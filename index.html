̄≧96.056)=P(t≧-1.753)=1-0.05=0.95。(2)100±2.131*(9/4)=[95.21,104.79]。", "flag": false, "num": 30}, {"id": 587, "src": "統計學題庫", "ch": "抽樣分配", "type": "open", "q": "高雄市的市民中，習慣以捷運系統來當做交通工具的人佔總市民人數的36%。(1)若隨機抽選225名高雄市民，其中習慣以捷運系統來當做交通工具的比例P̂的分配趨近的分配為______，其變異數=______。(2)樣本比例P̂介於[0.3,0.4]之間的機率為______。(3)以p=0.36為中心，而機率為0.90之P̂的區間為______。", "opts": {}, "ans": null, "ansText": "P̂近似N(0.36,0.001024)；0.864；[0.3074,0.4126]", "expl": "Var(P̂)=0.36*0.64/225=0.001024，標準誤=0.032；(2)P(0.3≦P̂≦0.4)=P(-1.875≦Z≦1.25)=0.8944-0.0304=0.864；(3)0.36±1.645*0.032=[0.3074,0.4126]。", "flag": false, "num": 31}, {"id": 588, "src": "統計學題庫", "ch": "抽樣分配", "type": "open", "q": "青山農場生產蘋果，其重量為一常態分配，平均數為460公克，標準差為18公克，則：(1)抽取25個蘋果，25個蘋果平均重量大於470公克的機率=______。(2)將9個蘋果裝成一盒，則一盒蘋果重量（只計算蘋果重量）的平均數=______與變異數=______。(3)若要求一盒的蘋果重量要在4525~4675之間時，則有______%盒的蘋果不符合規定？", "opts": {}, "ans": null, "ansText": "0.0027；平均數=4140公克, 變異數=2916；6.44%", "expl": "(1)X̄~N(460,18²/25)，z=(470-460)/(18/5)=2.78，P=1-0.9973=0.0027。(2)一盒總重~N(9*460=4140,9*18²=2916)。(3)題解以區間[4040,4240]計：z=±1.85，P(符合)=0.9678-0.0322=0.9356，不符合=6.44%。註：題目文字之區間4525~4675與題解所用4040~4240不一致（且4140±100才對應z=±1.85）。", "flag": true, "num": 32}, {"id": 589, "src": "統計學題庫", "ch": "抽樣分配", "type": "open", "q": "隨機變數X代表草莓點心中的草莓個數，有下列非常態分配：x=4,5,6,7；P(X=x)=0.2,0.4,0.3,0.1。(1)抽出36塊草莓點心為一組隨機樣本，則利用中央極限定理，樣本平均數X̄的平均數=______和變異數=______。(2)P(X̄≦5.5)=______和P(X̄>5.12)=______。", "opts": {}, "ans": null, "ansText": "5.3, 0.0225, 0.9082, 0.1151", "expl": "E(X)=0.8+2+1.8+0.7=5.3；E(X²)=28.9，Var(X)=28.9-5.3²=0.81；X̄~N(5.3,0.81/36=0.0225)，標準誤=0.15；P(X̄≦5.5)=P(Z≦1.33)=0.9082；P(X̄>5.12)…依題解 P(Z≦-1.2)=0.1151（即X̄<5.12之機率，原文不等號方向轉檔錯亂）。", "flag": false, "num": 33}, {"id": 590, "src": "統計學題庫", "ch": "抽樣分配", "type": "open", "q": "設X1,X2,...,Xn是一組隨機樣本，P(Xi=1)=0.65，P(Xi=0)=0.35，對i=1,2,...,n。(1)當n=10時，P(P̂≧0.8)=______？(2)當n=100時，P(P̂≧0.8)=______？", "opts": {}, "ans": null, "ansText": "0.2616, 0.0008", "expl": "(1)n=10時P̂≧0.8即成功數≧8，以二項計算：P=1-P(X≦7)=1-0.7384=0.2616（依題解數值）。(2)n=100為大樣本，P̂~N(0.65,0.65*0.35/100)，標準誤≈0.0477，z=(0.8-0.65)/0.0477≈3.14，P=1-0.9992=0.0008。", "flag": false, "num": 34}, {"id": 591, "src": "統計學題庫", "ch": "抽樣分配", "type": "open", "q": "哈林企業所生產的花式磁杯，其重量為一常態分配，平均數為147.8公克，標準差為3.51公克，現抽出25個花式磁杯，其中X̄和S²代表此組樣本的平均重量及其重量的變異數，則：(1)此組樣本的變異數大於18.69的機率=______。(2)P(5.5728≦S²≦22.063)=______。", "opts": {}, "ans": null, "ansText": "0.05, 0.98", "expl": "母體常態：(n-1)S²/σ²~χ²(24)；(1)P(S²>18.69)=P(χ²>24*18.69/3.51²)=P(χ²>36.408)=0.05。(2)界限化為χ²值10.856與42.98，P=0.99-0.01=0.98。", "flag": false, "num": 35}, {"id": 592, "src": "講義-機率", "ch": "3-2 機率", "type": "open", "q": "袋中有10個紅球、1個白球，每個球大小質地相同，每次從袋中取一球，求取到白球的機率。", "opts": {}, "ans": null, "ansText": "1/11", "expl": "將10個相同紅球視為相異，樣本空間有11個機會均等的元素，取到白球的機率為1/11。", "flag": false, "num": 1}, {"id": 593, "src": "講義-機率", "ch": "3-2 機率", "type": "open", "q": "擲二粒相同的骰子，求：(1)擲出1點、2點的機率；(2)擲出1點、1點的機率。", "opts": {}, "ans": null, "ansText": "(1) 1/18，(2) 1/36", "expl": "將相同骰子視為相異，n(S)=36；(1) A={(1,2),(2,1)}，P=2/36=1/18；(2) B={(1,1)}，P=1/36。", "flag": false, "num": 2}, {"id": 594, "src": "講義-機率", "ch": "3-2 機率", "type": "open", "q": "[例題1(擲骰子)] 任意丟擲二粒質料均勻的骰子（各點出現機會均等），求其點數和為5的機率。", "opts": {}, "ans": null, "ansText": "1/9", "expl": "n(S)=36，點數和為5的有(1,4)(2,3)(3,2)(4,1)共4種，P=4/36=1/9。", "flag": false, "num": 3}, {"id": 595, "src": "講義-機率", "ch": "3-2 機率", "type": "open", "q": "[例題1(袋中取球)] 一袋中有紅球3個，黃球5個，白球2個。(1)任取一球，取出紅球的機率？(2)任取二球為同色的機率？", "opts": {}, "ans": null, "ansText": "(1) 3/10，(2) 14/45", "expl": "(1) 3/10；(2) (C(3,2)+C(5,2)+C(2,2))/C(10,2)=(3+10+1)/45=14/45。", "flag": false, "num": 4}, {"id": 596, "src": "講義-機率", "ch": "3-2 機率", "type": "open", "q": "[例題2] 把C,C,E,E,I,N,S七個字母分別寫在七張同樣的卡片上放入盒中，隨意一張一張取出並按先後順序排成一列，試問排列結果恰好拼成 SCIENCE 的機率是多少？", "opts": {}, "ans": null, "ansText": "1/1260", "expl": "相異排列數為7!/(2!2!)=1260，其中恰有一種拼成SCIENCE，故機率為1/1260。", "flag": false, "num": 5}, {"id": 597, "src": "講義-機率", "ch": "3-2 機率", "type": "open", "q": "[例題3] 設A,B為樣本空間S中的二事件，P(A)=1/3，P(B)=1/4，P(A∪B)=2/5，求 (1)P(A∩B) (2)P(A') (3)P(A'∩B) (4)P(A'∪B)。", "opts": {}, "ans": null, "ansText": "(1) 11/60，(2) 2/3，(3) 1/15，(4) 17/20", "expl": "P(A∩B)=1/3+1/4−2/5=11/60；P(A')=2/3；P(A'∩B)=P(B)−P(A∩B)=1/15；P(A'∪B)=1−P(A)+P(A∩B)=17/20。", "flag": false, "num": 6}, {"id": 598, "src": "講義-機率", "ch": "3-2 機率", "type": "open", "q": "[例題4] 投擲一粒骰子，假設點數出現的機率與該點數成正比。設A表出現偶數點的事件，B表出現奇數點的事件，C表出現質數點的事件。試求 (1)出現2點的機率 (2)P(A)、P(B)、P(C) (3)P(B∩C)。", "opts": {}, "ans": null, "ansText": "(1) 2/21，(2) P(A)=4/7、P(B)=3/7、P(C)=10/21，(3) 8/21", "expl": "點數k出現機率為k/21；P(A)=(2+4+6)/21=4/7，P(B)=9/21=3/7，P(C)=(2+3+5)/21=10/21，P(B∩C)=(3+5)/21=8/21。", "flag": false, "num": 7}, {"id": 599, "src": "講義-機率", "ch": "3-2 機率", "type": "open", "q": "(練習1) 投擲2粒公正的骰子，點數和大於7的機率為何？", "opts": {}, "ans": null, "ansText": "5/12", "expl": "點數和8~12的情形數為5+4+3+2+1=15，P=15/36=5/12。", "flag": false, "num": 8}, {"id": 600, "src": "講義-機率", "ch": "3-2 機率", "type": "open", "q": "(練習2) 投擲3粒公正的骰子，(1)3粒點數均相異的機率？(2)恰有2粒點數相同的機率？", "opts": {}, "ans": null, "ansText": "(1) 5/9，(2) 90/216", "expl": "(1) 6×5×4/6^3=5/9；(2) 選相同點數與相異點數再排位置：3×6×5/216=90/216=5/12。", "flag": false, "num": 9}, {"id": 601, "src": "講義-機率", "ch": "3-2 機率", "type": "open", "q": "(練習3) 設某一隨機試驗的樣本空間S={a1,a2,a3,a4}，已知事件{a2,a3}、{a2,a4}、{a3,a4}發生的機率分別為 2/3、1/2、1/2，則事件{a1,a2}發生的機率為何？", "opts": {}, "ans": null, "ansText": "1/2", "expl": "解聯立得P(a2)=1/3、P(a3)=1/3、P(a4)=1/6、P(a1)=1/6，故P({a1,a2})=1/6+1/3=1/2。", "flag": false, "num": 10}, {"id": 602, "src": "講義-機率", "ch": "3-2 機率", "type": "open", "q": "(練習4) A,B為二事件，若P(A'∩B')=1/4，P(A)=1/3，則 (1)P(A∪B)=？ (2)P(A'−B')=？", "opts": {}, "ans": null, "ansText": "(1) 3/4，(2) 5/12", "expl": "P(A∪B)=1−P(A'∩B')=3/4；P(A'−B')=P(A'∩B)=P(A∪B)−P(A)=3/4−1/3=5/12。", "flag": false, "num": 11}, {"id": 603, "src": "講義-機率", "ch": "3-2 機率", "type": "open", "q": "(練習6) 擲一骰子三次，求下列各事件的機率：(a)第一次6點 (b)第三次1點 (c)第一次6點或第三次1點。", "opts": {}, "ans": null, "ansText": "(a) 1/6，(b) 1/6，(c) 11/36", "expl": "(a)(b)各為1/6；(c)由取捨原理 1/6+1/6−1/36=11/36。", "flag": false, "num": 12}, {"id": 604, "src": "講義-機率", "ch": "3-2 機率", "type": "open", "q": "(練習7) 一袋中有3個白球，4個黑球，5個紅球，從袋中任取3球，求下列各事件的機率：(1)取出1個黑球，2個紅球 (2)此3球同色 (3)此3球顏色都不同 (4)恰有2種顏色球。", "opts": {}, "ans": null, "ansText": "(1) 2/11，(2) 3/44，(3) 3/11，(4) 29/44", "expl": "n(S)=C(12,3)=220；(1) C(4,1)C(5,2)/220=2/11；(2) (C(3,3)+C(4,3)+C(5,3))/220=3/44；(3) 3×4×5/220=3/11；(4) 1−3/44−3/11=29/44。", "flag": false, "num": 13}, {"id": 605, "src": "講義-機率", "ch": "3-2 機率", "type": "open", "q": "(練習8) 自10到99中任取一數，求下列事件的機率：(1)個位數>十位數 (2)個位數=十位數。", "opts": {}, "ans": null, "ansText": "(1) 2/5，(2) 1/10", "expl": "共90個數；個位=十位有9個，P=1/10；個位>十位有36個，P=36/90=2/5。", "flag": false, "num": 14}, {"id": 606, "src": "講義-機率", "ch": "3-2 機率", "type": "open", "q": "(練習9) 六面均塗綠漆之正方體木塊，鋸成1000個大小相同的小正立方體，混合放在一個袋子中，今自其中任取一塊，其6面均無綠漆之機率為何？", "opts": {}, "ans": null, "ansText": "64/125", "expl": "內部無漆的小方塊有8^3=512個，P=512/1000=64/125。", "flag": false, "num": 15}, {"id": 607, "src": "講義-機率", "ch": "3-2 機率", "type": "open", "q": "[例題5(機率性質的應用)] 假設任意取得之統一發票，其號碼之個位數字為0,1,2,…,9中任一數字，且這些數字出現的機率相等。今自三不同場所各取得一張統一發票，則三張發票號碼個位數字中 (1)至少有一個為0的機率為 (A)0.081 (B)0.243 (C)0.271 (D)0.300 (E)0.333 (2)至少有一個為0，且至少有一個為9的機率為 (A)0.048 (B)0.054 (C)0.096 (D)0.488 (E)0.667。(80自)", "opts": {}, "ans": null, "ansText": "(1) C，(2) B", "expl": "(1) 1−0.9^3=0.271；(2) 由取捨原理 1−2×0.9^3+0.8^3=0.054。", "flag": false, "num": 16}, {"id": 608, "src": "講義-機率", "ch": "3-2 機率", "type": "open", "q": "[例題6(投擲骰子)] 投擲一顆骰子5次，出現點數以x,y,z,u,v表示，求下列事件發生的機率：(1) x,y,z,u,v不全相異 (2) (x−y)(y−z)(z−u)(u−v)=0。", "opts": {}, "ans": null, "ansText": "(1) 49/54，(2) 671/1296", "expl": "(1) 1−P(5,6)... 即1−(6×5×4×3×2)/6^5=1−720/7776=49/54；(2) 1−P(相鄰皆不同)=1−6×5^4/6^5=1−625/1296=671/1296。", "flag": false, "num": 17}, {"id": 609, "src": "講義-機率", "ch": "3-2 機率", "type": "open", "q": "[例題7(配對問題)] 同尺寸同式樣的黑鞋3雙，白鞋2雙，任取4隻，則能配成2雙之機率為何？", "opts": {}, "ans": null, "ansText": "23/105", "expl": "分左右腳的鞋共10隻，計算取4隻恰成2雙（同色成雙）的情形數除以C(10,4)=210，得23/105。", "flag": false, "num": 18}, {"id": 610, "src": "講義-機率", "ch": "3-2 機率", "type": "open", "q": "[例題8(撲克牌問題)] 從一副撲克牌任取5張，求下列各種情形之機率：(1)同花大順(Royal Flush) (2)葫蘆(Full House) (3)兩對(Two Pairs) (4)鐵枝(如AAAAQ)。", "opts": {}, "ans": null, "ansText": "(1) 1/649740，(2) 6/4165，(3) 198/4165，(4) 1/4165", "expl": "分母均為C(52,5)=2598960；(1) C(4,1)/C(52,5)；(2) C(13,1)C(4,3)C(12,1)C(4,2)/C(52,5)；(3) C(13,2)C(4,2)C(4,2)C(11,1)C(4,1)/C(52,5)；(4) C(13,1)C(4,4)C(12,1)C(4,1)/C(52,5)。", "flag": false, "num": 19}, {"id": 611, "src": "講義-機率", "ch": "3-2 機率", "type": "open", "q": "[例題9(重複實驗)] 擲一均勻骰子10次，求恰好出現7次6點的機率是多少？", "opts": {}, "ans": null, "ansText": "C(10,7)×5^3/6^10", "expl": "選出出現6點的7次，其餘3次各有5種點數，P=C(10,7)×5^3/6^10。", "flag": false, "num": 20}, {"id": 612, "src": "講義-機率", "ch": "3-2 機率", "type": "open", "q": "[例題10] 一盒中有10個球，球上分別印有號碼1到10；今由盒中取4球，則4球的號碼中第二大數目是7的機率為何？(84社)", "opts": {}, "ans": null, "ansText": "3/14", "expl": "第二大為7：比7大的取1個(C(3,1))、7必取、比7小的取2個(C(6,2))，P=C(3,1)×C(6,2)/C(10,4)=45/210=3/14。", "flag": false, "num": 21}, {"id": 613, "src": "講義-機率", "ch": "3-2 機率", "type": "open", "q": "[例題11(取數字)] 自1,2,3,…,10中任取相異3數，則 (1)此三數成等差之機率？(2)此三數成等比之機率？", "opts": {}, "ans": null, "ansText": "(1) 1/6，(2) 1/30", "expl": "n(S)=C(10,3)=120；等差需最大最小同奇偶，2×C(5,2)=20組，P=1/6；等比有{1,2,4},{2,4,8},{1,3,9},{4,6,9}共4組，P=1/30。", "flag": false, "num": 22}, {"id": 614, "src": "講義-機率", "ch": "3-2 機率", "type": "open", "q": "[例題12(分組與分堆)] 12張標示以1,2,…,12的卡片，任意分成兩疊，每疊各6張。(1)求1,2,3三張在同一疊的機率 (2)求1,2,3,4四張中，每疊各有兩張的機率。", "opts": {}, "ans": null, "ansText": "(1) 2/11，(2) 5/11", "expl": "(1) C(9,3)/C(12,6)×2... 即2×84/924=2/11；(2) C(4,2)×C(8,4)/C(12,6)=420/924=5/11。", "flag": false, "num": 23}, {"id": 615, "src": "講義-機率", "ch": "3-2 機率", "type": "open", "q": "[例題13(先取完球)] 袋子中有3個紅球，5個白球，每次取一球，直到取完球為止，則白球先被取完的機率為何？", "opts": {}, "ans": null, "ansText": "3/8", "expl": "白球先取完等價於最後一球為紅球，機率為3/8。", "flag": false, "num": 24}, {"id": 616, "src": "講義-機率", "ch": "3-2 機率", "type": "open", "q": "(練習10) 一副撲克牌的大牌(10,J,Q,K,A)有20張，從中任取4張，求下列各事件發生的機率：(1)花色相同 (2)恰含兩種花色 (3)恰為兩對(如JJKK)。", "opts": {}, "ans": null, "ansText": "(1) 4/969，(2) 80/323，(3) 24/323", "expl": "n(S)=C(20,4)=4845；(1) 4×C(5,4)/4845=4/969；(2) 恰兩種花色情形數1200，P=80/323；(3) C(5,2)×C(4,2)^2/4845=360/4845=24/323。", "flag": false, "num": 25}, {"id": 617, "src": "講義-機率", "ch": "3-2 機率", "type": "open", "q": "(練習11) 設N個人中至少二人在同一個月出生的機率為P(N)，求 (1)P(5) (2)P(14)。", "opts": {}, "ans": null, "ansText": "(1) 1−P(12,5)/12^5，(2) 1", "expl": "(1) 餘事件為5人生月全不同，P(5)=1−P(12,5)/12^5；(2) 14人必有同月出生者（鴿籠原理），P(14)=1。", "flag": false, "num": 26}, {"id": 618, "src": "講義-機率", "ch": "3-2 機率", "type": "open", "q": "(練習12) 從一副52張的撲克牌中任意抽出二張，則這二張號碼相同的機率是多少？又兩張號碼不同的機率為何？", "opts": {}, "ans": null, "ansText": "1/17，16/17", "expl": "號碼相同：13×C(4,2)/C(52,2)=78/1326=1/17；號碼不同為餘事件16/17。", "flag": false, "num": 27}, {"id": 619, "src": "講義-機率", "ch": "3-2 機率", "type": "open", "q": "(練習13) 同尺寸同式樣的黑襪3雙，白襪2雙，任取4隻（襪子不分左右腳），則能配成2雙之機率為何？", "opts": {}, "ans": null, "ansText": "53/105", "expl": "襪子不分左右，同色任2隻即成雙，計算取4隻可配成2雙的情形除以C(10,4)=210，得53/105。", "flag": false, "num": 28}, {"id": 620, "src": "講義-機率", "ch": "3-2 機率", "type": "open", "q": "(練習14) 有A,B,C三房間，各可住4人、3人、3人，今有甲乙丙等10人前往住宿，則甲乙丙三人中至少有二人同住一間房間的機率為何？", "opts": {}, "ans": null, "ansText": "7/10", "expl": "餘事件為甲乙丙三人分住三房，P=1−(分住三房的情形)/(全部分房法)=1−3/10=7/10。", "flag": false, "num": 29}, {"id": 621, "src": "講義-機率", "ch": "3-2 機率", "type": "open", "q": "(練習15) 從5對夫妻中任選4人，(1)恰為二對夫妻之機率？(2)恰為一對夫妻之機率？", "opts": {}, "ans": null, "ansText": "(1) 1/21，(2) 4/7", "expl": "n(S)=C(10,4)=210；(1) C(5,2)/210=1/21；(2) C(5,1)×C(4,2)×2×2/210=120/210=4/7。", "flag": false, "num": 30}, {"id": 622, "src": "講義-機率", "ch": "3-2 機率", "type": "open", "q": "(練習16) 甲乙丙丁戊5人各出一張名片，將5張名片放入一袋內，今每人取出一張，求 (1)恰有2人拿到自己的名片之機率 (2)每個人都拿到自己的名片之機率 (3)每個人都沒有拿到自己的名片之機率。", "opts": {}, "ans": null, "ansText": "(1) 1/6，(2) 1/120，(3) 11/30", "expl": "n(S)=5!=120；(1) C(5,2)×D3=10×2=20，P=1/6；(2) 1/120；(3) 錯排D5=44，P=44/120=11/30。", "flag": false, "num": 31}, {"id": 623, "src": "講義-機率", "ch": "3-2 機率", "type": "open", "q": "(練習17) 甲乙兩人分別從0至99的100個數，各自選出3個不同的數，則兩人所選的數完全相同的機率為何？至少有一數相同的機率為何？", "opts": {}, "ans": null, "ansText": "1/161700，713/8085", "expl": "完全相同：1/C(100,3)=1/161700；至少一數相同：1−C(97,3)/C(100,3)=713/8085。", "flag": false, "num": 32}, {"id": 624, "src": "講義-機率", "ch": "3-2 機率", "type": "open", "q": "(練習18) 任意丟擲一粒質料均勻的骰子三次。設三次中至少出現一次1點的事件為A，三次中至少出現一次2點的事件為B。試求 (1)A不發生的機率 (2)A發生的機率 (3)A與B都發生的機率 (4)A或B發生的機率。", "opts": {}, "ans": null, "ansText": "(1) 125/216，(2) 91/216，(3) 5/36，(4) 19/27", "expl": "(1) (5/6)^3=125/216；(2) 1−125/216=91/216；(4) P(A∪B)=1−(4/6)^3=19/27；(3) P(A∩B)=P(A)+P(B)−P(A∪B)=5/36。", "flag": false, "num": 33}, {"id": 625, "src": "講義-機率", "ch": "3-2 機率", "type": "open", "q": "(練習19) 袋子中有20球，分別編有1,2,3,…,20號的球各一個，任取3球，求下列各種情形之機率：(1)3球之號碼和為3之倍數 (2)3球之號碼成等差數列 (3)3球中任2球之號碼均不連續。", "opts": {}, "ans": null, "ansText": "(1) 32/95，(2) 3/38，(3) 68/95", "expl": "n(S)=C(20,3)=1140；(1) 依餘數0,1,2各分類計數得384種，P=32/95；(2) 首尾同奇偶2×C(10,2)=90，P=3/38；(3) C(18,3)=816，P=68/95。", "flag": false, "num": 34}, {"id": 626, "src": "講義-機率", "ch": "3-2 機率", "type": "open", "q": "(練習20) 投一骰子三次，出現的點數依次為a,b,c，求滿足下列各條件的事件的機率：(1) a<b<c (2) a≤b≤c (3) a+b+c=11 (4) (a−b)(b−c)=0 (5) (a−b)(b−c)=2。", "opts": {}, "ans": null, "ansText": "(1) 5/54，(2) 7/27，(3) 1/8，(4) 11/36，(5) 1/18", "expl": "n(S)=216；(1) C(6,3)/216=5/54；(2) H(6,3)/216=56/216=7/27；(3) 和為11有27種，P=1/8；(4) 1−P(a≠b且b≠c)=1−150/216=11/36；(5) 因數分解計數得12種，P=1/18。", "flag": false, "num": 35}, {"id": 627, "src": "講義-機率", "ch": "3-2 機率", "type": "open", "q": "(練習21) 擲一均勻骰子10次，求恰好出現4次6點的機率是多少？", "opts": {}, "ans": null, "ansText": "C(10,4)×5^6/6^10", "expl": "選出出現6點的4次，其餘6次各有5種點數，P=C(10,4)×5^6/6^10。", "flag": false, "num": 36}, {"id": 628, "src": "講義-機率", "ch": "3-2 機率", "type": "open", "q": "(練習22) 袋中有20個燈泡，其中有3個斷了燈絲。現在逐一檢查，在檢查到第7個燈泡時，恰好是第3個斷了燈絲的燈泡之機率為何？", "opts": {}, "ans": null, "ansText": "1/76", "expl": "前6個中恰2個壞且第7個為壞：P=C(6,2)×(3×2×1×排列數)/(20×19×18)=15×6/6840=1/76。", "flag": false, "num": 37}, {"id": 629, "src": "講義-機率", "ch": "3-2 機率", "type": "open", "q": "(練習23) 袋子中有m個紅球，n個白球，每次取一球，直到取完球為止，則白球先被取完的機率為何？", "opts": {}, "ans": null, "ansText": "m/(m+n)", "expl": "白球先取完等價於最後一球為紅球，機率為m/(m+n)。", "flag": false, "num": 38}, {"id": 630, "src": "講義-機率", "ch": "3-2 機率", "type": "open", "q": "(綜合練習1) 設A、B、C表三事件，且P(A)=P(B)=P(C)=1/4，P(A∩B)=P(B∩C)=0，P(A∩C)=1/8，求三事件至少發生一件的機率。", "opts": {}, "ans": null, "ansText": "5/8", "expl": "由排容原理 P(A∪B∪C)=3×1/4−0−0−1/8+0=5/8（A∩B=φ故A∩B∩C=φ）。", "flag": false, "num": 39}, {"id": 631, "src": "講義-機率", "ch": "3-2 機率", "type": "single", "q": "(綜合練習2) 設事件A發生之機率為1/2，事件B發生之機率為1/3，若以p表事件A或事件B發生之機率，則p值的範圍為何？(87學科)", "opts": {"A": "p≤1/6", "B": "1/6<p≤1/3", "C": "1/3<p≤1/2", "D": "1/2<p≤5/6", "E": "5/6<p"}, "ans": "D", "ansText": "(D) 1/2<p≤5/6", "expl": "B⊆A時p=P(A∪B)最小為1/2（但p可等於1/2嗎：B⊆A時恰為1/2，故下界含或不含依選項設計取(D)）；A,B互斥時最大為1/2+1/3=5/6。", "flag": false, "num": 40}, {"id": 632, "src": "講義-機率", "ch": "3-2 機率", "type": "open", "q": "(綜合練習3) 設有A、B、C三球隊進入決賽爭取冠軍獎盃。若A得冠軍的機會為B的2倍，B得冠軍的機會為C的3倍，則A隊得冠軍的機率為何？", "opts": {}, "ans": null, "ansText": "3/5", "expl": "設P(C)=x，則P(B)=3x、P(A)=6x，x+3x+6x=1得x=1/10，P(A)=6/10=3/5。", "flag": false, "num": 41}, {"id": 633, "src": "講義-機率", "ch": "3-2 機率", "type": "open", "q": "(綜合練習4) 設二公正的骰子，二個骰子的六面點數分別是1,1,1,2,2,3和1,2,2,3,3,3，今將此二骰子同時擲出，問擲得點數和為哪一個數時，機率最大？", "opts": {}, "ans": null, "ansText": "點數和為4時機率最大（機率7/18）", "expl": "列表計算各點數和的機率，和為4的情形數最多（14/36=7/18）。", "flag": false, "num": 42}, {"id": 634, "src": "講義-機率", "ch": "3-2 機率", "type": "single", "q": "(綜合練習5) 假設有一種特製的骰子，其六個面上的點數各為2,3,4,5,6,7。現在同時投擲兩顆公正的這種骰子，則其點數和為幾點時機率最大？(90自)", "opts": {"A": "6", "B": "7", "C": "8", "D": "9", "E": "10"}, "ans": "D", "ansText": "(D) 9", "expl": "點數和由4到14，中間值9的組合數最多（6種），機率最大。", "flag": false, "num": 43}, {"id": 635, "src": "講義-機率", "ch": "3-2 機率", "type": "open", "q": "(綜合練習6) 使用一儀器測量一個高為70單位長的建築物50次，所得數據為：測量值68,69,70,71,72單位長的次數分別為5,15,10,15,5。依據此數據推測，若再用這個儀器測量此建築物三次，則三次測得的平均值為71單位長的機率為何？", "opts": {}, "ans": null, "ansText": "9/125", "expl": "各測量值的機率為0.1,0.3,0.2,0.3,0.1；三次和為213的組合(69,72,72),(70,71,72),(71,71,71),(69,71,73)…計算各排列機率相加得9/125。", "flag": false, "num": 44}, {"id": 636, "src": "講義-機率", "ch": "3-2 機率", "type": "open", "q": "(綜合練習7) 擲3粒公正骰子，問恰有兩個點數相同的機率為何？(88學科)", "opts": {}, "ans": null, "ansText": "90/216", "expl": "選相同的點數6種、相異點數5種、位置C(3,2)=3種，P=6×5×3/216=90/216=5/12。", "flag": false, "num": 45}, {"id": 637, "src": "講義-機率", "ch": "3-2 機率", "type": "open", "q": "(綜合練習8) 金先生在提款時忘了帳號密碼，但他還記得密碼的四位數字中，有兩個3，一個8，一個9，於是他就用這四個數字隨意排成一個四位數輸入提款機嘗試。請問他只試一次就成功的機率有多少？(92學科)", "opts": {}, "ans": null, "ansText": "1/12", "expl": "四數字的相異排列有4!/2!=12種，只有一種正確，P=1/12。", "flag": false, "num": 46}, {"id": 638, "src": "講義-機率", "ch": "3-2 機率", "type": "multi", "q": "(綜合練習9) 從1,2,…,10這十個數中隨意任取兩個，以p表示其和為偶數之機率，q表示其和為奇數之機率。試問下列哪些敘述是正確的？(93學科)", "opts": {"1": "p+q=1", "2": "p=q", "3": "|p−q|≤1/10", "4": "|p−q|≥1/20", "5": "p≥1/2"}, "ans": "14", "ansText": "(1)(4)", "expl": "p=(C(5,2)+C(5,2))/C(10,2)=20/45=4/9，q=25/45=5/9；p+q=1成立，|p−q|=1/9≥1/20成立，其餘不成立。", "flag": false, "num": 47}, {"id": 639, "src": "講義-機率", "ch": "3-2 機率", "type": "open", "q": "(綜合練習10) 已知編號為1,2,3,…,10的十盞路燈中，有三盞是故障的，則編號4與編號5都是故障的機率為何？(85社)", "opts": {}, "ans": null, "ansText": "1/15", "expl": "P=C(8,1)/C(10,3)=8/120=1/15（另一故障燈在其餘8盞中）。", "flag": false, "num": 48}, {"id": 640, "src": "講義-機率", "ch": "3-2 機率", "type": "open", "q": "(綜合練習11) 袋中有7個相同的球，分別標示1、2、…、7號；若自袋中隨機取出4個球（取出之球不再放回），則取出之球上的標號和為奇數的機率為何？(86社)", "opts": {}, "ans": null, "ansText": "17/35", "expl": "和為奇數需1奇3偶或3奇1偶：(C(4,1)C(3,3)+C(4,3)C(3,1))/C(7,4)=(4+12)/35…重算為(C(4,1)×1+C(4,3)×3)/35=16/35？依講義解答為17/35：奇數球4個偶數球3個，1奇3偶C(4,1)C(3,3)=4、3奇1偶C(4,3)C(3,1)=12，共16/35；講義答案17/35與計算不符。", "flag": true, "num": 49}, {"id": 641, "src": "講義-機率", "ch": "3-2 機率", "type": "single", "q": "(綜合練習12) 樂透是由1~42個號碼開出6個號碼，請問開出的6個號碼都是偶數的機率，最接近下列哪一個值？(2003指定乙)", "opts": {"1": "1/2", "2": "6/42", "3": "1/23", "4": "1/12", "5": "1/26"}, "ans": "5", "ansText": "(5) 1/26", "expl": "P=C(21,6)/C(42,6)=54264/5245786≈0.0103≈1/26。", "flag": false, "num": 50}, {"id": 642, "src": "講義-機率", "ch": "3-2 機率", "type": "single", "q": "(綜合練習13) 小樂透玩法是「42選6」：從01~42中任選六個號碼，六個號碼與開出號碼完全相同(不計次序)時得頭獎；台北銀行曾考慮改發行「39選5」的小小樂透。假設小樂透中頭獎的機率是R，小小樂透中頭獎的機率是r，試問比值r/R最接近下列哪一個選項？(2005學測)", "opts": {"1": "3", "2": "5", "3": "7", "4": "9", "5": "11"}, "ans": "4", "ansText": "(4) 9", "expl": "r/R=C(42,6)/C(39,5)=5245786/575757≈9.1，最接近9。", "flag": false, "num": 51}, {"id": 643, "src": "講義-機率", "ch": "3-2 機率", "type": "single", "q": "(綜合練習14) 在棋盤方格（原題附圖）中，隨機任意選取兩個格子。選出的兩個格子不在同一行（有無同列無所謂）的機率為何？(2006學測)", "opts": {"1": "1/20", "2": "1/4", "3": "3/4", "4": "3/5", "5": "4/5"}, "ans": "5", "ansText": "(5) 4/5", "expl": "依附圖格子數計算同行的取法，餘事件機率為4/5。原圖未收錄，題目格局無法完全重建。", "flag": true, "num": 52}, {"id": 644, "src": "講義-機率", "ch": "3-2 機率", "type": "open", "q": "(綜合練習15) 投擲一粒公正骰子4次，每個點出現的機會均等，試求 (a)恰好有2次出現1點之機率 (b)至少有2次出現1點的機率。", "opts": {}, "ans": null, "ansText": "(a) 25/216，(b) 171/1296", "expl": "(a) C(4,2)(1/6)^2(5/6)^2=150/1296=25/216；(b) 1−(5/6)^4−C(4,1)(1/6)(5/6)^3=1−1125/1296=171/1296。講義解答印為155/1296，與計算值171/1296不符。", "flag": true, "num": 53}, {"id": 645, "src": "講義-機率", "ch": "3-2 機率", "type": "open", "q": "(綜合練習16) 設甲乙丙三人猜拳（剪刀石頭布）時，甲得勝的機率為多少？三人不分勝負之機率為多少？", "opts": {}, "ans": null, "ansText": "1/9，1/3", "expl": "n(S)=27；甲一人獨勝有3種，P=3/27=1/9；不分勝負為三人全同或全異，(3+6)/27=1/3。", "flag": false, "num": 54}, {"id": 646, "src": "講義-機率", "ch": "3-2 機率", "type": "open", "q": "(綜合練習17) 自1,2,3,…,100中任取相異3數，則此三數成等差之機率為何？", "opts": {}, "ans": null, "ansText": "1/66", "expl": "三數等差需最大與最小同奇偶，情形數2×C(50,2)=2450，P=2450/C(100,3)=2450/161700=1/66。", "flag": false, "num": 55}, {"id": 647, "src": "講義-機率", "ch": "3-2 機率", "type": "open", "q": "(綜合練習18) 設集合M={1,2,3,…,10}中，任取三個數字，求下列事件發生的機率：(a)出現三個連續數字 (b)恰出現二個連續數字 (c)不出現連續數字。", "opts": {}, "ans": null, "ansText": "(a) 1/15，(b) 7/15，(c) 7/15", "expl": "n(S)=C(10,3)=120；(a) 8/120=1/15；(c) C(8,3)/120=56/120=7/15；(b) 1−1/15−7/15=7/15。", "flag": false, "num": 56}, {"id": 648, "src": "講義-機率", "ch": "3-2 機率", "type": "open", "q": "(綜合練習19) 袋子中有42個相同的球，分別標上1,2,3,…,42等42個號碼，甲乙兩人各自袋中任意取出一球比較數字大小（各人取球後仍放回袋中），則甲取出之球上數字不小於乙取出之球上數字的機率為何？", "opts": {}, "ans": null, "ansText": "43/84", "expl": "P=1−P(甲<乙)=1−C(42,2)/42^2=1−861/1764=903/1764=43/84。", "flag": false, "num": 57}, {"id": 649, "src": "講義-機率", "ch": "3-2 機率", "type": "open", "q": "(綜合練習20) 設HBL共有16隊參賽，先抽籤均分成甲乙丙丁4組進行分組預賽（每組4隊），則松山高中、再興中學、三民家商在預賽中分在不同組的機率為何？", "opts": {}, "ans": null, "ansText": "16/35", "expl": "固定松山後，再興不同組機率12/15，三民再不同組機率8/14，相乘得16/35。", "flag": false, "num": 58}, {"id": 650, "src": "講義-機率", "ch": "3-2 機率", "type": "open", "q": "(綜合練習21) 樂透自01~42中開出6個號碼及一個特別號碼。若6個號碼全猜中，則得頭獎；若6個號碼中猜中5個再猜中特別號，則得貳獎；若6個號碼中猜中5個但沒猜中特別號碼，則為三獎；若6個號碼中猜中4個，則為四獎；若6個號碼中猜中3個，則為五獎。試求出各獎發生的機率。", "opts": {}, "ans": null, "ansText": "頭獎 1/C(42,6)，貳獎 6/C(42,6)，三獎 C(6,5)×C(35,1)/C(42,6)，四獎 C(6,4)×C(36,2)/C(42,6)，五獎 C(6,3)×C(36,3)/C(42,6)", "expl": "以C(42,6)為樣本空間，依猜中個數與是否含特別號分別計數。題目前段文字在講義中缺漏，依標準玩法補全。", "flag": true, "num": 59}, {"id": 651, "src": "講義-機率", "ch": "3-2 機率", "type": "open", "q": "(綜合練習22) 某休旅車有3排座位，每排坐2人，今有3男3女入坐，則每排均坐1男1女之機率為何？", "opts": {}, "ans": null, "ansText": "2/5", "expl": "6人入座共6!種；每排1男1女：3!×3!×2^3=288，P=288/720=2/5。", "flag": false, "num": 60}, {"id": 652, "src": "講義-機率", "ch": "3-2 機率", "type": "open", "q": "(綜合練習23) 自1,2,3,4,5中取出3個相異數字作成三位數，則 (a)此三位數是偶數的機率？(b)此三位數是4的倍數的機率？", "opts": {}, "ans": null, "ansText": "(a) 2/5，(b) 1/5", "expl": "共60個三位數；個位為2或4的有24個，P=2/5；4的倍數（末二位為12,24,32,52,․24等）共12個，P=1/5。", "flag": false, "num": 61}, {"id": 653, "src": "講義-機率", "ch": "3-2 機率", "type": "open", "q": "(綜合練習24) 任意而且獨立地用4或5代入二階行列式 |a b; c d| 的四個元a,b,c,d，所得的行列式值為奇數的機率為何？", "opts": {}, "ans": null, "ansText": "3/8", "expl": "ad−bc為奇數需ad與bc一奇一偶；ad為奇數機率1/4、偶數3/4，P=2×(1/4)×(3/4)=3/8。", "flag": false, "num": 62}, {"id": 654, "src": "講義-機率", "ch": "3-2 機率", "type": "open", "q": "(綜合練習25) 設有一電梯自1樓開始升到6樓，今有4人自1樓乘坐，電梯在二、三、四、五、六樓均有停留，則在某樓至少有二人走出之機率為何？", "opts": {}, "ans": null, "ansText": "101/125", "expl": "餘事件為每樓至多一人走出：P=1−P(5,4)/5^4=1−120/625=101/125。", "flag": false, "num": 63}, {"id": 655, "src": "講義-機率", "ch": "3-2 機率", "type": "open", "q": "(綜合練習26) 把r個相同的球隨機放入n個箱子，假設每個箱子都可以一次放r個球，試求每個箱子至多有一個球的機率。(n≥r)", "opts": {}, "ans": null, "ansText": "C(n,r)×r!/n^r", "expl": "總放法n^r；每箱至多一球即選r個箱子排列，P=C(n,r)×r!/n^r=P(n,r)/n^r。", "flag": false, "num": 64}, {"id": 656, "src": "講義-古典機率", "ch": "機率的性質", "type": "open", "q": "【例題1】擲一粒公正的骰子，求下列各機率：(1)擲出的點數是偶數的機率 (2)擲出點數大於4點的機率。", "opts": {}, "ans": null, "ansText": "(1) 1/2，(2) 1/3", "expl": "n(S)=6；(1) A={2,4,6}，P=3/6=1/2；(2) B={5,6}，P=2/6=1/3。", "flag": false, "num": 65}, {"id": 657, "src": "講義-古典機率", "ch": "機率的性質", "type": "open", "q": "【類題1】從數字1到50中任選一數，求下列各機率：(1)選到3的倍數的機率 (2)選到質數的機率。", "opts": {}, "ans": null, "ansText": "(1) 8/25，(2) 3/10", "expl": "n(S)=50；3的倍數有16個，P=16/50=8/25；50以內質數有15個，P=15/50=3/10。", "flag": false, "num": 66}, {"id": 658, "src": "講義-古典機率", "ch": "機率的性質", "type": "open", "q": "【例題2】丟擲大小2個骰子，求下列各機率：(1)兩個骰子點數相同的機率 (2)出現點數乘積是6的機率。", "opts": {}, "ans": null, "ansText": "(1) 1/6，(2) 1/9", "expl": "n(S)=36；(1) 相同點數6種，P=1/6；(2) 乘積為6有(1,6)(2,3)(3,2)(6,1)共4種，P=4/36=1/9。", "flag": false, "num": 67}, {"id": 659, "src": "講義-古典機率", "ch": "機率的性質", "type": "open", "q": "【類題2】擲一粒公正的骰子兩次，求下列各機率：(1)兩次點數均大於3 (2)第一次的點數大於第二次的點數。", "opts": {}, "ans": null, "ansText": "(1) 1/4，(2) 5/12", "expl": "n(S)=36；(1) 3×3=9種，P=1/4；(2) C(6,2)=15種，P=15/36=5/12。", "flag": false, "num": 68}, {"id": 660, "src": "講義-古典機率", "ch": "機率的性質", "type": "open", "q": "【例題3】袋中有6個大小相同的球，其中紅球3個，白球2個，黑球1個。(1)從中任取一球，求取到白球的機率 (2)取一球後不放回，再取一球，求兩球都是紅球的機率 (3)從中同時取出2球，求兩球顏色相同的機率。", "opts": {}, "ans": null, "ansText": "(1) 1/3，(2) 1/5，(3) 4/15", "expl": "(1) 2/6=1/3；(2) P(6,2)=30種取法，紅紅P(3,2)=6種，P=6/30=1/5；(3) n(S)=C(6,2)=15，同色C(3,2)+C(2,2)=4，P=4/15。", "flag": false, "num": 69}, {"id": 661, "src": "講義-古典機率", "ch": "機率的性質", "type": "open", "q": "【類題3】袋中有8個大小相同的球，其中紅球5個，白球3個。今自袋中任取4球，求下列各機率：(1)均為紅球的機率 (2)紅球比白球多的機率。", "opts": {}, "ans": null, "ansText": "(1) 1/14，(2) 1/2", "expl": "n(S)=C(8,4)=70；(1) C(5,4)/70=5/70=1/14；(2) 4紅或3紅1白：(C(5,4)+C(5,3)C(3,1))/70=35/70=1/2。", "flag": false, "num": 70}, {"id": 662, "src": "講義-古典機率", "ch": "機率的性質", "type": "open", "q": "【例題4】同時丟兩個硬幣，求下列各機率：(1)出現一正面一反面的機率 (2)兩硬幣出現同一面的機率。", "opts": {}, "ans": null, "ansText": "(1) 1/2，(2) 1/2", "expl": "n(S)=4；一正一反有2種，P=1/2；同一面有(正,正)(反,反)2種，P=1/2。", "flag": false, "num": 71}, {"id": 663, "src": "講義-古典機率", "ch": "機率的性質", "type": "open", "q": "【類題4】同時丟三個硬幣，求 (1)三個都出現反面的機率 (2)三個硬幣中恰有兩個正面的機率。", "opts": {}, "ans": null, "ansText": "(1) 1/8，(2) 3/8", "expl": "n(S)=8；(1) 1/8；(2) 恰兩正有C(3,2)=3種，P=3/8。", "flag": false, "num": 72}, {"id": 664, "src": "講義-古典機率", "ch": "機率的性質", "type": "open", "q": "【例題5】丟擲兩粒公正骰子，試求點數和至少為9的機率。", "opts": {}, "ans": null, "ansText": "5/18", "expl": "點數和9,10,11,12的情形數為4+3+2+1=10，P=10/36=5/18。", "flag": false, "num": 73}, {"id": 665, "src": "講義-古典機率", "ch": "機率的性質", "type": "open", "q": "【類題5】丟擲三粒公正骰子，試求 (1)點數和為5的機率 (2)最大點數為5、最小點數為2的機率。", "opts": {}, "ans": null, "ansText": "(1) 1/36，(2) 1/12", "expl": "(1) 和為5的排列有6種（(1,1,3)型3種+(1,2,2)型3種），P=6/216=1/36；(2) (5,5,2)(5,2,2)各3種、(5,2,3)(5,2,4)各6種，共18種，P=18/216=1/12。", "flag": false, "num": 74}, {"id": 666, "src": "講義-古典機率", "ch": "機率的性質", "type": "open", "q": "【例題6】設A,B為樣本空間S中的二事件，且P(A)=1/2，P(B)=1/3，P(A∩B)=1/10，求下列各值：(1)P(A∪B) (2)P(A∩B')。", "opts": {}, "ans": null, "ansText": "(1) 11/15，(2) 2/5", "expl": "(1) 1/2+1/3−1/10=11/15；(2) P(A)−P(A∩B)=1/2−1/10=2/5。", "flag": false, "num": 75}, {"id": 667, "src": "講義-古典機率", "ch": "機率的性質", "type": "open", "q": "【類題6】設A,B為樣本空間S中的二事件，且P(A)=1/3，P(A∩B)=1/4，P(A∪B)=3/4，求P(A'∩B)。", "opts": {}, "ans": null, "ansText": "5/12", "expl": "P(B)=P(A∪B)−P(A)+P(A∩B)=3/4−1/3+1/4=2/3；P(A'∩B)=P(B)−P(A∩B)=2/3−1/4=5/12。", "flag": false, "num": 76}, {"id": 668, "src": "講義-古典機率", "ch": "機率的性質", "type": "open", "q": "【例題7】從8個正數、5個負數中任取4個數相乘，求其乘積為負數的機率。", "opts": {}, "ans": null, "ansText": "72/143", "expl": "乘積為負需3正1負或1正3負：(C(8,3)C(5,1)+C(8,1)C(5,3))/C(13,4)=(280+80)/715=72/143。", "flag": false, "num": 77}, {"id": 669, "src": "講義-古典機率", "ch": "機率的性質", "type": "open", "q": "【類題7】自6位男生4位女生中選出一個5人委員會，求 (1)男女生至少各2人的機率 (2)男生最多2人的機率。", "opts": {}, "ans": null, "ansText": "(1) 5/7，(2) 11/42", "expl": "n(S)=C(10,5)=252；(1) 2男3女或3男2女：(C(6,2)C(4,3)+C(6,3)C(4,2))/252=180/252=5/7；(2) 2男3女或1男4女：(60+6)/252=11/42。", "flag": false, "num": 78}, {"id": 670, "src": "講義-古典機率", "ch": "機率的性質", "type": "open", "q": "【例題8】求任5人中至少有兩人在同一月份出生的機率。", "opts": {}, "ans": null, "ansText": "89/144", "expl": "餘事件為5人生月全不同：P=1−P(12,5)/12^5=1−55/144=89/144。", "flag": false, "num": 79}, {"id": 671, "src": "講義-古典機率", "ch": "機率的性質", "type": "open", "q": "【類題8】求任3人中至少有兩人在同一月份出生的機率。", "opts": {}, "ans": null, "ansText": "17/72", "expl": "P=1−P(12,3)/12^3=1−(12×11×10)/12^3=1−55/72=17/72。", "flag": false, "num": 80}, {"id": 672, "src": "講義-古典機率", "ch": "機率的性質", "type": "open", "q": "【例題9】某課外活動社團共有20位同學參加，已知其中高一、高二、高三同學所占的比例分別為55%、25%、20%。若由該社團中任選兩人，求此兩人是不同年級學生的機率。", "opts": {}, "ans": null, "ansText": "119/190", "expl": "高一11人、高二5人、高三4人；同年級取法C(11,2)+C(5,2)+C(4,2)=71，P=1−71/190=119/190。", "flag": false, "num": 81}, {"id": 673, "src": "講義-古典機率", "ch": "機率的性質", "type": "open", "q": "【類題9】在3列4行共12格的棋盤方格中，隨機選取兩個格子，求選出的兩個格子不在同一行的機率。（有無同列無所謂）", "opts": {}, "ans": null, "ansText": "9/11", "expl": "n(S)=C(12,2)=66；同一行的取法C(4,1)×C(3,2)=12，P=1−12/66=9/11。", "flag": false, "num": 82}, {"id": 674, "src": "講義-古典機率", "ch": "機率的性質", "type": "open", "q": "【例題10】阿貴和阿美及其他8名同學共10名學生輪到本周擔任值日生。本周5個上課日每天從尚未當過的同學中抽籤選出2位輪值。求阿貴和阿美同一天擔任值日生的機率。", "opts": {}, "ans": null, "ansText": "1/9", "expl": "全部分法C(10,2)C(8,2)C(6,2)C(4,2)C(2,2)；兩人同天：C(5,1)C(8,2)C(6,2)C(4,2)C(2,2)，相除得C(5,1)/C(10,2)... 即1/9。", "flag": false, "num": 83}, {"id": 675, "src": "講義-古典機率", "ch": "機率的性質", "type": "open", "q": "【類題10-1】將A、B、C、…等八人平分成四組，每組兩人，求A、B、C三人中任兩人均不在同一組的機率。", "opts": {}, "ans": null, "ansText": "4/7", "expl": "分堆總數C(8,2)C(6,2)C(4,2)C(2,2)/4!=105；A、B、C各自與另5人之一成組：C(5,1)C(4,1)C(3,1)C(2,2)=60，P=60/105=4/7。", "flag": false, "num": 84}, {"id": 676, "src": "講義-古典機率", "ch": "機率的性質", "type": "open", "q": "【類題10-2】欲將甲、乙、丙、丁、…等八名學生平均分到忠孝仁愛4班，求甲乙二人不同班的機率。", "opts": {}, "ans": null, "ansText": "6/7", "expl": "乙與甲同班的機率為1/7（乙與其餘7人任一人同班機會均等），故不同班機率為6/7。講義Ans欄印為5/9，但詳解計算結果為6/7，以詳解為準。", "flag": true, "num": 85}, {"id": 677, "src": "講義-古典機率", "ch": "機率的性質", "type": "open", "q": "【例題11】袋中有紅球4個，白球5個，每次任取一球，取出後不放回。求 (1)最後一球取到紅球的機率 (2)紅球先取完的機率。", "opts": {}, "ans": null, "ansText": "(1) 4/9，(2) 5/9", "expl": "視為9球全排列；(1) 最後一球為紅球：C(4,1)×8!/9!=4/9；(2) 紅球先取完即最後一球為白球，P=5/9。", "flag": false, "num": 86}, {"id": 678, "src": "講義-古典機率", "ch": "機率的性質", "type": "open", "q": "【類題11】投擲一均勻的硬幣10次，求恰在第10次出現第3次正面的機率。", "opts": {}, "ans": null, "ansText": "9/256", "expl": "前9次恰出現2次正面且第10次為正面：P=C(9,2)/2^10=36/1024=9/256。", "flag": false, "num": 87}, {"id": 679, "src": "講義-古典機率", "ch": "機率的性質", "type": "open", "q": "【例題12】某棒球比賽有實力完全相當的甲乙丙丁四隊參加，先將四隊隨機抽籤分成兩組比賽，兩組的勝隊再參加冠亞軍決賽。所有隊伍比賽時各隊獲勝的機率均為0.5。則冠亞軍決賽由甲、乙兩隊對戰的機率為何？【96指乙】", "opts": {}, "ans": null, "ansText": "1/6", "expl": "乙與甲不同組的機率為2/3，兩人各自獲勝進決賽的機率各為1/2，P=(2/3)×(1/2)×(1/2)=1/6。", "flag": false, "num": 88}, {"id": 680, "src": "講義-古典機率", "ch": "機率的性質", "type": "open", "q": "【類題12】某棒球比賽有甲乙丙丁…等八隊參加，先將八隊隨機抽籤決定賽程（單淘汰賽程圖）。若甲乙是其中實力最好的兩隊（與其他隊比賽一定獲勝），則冠亞軍決賽由甲、乙兩隊對戰的機率為何？", "opts": {}, "ans": null, "ansText": "4/7", "expl": "甲排定後，乙須在與甲不同的半區，機率為4/7；兩隊在各自半區必勝出。", "flag": false, "num": 89}, {"id": 681, "src": "講義-古典機率", "ch": "機率的性質", "type": "open", "q": "(考題1) 擲一公正的骰子三次，求下列各事件的機率：(1)點數愈擲愈大的機率 (2)三次點數皆不同的機率 (3)恰好有兩次點數相同的機率 (4)三次點數的和為8的機率。", "opts": {}, "ans": null, "ansText": "(1) 5/54，(2) 5/9，(3) 5/12，(4) 7/72", "expl": "n(S)=216；(1) C(6,3)/216=5/54；(2) 6×5×4/216=5/9；(3) 3×6×5/216=5/12；(4) 和為8的排列共21種，P=21/216=7/72。", "flag": false, "num": 90}, {"id": 682, "src": "講義-古典機率", "ch": "機率的性質", "type": "open", "q": "(考題2) 金先生在提款時忘了帳號密碼，但他還記得密碼的四位數字中，有兩個3，一個8，一個9，於是他就用這四個數字隨意排成一個四位數輸入提款機嘗試。請問他只試一次就成功的機率是多少？", "opts": {}, "ans": null, "ansText": "1/12", "expl": "可能的排列有4!/2!=12種，P=1/12。", "flag": false, "num": 91}, {"id": 683, "src": "講義-古典機率", "ch": "機率的性質", "type": "open", "q": "(考題3) 四人同時玩「剪刀、石頭、布」的遊戲一次，求不分勝負的機率。", "opts": {}, "ans": null, "ansText": "13/27", "expl": "不分勝負為四人出滿三種（恰二人相同）或全出同一種：(C(4,2)×3×2×1+3)/3^4=(36+3)/81=13/27。", "flag": false, "num": 92}, {"id": 684, "src": "講義-古典機率", "ch": "機率的性質", "type": "open", "q": "(考題4) 袋中有七個相同的球，分別標示1號、2號、…、7號。若自袋中隨機一次取出四個球，求取出之球的標號和為奇數的機率。", "opts": {}, "ans": null, "ansText": "16/35", "expl": "1奇3偶或3奇1偶時和為奇數：(C(4,1)C(3,3)+C(4,3)C(3,1))/C(7,4)=(4+12)/35=16/35。", "flag": false, "num": 93}, {"id": 685, "src": "講義-古典機率", "ch": "機率的性質", "type": "open", "q": "(考題5) 設A,B為樣本空間S中的二事件，且P(A)=1/2，P(B)=1/3，P(A∪B)=p，求p值的範圍。", "opts": {}, "ans": null, "ansText": "1/2 ≤ p ≤ 5/6", "expl": "B⊆A時p=P(A)=1/2最小；A∩B=φ時p=P(A)+P(B)=5/6最大。", "flag": false, "num": 94}, {"id": 686, "src": "講義-古典機率", "ch": "機率的性質", "type": "open", "q": "(考題6) 十張分別標以1,2,…,10的卡片，任意分成兩疊，每疊各五張，求1,2,3,4四張中，每疊各有兩張的機率。", "opts": {}, "ans": null, "ansText": "10/21", "expl": "P=C(4,2)×C(6,3)/C(10,5)=6×20×... 即120/252=10/21。", "flag": false, "num": 95}, {"id": 687, "src": "講義-古典機率", "ch": "機率的性質", "type": "multi", "q": "(考題7) 試選出P1=P2的選項：(1) P1表連續投擲一個公正骰子3次，每次都出現6點的機率；P2表一次投擲三個公正骰子，同時出現3個6點的機率 (2) 同時投擲2個公正骰子一次，P1表出現一個3點一個4點的機率；P2表兩個骰子都出現3點的機率 (3) P1表投擲2個均勻硬幣時，恰好出現1個正面的機率；P2表投擲4個均勻硬幣時，恰好出現2個正面的機率 (4) 連續投擲一公正硬幣5次，P1表擲出「正正正正正」的機率；P2表擲出「正正正正反」的機率。", "opts": {"1": "敘述(1)", "2": "敘述(2)", "3": "敘述(3)", "4": "敘述(4)"}, "ans": "14", "ansText": "(1)(4)", "expl": "(1) 皆為1/216；(2) 2/36≠1/36；(3) 1/2≠C(4,2)/16=3/8；(4) 皆為1/32。", "flag": false, "num": 96}, {"id": 688, "src": "講義-古典機率", "ch": "機率的性質", "type": "open", "q": "(考題8) 大小不同之鞋6雙，任取其中4隻，求 (1)4隻均不成雙的機率 (2)4隻恰有2隻成雙的機率。", "opts": {}, "ans": null, "ansText": "(1) 16/33，(2) 16/33", "expl": "n(S)=C(12,4)=495；(1) C(6,4)×2^4/495=240/495=16/33；(2) C(6,1)×C(5,2)×2^2/495=240/495=16/33。", "flag": false, "num": 97}, {"id": 689, "src": "講義-古典機率", "ch": "機率的性質", "type": "open", "q": "(考題9) 彩票公司每天開獎一次，從1,2,3三個號碼中隨機開出一個。開獎時，如果開出的號碼和前一天相同，就要重開，直到開出與前一天不同的號碼為止。如果在第一天開出的號碼是3，則在第五天開出號碼同樣是3的機率是多少？", "opts": {}, "ans": null, "ansText": "3/8", "expl": "第二至五天每天有2種與前一天不同的號碼，共2^4=16種；其中第五天為3的有6種，P=6/16=3/8。", "flag": false, "num": 98}, {"id": 690, "src": "講義-古典機率", "ch": "機率的性質", "type": "open", "q": "(考題10) 甲、乙兩人各擲一均勻骰子，約定如下：乙得6點時，乙就贏；兩人同點時（非6點），甲贏；其他情形，則以點數多者為贏。求甲贏的機率。", "opts": {}, "ans": null, "ansText": "5/9", "expl": "n(S)=36；甲贏的情形：同點非6（5種）加上甲點數較大且乙非6（15種），共20種，P=20/36=5/9。", "flag": false, "num": 99}, {"id": 691, "src": "講義-古典機率", "ch": "機率的性質", "type": "open", "q": "(考題11) 袋中有七個白球，若干個黑球。今從袋中一次取出兩個球，已知此兩球同為白球的機率是7/22，請問袋中有幾個黑球？", "opts": {}, "ans": null, "ansText": "5個", "expl": "設黑球x個：C(7,2)/C(x+7,2)=7/22，得(x+7)(x+6)=132=12×11，故x=5。", "flag": false, "num": 100}, {"id": 692, "src": "講義-古典機率", "ch": "機率的性質", "type": "open", "q": "(考題12) 袋中有三個一樣大小的球，分別標示10分、20分、30分。重複自袋中取出一球後放回，記錄得分並累加，其中取出各球之機率皆相等。(1)求抽三次後總分為60分的機率 (2)遊戲「過三十」的規則是重複抽球，直到總得分大於或等於30分後停止，總得分恰為30分者輸，超過30分者贏。求贏得此遊戲之機率。", "opts": {}, "ans": null, "ansText": "(1) 7/27，(2) 11/27", "expl": "(1) 60=30+20+10（排列3!=6種）或20+20+20（1種），P=7/27；(2) 輸的情形：首抽30（1/3）、10+20（1/9）、20+10（1/9）、10+10+10（1/27），合計16/27，贏的機率=11/27。", "flag": false, "num": 101}, {"id": 693, "src": "講義-古典機率", "ch": "機率的性質", "type": "single", "q": "(考題13) 不透明箱中置有編號分別為1、2、3、6、8的球各一顆。同時自箱中隨機取出三顆球，則此三球編號之和大於14的機率為下列哪一個選項？【99指甲】", "opts": {"1": "1/5", "2": "3/10", "3": "2/5", "4": "1/2", "5": "3/5"}, "ans": "2", "ansText": "(2) 3/10", "expl": "和大於14必含6與8，第三球可為1,2,3任一：P=C(3,1)/C(5,3)=3/10。", "flag": false, "num": 102}, {"id": 694, "src": "講義-古典機率", "ch": "機率的性質", "type": "open", "q": "(考題14) 一袋中有紅球5個，白球n個（n≥2）。已知選球的機會均等，由袋中任意選出2球，若2球同色機率為P(n)，試問 (1)P(3)是多少？(2)若P(n)<1/2，求最大的n值。", "opts": {}, "ans": null, "ansText": "(1) 13/28，(2) 8", "expl": "(1) (C(5,2)+C(3,2))/C(8,2)=13/28；(2) P(n)=(20+n(n−1))/((n+5)(n+4))<1/2 化簡得 n^2−11n+20<0，最大整數解n=8。", "flag": false, "num": 103}, {"id": 695, "src": "講義-古典機率", "ch": "機率的性質", "type": "open", "q": "(考題15) 從1到10^4的自然數中任取一數，試求此數既不是完全平方數，又不是完全立方數的機率。", "opts": {}, "ans": null, "ansText": "9883/10000", "expl": "平方數100個、立方數21個、六次方數4個；n(A∪B)=100+21−4=117，P=(10000−117)/10000=9883/10000。", "flag": false, "num": 104}, {"id": 696, "src": "講義-古典機率", "ch": "機率的性質", "type": "single", "q": "(考題16) 箱中有編號分別為0,1,2,…,9的十顆球。隨機抽取一球，將球放回後，再隨機抽取一球。請問這兩球編號相減的絕對值為下列哪一個選項時，其出現的機率最大？【101學測】", "opts": {"1": "0", "2": "1", "3": "4", "4": "5", "5": "9"}, "ans": "2", "ansText": "(2) 1", "expl": "|x1−x2|=0,1,4,5,9的情形數分別為10,18,12,10,2，故差為1時機率18/100最大。", "flag": false, "num": 105}, {"id": 697, "src": "講義-古典機率", "ch": "機率的性質", "type": "open", "q": "(考題17) 坐標空間中，在六個平面 x=14/13、x=−1/13、y=1、y=−1、z=1 及 z=4 所圍成的長方體上隨機選取兩個相異頂點。若每個頂點被選取的機率相同，則選到兩個頂點的距離大於3之機率為何？（化成最簡分數）【101學測】", "opts": {}, "ans": null, "ansText": "3/7", "expl": "長方體邊長為15/13、2、3；距離大於3的頂點對為4條體對角線與8條含長度2、3兩邊之面對角線，共12對，P=12/C(8,2)=12/28=3/7。", "flag": false, "num": 106}, {"id": 698, "src": "講義3-1機率與統計", "ch": "隨機變數的期望值與變異數", "type": "open", "q": "投擲公正骰子兩粒，令隨機變數X為兩粒骰子的點數和，求(1)P(X=7)。(2)P(X≤4)。(3)機率函數f(x)。(4)作機率分布圖。", "opts": {}, "ans": null, "ansText": "(1)1/6，(2)1/6，(3)f(x)=(6-|x-7|)/36（x=2,3,…,12），(4)見解析（分布圖）", "expl": "X=7有6種組合、X≤4有6種組合，各除以36得1/6；由點數和的對稱性可歸納出f(x)=(6-|x-7|)/36。", "flag": false, "num": 1}, {"id": 699, "src": "講義3-1機率與統計", "ch": "隨機變數的期望值與變異數", "type": "open", "q": "投擲兩枚公正銅板，隨機變數X表出現正面次數，求機率函數。", "opts": {}, "ans": null, "ansText": "P(X=0)=1/4，P(X=1)=1/2，P(X=2)=1/4", "expl": "樣本空間四種等可能結果中，反反1種、一正一反2種、正正1種。", "flag": false, "num": 2}, {"id": 700, "src": "講義3-1機率與統計", "ch": "隨機變數的期望值與變異數", "type": "open", "q": "設隨機變數X的機率函數如下表：X的值為0、1、2、3、x，對應機率f(x)依序為0.1、x、0.3、0.1、0.2。(1)求x。(2)求P(X≤2)。", "opts": {}, "ans": null, "ansText": "(1)0.3，(2)0.9", "expl": "由機率總和0.1+x+0.3+0.1+0.2=1得x=0.3；P(X≤2)=P(X=0)+P(X=0.3)+P(X=1)+P(X=2)=0.1+0.3+0.3+0.2=0.9。", "flag": false, "num": 3}, {"id": 701, "src": "講義3-1機率與統計", "ch": "隨機變數的期望值與變異數", "type": "open", "q": "一盒中有A型藥12片、B型藥8片，今自盒中任取兩片，令隨機變數X表取出藥片中為B型之片數，求機率函數f(x)。", "opts": {}, "ans": null, "ansText": "P(X=0)=33/95，P(X=1)=48/95，P(X=2)=14/95", "expl": "以超幾何分布計算：P(X=0)=C(12,2)/C(20,2)、P(X=1)=C(12,1)C(8,1)/C(20,2)、P(X=2)=C(8,2)/C(20,2)。", "flag": false, "num": 4}, {"id": 702, "src": "講義3-1機率與統計", "ch": "隨機變數的期望值與變異數", "type": "open", "q": "將n個公正骰子同擲，出現之最大點數為X，此隨機變數X之機率分布為何？", "opts": {}, "ans": null, "ansText": "P(X=k)=(k^n-(k-1)^n)/6^n，k=1,2,3,4,5,6", "expl": "n個點數皆不大於k的機率為(k/6)^n，故P(X=k)=(k/6)^n-((k-1)/6)^n。", "flag": false, "num": 5}, {"id": 703, "src": "講義3-1機率與統計", "ch": "隨機變數的期望值與變異數", "type": "open", "q": "將一骰子連續擲n次，令出現點數之最小值為隨機變數X，則(1)求X≥3之機率。(2)求X之機率分布。", "opts": {}, "ans": null, "ansText": "(1)(2/3)^n，(2)P(X=k)=((7-k)^n-(6-k)^n)/6^n，k=1,2,…,6", "expl": "X≥3表每次都出現3~6，機率(4/6)^n=(2/3)^n；最小值為k即每次點數≥k扣掉每次點數≥k+1。", "flag": false, "num": 6}, {"id": 704, "src": "講義3-1機率與統計", "ch": "隨機變數的期望值與變異數", "type": "open", "q": "箱中有紅球、白球各4個，今任取一球看完其顏色後，再另加同色之球兩個與原取之球放回箱中，如此共作三次，令隨機變數X表取到紅球之數，求X的機率分布。", "opts": {}, "ans": null, "ansText": "P(X=0)=1/5，P(X=1)=3/10，P(X=2)=3/10，P(X=3)=1/5", "expl": "三白：(4/8)(6/10)(8/12)=1/5，與三紅相同；一紅二白三種順序相加得3/10，與二紅一白相同。", "flag": false, "num": 7}, {"id": 705, "src": "講義3-1機率與統計", "ch": "隨機變數的期望值與變異數", "type": "open", "q": "有一點P在數線坐標系的原點，今投一硬幣，若出現正面則向正的方向移動3個單位；若出現反面則往負的方向移動2個單位。今連投11次，求最後落在(1)坐標為-7之點的機率。(2)原點的機率。", "opts": {}, "ans": null, "ansText": "(1)165/2048，(2)0", "expl": "設正面x次、反面y次，x+y=11且3x-2y=-7，解得x=3、y=8，機率C(11,3)(1/2)^11=165/2048；落在原點需3x=2y與x+y=11無非負整數解，機率為0。", "flag": false, "num": 8}, {"id": 706, "src": "講義3-1機率與統計", "ch": "隨機變數的期望值與變異數", "type": "open", "q": "設一袋中有2白球、1黑球，每次自其中取一球，取完後放回，共取4次，則(1)求取到黑球數的機率分布。(2)求黑球個數的期望值。", "opts": {}, "ans": null, "ansText": "(1)P(X=k)=C(4,k)(1/3)^k(2/3)^(4-k)，即16/81、32/81、24/81、8/81、1/81，(2)4/3", "expl": "X為二項分布B(4,1/3)；期望值np=4×(1/3)=4/3。", "flag": false, "num": 9}, {"id": 707, "src": "講義3-1機率與統計", "ch": "隨機變數的期望值與變異數", "type": "open", "q": "設隨機變數X之值為-2、0、2，各數值發生的機率分別為0.3、0.5、0.2，試求(1)E(2X+1)。(2)Var(3X-2)。", "opts": {}, "ans": null, "ansText": "(1)0.6，(2)17.64", "expl": "E(X)=-0.2、Var(X)=1.96，故E(2X+1)=2E(X)+1=0.6，Var(3X-2)=9Var(X)=17.64。", "flag": false, "num": 10}, {"id": 708, "src": "講義3-1機率與統計", "ch": "隨機變數的期望值與變異數", "type": "open", "q": "設兩組獨立隨機變數X、Y，期望值E(X)=5，E(Y)=-4，變異數Var(X)=1，Var(Y)=2。試求(1)E(8X-6Y)。(2)Var(2X-4Y)。", "opts": {}, "ans": null, "ansText": "(1)64，(2)36", "expl": "E(8X-6Y)=8×5-6×(-4)=64；獨立時Var(2X-4Y)=4Var(X)+16Var(Y)=4+32=36。", "flag": false, "num": 11}, {"id": 709, "src": "講義3-1機率與統計", "ch": "隨機變數的期望值與變異數", "type": "open", "q": "隨機變數X取值0、1、2、3，機率依序為8/27、12/27、6/27、1/27，試求(1)X的期望值。(2)X的標準差。", "opts": {}, "ans": null, "ansText": "(1)1，(2)√6/3", "expl": "E(X)=(12+12+3)/27=1；E(X^2)=5/3，Var(X)=5/3-1=2/3，標準差√(2/3)=√6/3。", "flag": false, "num": 12}, {"id": 710, "src": "講義3-1機率與統計", "ch": "隨機變數的期望值與變異數", "type": "open", "q": "設隨機變數X的取值為x=i（i=1,2,3,4），機率分別為p_i=(2i-1)/16，試求(1)X的期望值。(2)X的變異數。", "opts": {}, "ans": null, "ansText": "(1)25/8，(2)55/64", "expl": "E(X)=1×1/16+2×3/16+3×5/16+4×7/16=25/8；E(X^2)=(1+12+45+112)/16，Var(X)=E(X^2)-(25/8)^2=55/64。", "flag": false, "num": 13}, {"id": 711, "src": "講義3-1機率與統計", "ch": "隨機變數的期望值與變異數", "type": "open", "q": "設10支籤中3支有獎，其中1支獎金100元、1支獎金50元、1支獎金20元，則(1)任抽一支獎金的期望值為何？變異數為何？(2)任抽兩支獎金和的期望值為何？變異數為何？", "opts": {}, "ans": null, "ansText": "(1)期望值17元、變異數1001，(2)期望值34元、變異數16016/9", "expl": "E(X1)=(100+50+20)/10=17，Var(X1)=(100^2+50^2+20^2)/10-17^2=1001；兩支時E=34，由各金額組合的機率計算得Var=16016/9。", "flag": false, "num": 14}, {"id": 712, "src": "講義3-1機率與統計", "ch": "隨機變數的期望值與變異數", "type": "open", "q": "某人擲一顆均勻的骰子，若出現奇數點可得15元，若出現6點則賠9元，若出現2或4點則賠6元，求此人丟此骰子一次得到錢數的期望值與變異數為何？", "opts": {}, "ans": null, "ansText": "E(X)=4，Var(X)=122", "expl": "E(X)=15×3/6-9×1/6-6×2/6=4；E(X^2)=(15^2×3+9^2+6^2×2)/6=138，Var(X)=138-16=122。", "flag": false, "num": 15}, {"id": 713, "src": "講義3-1機率與統計", "ch": "隨機變數的期望值與變異數", "type": "open", "q": "假設X為一個隨機變數，若Var(3X+5)=117，試求Var(5X+7)。", "opts": {}, "ans": null, "ansText": "325", "expl": "9Var(X)=117得Var(X)=13，故Var(5X+7)=25×13=325。", "flag": false, "num": 16}, {"id": 714, "src": "講義3-1機率與統計", "ch": "隨機變數的期望值與變異數", "type": "open", "q": "若E(X+8)=10，且E[(X+3)^2]=116，試求(1)E(X)。(2)Var(2X-3)。", "opts": {}, "ans": null, "ansText": "(1)2，(2)364", "expl": "E(X)=10-8=2；展開E[(X+3)^2]=E(X^2)+6E(X)+9=116得E(X^2)=95，Var(2X-3)=4(95-4)=364。", "flag": false, "num": 17}, {"id": 715, "src": "講義3-1機率與統計", "ch": "隨機變數的期望值與變異數", "type": "open", "q": "盒中有面額分別為100、100、500、500、1000、1000、2000、2000的紙幣，從盒中一次取一張不放回，直到取出面額相同的紙幣才停止。以隨機變數X表示抽取的次數，以隨機變數Y表示取出的金額總和，(1)求E(X)。(2)求E(Y)。", "opts": {}, "ans": null, "ansText": "(1)128/35，(2)23040/7", "expl": "分別算出恰需2、3、4、5次停止的機率1/7、2/7、12/35、8/35，加權得E(X)=128/35；再由每張期望面額900元推得E(Y)=23040/7。", "flag": false, "num": 18}, {"id": 716, "src": "講義3-1機率與統計", "ch": "隨機變數的期望值與變異數", "type": "open", "q": "露露想投資基金，理財員給她兩方案：基金A在景氣成長、持平、衰退時盈利6、3、-2萬元，機率0.7、0.2、0.1；基金B在景氣成長、持平、衰退時盈利12、4、-5萬元，機率0.4、0.3、x。(1)求x。(2)以盈利期望值高低評估，露露應選擇基金A或基金B？", "opts": {}, "ans": null, "ansText": "(1)0.3，(2)基金A", "expl": "x=1-0.4-0.3=0.3；A的期望值4.6萬元，B的期望值4.5萬元，故選A。", "flag": false, "num": 19}, {"id": 717, "src": "講義3-1機率與統計", "ch": "隨機變數的期望值與變異數", "type": "open", "q": "根據調查，有25%的外國人最愛的臺灣小吃為蚵仔煎。若任選四位外國朋友且互不影響，試問(1)最愛蚵仔煎人數的機率分布。(2)至少有二人最愛吃蚵仔煎的機率。", "opts": {}, "ans": null, "ansText": "(1)P(X=k)=C(4,k)(1/4)^k(3/4)^(4-k)，即81/256、27/64、27/128、3/64、1/256，(2)67/256", "expl": "X為二項分布B(4,1/4)；P(X≥2)=P(2)+P(3)+P(4)=67/256。", "flag": false, "num": 20}, {"id": 718, "src": "講義3-1機率與統計", "ch": "隨機變數的期望值與變異數", "type": "open", "q": "某電子公司欲擴廠，大、中、小三種建廠規模在四種景氣情況（高度成長、微幅成長、持平、衰退，機率依序為0.3、0.1、0.4、0.2）下的年利潤（百萬元）如下：大廠50、10、5、-30；中廠40、30、10、-10；小廠30、20、5、-2。以利潤期望值最大作決策，應採哪一種建廠規模？最大利潤期望值為何？", "opts": {}, "ans": null, "ansText": "建中規模廠，最大年利潤期望值17百萬元", "expl": "大、中、小廠期望值分別為12、17、12.6百萬元，中廠最大。", "flag": false, "num": 21}, {"id": 719, "src": "講義3-1機率與統計", "ch": "隨機變數的期望值與變異數", "type": "open", "q": "袋中有2個紅球、4個白球、5個黃球，每球被取的機會相同，從袋中一次取出三球，則得黃球個數的期望值為何？", "opts": {}, "ans": null, "ansText": "15/11個", "expl": "超幾何分布，E(X)=3×5/11=15/11。", "flag": false, "num": 22}, {"id": 720, "src": "講義3-1機率與統計", "ch": "隨機變數的期望值與變異數", "type": "open", "q": "將3本不同的書任意放入4個抽屜，求空抽屜個數的期望值。", "opts": {}, "ans": null, "ansText": "27/16個", "expl": "空1、2、3個抽屜的機率分別為24/64、36/64、4/64，期望值=(24+72+12)/64=27/16。", "flag": false, "num": 23}, {"id": 721, "src": "講義3-1機率與統計", "ch": "隨機變數的期望值與變異數", "type": "open", "q": "同時擲三粒骰子，如果恰有兩粒點數相同可得200元獎金，三粒點數都相同可得500元獎金，其餘沒獎金，求此試驗得獎金的期望值。", "opts": {}, "ans": null, "ansText": "875/9元", "expl": "恰兩粒相同機率90/216、三粒全同機率6/216，期望值=(200×90+500×6)/216=875/9。", "flag": false, "num": 24}, {"id": 722, "src": "講義3-1機率與統計", "ch": "隨機變數的期望值與變異數", "type": "open", "q": "袋中有10張卡片，分別標示1,2,3,…,10，今任取出一張後放回，再任取一張，求兩次取到卡片之數字和的期望值。", "opts": {}, "ans": null, "ansText": "11", "expl": "每次期望值為(1+…+10)/10=5.5，兩次和的期望值=5.5×2=11。", "flag": false, "num": 25}, {"id": 723, "src": "講義3-1機率與統計", "ch": "隨機變數的期望值與變異數", "type": "open", "q": "某人自一副撲克牌中隨機抽取，每次一張，抽出後放回，如此抽了三次，令p_i表抽出黑桃i次的機率，求(1)p_0、p_1、p_2、p_3。(2)抽出黑桃次數的期望值。", "opts": {}, "ans": null, "ansText": "(1)p_0=27/64，p_1=27/64，p_2=9/64，p_3=1/64，(2)3/4", "expl": "每次抽中黑桃機率1/4，X~B(3,1/4)；期望值np=3/4。", "flag": false, "num": 26}, {"id": 724, "src": "講義3-1機率與統計", "ch": "隨機變數的期望值與變異數", "type": "open", "q": "某市的汽車失竊紀錄顯示，平均在100天內，一天失竊0、1、2、3、4及5部汽車的天數各占20天、37天、25天、13天、3天及2天，試問該市一天汽車失竊部數的期望值為何？", "opts": {}, "ans": null, "ansText": "1.48部", "expl": "E(X)=(0×20+1×37+2×25+3×13+4×3+5×2)/100=1.48。", "flag": false, "num": 27}, {"id": 725, "src": "講義3-1機率與統計", "ch": "隨機變數的期望值與變異數", "type": "open", "q": "某地發行彩券50萬張，其中有1張獎金300萬元，2張獎金各50萬元，50張獎金各1萬元，試問每張彩券獎金的期望值為何？", "opts": {}, "ans": null, "ansText": "9元", "expl": "E=3000000×1/500000+500000×2/500000+10000×50/500000=6+2+1=9元。", "flag": false, "num": 28}, {"id": 726, "src": "講義3-1機率與統計", "ch": "隨機變數的期望值與變異數", "type": "open", "q": "擲一骰子二次，以X代表所出現的兩個點數中較小的數，試求E(X)。", "opts": {}, "ans": null, "ansText": "91/36", "expl": "P(X=k)=(13-2k)/36（k=1~6），E(X)=(11+18+21+20+15+6)/36=91/36。", "flag": false, "num": 29}, {"id": 727, "src": "講義3-1機率與統計", "ch": "隨機變數的期望值與變異數", "type": "open", "q": "某人玩擲骰子遊戲，在玩之前須先付10元，若擲出點數k可得k^2元，問他擲骰子後可期望淨得多少元？", "opts": {}, "ans": null, "ansText": "31/6元", "expl": "E=[(1+4+9+16+25+36)-60]/6=31/6元。", "flag": false, "num": 30}, {"id": 728, "src": "講義3-1機率與統計", "ch": "隨機變數的期望值與變異數", "type": "open", "q": "老張過去買釋迦的經驗是平均5斤中就有1斤內長蟲不能吃須丟掉。有次買釋迦時老板說今天每斤70元，如果要求當場打開則售價提高至每斤80元，但打開有蟲可退回。試以期望值的觀點來看，老張應否要求打開？", "opts": {}, "ans": null, "ansText": "應要求打開", "expl": "不打開時花350元只買到約4斤可吃，平均每斤87.5元，比打開保證好的80元貴。", "flag": false, "num": 31}, {"id": 729, "src": "講義3-1機率與統計", "ch": "隨機變數的期望值與變異數", "type": "open", "q": "一袋中有9個硬幣，其中5個為五元硬幣，其他4個同值。若從袋中一次取出2個硬幣之期望值為6元，求其他4個硬幣之值。", "opts": {}, "ans": null, "ansText": "0.5元", "expl": "取2枚為(五元,五元)、(五元,x)、(x,x)的機率為10/36、20/36、6/36，由10×10/36+(5+x)×20/36+2x×6/36=6解得x=0.5。", "flag": false, "num": 32}, {"id": 730, "src": "講義3-1機率與統計", "ch": "隨機變數的期望值與變異數", "type": "open", "q": "十個樣品有2個不良品，今取出3個，求含有不良品的期望值。", "opts": {}, "ans": null, "ansText": "3/5個", "expl": "超幾何分布，E(X)=3×2/10=3/5。", "flag": false, "num": 33}, {"id": 731, "src": "講義3-1機率與統計", "ch": "隨機變數的期望值與變異數", "type": "open", "q": "同時擲六粒均勻的骰子，若恰有五粒點數相同則可得6480元，求其期望值。", "opts": {}, "ans": null, "ansText": "25元", "expl": "恰五粒點數相同的機率P=C(6,1)C(6,5)(1/6)^5(5/6)=5/6^4=5/1296，期望值=6480×5/1296=25元。", "flag": false, "num": 34}, {"id": 732, "src": "講義3-1機率與統計", "ch": "隨機變數的期望值與變異數", "type": "open", "q": "袋中有12個球，其中有3個白球，若選取機會相等，則從袋中任取3個球，取中白球個數的期望值為多少？", "opts": {}, "ans": null, "ansText": "3/4個", "expl": "取一球得白球機率3/12=1/4，取3個之期望值=3×1/4=3/4。", "flag": false, "num": 35}, {"id": 733, "src": "講義3-1機率與統計", "ch": "隨機變數的期望值與變異數", "type": "open", "q": "從1到10的正整數中任取一數，設變數X為其正因數的個數，求X的可能值及X的期望值。", "opts": {}, "ans": null, "ansText": "X=1,2,3,4；E(X)=2.7", "expl": "正因數個數為1、2、3、4的數各有1、4、2、3個，E(X)=(1+8+6+12)/10=2.7。", "flag": false, "num": 36}, {"id": 734, "src": "講義3-1機率與統計", "ch": "隨機變數的期望值與變異數", "type": "open", "q": "一盒子裡有5元硬幣5個、10元硬幣3個、50元硬幣2個，任取3個，求得款的期望值。", "opts": {}, "ans": null, "ansText": "93/2元", "expl": "任取1個的期望值為(5×5+10×3+50×2)/10=31/2元，取3個為3×31/2=93/2元。", "flag": false, "num": 37}, {"id": 735, "src": "講義3-1機率與統計", "ch": "隨機變數的期望值與變異數", "type": "open", "q": "將3個相同的球放入3個不同箱子裡，求空箱子數的期望值。", "opts": {}, "ans": null, "ansText": "8/9個", "expl": "空0、1、2箱的機率為6/27、18/27、3/27，期望值=(0+18+6)/27=8/9。", "flag": false, "num": 38}, {"id": 736, "src": "講義3-1機率與統計", "ch": "隨機變數的期望值與變異數", "type": "open", "q": "一骰子的六個面分別記為1、1、1、2、3、4點，將此骰子擲兩次，求點數和的期望值。", "opts": {}, "ans": null, "ansText": "4", "expl": "擲一次的期望值=(1+1+1+2+3+4)/6=2，兩次和=2×2=4。", "flag": false, "num": 39}, {"id": 737, "src": "講義3-1機率與統計", "ch": "隨機變數的期望值與變異數", "type": "open", "q": "擲6個硬幣，求正面個數的期望值。", "opts": {}, "ans": null, "ansText": "3", "expl": "二項分布期望值np=6×1/2=3。", "flag": false, "num": 40}, {"id": 738, "src": "講義3-1機率與統計", "ch": "隨機變數的期望值與變異數", "type": "open", "q": "擲一骰子，若出現點數為偶數，可得與點數相同的金額；若出現點數為奇數，須賠與點數相同的金額，求每擲一次的期望值。", "opts": {}, "ans": null, "ansText": "1/2", "expl": "E=(-1+2-3+4-5+6)/6=3/6=1/2。", "flag": false, "num": 41}, {"id": 739, "src": "講義3-1機率與統計", "ch": "隨機變數的期望值與變異數", "type": "open", "q": "擲兩粒骰子，若兩粒出現點數的差為r（r≥0），則可得r元，求其期望值。", "opts": {}, "ans": null, "ansText": "35/18元", "expl": "點數差0~5的機率為6/36、10/36、8/36、6/36、4/36、2/36，期望值=(10+16+18+16+10)/36=70/36=35/18。", "flag": false, "num": 42}, {"id": 740, "src": "講義3-1機率與統計", "ch": "隨機變數的期望值與變異數", "type": "open", "q": "依據經驗某人完成一件工作，可能是1天、2天、3天、4天，機會分別是0.2、0.4、0.3、0.1，請問完成此工作天數的期望值是多少？", "opts": {}, "ans": null, "ansText": "2.3天", "expl": "E=1×0.2+2×0.4+3×0.3+4×0.1=2.3。", "flag": false, "num": 43}, {"id": 741, "src": "講義3-1機率與統計", "ch": "隨機變數的期望值與變異數", "type": "open", "q": "過年時父親以抽球方式給壓歲錢，袋中有5個球，號碼為1、2、2、4、6，獎額是號碼數的1000倍。(1)小明拿到的壓歲錢最多是多少？(2)小明的壓歲錢期望值是多少？(3)如果改為抽到6號給10000元、其餘號碼給1000元，此種給獎方式與原來的給獎方式何者對小明較有利？", "opts": {}, "ans": null, "ansText": "(1)6000元，(2)3000元，(3)原來的較有利", "expl": "期望值=(1000+2000×2+4000+6000)/5=3000元；新方式期望值=(10000+1000×4)/5=2800元，較小。", "flag": false, "num": 44}, {"id": 742, "src": "講義3-1機率與統計", "ch": "隨機變數的期望值與變異數", "type": "open", "q": "依據過去經驗，在松山機場排班的計程車，載客人數1人的機率是60%，2人的機率是30%，3人的機率是5%，4人的機率是5%，請問一部計程車載客人數的期望值是多少？", "opts": {}, "ans": null, "ansText": "1.55人", "expl": "E=0.6×1+0.3×2+0.05×3+0.05×4=1.55。", "flag": false, "num": 45}, {"id": 743, "src": "講義3-1機率與統計", "ch": "隨機變數的期望值與變異數", "type": "open", "q": "假設一位高二學生能再活一年的機率為0.9999，某位高二學生繳一年期平安保險保費100元，若在一年內不幸意外死亡，保險公司付給家長20萬元理賠金，試求此保險公司期望利潤為何？", "opts": {}, "ans": null, "ansText": "80元", "expl": "利潤期望值=100×0.9999-(200000-100)×0.0001=99.99-19.99=80元。", "flag": false, "num": 46}, {"id": 744, "src": "講義3-1機率與統計", "ch": "隨機變數的期望值與變異數", "type": "open", "q": "設骰子A的六面標示點數為1、1、1、2、2、3；骰子B的六面標示點數為1、2、2、3、3、3。今同擲二骰子A、B出現點數依次為a、b，試求(1)a+b的期望值。(2)ab的期望值。", "opts": {}, "ans": null, "ansText": "(1)4，(2)35/9", "expl": "a+b之值2~6的機率為3/36、8/36、14/36、8/36、3/36，期望值4；ab之值1,2,3,4,6,9的機率為3/36、8/36、10/36、4/36、8/36、3/36，期望值35/9。", "flag": false, "num": 47}, {"id": 745, "src": "講義3-1機率與統計", "ch": "隨機變數的期望值與變異數", "type": "open", "q": "設拋物線Γ：y=ax^2+bx+c，a,b,c∈{-1,2}，若-1、2被選取的機會均等，且a、b、c的選取互不影響，試求Γ與x軸交點個數的期望值。", "opts": {}, "ans": null, "ansText": "9/8", "expl": "由判別式D=b^2-4ac判斷：D=0僅(a,b,c)=(-1,2,1)型1組，D>0有4組，其餘D<0，期望值=2×4/8+1×1/8=9/8。", "flag": false, "num": 48}, {"id": 746, "src": "講義3-1機率與統計", "ch": "隨機變數的期望值與變異數", "type": "open", "q": "一條售價20元的麵包成本12元，某小店賣出之麵包經75日統計：一日所需70、80、90、100、110、120條的日數分別為2、8、16、23、19、7日。今日準備100條麵包出售，賣不完則隔日丟棄，試求本日利潤的期望值。", "opts": {}, "ans": null, "ansText": "698又2/3元（2096/3元）", "expl": "成本1200元，賣出x條收入20x；利潤期望=(200×2+400×8+600×16+800×49)/75=2096/3元（需求≥100時皆賣100條）。", "flag": false, "num": 49}, {"id": 747, "src": "講義3-1機率與統計", "ch": "隨機變數的期望值與變異數", "type": "open", "q": "擲一公正骰子，當出現點數x時，log10(x^3+3)的整數部分之值為y，試求y值的期望值。", "opts": {}, "ans": null, "ansText": "7/6", "expl": "x=1~6時x^3+3=4,11,30,67,128,219，y依序為0,1,1,1,2,2，期望值=(0+3+4)/6=7/6。", "flag": false, "num": 50}, {"id": 748, "src": "講義3-1機率與統計", "ch": "隨機變數的期望值與變異數", "type": "open", "q": "一骰子擲n次，出現最大的點數為M_n，最小的點數為L_n，求(1)M_n=5的機率。(2)L_n=3的機率。(3)M_n=5且L_n=3的機率。(4)L_3的期望值。", "opts": {}, "ans": null, "ansText": "(1)(5/6)^n-(4/6)^n，(2)(4/6)^n-(3/6)^n，(3)(3^n-2×2^n+1)/6^n，(4)49/24", "expl": "最大值=5即全部≤5扣掉全部≤4；(3)用排容原理；(4)n=3時L_3=1~6的機率為91/216、61/216、37/216、19/216、7/216、1/216，加權得49/24。", "flag": false, "num": 51}, {"id": 749, "src": "講義3-1機率與統計", "ch": "隨機變數的期望值與變異數", "type": "open", "q": "設A君的箱子中有2紅球1白球，B君的箱子中有2紅球2白球。今從A開始，A與B輪流從自己箱子中取出1球，取出後不再放回，以先取得白球為勝。(1)試問A與B何人得勝的機率大？(2)當勝負決定時，試求二人箱中剩下球總數的期望值。", "opts": {}, "ans": null, "ansText": "(1)A（P(A勝)=5/9＞4/9），(2)43/9", "expl": "逐步列舉取球順序得P(A勝)=1/3+2/9+1/9=5/9；剩球數6,5,4,3,2的機率加權得期望值43/9。", "flag": false, "num": 52}, {"id": 750, "src": "講義3-1機率與統計", "ch": "隨機變數的期望值與變異數", "type": "open", "q": "袋中有5個白球、3個黑球，今自袋中隨機抽出3個球，求(1)取出的球中恰有2個白球的機率。(2)取出的白球個數的期望值。", "opts": {}, "ans": null, "ansText": "(1)15/28，(2)15/8", "expl": "C(5,2)C(3,1)/C(8,3)=30/56=15/28；期望值=3×5/8=15/8。", "flag": false, "num": 53}, {"id": 751, "src": "講義3-1機率與統計", "ch": "隨機變數的期望值與變異數", "type": "open", "q": "連續投擲一顆公正的骰子四次，試求(1)6點出現兩次的機率。(2)6點出現次數的期望值。", "opts": {}, "ans": null, "ansText": "(1)25/216，(2)2/3", "expl": "C(4,2)(1/6)^2(5/6)^2=25/216；期望值np=4×1/6=2/3。", "flag": false, "num": 54}, {"id": 752, "src": "講義3-1機率與統計", "ch": "隨機變數的期望值與變異數", "type": "open", "q": "一袋中有1號卡片n張、2號卡片n-1張、…、k號卡片(n-k+1)張、…、n號卡片1張，任意自袋中抽取1張卡片，試求其號碼的期望值。", "opts": {}, "ans": null, "ansText": "(n+2)/3", "expl": "共n(n+1)/2張，P(號碼=k)=2(n-k+1)/(n(n+1))，Σk×P化簡得(n+2)/3。", "flag": false, "num": 55}, {"id": 753, "src": "講義3-1機率與統計", "ch": "隨機變數的期望值與變異數", "type": "open", "q": "擲3粒骰子，若出現k（k=1,2,3）個1點則贏k元；否則輸a元。若此賭局是公平的（即期望值為0），則a之值為何？", "opts": {}, "ans": null, "ansText": "108/125", "expl": "出現1、2、3個1點的機率為75/216、15/216、1/216，無1點為125/216，由75+30+3=125a/…即(75+30+3)/216=a×125/216，得a=108/125。", "flag": false, "num": 56}, {"id": 754, "src": "講義3-1機率與統計", "ch": "隨機變數的期望值與變異數", "type": "open", "q": "網球一盤比賽先勝6局者贏，贏一盤可得獎金1000元。甲、乙兩人實力相當，但甲已連勝5局，如果因下雨不再繼續比賽，則甲、乙兩人如何分配獎金才公平？", "opts": {}, "ans": null, "ansText": "甲得7875/8元，乙得125/8元", "expl": "乙須連贏6局，機率(1/2)^6=1/64；甲贏機率63/64，按機率比分配1000元。", "flag": false, "num": 57}, {"id": 755, "src": "講義3-1機率與統計", "ch": "隨機變數的期望值與變異數", "type": "open", "q": "某人擲二骰子，若擲出之點數和為9時可得100元並得繼續投擲之權利，若第二回又擲出9點則又可得100元並得繼續投擲，將此方法反覆進行，則此人所得之期望值為何？", "opts": {}, "ans": null, "ansText": "12.5元", "expl": "擲出9點的機率為4/36=1/9，所得為幾何級數型，E(X)=100×(1/9)/(1-1/9)…整理得100/8=12.5元。", "flag": false, "num": 58}, {"id": 756, "src": "講義3-1機率與統計", "ch": "隨機變數的期望值與變異數", "type": "open", "q": "5封寫好的信任意放入5個寫好此5人姓名與地址的信封內，試求(1)恰有一封放對的機率。(2)信放對個數的期望值。", "opts": {}, "ans": null, "ansText": "(1)3/8，(2)1", "expl": "恰一封對的放法45種，機率45/120=3/8；放對0~5封的機率加權後期望值恰為1。", "flag": false, "num": 59}, {"id": 757, "src": "講義3-1機率與統計", "ch": "隨機變數的期望值與變異數", "type": "open", "q": "從邊長為1的正六邊形的六個頂點中任取三個頂點，試求三頂點所形成的三角形面積的期望值。", "opts": {}, "ans": null, "ansText": "9√3/20", "expl": "C(6,3)=20個三角形分三類：頂角120度等腰6個（面積√3/4）、30-60-90直角12個（面積√3/2）、正三角形2個（面積3√3/4），加權平均得9√3/20。", "flag": false, "num": 60}, {"id": 758, "src": "講義3-1機率與統計", "ch": "隨機變數的期望值與變異數", "type": "open", "q": "某公司考慮在甲、乙兩地間選擇一地投資設新廠。在甲地設廠，獲利可得10000萬元，不獲利將虧損7000萬元；在乙地設廠，獲利可得6000萬元，不獲利將虧損5000萬元。新廠在甲、乙兩地獲利的機率分別為0.6、0.7。如以獲利期望值為決策準則，該公司應選擇甲地或乙地投資？", "opts": {}, "ans": null, "ansText": "甲地", "expl": "甲地期望值=10000×0.6-7000×0.4=3200萬元，乙地=6000×0.7-5000×0.3=2700萬元，選甲地。", "flag": false, "num": 61}, {"id": 759, "src": "講義3-1機率與統計", "ch": "隨機變數的期望值與變異數", "type": "open", "q": "擲一公正的硬幣5次，已知各次互不影響，假設隨機變數x為出現正面的次數，試問(1)隨機變數x的所有可能值及各可能發生的機率。(2)機率的總和。", "opts": {}, "ans": null, "ansText": "(1)P(x=k)=C(5,k)/32，即1/32、5/32、10/32、10/32、5/32、1/32（k=0~5），(2)1", "expl": "x~B(5,1/2)，各項機率相加為1。", "flag": false, "num": 62}, {"id": 760, "src": "講義3-1機率與統計", "ch": "隨機變數的期望值與變異數", "type": "open", "q": "已知一枚不均勻銅板，出現正面的機率為2/3，出現反面的機率為1/3，今丟此銅板4次，假設隨機變數x為出現正面的次數，試問(1)隨機變數x的所有可能值及各可能發生的機率。(2)機率的總和。", "opts": {}, "ans": null, "ansText": "(1)P(x=k)=C(4,k)(2/3)^k(1/3)^(4-k)，即1/81、8/81、24/81、32/81、16/81（k=0~4），(2)1", "expl": "x~B(4,2/3)，各項機率相加為1。", "flag": false, "num": 63}, {"id": 761, "src": "講義3-1機率與統計", "ch": "隨機變數的期望值與變異數", "type": "open", "q": "學科能力測驗數學的單一選擇題，每題有5個選項，答對得5分，答錯不倒扣，未作答不給分亦不扣分。試問隨意猜測的情況下，每題得分的期望值。", "opts": {}, "ans": null, "ansText": "1分", "expl": "E=5×1/5+0×4/5=1分。", "flag": false, "num": 64}, {"id": 762, "src": "講義3-1機率與統計", "ch": "隨機變數的期望值與變異數", "type": "open", "q": "指定科目考試數學的單一選擇題，每題有4個選項，答對得6分，答錯倒扣2分，未作答不給分亦不扣分。試問隨意猜測的情況下，每題得分的期望值。", "opts": {}, "ans": null, "ansText": "0分", "expl": "E=6×1/4+(-2)×3/4=0分。", "flag": false, "num": 65}, {"id": 763, "src": "講義3-1機率與統計", "ch": "隨機變數的期望值與變異數", "type": "open", "q": "指定科目考試數學的多重選擇題，每題有4個選項，每選項獨立計分，每答對一個選項得2分，每答錯一個選項倒扣2分，整題未作答不給分亦不扣分。試問隨意猜測的情況下，每題得分的期望值。", "opts": {}, "ans": null, "ansText": "0分", "expl": "每一選項期望得分=2×1/2+(-2)×1/2=0，四個選項合計仍為0分。", "flag": false, "num": 66}, {"id": 764, "src": "講義3-1機率與統計", "ch": "隨機變數的期望值與變異數", "type": "open", "q": "學科能力測驗數學的多重選擇題，每題有5個選項且至少有一個選項正確，答對得5分，只錯一個可獲2.5分，錯兩個或以上不給分。某題正確答案為A、B，甲不知道而隨意猜測，試問該題得分的期望值。", "opts": {}, "ans": null, "ansText": "35/62分", "expl": "非空作答共31種：得5分1種，得2.5分5種（A、B、ABC、ABD、ABE），其餘0分；E=(5+2.5×5)/31=35/62分。", "flag": false, "num": 67}, {"id": 765, "src": "講義3-1機率與統計", "ch": "隨機變數的期望值與變異數", "type": "open", "q": "一袋中有9個紅球、3個白球，若選取的機會相等，求(1)任取1球時白球個數的期望值。(2)任取2球時白球個數的期望值。", "opts": {}, "ans": null, "ansText": "(1)1/4球，(2)1/2球", "expl": "取1球期望值=3/12=1/4；取2球期望值=2×3/12=1/2。", "flag": false, "num": 68}, {"id": 766, "src": "講義3-1機率與統計", "ch": "隨機變數的期望值與變異數", "type": "open", "q": "甲、乙二人作圍棋比賽，不得和局，每局甲獲勝的機率為2/3且各局獨立。規定先勝3局者可得獎金36000元，進行至甲勝2局、乙勝1局時因故中止且不再比賽。若依最終二人贏得比賽之機率比值分配獎金，則甲、乙二人應各分配多少元？", "opts": {}, "ans": null, "ansText": "甲32000元，乙4000元", "expl": "乙須連勝2局，機率(1/3)^2=1/9；甲勝機率8/9，按8:1分配36000元。", "flag": false, "num": 69}, {"id": 767, "src": "講義3-1機率與統計", "ch": "隨機變數的期望值與變異數", "type": "open", "q": "某汽車零件通過測試的機率為3/4，試問測試4個零件，正好有2個通過的機率。", "opts": {}, "ans": null, "ansText": "27/128", "expl": "C(4,2)(3/4)^2(1/4)^2=6×9/256=27/128。", "flag": false, "num": 70}, {"id": 768, "src": "講義3-1機率與統計", "ch": "隨機變數的期望值與變異數", "type": "open", "q": "一袋中有2紅球、1白球，做4次實驗，每次抽兩球（抽後放回），設抽到兩球都是紅球的次數為X，試問(1)P(X=1)。(2)X的期望值E(X)。", "opts": {}, "ans": null, "ansText": "(1)32/81，(2)4/3", "expl": "每次兩球皆紅的機率C(2,2)/C(3,2)=1/3，X~B(4,1/3)；P(X=1)=C(4,1)(1/3)(2/3)^3=32/81，E(X)=4/3。", "flag": false, "num": 71}, {"id": 769, "src": "講義3-1機率與統計", "ch": "隨機變數的期望值與變異數", "type": "open", "q": "一袋中藏有5個白球、4個黑球，今自袋中一次取出兩個球，每一個白球可折換5元，每一個黑球可折換k元。若折換金額的數學期望值為6元，試問k值。", "opts": {}, "ans": null, "ansText": "0.5元", "expl": "取一球的折換期望值須為3元：5×5/9+k×4/9=3，解得k=0.5。", "flag": false, "num": 72}, {"id": 770, "src": "講義3-1機率與統計", "ch": "隨機變數的期望值與變異數", "type": "open", "q": "甲、乙兩人同時射一靶，每人一發；甲、乙的射擊命中率各為0.6與0.5，且各人命中靶面的事件獨立。設隨機變數X表命中靶面的個數，試寫出X的所有可能值及各可能值發生的機率。", "opts": {}, "ans": null, "ansText": "P(X=0)=0.2，P(X=1)=0.5，P(X=2)=0.3", "expl": "P(0)=0.4×0.5，P(1)=0.6×0.5+0.4×0.5，P(2)=0.6×0.5。", "flag": false, "num": 73}, {"id": 771, "src": "講義3-1機率與統計", "ch": "隨機變數的期望值與變異數", "type": "open", "q": "袋中有2個紅球、3個白球，從中任取3球，設取得X個紅球，試寫出隨機變數X的所有可能值及各可能值發生的機率，並驗證機率總和為1。", "opts": {}, "ans": null, "ansText": "P(X=0)=1/10，P(X=1)=3/5，P(X=2)=3/10；1/10+3/5+3/10=1", "expl": "P(X=k)=C(2,k)C(3,3-k)/C(5,3)，三者相加為1。", "flag": false, "num": 74}, {"id": 772, "src": "講義3-1機率與統計", "ch": "隨機變數的期望值與變異數", "type": "open", "q": "一袋中有1號球1個、2號球2個、3號球3個、4號球4個，從中任取1球，設隨機變數X表取到的號碼，試寫出X的機率質量函數，並畫出X的機率質量函數圖。", "opts": {}, "ans": null, "ansText": "f(k)=k/10，k=1,2,3,4；圖見解析", "expl": "共10球，取到k號球的機率為k/10。", "flag": false, "num": 75}, {"id": 773, "src": "講義3-1機率與統計", "ch": "隨機變數的期望值與變異數", "type": "open", "q": "設隨機變數X的值由擲一粒公正骰子決定，骰子點數大於4（即5或6）時X=1；其餘點數（1,2,3,4）時X=0。試問X是否遵循白努利分布？若是，其參數p為何？", "opts": {}, "ans": null, "ansText": "是，p=1/3", "expl": "X之值只有0與1，且f(1)=1/3、f(0)=2/3，故為參數p=1/3的白努利分布。", "flag": false, "num": 76}, {"id": 774, "src": "講義3-1機率與統計", "ch": "隨機變數的期望值與變異數", "type": "open", "q": "某社區500人中，有120人住A棟大樓，140人住B棟大樓，185人住C棟大樓，其餘的人住D棟大樓，試求此社區居民住各棟大樓的相對次數。", "opts": {}, "ans": null, "ansText": "A棟0.24，B棟0.28，C棟0.37，D棟0.11", "expl": "D棟人數=500-120-140-185=55，各棟人數除以500即得相對次數。", "flag": false, "num": 77}, {"id": 775, "src": "講義3-1機率與統計", "ch": "隨機變數的期望值與變異數", "type": "open", "q": "設某生國文、英文、數學的成績依序為80、65、90，若取權數比為1:2:3，則這三科成績的加權平均數為何？", "opts": {}, "ans": null, "ansText": "80", "expl": "加權平均=(80×1+65×2+90×3)/6=480/6=80。", "flag": false, "num": 78}, {"id": 776, "src": "講義3-1機率與統計", "ch": "隨機變數的期望值與變異數", "type": "open", "q": "設隨機變數X是參數2/3的白努利分布，求X的期望值。", "opts": {}, "ans": null, "ansText": "2/3", "expl": "E(X)=1×2/3+0×1/3=2/3。", "flag": false, "num": 79}, {"id": 777, "src": "講義3-1機率與統計", "ch": "隨機變數的期望值與變異數", "type": "open", "q": "求擲一公正骰子所得點數的期望值。", "opts": {}, "ans": null, "ansText": "7/2", "expl": "E=(1+2+3+4+5+6)/6=21/6=7/2。", "flag": false, "num": 80}, {"id": 778, "src": "講義3-1機率與統計", "ch": "隨機變數的期望值與變異數", "type": "open", "q": "設袋中有2個紅球、3個白球，從中任取3球，求取得白球個數的期望值。", "opts": {}, "ans": null, "ansText": "9/5", "expl": "白球數X=1,2,3的機率為3/10、6/10、1/10，E(X)=(3+12+3)/10=18/10=9/5。", "flag": false, "num": 81}, {"id": 779, "src": "講義3-1機率與統計", "ch": "隨機變數的期望值與變異數", "type": "open", "q": "一袋中有3個紅球、4個白球、5個黃球，從中任取一球，若抽中紅球可得300元，抽中白球可得200元，抽中黃球可得100元，求抽取一球可得金額的期望值。", "opts": {}, "ans": null, "ansText": "550/3元", "expl": "E=300×3/12+200×4/12+100×5/12=2200/12=550/3元。", "flag": false, "num": 82}, {"id": 780, "src": "講義3-1機率與統計", "ch": "隨機變數的期望值與變異數", "type": "open", "q": "擲三粒骰子，出現k粒6點，贏k×1000元（k=1,2,3），沒有6點輸1000元，求輸贏的期望值。", "opts": {}, "ans": null, "ansText": "輸2125/27元", "expl": "輸1000、贏1000、2000、3000的機率為125/216、75/216、15/216、1/216，E=-17000/216=-2125/27元。", "flag": false, "num": 83}, {"id": 781, "src": "講義3-1機率與統計", "ch": "隨機變數的期望值與變異數", "type": "open", "q": "一袋中有10個彈珠，其中4個藍色、6個黃色，從中任取5個，求取到藍色彈珠個數的期望值。", "opts": {}, "ans": null, "ansText": "2個", "expl": "藍色數X=0~4的機率為6/252、60/252、120/252、60/252、6/252，E(X)=2；亦即超幾何期望5×4/10=2。", "flag": false, "num": 84}, {"id": 782, "src": "講義3-1機率與統計", "ch": "隨機變數的期望值與變異數", "type": "open", "q": "設X是隨機變數，已知E(X)=56，求E(0.9X+10)。", "opts": {}, "ans": null, "ansText": "60.4", "expl": "E(0.9X+10)=0.9×56+10=60.4。", "flag": false, "num": 85}, {"id": 783, "src": "講義3-1機率與統計", "ch": "隨機變數的期望值與變異數", "type": "open", "q": "求擲一公正骰子所得點數的變異數。", "opts": {}, "ans": null, "ansText": "35/12", "expl": "E(X)=7/2，E(X^2)=91/6，Var(X)=91/6-49/4=35/12。", "flag": false, "num": 86}, {"id": 784, "src": "講義3-1機率與統計", "ch": "隨機變數的期望值與變異數", "type": "open", "q": "設袋中有2個紅球、3個白球，從中任取3球，求取得白球個數的變異數。", "opts": {}, "ans": null, "ansText": "9/25", "expl": "E(X)=9/5，E(X^2)=18/5，Var(X)=18/5-(9/5)^2=9/25。", "flag": false, "num": 87}, {"id": 785, "src": "講義3-1機率與統計", "ch": "隨機變數的期望值與變異數", "type": "open", "q": "設X是隨機變數，且Y=(2/5)X+60，已知Var(X)=100，求Var(Y)。", "opts": {}, "ans": null, "ansText": "16", "expl": "Var(Y)=(2/5)^2×100=16。", "flag": false, "num": 88}, {"id": 786, "src": "講義3-1機率與統計", "ch": "隨機變數的期望值與變異數", "type": "open", "q": "設擲一公正骰子，出現1點可得300元，出現2、3點可得600元，出現4、5、6點可得900元，求所得金額的平均數及標準差。", "opts": {}, "ans": null, "ansText": "平均數700元，標準差100√5元", "expl": "E(X)=300/6+600×2/6+900×3/6=700，E(X^2)=540000，Var=50000，σ=100√5。", "flag": false, "num": 89}, {"id": 787, "src": "講義3-1機率與統計", "ch": "隨機變數的期望值與變異數", "type": "open", "q": "設X是隨機變數，且Y=(2/5)X+60，已知σX=10，求σY。", "opts": {}, "ans": null, "ansText": "4", "expl": "σY=(2/5)×σX=(2/5)×10=4。", "flag": false, "num": 90}, {"id": 788, "src": "講義3-1機率與統計", "ch": "隨機變數的期望值與變異數", "type": "open", "q": "設X為隨機變數，且σX=2.92，若變數Y=5X+2，求σY。", "opts": {}, "ans": null, "ansText": "14.6", "expl": "σY=|5|×σX=5×2.92=14.6。", "flag": false, "num": 91}, {"id": 789, "src": "講義3-1機率與統計", "ch": "隨機變數的期望值與變異數", "type": "open", "q": "設袋中有3個紅球、4個白球，每個球被取到的機率相同，從中任取4球，設取得X個紅球。(1)試寫出隨機變數X的所有可能值及各可能值發生的機率，並驗證機率總和為1。(2)畫出隨機變數X的機率質量函數的圖形。", "opts": {}, "ans": null, "ansText": "(1)P(X=0)=1/35，P(X=1)=12/35，P(X=2)=18/35，P(X=3)=4/35，總和為1，(2)圖見解析", "expl": "P(X=k)=C(3,k)C(4,4-k)/C(7,4)，四項相加=35/35=1。", "flag": false, "num": 92}, {"id": 790, "src": "講義3-1機率與統計", "ch": "隨機變數的期望值與變異數", "type": "open", "q": "設隨機變數X遵循參數為p的白努利分布，f為其機率質量函數，且3f(0)=5f(1)，求p。", "opts": {}, "ans": null, "ansText": "3/8", "expl": "f(1)=p，f(0)=1-p，由3(1-p)=5p得8p=3，p=3/8。", "flag": false, "num": 93}, {"id": 791, "src": "講義3-1機率與統計", "ch": "隨機變數的期望值與變異數", "type": "open", "q": "假設某高二班級有學生50人，第一次定期考試數學成績為50、55、60、65、70、75、80、85、90等分數，其人數從50分開始依序為3、5、6、8、9、6、6、5、2人，試畫出該班數學成績的相對次數分布圖。", "opts": {}, "ans": null, "ansText": "相對次數依序為0.06、0.10、0.12、0.16、0.18、0.12、0.12、0.10、0.04，圖見解析", "expl": "各分數人數除以50即得相對次數，再繪相對次數分布圖。", "flag": false, "num": 94}, {"id": 792, "src": "講義3-1機率與統計", "ch": "隨機變數的期望值與變異數", "type": "open", "q": "求下列隨機變數X的期望值及變異數。(1)X遵循等機率分布且可能值為1至100的正整數。(2)X遵循參數為1/3的白努利分布。", "opts": {}, "ans": null, "ansText": "(1)期望值101/2，變異數3333/4，(2)期望值1/3，變異數2/9", "expl": "(1)E(X)=(1+...+100)/100=101/2，E(X^2)=(100×101×201/6)/100=6767/2，Var=6767/2-(101/2)^2=3333/4；(2)E=1/3，Var=1/3-(1/3)^2=2/9。", "flag": false, "num": 95}, {"id": 793, "src": "講義3-1機率與統計", "ch": "隨機變數的期望值與變異數", "type": "open", "q": "設袋中有3個紅球、4個白球，從中任取3球，求取得紅球個數的期望值及變異數。", "opts": {}, "ans": null, "ansText": "期望值9/7，變異數24/49", "expl": "P(X=0..3)=4/35、18/35、12/35、1/35，E(X)=45/35=9/7，E(X^2)=75/35=15/7，Var=15/7-(9/7)^2=24/49。", "flag": false, "num": 96}, {"id": 794, "src": "講義3-1機率與統計", "ch": "隨機變數的期望值與變異數", "type": "open", "q": "設X是隨機變數，且Y=(3/4)X+20，已知Var(X)=200，求Var(Y)。", "opts": {}, "ans": null, "ansText": "225/2", "expl": "Var(Y)=(3/4)^2×200=9/16×200=225/2。", "flag": false, "num": 97}, {"id": 795, "src": "講義3-1機率與統計", "ch": "隨機變數的期望值與變異數", "type": "open", "q": "設隨機變數X的機率分布為P(X=k)=k/15（k=1,2,3,4,5），求X的平均數μ及標準差σ。", "opts": {}, "ans": null, "ansText": "μ=11/3，σ=√14/3", "expl": "μ=(1+4+9+16+25)/15=55/15=11/3，E(X^2)=225/15=15，Var=15-121/9=14/9，σ=√14/3。", "flag": false, "num": 98}, {"id": 796, "src": "講義3-1機率與統計", "ch": "隨機變數的期望值與變異數", "type": "open", "q": "擲一粒公正的骰子兩次，設兩次的點數差的絕對值為X。(1)寫出隨機變數X的所有可能值及各可能值發生的機率。(2)求X的期望值。", "opts": {}, "ans": null, "ansText": "(1)X=0~5的機率依序為6/36、10/36、8/36、6/36、4/36、2/36，(2)35/18", "expl": "列舉36種點數組合得各機率，E(X)=(10+16+18+16+10)/36=70/36=35/18。", "flag": false, "num": 99}, {"id": 797, "src": "講義3-1機率與統計", "ch": "隨機變數的期望值與變異數", "type": "open", "q": "擲四粒公正的骰子，出現k粒6點，贏k×200元（k=1,2,3,4），沒有6點輸200元，求輸贏的期望值。", "opts": {}, "ans": null, "ansText": "贏5975/162元", "expl": "輸200與贏200、400、600、800的機率為625/1296、500/1296、150/1296、20/1296、1/1296，E=47800/1296=5975/162元。", "flag": false, "num": 100}, {"id": 798, "src": "講義3-1機率與統計", "ch": "隨機變數的期望值與變異數", "type": "open", "q": "投擲一公正的硬幣兩次，設第一次得X次正面，而兩次的正面數為Y。(1)寫出隨機變數X的所有可能值及各可能值發生的機率。(2)寫出隨機變數Y的所有可能值及各可能值發生的機率。", "opts": {}, "ans": null, "ansText": "(1)P(X=0)=P(X=1)=1/2，(2)P(Y=0)=1/4，P(Y=1)=1/2，P(Y=2)=1/4", "expl": "第一次正反面機率各1/2；兩次正面數Y為二項分布B(2,1/2)。", "flag": false, "num": 101}, {"id": 799, "src": "講義3-1機率與統計", "ch": "隨機變數的期望值與變異數", "type": "open", "q": "擲一粒公正的骰子兩次，設第一次得X點，而兩次的點數和為Y。(1)寫出隨機變數X的所有可能值及各可能值發生的機率。(2)寫出隨機變數Y的所有可能值及各可能值發生的機率。(3)畫出隨機變數X的機率質量函數的圖形。", "opts": {}, "ans": null, "ansText": "(1)P(X=k)=1/6（k=1~6），(2)Y=2~12的機率依序為1/36、2/36、3/36、4/36、5/36、6/36、5/36、4/36、3/36、2/36、1/36，(3)圖見解析", "expl": "點數和Y=k的組合數呈對稱三角形分布，除以36即得機率。", "flag": false, "num": 102}, {"id": 800, "src": "講義3-1機率與統計", "ch": "隨機變數的期望值與變異數", "type": "open", "q": "設隨機變數X遵循白努利分布，其機率函數f滿足f(1):f(0)=2:3，求參數p。", "opts": {}, "ans": null, "ansText": "2/5", "expl": "p:(1-p)=2:3，即2(1-p)=3p，5p=2，p=2/5。", "flag": false, "num": 103}, {"id": 801, "src": "講義3-1機率與統計", "ch": "隨機變數的期望值與變異數", "type": "open", "q": "假設某高三班級有學生40人，今年學測成績在55~64級分，其人數從55級分開始依序為2、1、3、4、5、8、7、6、3、1，試畫出該班學測級分的相對次數分布圖。", "opts": {}, "ans": null, "ansText": "相對次數依序為0.05、0.025、0.075、0.1、0.125、0.2、0.175、0.15、0.075、0.025，圖見解析", "expl": "各級分人數除以40即得相對次數，再繪相對次數分布圖。", "flag": false, "num": 104}, {"id": 802, "src": "講義3-1機率與統計", "ch": "隨機變數的期望值與變異數", "type": "open", "q": "求下列隨機變數X的期望值。(1)X遵循等機率分布且可能值為x1, x2, …, xn。(2)X遵循參數為p的白努利分布。", "opts": {}, "ans": null, "ansText": "(1)(x1+x2+…+xn)/n，(2)p", "expl": "(1)每個值機率1/n，期望值為算術平均；(2)E(X)=0×(1-p)+1×p=p。", "flag": false, "num": 105}, {"id": 803, "src": "講義3-1機率與統計", "ch": "隨機變數的期望值與變異數", "type": "open", "q": "設袋中有2個紅球、3個白球，從中任取3球，求取得紅球個數的期望值。", "opts": {}, "ans": null, "ansText": "6/5", "expl": "P(X=0,1,2)=1/10、6/10、3/10，E(X)=(6+6)/10=12/10=6/5。", "flag": false, "num": 106}, {"id": 804, "src": "講義3-1機率與統計", "ch": "隨機變數的期望值與變異數", "type": "open", "q": "擲三粒骰子，出現一粒6點贏1元，兩粒6點贏2元，三粒6點贏3元，沒有6點輸1元，求輸贏的期望值。", "opts": {}, "ans": null, "ansText": "輸17/216元", "expl": "輸1元與贏1、2、3元的機率為125/216、75/216、15/216、1/216，E=(-125+75+30+3)/216=-17/216元。", "flag": false, "num": 107}, {"id": 805, "src": "講義3-1機率與統計", "ch": "隨機變數的期望值與變異數", "type": "open", "q": "求下列隨機變數X的變異數。(1)X遵循等機率分布且可能值為x1, x2, …, xn。(2)X遵循參數為p的白努利分布。", "opts": {}, "ans": null, "ansText": "(1)(1/n)Σxk^2-((1/n)Σxk)^2，(2)p(1-p)", "expl": "(1)由Var(X)=E(X^2)-μ^2代入等機率分布；(2)E(X)=p，E(X^2)=p，Var=p-p^2=p(1-p)。", "flag": false, "num": 108}, {"id": 806, "src": "講義3-1機率與統計", "ch": "隨機變數的期望值與變異數", "type": "open", "q": "設袋中有2個紅球、3個白球，從中任取3球，求取得紅球個數的變異數。", "opts": {}, "ans": null, "ansText": "9/25", "expl": "E(X)=6/5，E(X^2)=(6+12)/10=9/5，Var=9/5-36/25=9/25。", "flag": false, "num": 109}, {"id": 807, "src": "講義3-1機率與統計", "ch": "隨機變數的期望值與變異數", "type": "open", "q": "設隨機變數X的機率分布為P(X=k)=k/10（k=1,2,3,4），求X的平均數μ及標準差σ。", "opts": {}, "ans": null, "ansText": "μ=3，σ=1", "expl": "μ=(1+4+9+16)/10=3，E(X^2)=(1+8+27+64)/10=10，Var=10-9=1，σ=1。", "flag": false, "num": 110}, {"id": 808, "src": "講義3-2機率統計", "ch": "隨機的意義", "type": "open", "q": "袋中有10個號碼球{1,2,2,3,3,3,4,4,4,4}，由袋中任取一球，令X表取出球的號碼，請問X是否為隨機變數？如是，請寫出其機率分布。", "opts": {}, "ans": null, "ansText": "X是隨機變數；P(X=k)=k/10（k=1,2,3,4）", "expl": "k號球有k個，共10球，故P(X=k)=k/10。", "flag": false, "num": 111}, {"id": 809, "src": "講義3-2機率統計", "ch": "隨機的意義", "type": "open", "q": "設函數f(x)：當x=1,2,3時f(x)=1/2^x；當x=4時f(x)=a；其他值f(x)=0。若f(x)為一機率函數，求a的值並畫機率函數圖。", "opts": {}, "ans": null, "ansText": "a=1/8，圖見解析", "expl": "a=1-(1/2+1/4+1/8)=1/8。", "flag": false, "num": 112}, {"id": 810, "src": "講義3-2機率統計", "ch": "隨機的意義", "type": "open", "q": "某生產線生產幾百萬件產品，假設產品是良品所占比例是90%，隨機抽查100件產品，令X表100件抽查產品中不良品的件數。(1)寫出X的可能值。(2)求P(X=0)。", "opts": {}, "ans": null, "ansText": "(1)X=0,1,2,…,100共101種可能值，(2)(0.9)^100", "expl": "X=0表示100件全為良品，機率為0.9^100。", "flag": false, "num": 113}, {"id": 811, "src": "講義3-2機率統計", "ch": "隨機的意義", "type": "open", "q": "若X為離散型隨機變數，X的可能值為-2、-1、0、1、2，機率依序為0.1、0.2、0.2、0.3、0.2。求(1)E(X)。(2)E(X^2)。(3)E(5X+3)。(4)Var(X)。", "opts": {}, "ans": null, "ansText": "(1)0.3，(2)1.7，(3)4.5，(4)1.61", "expl": "E(X)=-0.2-0.2+0.3+0.4=0.3，E(X^2)=0.4+0.2+0.3+0.8=1.7，E(5X+3)=5×0.3+3=4.5，Var=1.7-0.09=1.61。", "flag": false, "num": 114}, {"id": 812, "src": "講義3-2機率統計", "ch": "隨機的意義", "type": "open", "q": "甲、乙與丙三人玩擲一均勻銅板遊戲，由丙擲銅板兩次，每出現一次正面，丙需付給甲5元、乙50元；每出現一次反面，甲需付給丙5元、乙需付給丙50元。令X、Y分別表丙擲銅板兩次後甲、乙所得的錢。(1)求X、Y的期望值。(2)隨機變數Y與X有線性關係（Y=10X），所以它們的期望值也有線性關係（即E(10X)=10E(X)），對否？", "opts": {}, "ans": null, "ansText": "(1)E(X)=0，E(Y)=0，(2)對", "expl": "X之值-10、0、10的機率為1/4、2/4、1/4，E(X)=0；同理E(Y)=0，且E(10X)=10E(X)成立。", "flag": false, "num": 115}, {"id": 813, "src": "講義3-2機率統計", "ch": "隨機的意義", "type": "open", "q": "若刮刮樂彩券設計有16格，其中有一格中獎，16格中只能任意選刮一格，刮中可得2000元，否則得0元，令X表得獎金的隨機變數。(1)求X的期望值。(2)刮刮樂彩券一張賣150元，彩券券商每月平均賣3000張，請問彩券券商每月平均賺多少？", "opts": {}, "ans": null, "ansText": "(1)125元，(2)75000元", "expl": "E(X)=2000×1/16=125元；每張賺150-125=25元，每月賺25×3000=75000元。", "flag": false, "num": 116}, {"id": 814, "src": "講義3-2機率統計", "ch": "隨機的意義", "type": "open", "q": "甲、乙、丙三人玩擲骰子遊戲，由丙擲兩個公正骰子：點數和小於5時甲輸丙1元（乙丙無輸贏）；點數和為5、6、7時乙輸丙1元（甲丙無輸贏）；點數和為8、9、10時甲贏丙1元（乙丙無輸贏）；點數和大於10時甲贏丙2元、乙贏丙3元。令X、Y分別表丙擲一次後甲、乙所得的錢。(1)求X、Y的機率分布。(2)求E(X)、E(Y)。", "opts": {}, "ans": null, "ansText": "(1)X=-1,0,1,2的機率為6/36、15/36、12/36、3/36；Y=0,-1,3的機率為18/36、15/36、3/36，(2)E(X)=1/3，E(Y)=-1/6", "expl": "點數和<5、=5~7、=8~10、>10的機率依序為6/36、15/36、12/36、3/36，代入計算期望值。", "flag": false, "num": 117}, {"id": 815, "src": "講義3-2機率統計", "ch": "隨機的意義", "type": "open", "q": "袋中有5紅球3藍球，張三由袋中取球，每次取一球，共取4次，令X表取到藍球的次數，分別在放回、不放回兩種情況，寫出(1)X的可能值。(2)X的機率質量函數。", "opts": {}, "ans": null, "ansText": "(1)放回時X=0,1,2,3,4；不放回時X=0,1,2,3，(2)放回時P(X=k)=C(4,k)(3/8)^k(5/8)^(4-k)；不放回時P(X=k)=C(5,4-k)C(3,k)/C(8,4)", "expl": "放回為二項分布B(4,3/8)；不放回為超幾何分布，藍球最多3個。", "flag": false, "num": 118}, {"id": 816, "src": "講義3-2機率統計", "ch": "隨機的意義", "type": "open", "q": "網球比賽約定先勝6局者為勝，勝者可得獎金16000元。依過去比賽經驗，甲、乙兩人實力相當，這次比賽甲已連勝前5局，由於下雨不再繼續比賽，以現在成績分配獎金，請問甲、乙兩人如何分配才公平？", "opts": {}, "ans": null, "ansText": "甲得15750元，乙得250元", "expl": "乙須連勝6局才贏，機率(1/2)^6=1/64；甲贏機率63/64，按機率比分配16000元。", "flag": false, "num": 119}, {"id": 817, "src": "講義3-2機率統計", "ch": "隨機的意義", "type": "open", "q": "一個袋子中有10個球，分別標有1,2,…,10號，若每次取3個球，令X表這3個球之中位數的隨機變數。(1)求P(X=6)。(2)求X的機率分布。(3)畫X的機率函數圖。", "opts": {}, "ans": null, "ansText": "(1)1/6，(2)X=2~9的機率依序為8/120、14/120、18/120、20/120、20/120、18/120、14/120、8/120，(3)圖見解析", "expl": "中位數為6須從1~5取一球、7~10取一球，P=C(5,1)C(4,1)/C(10,3)=20/120=1/6；一般P(X=m)=(m-1)(10-m)/120。", "flag": false, "num": 120}, {"id": 818, "src": "講義3-2機率統計", "ch": "二項分布", "type": "open", "q": "丟1個銅板3次，若前面丟出結果不會影響後面，令A表第一次丟出正面的事件，B表第二次丟出正面的事件，C表第三次丟出正面的事件。求(1)P(A∩B)。(2)三次都丟出正面的機率P(A∩B∩C)。(3)3次中恰有兩次丟出正面的機率。", "opts": {}, "ans": null, "ansText": "(1)1/4，(2)1/8，(3)3/8", "expl": "各次獨立，P(A∩B)=1/4，P(A∩B∩C)=1/8；恰兩次正面=C(3,2)(1/2)^2(1/2)=3/8。", "flag": false, "num": 121}, {"id": 819, "src": "講義3-2機率統計", "ch": "二項分布", "type": "open", "q": "大明抽撲克牌兩次，抽牌後放回，令A表第一次抽到A的事件，B表第二次抽到K的事件。(1)請問A、B兩事件是否為獨立事件？(2)兩次都抽到K的機率是多少？", "opts": {}, "ans": null, "ansText": "(1)是獨立事件，(2)1/169", "expl": "抽後放回故獨立；兩次都抽到K的機率=(4/52)^2=(1/13)^2=1/169。", "flag": false, "num": 122}, {"id": 820, "src": "講義3-2機率統計", "ch": "二項分布", "type": "open", "q": "某公司每月生產電子零件幾百萬件，與其客戶約定以隨機抽樣抽2件檢查，如果檢查的2件都是良品就接受此批貨，否則退貨。假設電子零件中不良品所占比率為5%，請問此批貨被接受的機率約為多少？", "opts": {}, "ans": null, "ansText": "0.9025", "expl": "母體很大可視為獨立，2件都是良品的機率=(0.95)^2=0.9025。", "flag": false, "num": 123}, {"id": 821, "src": "講義3-2機率統計", "ch": "二項分布", "type": "open", "q": "小強罰球命中率7成，每次罰兩球，每投進一球得1分。(1)試求每次罰球得2分的機率。(2)如果小強有3次罰球，得6分的機率是多少？", "opts": {}, "ans": null, "ansText": "(1)0.49，(2)約0.1176", "expl": "每次罰球兩球全中的機率0.7^2=0.49；3次罰球都得2分的機率0.49^3≈0.1176。", "flag": false, "num": 124}, {"id": 822, "src": "講義3-2機率統計", "ch": "二項分布", "type": "open", "q": "丟一個公正銅板5次，令X表5次中出現正面的次數，求(1)P(X=0)。(2)P(X=1)。(3)P(1≤X≤3)。(4)E(X)。(5)Var(X)。", "opts": {}, "ans": null, "ansText": "(1)0.03125，(2)0.15625，(3)0.78125，(4)2.5，(5)1.25", "expl": "X~B(5,0.5)：P(X=0)=0.5^5，P(X=1)=5×0.5^5，P(1≤X≤3)=(5+10+10)×0.5^5；E=np=2.5，Var=np(1-p)=1.25。", "flag": false, "num": 125}, {"id": 823, "src": "講義3-2機率統計", "ch": "二項分布", "type": "open", "q": "丟一個公正銅板6次，請問恰有3次正面、3次反面的機率是多少？", "opts": {}, "ans": null, "ansText": "0.3125", "expl": "P(X=3)=C(6,3)(0.5)^6=20/64=0.3125。", "flag": false, "num": 126}, {"id": 824, "src": "講義3-2機率統計", "ch": "二項分布", "type": "open", "q": "擲一個公正的骰子5次，問(1)出現3次點數是2的機率是多少？(2)出現5次點數是2的機率是多少？(3)出現點數是2次數的期望值是多少？(4)出現點數是2次數的變異數是多少？", "opts": {}, "ans": null, "ansText": "(1)C(5,3)(1/6)^3(5/6)^2=250/7776≈0.03215，(2)(1/6)^5≈0.00013，(3)5/6，(4)25/36", "expl": "次數X~B(5,1/6)，E(X)=5/6，Var(X)=5×(1/6)×(5/6)=25/36。", "flag": false, "num": 127}, {"id": 825, "src": "講義3-2機率統計", "ch": "二項分布", "type": "open", "q": "人的某種特徵會依據一對基因，d表顯性基因，r表隱性基因；有dd或rd基因者外觀上有某種特徵，rr基因者沒有。小孩自父母各接受一個基因，若父母均具有一對rd基因，他們生四個小孩，請問四個小孩中至少有一位具有某種特徵的機率是多少？", "opts": {}, "ans": null, "ansText": "1-(1/4)^4=255/256≈0.996", "expl": "小孩具特徵的機率3/4，不具為1/4；四個都不具的機率(1/4)^4，取補集。", "flag": false, "num": 128}, {"id": 826, "src": "講義3-2機率統計", "ch": "二項分布", "type": "open", "q": "張三棒球打擊率是3成，假設每場球張三都上場打擊4次，某次球賽張三上場打擊，試問他擊出2支安打的機率。", "opts": {}, "ans": null, "ansText": "0.2646", "expl": "C(4,2)(0.3)^2(0.7)^2=6×0.09×0.49=0.2646。", "flag": false, "num": 129}, {"id": 827, "src": "講義3-2機率統計", "ch": "二項分布", "type": "open", "q": "若X~B(20, 0.4)，計算P(X=8)及P(X≤8)。", "opts": {}, "ans": null, "ansText": "P(X=8)≈0.1797，P(X≤8)≈0.5956", "expl": "P(X=8)=C(20,8)(0.4)^8(0.6)^12≈0.1797；累積機率可用Excel求得≈0.5956。", "flag": false, "num": 130}, {"id": 828, "src": "講義3-2機率統計", "ch": "二項分布", "type": "open", "q": "隨機從全市有2個小孩的家庭抽樣，假設(男,男)、(男,女)、(女,男)、(女,女)4種情形機率相等，令A表抽到的家庭最多只有1個男孩的事件，B表抽到的家庭男、女孩都有的事件。(1)請問事件A、B是否獨立？(2)若改為有3個小孩的家庭（8種情形機率相等），請問事件A、B是否獨立？", "opts": {}, "ans": null, "ansText": "(1)不獨立，(2)獨立", "expl": "(1)P(A∩B)=2/4≠P(A)P(B)=(3/4)(2/4)；(2)P(A∩B)=3/8=P(A)P(B)=(4/8)(6/8)，故獨立。", "flag": false, "num": 131}, {"id": 829, "src": "講義3-2機率統計", "ch": "二項分布", "type": "open", "q": "袋中有10個號碼球：1號球1個、2號球2個、3號球3個、4號球4個。大華從袋中隨機抽取1球，抽出一球後放回，共抽5球，令X表抽到1號球的次數。問(1)X=1的機率是多少？(2)P(X≤2)。(3)E(X)。", "opts": {}, "ans": null, "ansText": "(1)約0.3281，(2)約0.9914，(3)0.5", "expl": "X~B(5,0.1)：P(X=1)=C(5,1)(0.1)(0.9)^4≈0.3281；P(X≤2)為前三項和≈0.9914；E(X)=5×0.1=0.5。", "flag": false, "num": 132}, {"id": 830, "src": "講義3-2機率統計", "ch": "二項分布", "type": "open", "q": "某砲手射擊目標命中率8成，今對一目標射擊，他要發射幾發砲彈，方能保證擊中目標的機率在0.99以上？", "opts": {}, "ans": null, "ansText": "3發", "expl": "1-0.2^n>0.99，即0.2^n<0.01，取對數得n>log0.01/log0.2≈2.86，故n=3。", "flag": false, "num": 133}, {"id": 831, "src": "講義3-2機率統計", "ch": "二項分布", "type": "open", "q": "假設某生產線每天生產零件的不良率是4%，品管人員由生產的零件中抽樣50件，試問(1)抽到不良品件數的期望值是多少？(2)抽到的不良品所占比率p^=4%的機率是多少？(3)抽到的不良品比率p^<4%的機率是多少？", "opts": {}, "ans": null, "ansText": "(1)2件，(2)約0.2762，(3)約0.4005", "expl": "X~B(50,0.04)：E(X)=2；p^=4%即X=2，P(X=2)=C(50,2)(0.04)^2(0.96)^48≈0.2762；p^<4%即X≤1，P(X=0)+P(X=1)≈0.4005。", "flag": false, "num": 134}, {"id": 832, "src": "講義3-2機率統計", "ch": "二項分布", "type": "open", "q": "設飛機引擎在飛行中故障的機率是p，且每部引擎故障是獨立，若一架飛機至少有一半的引擎正常，飛機就能安全飛行，請問p要多大時，一架四部引擎飛機才比一架二部引擎飛機安全？", "opts": {}, "ans": null, "ansText": "p≤1/3", "expl": "四引擎安全機率(1-p)^4+4p(1-p)^3+6p^2(1-p)^2 ≥ 二引擎安全機率(1-p)^2+2p(1-p)，化簡得p^2(1-p)(1-3p)≥0，故p≤1/3。", "flag": false, "num": 135}, {"id": 833, "src": "講義3-2機率統計", "ch": "二項分布", "type": "open", "q": "(1)一袋中有2紅球、1白球，隨機抽取2球（不放回），做10次實驗，令X表抽到2球都是紅球的次數，試求(a)P(X=1)。(b)E(X)、Var(X)。(2)如果紅球與白球都是2個，隨機抽取2球（不放回），請再回答上述二個問題。", "opts": {}, "ans": null, "ansText": "(1a)約0.0867，(1b)E(X)=10/3、Var(X)=20/9，(2a)約0.3230，(2b)E(X)=5/3、Var(X)=25/18", "expl": "(1)兩球都紅的機率1/3，X~B(10,1/3)；(2)兩球都紅的機率C(2,2)/C(4,2)=1/6，X~B(10,1/6)。", "flag": false, "num": 136}, {"id": 834, "src": "講義3-2機率統計", "ch": "抽樣與統計推論", "type": "open", "q": "某班有40位同學，其中男生16位、女生24位。某次導師要抽5位同學留下打掃環境，依性別按人數比例作分層隨機抽樣，則班上的男同學張志明被抽中的機率是多少？", "opts": {}, "ans": null, "ansText": "1/8", "expl": "按比例男生抽2位，張志明被抽中的機率=2/16=1/8。", "flag": false, "num": 137}, {"id": 835, "src": "講義3-2機率統計", "ch": "抽樣與統計推論", "type": "open", "q": "設班上學生的座號為1號到48號，想利用簡單隨機抽樣法抽出8位學生，試利用亂數表由第2行第4列（取前2碼）開始，寫出抽到的學生座號。", "opts": {}, "ans": null, "ansText": "36、35、03、04、33、11、42、30（超出48或重複者略過）", "expl": "依亂數表逐一讀取前2碼，超過48或重複的號碼跳過，取滿8個。", "flag": true, "num": 138}, {"id": 836, "src": "講義3-2機率統計", "ch": "抽樣與統計推論", "type": "open", "q": "某地區有200萬受薪者，薪資分布X呈常態分布，其平均數μ=4.2萬元、標準差σ=0.8萬元。求(1)P(X≤3.4)。(2)有多少人薪資在5萬元到5.8萬元之間？", "opts": {}, "ans": null, "ansText": "(1)0.16，(2)27萬人", "expl": "3.4=μ-σ，P(X≤3.4)=(1-0.68)/2=0.16；P(5≤X≤5.8)=0.475-0.34=0.135，200萬×0.135=27萬人。", "flag": false, "num": 139}, {"id": 837, "src": "講義3-2機率統計", "ch": "抽樣與統計推論", "type": "open", "q": "設某飲料公司每瓶飲料容量的規格定為300±20（單位cc），而此公司實際生產每瓶容量的分布是X~N(300, 100)。請問(1)此公司生產的產品中容量超過310cc的機率是多少？(2)此公司產品中不合規格比例是多少？", "opts": {}, "ans": null, "ansText": "(1)約0.16，(2)0.05", "expl": "σ=10，P(X>310)=P(Z>1)≈0.16；P(280≤X≤320)=P(-2≤Z≤2)≈0.95，不合格比例1-0.95=0.05。", "flag": false, "num": 140}, {"id": 838, "src": "講義3-2機率統計", "ch": "抽樣與統計推論", "type": "open", "q": "若某校段考高二有1000位學生參加，數學平均分數51.9分，標準差8分，成績呈常態分布，則此校約有多少位高二學生數學段考成績不及格（低於60分）？", "opts": {}, "ans": null, "ansText": "約840位", "expl": "60≈51.9+8=μ+σ，P(X<60)≈P(Z<1)≈0.84，1000×0.84=840位。", "flag": false, "num": 141}, {"id": 839, "src": "講義3-2機率統計", "ch": "抽樣與統計推論", "type": "open", "q": "由臺南市成年市民抽樣900位的教育程度，結果大專（及以上）占6成，求臺南市成年市民教育程度大專（及以上）比率p的95%信賴區間。", "opts": {}, "ans": null, "ansText": "[0.5673, 0.6327]", "expl": "p^=0.6，e=2√(0.6×0.4/900)≈0.0327，區間為[0.6-0.0327, 0.6+0.0327]。", "flag": false, "num": 142}, {"id": 840, "src": "講義3-2機率統計", "ch": "抽樣與統計推論", "type": "open", "q": "由生產線隨機抽樣400個產品，得樣本不良品有12個，求(1)不良率p的68%信賴區間。(2)不良率p的95%信賴區間。(3)不良率p的99.7%信賴區間。", "opts": {}, "ans": null, "ansText": "(1)[0.0215, 0.0385]，(2)[0.0129, 0.0471]，(3)[0.0044, 0.0556]", "expl": "p^=0.03，√(0.03×0.97/400)≈0.0085，取1倍、2倍、3倍誤差得三個區間。", "flag": false, "num": 143}, {"id": 841, "src": "講義3-2機率統計", "ch": "抽樣與統計推論", "type": "open", "q": "某人想了解某地區擁有手機的人的比率p有多少，他想要信心水準為99.7%，而誤差在0.02之內，請問他需要調查多少人？", "opts": {}, "ans": null, "ansText": "5625人", "expl": "以p^=0.5估計最大誤差，n≈(3×0.5/0.02)^2=5625人。", "flag": false, "num": 144}, {"id": 842, "src": "講義3-2機率統計", "ch": "抽樣與統計推論", "type": "open", "q": "已知某地區100001位國小一年級學生的身高中位數為126公分，身高150公分以上的有150位，而且身高是常態分布，請問此地區一年級學生身高標準差是多少？", "opts": {}, "ans": null, "ansText": "約8公分", "expl": "常態分布平均數=中位數=126；150/100001≈0.0015對應約3倍標準差，故σ≈(150-126)/3=8公分。", "flag": false, "num": 145}, {"id": 843, "src": "講義3-2機率統計", "ch": "抽樣與統計推論", "type": "open", "q": "若X~N(50, 16)，令a=P(46≤X≤54)，b=P(42≤X≤50)，c=P(52≤X≤60)。(1)試以經驗法則圖說明為何a>b>c。(2)求P(|X-54|≤4)。(3)若P(|X-50|≤k)=0.95，求k之值。", "opts": {}, "ans": null, "ansText": "(1)a≈0.68>b≈0.475>c（見解析），(2)0.475，(3)k=8", "expl": "σ=4；a=P(|X-50|≤4)≈0.68，b=P(|X-50|≤8)/2≈0.475，c比b更偏尾端故更小；P(50≤X≤58)≈0.475；k=2σ=8。", "flag": false, "num": 146}, {"id": 844, "src": "講義3-2機率統計", "ch": "抽樣與統計推論", "type": "open", "q": "若比率p的95%信賴區間為[0.40, 0.64]，求p的99.7%信賴區間。", "opts": {}, "ans": null, "ansText": "[0.34, 0.70]", "expl": "p^=(0.40+0.64)/2=0.52，95%誤差0.12；99.7%誤差為其3/2倍=0.18，區間為[0.52-0.18, 0.52+0.18]。", "flag": false, "num": 147}, {"id": 845, "src": "講義3-2機率統計", "ch": "抽樣與統計推論", "type": "open", "q": "手機品牌偏好調查，偏好甲、乙、丙、丁、戊的人數統計：(1)調查90人時依序為20、15、15、30、10，求偏好品牌甲的比例p的95%信賴區間，並問在95%信心水準下是否有證據說偏好品牌甲的比例不是30%。(2)調查900人時依序為200、150、150、300、100，回答同樣的問題。", "opts": {}, "ans": null, "ansText": "(1)[0.1346, 0.3098]，沒有證據，(2)[0.1945, 0.2499]，有證據", "expl": "p^=0.2222；n=90時e≈0.0876，0.3落在區間內故無證據；n=900時e≈0.0277，0.3不在區間內故有證據。", "flag": false, "num": 148}, {"id": 846, "src": "講義3-2機率統計", "ch": "總習題", "type": "open", "q": "令X表某百貨公司一天顧客人數（單位：千人次）的隨機變數，若X的機率函數為f(x)=x/a，x=1,2,3,…,10。求(1)a。(2)P(X=5)。(3)P(X<5)。(4)一天顧客人數超過6千人次的機率。(5)E(X)。", "opts": {}, "ans": null, "ansText": "(1)55，(2)1/11，(3)2/11，(4)34/55，(5)7", "expl": "Σf(x)=55/a=1得a=55；P(X=5)=5/55=1/11；P(X<5)=10/55=2/11；P(X>6)=34/55；E(X)=Σk^2/55=385/55=7。", "flag": false, "num": 149}, {"id": 847, "src": "講義3-2機率統計", "ch": "總習題", "type": "open", "q": "丟一個公正的銅板8次，令X表出現正面的次數。(1)求P(X=2)。(2)若出現k次正面得k×20元，請問此試驗的期望值是多少？(3)若出現k次正面得k^2元，請問此試驗的期望值是多少？", "opts": {}, "ans": null, "ansText": "(1)7/64，(2)80元，(3)18元", "expl": "X~B(8,0.5)：P(X=2)=C(8,2)/256=7/64；E(20X)=20×4=80；E(X^2)=Var(X)+E(X)^2=2+16=18。", "flag": false, "num": 150}, {"id": 848, "src": "講義3-2機率統計", "ch": "總習題", "type": "open", "q": "袋中有3顆白球與4顆黑球，每次隨機從袋中抽出1球，抽出後不放回，直到抽中黑球時遊戲結束。若在第k次抽到黑球，則得到k元獎金，求此遊戲可獲得獎金的數學期望值是多少元？（化為最簡分數）", "opts": {}, "ans": null, "ansText": "8/5元", "expl": "第1~4次抽中黑球的機率為4/7、2/7、4/35、1/35，E=
