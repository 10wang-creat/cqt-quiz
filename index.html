<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta name="robots" content="noindex, nofollow">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>CQT 統計題庫練習</title>
<style>
:root{
  --bg:#F0EEF3;--card:#fff;--text:#34435E;--sub:#7A7F96;--line:#DFDAE8;
  --pri:#8981C2;--pri-soft:#ECE8F6;--ok:#4F8A6D;--ok-soft:#E2F0E8;
  --bad:#C25573;--bad-soft:#F8E7ED;--warn:#8968B8;--warn-soft:#F1EAF9;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;font-family:-apple-system,"PingFang TC","Microsoft JhengHei",sans-serif;background:var(--bg);color:var(--text);font-size:16px;line-height:1.55}
#app{max-width:640px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}
header{position:sticky;top:0;z-index:10;background:var(--card);border-bottom:1px solid var(--line);padding:10px 14px;display:flex;align-items:center;gap:10px}
header .back{border:none;background:none;font-size:22px;color:var(--pri);padding:2px 8px 2px 0;cursor:pointer}
header .title{font-weight:700;font-size:17px;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
header .sub{font-size:13px;color:var(--sub)}
main{flex:1;padding:14px;padding-bottom:40px}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:12px}
.big-btn{display:flex;align-items:center;gap:12px;width:100%;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:12px;font-size:16px;cursor:pointer;text-align:left}
.big-btn .ic{font-size:26px}
.big-btn .t{font-weight:700}
.big-btn .d{font-size:13px;color:var(--sub);margin-top:2px}
.big-btn .badge{margin-left:auto;background:var(--bad);color:#fff;border-radius:999px;padding:2px 10px;font-size:13px;font-weight:700}
.big-btn .badge.gray{background:var(--sub)}
.stat-row{display:flex;gap:8px;margin-bottom:12px}
.stat{flex:1;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:10px;text-align:center}
.stat b{display:block;font-size:20px}
.stat span{font-size:12px;color:var(--sub)}
.list-item{display:flex;align-items:center;width:100%;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:13px 14px;margin-bottom:9px;cursor:pointer;font-size:15px;text-align:left;gap:8px}
.list-item .name{flex:1;font-weight:600}
.list-item .meta{font-size:12.5px;color:var(--sub);white-space:nowrap}
.list-item .wr{font-size:12.5px;color:var(--bad);white-space:nowrap}
.pbar{height:5px;background:var(--line);border-radius:3px;overflow:hidden;margin-top:7px}
.pbar>div{height:100%;background:var(--pri)}
.pbar>div.g{background:var(--ok)}
/* quiz */
.qmeta{display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--sub);margin-bottom:8px;flex-wrap:wrap}
.chip{background:var(--pri-soft);color:var(--pri);border-radius:6px;padding:1px 8px;font-weight:600}
.chip.r{background:var(--bad-soft);color:var(--bad)}
.qtext{font-size:16.5px;font-weight:600;white-space:pre-wrap;word-break:break-word}
.flagnote{margin-top:10px;background:var(--warn-soft);color:var(--warn);border-radius:8px;padding:8px 10px;font-size:13px}
.opt{display:flex;gap:10px;width:100%;background:var(--card);border:1.5px solid var(--line);border-radius:12px;padding:13px 14px;margin-bottom:9px;font-size:15.5px;cursor:pointer;text-align:left;align-items:flex-start;word-break:break-word}
.opt .L{font-weight:800;color:var(--pri);min-width:20px}
.opt.sel{border-color:var(--pri);background:var(--pri-soft)}
.opt.ok{border-color:var(--ok);background:var(--ok-soft)}
.opt.bad{border-color:var(--bad);background:var(--bad-soft)}
.opt:disabled{opacity:1;color:var(--text)}
.feedback{border-radius:12px;padding:13px 14px;margin:10px 0;font-size:15px;white-space:pre-wrap;word-break:break-word}
.feedback.ok{background:var(--ok-soft);border:1px solid #A9D7BC}
.feedback.bad{background:var(--bad-soft);border:1px solid #EBB4C6}
.feedback b{display:block;margin-bottom:4px}
.expl{margin-top:8px;font-size:14px;color:#4A5670;border-top:1px dashed #D8D3E3;padding-top:8px}
.actions{display:flex;gap:10px;margin-top:12px}
.btn{flex:1;border:none;border-radius:12px;padding:14px;font-size:16px;font-weight:700;cursor:pointer}
.btn.pri{background:var(--pri);color:#fff}
.btn.okb{background:var(--ok);color:#fff}
.btn.badb{background:var(--bad);color:#fff}
.btn.ghost{background:var(--card);border:1.5px solid var(--line);color:var(--text)}
.topbar{display:flex;align-items:center;gap:10px;margin-bottom:12px;font-size:13.5px;color:var(--sub)}
.topbar .pbar{flex:1;margin-top:0}
.center{text-align:center;padding:40px 16px;color:var(--sub)}
.center .big{font-size:44px;margin-bottom:10px}
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:4px 2px 12px;font-size:14.5px;color:var(--sub)}
.switch{position:relative;width:46px;height:26px;background:#C7C2D6;border-radius:99px;border:none;cursor:pointer;transition:.2s}
.switch.on{background:var(--pri)}
.switch::after{content:"";position:absolute;top:3px;left:3px;width:20px;height:20px;background:#fff;border-radius:50%;transition:.2s}
.switch.on::after{left:23px}
.danger-link{color:var(--bad);font-size:13.5px;background:none;border:none;text-decoration:underline;cursor:pointer;padding:10px}
.result-num{font-size:40px;font-weight:800}
footer{padding:10px;text-align:center;font-size:12px;color:var(--sub)}
</style>
</head>

較好，因其變異數較小。", "B": ". 平均數較好，因其變異數較大。", "C": ". 平均數較好，因其變異數較小。", "D": ". 不能比較。"}, "ans": "C", "ansText": null, "expl": "", "flag": false, "num": 2}, {"id": 133, "src": "統計學會考題庫", "ch": "Ch8 點估計", "type": "single", "q": "令 𝑋 ,𝑋 ,…,𝑋 為來自某母體的一組隨機樣本，母體平均數為μ。則下列何者不是不偏估計量？\n1 2 10", "opts": {"A": "𝜃̂ = 𝑋1+𝑋2", "B": "𝜃̂ = 2𝑋1−3𝑋2", "C": "𝜃̂ = 𝑋1+𝑋2+⋯+𝑋9", "D": "𝜃̂ = 3𝑋1−𝑋2+4𝑋7"}, "ans": "B", "ansText": null, "expl": "", "flag": false, "num": 3}, {"id": 134, "src": "統計學會考題庫", "ch": "Ch8 點估計", "type": "single", "q": "假設 𝜃̂ , 𝜃̂ , 𝜃̂ 為母體參數 θ 的三個不同的點估計量。已知 E(𝜃̂ ) = 𝐸(𝜃̂ ) = 𝜃, E(𝜃̂ ) ≠ 𝜃，且\n1 2 3 1 2 3\nV(𝜃̂ ) = 10, 𝑉(𝜃̂ ) = 8, 𝐸(𝜃̂ −𝜃)2 = 8。則下列說法何者錯誤：\n1 2 3", "opts": {"A": "以不偏性來說，𝜃̂ , 𝜃̂ 一樣好 1 2", "B": "若同時考慮不偏性與有效性，𝜃̂ , 𝜃̂ 一樣好 2 3", "C": "三者之中，𝜃̂ 的變異數最小", "D": "𝜃̂ 的偏誤為 8"}, "ans": "D", "ansText": null, "expl": "", "flag": false, "num": 4}, {"id": 135, "src": "統計學會考題庫", "ch": "Ch8 點估計", "type": "single", "q": "下列說法何者錯誤？", "opts": {"A": "樣本平均數為母體平均數的不偏估計量", "B": "在常態分配下，中位數為母體平均數的不偏估計量", "C": "樣本變異數為母體變異數的不偏估計量", "D": "樣本標準差為母體標準差的不偏估計量"}, "ans": "D", "ansText": null, "expl": "", "flag": false, "num": 5}, {"id": 136, "src": "統計學會考題庫", "ch": "Ch8 點估計", "type": "single", "q": "令 𝑋 ,𝑋 ,…,𝑋 為來自某母體的一組隨機樣本，母體平均數為μ，標準差為 σ。統計量 𝜃̂ =\n1 2 10\n3𝑋1−𝑋2+4𝑋7\n的期望值為？", "opts": {"A": "μ", "B": "μ", "C": "μ", "D": "μ"}, "ans": "C", "ansText": null, "expl": "", "flag": false, "num": 6}, {"id": 137, "src": "統計學會考題庫", "ch": "Ch8 點估計", "type": "single", "q": "令 𝑋 ,𝑋 ,…,𝑋 為來自某母體的一組隨機樣本，母體平均數為μ，標準差為 σ。統計量 𝜃̂ =\n1 2 10\n3𝑋1−𝑋2+4𝑋7\n的變異數為？", "opts": {"A": "24 σ2", "B": "26 σ2", "C": "σ2", "D": "4 σ2"}, "ans": "B", "ansText": null, "expl": "", "flag": false, "num": 7}, {"id": 138, "src": "統計學會考題庫", "ch": "Ch8 點估計", "type": "single", "q": "令 𝑋 ,𝑋 ,…,𝑋 為來自某常態母體的一組隨機樣本，母體平均數為μ，標準差為 σ。樣本變數 𝑆2 的\n1 2 10\n變異數為？", "opts": {"A": "9 σ4", "B": "2 σ4", "C": "σ4+𝜇4", "D": "4 σ4"}, "ans": "B", "ansText": null, "expl": "", "flag": false, "num": 8}, {"id": 139, "src": "統計學會考題庫", "ch": "Ch8 點估計", "type": "single", "q": "某機關想了解現代夫妻是否想要生育的情況。隨機抽樣了 400 對夫妻，訪查出有 270 對夫妻想要生\n育下一代。若欲以樣本比例估計想要生育的比例，在 95% 的信賴度下，抽樣誤差最多為？", "opts": {"A": "0.0125", "B": "0.2194", "C": "0.0459", "D": "0.02342"}, "ans": "C", "ansText": null, "expl": "", "flag": false, "num": 9}, {"id": 140, "src": "統計學會考題庫", "ch": "Ch8 點估計", "type": "single", "q": "某機關想了解現代夫妻是否想要生育的比例。若想要在 95% 的信賴度下，抽樣誤差最多為 1.5%。\n則需抽多少對夫妻？", "opts": {"A": "17074", "B": "1068", "C": "", "D": "2342 解答："}, "ans": "C", "ansText": null, "expl": "", "flag": false, "num": 10}, {"id": 141, "src": "統計學會考題庫", "ch": "Ch8 點估計", "type": "single", "q": "某機關想了解目前現代夫妻是否想要生育的比例，已經得知去年的比例約為 2%。若想要在 95% 的\n信賴度下，抽樣誤差最多為 0.5%。，則需抽多少對夫妻？", "opts": {"A": "60", "B": "1068", "C": "3012", "D": "2342"}, "ans": "C", "ansText": null, "expl": "", "flag": false, "num": 11}, {"id": 142, "src": "統計學會考題庫", "ch": "Ch8 點估計", "type": "single", "q": "今調查甲乙兩學校的學生身高，甲學校抽樣 100 人，學生身高的變異數為 81；乙學校抽樣 150 人，\n學生身高的變異數為 100。若甲乙兩學校學生身高的母體變異數相同為 𝜎2 。則 𝜎2 的最佳點估計\n量的估計值為多少？", "opts": {"A": "9.6133", "B": "90.5", "C": "181", "D": "92.4153"}, "ans": "D", "ansText": null, "expl": "", "flag": false, "num": 12}, {"id": 143, "src": "統計學會考題庫", "ch": "Ch8 點估計", "type": "single", "q": "某研究者欲以樣本平均數估計長途賽跑者的心跳平均速度。已知心跳速度的標準差為 2，若想要在\n95% 的信賴度下，抽樣誤差最多為 1.5。則需抽選幾位跑者？", "opts": {"A": "7", "B": "8", "C": "9", "D": "10"}, "ans": "A", "ansText": null, "expl": "", "flag": false, "num": 13}, {"id": 144, "src": "統計學會考題庫", "ch": "Ch8 點估計", "type": "single", "q": "某研究者欲以樣本平均數估計長途賽跑者的心跳平均速度，如今抽樣 9 位跑者。已知心跳速度的標\n準差為 2，則在 95% 的信賴度下，抽樣誤差最多為？", "opts": {"A": "1.5", "B": "1.4", "C": "1.3", "D": "1.2"}, "ans": "C", "ansText": null, "expl": "", "flag": false, "num": 14}, {"id": 145, "src": "統計學會考題庫", "ch": "Ch8 點估計", "type": "single", "q": "某研究者欲估計長途賽跑者的心跳速度，隨機選擇了 12 位跑者，記錄其心跳情況如下，單位為每\n分鐘的心跳數：\n80 81 61 79 59 66 80 62 72 78 60 63\n請問長途跑者的平均心跳速度的標準誤應為多少？", "opts": {"A": "88.697", "B": "70.1", "C": "12.5", "D": "2.61"}, "ans": "D", "ansText": null, "expl": "", "flag": false, "num": 15}, {"id": 146, "src": "統計學會考題庫", "ch": "Ch9 區間估計", "type": "single", "q": "某經濟學家欲研究 A 城市中某特殊族群的收入情況。若已知該族群收入情況的標準差為 1000 元，\n現由該族群中隨機抽取 50 位，得其平均收入為 35000。請問該族群平均收入的 95% 信賴區間的\n寬度為多少？", "opts": {"A": "465.23", "B": "232.6", "C": "364.3", "D": "554.37"}, "ans": "B", "ansText": null, "expl": "", "flag": false, "num": 1}, {"id": 147, "src": "統計學會考題庫", "ch": "Ch9 區間估計", "type": "single", "q": "對於 t 分配的說法，下列何者錯誤？", "opts": {"A": "相較於標準常態分配，t 分配機率密度函數的的尾端面積較多", "B": "當母體標準差已知時，他可用來計算母體平均數的信賴區間", "C": "當 t 分配的自由度越多時，t 分配會越像標準常態分配", "D": "它是鐘型對稱分配"}, "ans": "B", "ansText": null, "expl": "", "flag": false, "num": 2}, {"id": 148, "src": "統計學會考題庫", "ch": "Ch9 區間估計", "type": "single", "q": "『母體平均數 μ 的 95% 信賴區間為 (1000, 2100)。』這句話中，95% 的含意是下列哪一種說法？", "opts": {"A": "有 95% 的樣本位於 (1000, 2100) 區間中", "B": "有 95% 的母體位於 (1000, 2100) 區間中", "C": "在重複抽樣的過程中，母體參數會落於區間 (1000, 2100) 的機會為 95%", "D": "在重複抽樣的過程中，所創建出的區間，有 95% 的區間會包含母體參數"}, "ans": "D", "ansText": null, "expl": "", "flag": false, "num": 3}, {"id": 149, "src": "統計學會考題庫", "ch": "Ch9 區間估計", "type": "single", "q": "醫院主管想估計一整天24 小時進入急診室的平均人數。今隨機收集 64 天的人數資料，計算得其平\n均人數為 19.8 人，標準差為 5 人。為了要得到適當的信賴區間，下列哪一個假設是必須的？", "opts": {"A": "樣本平均數等於母體平均數", "B": "母體分配需近似 t 分配", "C": "母體分配需近似常態分配", "D": "不用以上假設"}, "ans": "D", "ansText": null, "expl": "", "flag": false, "num": 4}, {"id": 150, "src": "統計學會考題庫", "ch": "Ch9 區間估計", "type": "single", "q": "百貨公司經理想要了解該公司顧客第一次消費的金額。今隨機抽取 15 位顧客，得其平均消費金額\n為 50.5，標準差為 20。假設顧客消費金額為常態分配，請問第一次平均消費金額的 95% 信賴區\n間為何？", "opts": {"A": "$50.5±$10.12", "B": "$50.5±$9.09", "C": "$50.5±$12.00", "D": "$50.5±$11.08"}, "ans": "D", "ansText": null, "expl": "", "flag": false, "num": 5}, {"id": 151, "src": "統計學會考題庫", "ch": "Ch9 區間估計", "type": "single", "q": "某市投票工作人員想要了解該市中需要某種特殊輔助投票設備的人數。該工作人員隨機抽取 400\n位投票者，如果其中有 150 位需要該特殊輔助投票設備，請問該市中，需要該特殊輔助投票設備\n的人數比例的 90% 信賴區間為？", "opts": {"A": "150±12.3375", "B": "0.375±0.0474", "C": "0.375±0.0398", "D": "0.375±0.065"}, "ans": "C", "ansText": null, "expl": "", "flag": false, "num": 6}, {"id": 152, "src": "統計學會考題庫", "ch": "Ch9 區間估計", "type": "single", "q": "針對母體比例的信賴區間的寬度，下列何者是對的？", "opts": {"A": "90% 信賴區間的寬度比95% 信賴區間的較窄", "B": "樣本數 100 的信賴區間較樣本數 50 的信賴區間寬", "C": "99% 信賴區間的寬度比95% 信賴區間的較窄", "D": "樣本比例是 0.5 的信賴區間較樣本比例是 0.2 的信賴區間窄"}, "ans": "A", "ansText": null, "expl": "", "flag": false, "num": 7}, {"id": 153, "src": "統計學會考題庫", "ch": "Ch9 區間估計", "type": "single", "q": "在計算母體比例信賴區間的寬度時，若其他條件不變，母體比例越接近 0.5，信賴區間的寬度為：", "opts": {"A": "不受影響", "B": "越寬", "C": "越窄", "D": "各種情況均有可能"}, "ans": "B", "ansText": null, "expl": "", "flag": false, "num": 8}, {"id": 154, "src": "統計學會考題庫", "ch": "Ch9 區間估計", "type": "single", "q": "某圖書館長要求館員估計每天借出書籍數的信賴區間，館員提供的 95%信賴區間為 (740, 920)。若\n館長知道每天借出書籍數的標準差為 150，則館員大約是抽取多少樣本？", "opts": {"A": "11", "B": "125", "C": "13", "D": "4"}, "ans": "A", "ansText": null, "expl": "", "flag": false, "num": 9}, {"id": 155, "src": "統計學會考題庫", "ch": "Ch9 區間估計", "type": "single", "q": "一學校主管想了解該學校學生中有領取獎助學金的比例。因為申請人數眾多，該主管不由學校已有\n的全部申請資料了解，而利用統計抽樣的方式了解。今隨機抽取 200 位學生，其中有 118 位學生\n有領取獎助學金。若欲估計有申請該獎助學金的學生比例的 99% 信賴區間，且抽樣誤差在 3% 之\n內。請問需要抽取多少樣本？", "opts": {"A": "1435", "B": "1784", "C": "1503", "D": "1844"}, "ans": "B", "ansText": null, "expl": "", "flag": false, "num": 10}, {"id": 156, "src": "統計學會考題庫", "ch": "Ch9 區間估計", "type": "single", "q": "欲研究某母體比例，抽取 72 個樣本，估算 90% 信賴區間為 (0.438, 0.642)。今欲得到95% 信賴區\n間，且抽樣誤差需在 0.08 之內，請問需要抽取多少樣本？", "opts": {"A": "150", "B": "420", "C": "105", "D": "597"}, "ans": "A", "ansText": null, "expl": "", "flag": false, "num": 11}, {"id": 157, "src": "統計學會考題庫", "ch": "Ch9 區間估計", "type": "single", "q": "某經濟學家欲研究 A 城市中某特殊族群的收入情況。現由該族群中隨機抽取 20 位，得其平均收入\n為 35000，收入情況的標準差為 1000 元。為了要得到適當的信賴區間，下列哪一個假設是必須的？", "opts": {"A": "樣本平均數等於母體平均數", "B": "母體分配需近似 t 分配", "C": "母體分配需為常態分配", "D": "不用以上假設"}, "ans": "C", "ansText": null, "expl": "", "flag": false, "num": 12}, {"id": 158, "src": "統計學會考題庫", "ch": "Ch9 區間估計", "type": "single", "q": "一學校主管想了解該學校學生中有領取獎助學金的比例。因為申請人數眾多，該主管不經由學校已\n有的全部申請資料了解，而利用統計抽樣的方式了解。今隨機抽取 200 位學生，其中有 118 位學\n生有領取獎助學金。試計算有申請該獎助學金的學生比例的 95% 信賴區間為何？", "opts D", "ansText": null, "expl": "", "flag": false, "num": 2}, {"id": 225, "src": "統計學會考題庫", "ch": "Ch13 變異數分析", "type": "single", "q": "一位農學家想比較三種改良玉米種子之產量。在五個不同區域的每一區，三種改良玉米種子種植一\n公畝，成熟後收成以平均公噸計算。這種比較平均收成量的方式的檢定", "opts": {"A": "對區集效應以隨機方式作 F 檢定", "B": "以區集化方式對三種改良玉米種子效應作 F 檢定", "C": "兩因子變異數分析對三種改良玉米種子效應以F 檢定", "D": "單因子變異數分析對三種改良玉米種子效應以 F 檢定"}, "ans": "B", "ansText": null, "expl": "", "flag": false, "num": 3}, {"id": 226, "src": "統計學會考題庫", "ch": "Ch13 變異數分析", "type": "single", "q": "若對三個處理各別隨機抽樣 n=5 後，計算得平均數：{21.75, 24.67, 25.60}。則其處理平方和為", "opts": {"A": "29.63", "B": "17.33", "C": "37.43", "D": "22.57"}, "ans": "C", "ansText": null, "expl": "", "flag": false, "num": 4}, {"id": 227, "src": "統計學會考題庫", "ch": "Ch13 變異數分析", "type": "single", "q": "若對四個母體各別隨機抽樣 n=5 後，分別計算得變異數：{2.69, 1.92, 2.13, 2.98}。則下列之值較為接\n近其誤差平方和", "opts": {"A": "97.50", "B": "63.29", "C": "21.10", "D": "160.32"}, "ans": "A", "ansText": null, "expl": "", "flag": false, "num": 5}, {"id": 228, "src": "統計學會考題庫", "ch": "Ch13 變異數分析", "type": "single", "q": "比較三個處理，而各別隨機抽樣 n=5 後，F 檢定的自由度為：", "opts": {"A": "(3, 5)", "B": "(2, 5)", "C": "( 3, 13)", "D": "(2, 13)"}, "ans": "D", "ansText": null, "expl": "", "flag": false, "num": 6}, {"id": 229, "src": "統計學會考題庫", "ch": "Ch13 變異數分析", "type": "single", "q": "若兩因子 A 和B中，A 有2 個水準而B有4 個水準。兩因子變異數分析中， F 檢定交互作用的自由\n度為：", "opts": {"A": "(1, 32)", "B": "(6, 32)", "C": "(3, 32)", "D": "(8, 32)"}, "ans": "C", "ansText": null, "expl": "", "flag": false, "num": 7}, {"id": 230, "src": "統計學會考題庫", "ch": "Ch13 變異數分析", "type": "single", "q": "某公司的一個產品在五個不同地區比較其年度銷售金額時，以 F 檢定得到p 值為0.032。\n則其結論下列何者為正確？", "opts": {"A": "在=0.05 時，有証據顯五個地區平均年度銷售金額皆相同", "B": "在=0.05 時，有証據顯五個地區平均年度銷售金額至少一區不同", "C": "在=0.01 時，有証據顯，五個地區平均年度銷售金額至少一區不同", "D": "在=0.10 時，有証據顯，五個地區平均年度銷售金額皆相同"}, "ans": "C", "ansText": null, "expl": "", "flag": false, "num": 8}, {"id": 231, "src": "統計學會考題庫", "ch": "Ch13 變異數分析", "type": "single", "q": "兩因子(A 和B個有三個水準)變異數分析中，所謂一個母體意義和下列那個無關：", "opts": {"A": "A 因子的三個水準代表三個母體", "ch": "練習題", "type": "single", "q": "若 P(A)=1/2，P(B)=1/3，P(A∪B)=4/6，則 A、B 二事件同時發生的機率如何？", "opts": {"A": "1/6", "B": "1/3", "C": "1/2", "D": "5/6", "E": "以上皆非 "}, "ans": "A", "ansText": null, "expl": "P(A∪B)= 4/6= 1/2+1/3-P(A∩B)，P(A∩B)=5/6-4/6=1/6", "flag": false, "num": 14}, {"id": 304, "src": "基本統計計算考古題", "ch": "練習題", "type": "single", "q": "若 A 與 B 為為獨立事件，P(A)=1/2，P(B)=1/3，則 A、B 至少有一事件發生之 機率為何？", "opts": {"A": "1/6", "B": "1/2", "C": "1/3", "D": "2/3", "E": "5/6 "}, "ans": "D", "ansText": null, "expl": "P(A∪B)=P(A)＋P(B)-P(A∩B)= 1/2+1/3-1/6=4/6", "flag": false, "num": 15}, {"id": 305, "src": "基本統計計算考古題", "ch": "練習題", "type": "single", "q": "設 A、B 為樣本空間之兩個事件且 P(A) = 0.22，P(B) = 0.4，P(A∩B) = 0.044， 則 P(A|B) = ?", "opts": {"A": "0.462", "B": "0.182", "C": "0.20", "D": "0.11", "E": "以上皆非 "}, "ans": "D", "ansText": null, "expl": "P(A|B)=P(A∩B)/P(B)=0.044/0.4= 0.11", "flag": false, "num": 16}, {"id": 306, "src": "基本統計計算考古題", "ch": "練習題", "type": "open", "q": "設 A、B 為互斥事件，P(A) = 0.3，則 P(B) = 0.5，P(A∪B) = ，P(A’) = ， P(A’∩B)= 。", "opts": {}, "ans": null, "ansText": "（見解析）", "expl": "", "flag": false, "num": 17}, {"id": 307, "src": "基本統計計算考古題", "ch": "練習題", "type": "open", "q": "假設 X 為一常態分配之隨機變數，其 E(X) = 2 A 及 A’ V B ar (X)= 0.4， P(X=2)= 。", "opts": {}, "ans": null, "ansText": "（見解析）", "expl": "", "flag": false, "num": 18}, {"id": 308, "src": "基本統計計算考古題", "ch": "練習題", "type": "open", "q": "若連續型隨機變數 X 之機率分配對稱於 0，則 P(X<0)之機率為 。", "opts": {}, "ans": null, "ansText": "（見解析）", "expl": "", "flag": false, "num": 19}, {"id": 309, "src": "基本統計計算考古題", "ch": "練習題", "type": "single", "q": "令隨機變數 x 呈標準常態分配，a 為任一正常數，則 P(-a ≤ x ≤ a) 等於：", "opts": {"A": "2P(x ≥ -a)", "B": "1-P(x ≤ -a)", "C": "1-P(x ≥ a)", "D": "1-2P(x ≤ -a)", "E": "0.5+P(0 ≤ x ≤ a)"}, "ans": "D", "ansText": null, "expl": "P(-a≤x≤a)=1-2P(x≤-a)（利用對稱性）", "flag": false, "num": 20}, {"id": 310, "src": "基本統計計算考古題", "ch": "練習題", "type": "open", "q": "假設 X 為二項式之隨機變數，其參數為 n = 100， P = 0.6，則成功次數的期 望值為 ，成功次數的變異數為 。", "opts": {}, "ans" =σ2/n×(N-n/ N-1)=5/2× (4-2)/(4-1)=1.67 ", "flag": false, "num": 103}, {"id": 393, "src": "基本統計計算考古題", "ch": "練習題", "type": "single", "q": "下列何者有關信賴區間的敘述是正確的？ 1.在相同的信賴度下，信賴區間的寬度越窄越佳。 2.信賴度越高，信賴區間的寬度越窄。 3.母體平均數的信賴區間，表是此區間會包含母體平均數的機率是 95%。", "opts": {"A": "1,2,3", "B": "1", "C": "1, 3", "D": "1,2", "E": "以上皆非"}, "ans": "D", "ansText": null, "expl": "", "flag": false, "num": 104}, {"id": 394, "src": "基本統計計算考古題", "ch": "練習題", "type": "single", "q": "吾人進行統計判斷時，發生統計第一型錯誤及統計第二型錯誤，如果您是生 產者應致力降低哪一型錯誤？", "opts": {"A": "第一型錯誤", "B": "第二型錯誤", "C": "第一及第二型錯誤", "D": "不必降低錯誤", "E": "以上皆非"}, "ans": "C", "ansText": null, "expl": "", "flag": false, "num": 105}, {"id": 395, "src": "基本統計計算考古題", "ch": "練習題", "type": "single", "q": "假設有一貨車品質較低劣的柳橙被運送到雜貨店，並且接受高品質的試驗樣 品，則會發生下列哪一種誤差？", "opts": {"A": "運輸風險", "B": "交貨風險", "C": "型 II 誤差", "D": "型 I 誤差"}, "ans": "C", "ansText": null, "expl": "", "flag": false, "num": 106}, {"id": 396, "src": "基本統計計算考古題", "ch": "練習題", "type": "single", "q": "虛無假設(null hypotheses)為真卻否定之，稱為", "opts": {"A": "型一誤差", "B": "型二誤差", "C": "顯著拒絕區", "D": "顯著水準", "E": "以上皆非"}, "ans": "A", "ansText": null, "expl": "", "flag": false, "num": 107}, {"id": 397, "src": "基本統計計算考古題", "ch": "練習題", "type": "single", "q": "在假設檢定中，P(不拒絕 H |H 為真) = ? 0 0", "opts": {"A": "α", "B": "β", "C": "1-α", "D": "1-β", "E": "以上皆非"}, "ans": "C", "ansText": null, "expl": "", "flag": false, "num": 108}, {"id": 398, "src": "基本統計計算考古題", "ch": "練習題", "type": "single", "q": "自二個常態群體各抽取 1 組樣本，若二個群體之標準差已知，則可用何種分 配來檢定這二個群體之平均數是否相等？", "opts": {"A": "F 分配", "B": "t 分配", "C": "卜氏分配", "D": "常態分配", "E": "卡方分配"}, "ans": "D", "ansText": null, "expl": "", "flag": false, "num": 109}, {"id": 399, "src": "基本統計計算考古題", "ch": "練習題", "type": "single", "q": "自二個常態群體各抽取 10 個樣本，若二個群體之標準差未知，則可用何種 分配來檢定這二個群體之平均數是否相等？", "opts": {"A": "F 分配", "B": "t 分配", "C": "常態分配", "D": "卡方分配"}, "ans": "B", "ansText": null, "expl": "", "flag": false, "num": 110}, {"id": 400, "src": "基本統計計算考古題", "ch": "練習題", "type": "open", "q": "在一假設檢定中，若 α=0.05 且 0.05<p-值，則其檢定結果應為接受 H 。", "opts": {}, "ans": null, "ansText": "（見解析）", "expl": "", "flag": false, "num": 111}, {"id": 401, "src": "基本統計計算考古題", "ch": "練習題", "type": "open", "q": "以 t 分配檢定二獨立母體之平均值 H ：µ -µ = 0 時，若 n = n =14，則此 t 0 1 2 1 2 分配之自由度為 26 。", "opts": {}, "ans": null, "ansText": "（見解析）", "expl": "", "flag": false, "num": 112}, {"id": 402, "src": "基本統計計算考古題", "ch": "練習題", "type": "single", "q": "假設血壓值的資料為常態分配(Normal distribution)，欲檢定某一降血壓的藥 是否有效，研究者收集了 15 位受測者，使用該藥前、後的血壓值各 15 筆資 料，請問這個檢定應該使用：", "opts": {"A": "Z-檢定", "B": "t-檢定、自由度 29", "C": "t-檢定、自由度 28", "D": "t-檢定、自由度 14。"}, "ans": "D", "ansText": null, "expl": "", "flag": false, "num": 113}, {"id": 403, "src": "統計學題庫", "ch": "緒論", "type": "single", "q": "下列調查結果何者屬於敘述統計？", "opts": {"A": "由於香蕉生產過剩，預計今年香蕉的平均價格將跌到每台斤不到5元台幣。", "B": "由於政府施行禁煙規定，今年二月份的香煙銷售量較去年同期減少了5%。", "C": "由於全球金融風暴，紐約地區今年失業率將上升6%。", "D": "由於近年少子化的影響，預計自2010年開始，台灣的人口將呈現負成長。"}, "ans": "B", "ansText": null, "expl": "敘述統計是對已發生的資料做整理描述；(A)(C)(D)皆為對未來的推測，屬推論統計。", "flag": false, "num": 1}, {"id": 404, "src": "統計學題庫", "ch": "緒論", "type": "single", "q": "下列調查結果何者屬於推論統計？", "opts": {"A": "因應政府拯救房市方案，今年初各大銀行紛紛調降房屋貸款利率，平均利率下降了2個百分點。", "B": "由於政府去年鐵腕施行掃毒行動，今年上半年的犯罪率較去年同期減少了5個百分點。", "C": "由於台灣地區鰻魚生產過剩，我們預計今年外銷鰻魚的平均價格將跌到每台斤不到100元台幣。", "D": "於全球金融風暴，台灣地區今年一月份的失業率較去年同期上升了0.6個百分點。"}, "ans": "C", "ansText": null, "expl": "(C)為對未來的預測，屬推論統計；其餘為已發生事實的描述。", "flag": false, "num": 2}, {"id": 405, "src": "統計學題庫", "ch": "緒論", "type": "single", "q": "母體之標準差即為母體的？", "opts": {"A": "參數", "B": "標準誤", "C": "統計量", "D": "變異數"}, "ans": "A", "ansText": null, "expl": "描述母體特徵的量稱為參數。", "flag": false, "num": 3}, {"id": 406, "src": "統計學題庫", "ch": "緒論", "type": "single", "q": "抽查明新奶粉在全省四家商店的售價為200，195，195，210（元）。下列敘述何者屬於敘述統計學？", "opts": {"A": "這四家商店所售明新奶粉的平均售價為200元", "B": "全省所有商店所售明新牌奶粉的平均售價為200元", "C": "全省有一半商店所售明新甲牌奶粉的售價低於200元", "D": "全省有一半商店所售明新甲牌奶粉的售價是195元"}, "ans": "A", "ansText": null, "expl": "只描述樣本（四家商店）本身的為敘述統計；推及全省即為推論統計。", "flag": false, "num": 4}, {"id": 407, "src": "統計學題庫", "ch": "緒論", "type": "single", "q": "下列何者為母體參數？", "opts": {"A": "有五萬名網友參加的網路民調結果。", "B": "內政部每年公佈的台灣地區新生兒出生數。", "C": "行政院主計處調查顯示，上個月台灣地區失業率為4.91%。", "D": "衛生局抽查冰店紅豆冰的不合格率。"}, "ans": "B", "ansText": null, "expl": "新生兒出生數為全體登記資料（普查性質），屬母體參數；其餘為抽樣所得統計量。", "flag": false, "num": 5}, {"id": 408, "src": "統計學題庫", "ch": "資料蒐集與整理", "type": "single", "q": "下列何種抽樣方法能得到不偏的民意調查？", "opts": {"A": "叩應（call-in，觀眾、聽眾自主電話回應調查問題）", "B": "寫應（write-in，讀者自主寫信回應調查問題）", "C": "白天在車站每10人取1人的調查訪談", "D": "簡單隨機抽樣"}, "ans": "D", "ansText": null, "expl": "", "flag": false, "num": 1}, {"id": 409, "src": "統計學題庫", "ch": "資料蒐集與整理", "type": "single", "q": "上學時使用的交通工具的可選擇搭公車=1，騎機車=2，其他=3，這是何種量度尺度？", "opts": {"A": "順序尺度", "B": "區間尺度", "C": "名目尺度", "D": "以上皆非"}, "ans": "C", "ansText": null, "expl": "數字僅作類別代號，無大小意義，屬名目尺度。", "flag": false, "num": 2}, {"id": 410, "src": "統計學題庫", "ch": "資料蒐集與整理", "type": "single", "q": "下列何者為抽樣調查優於普查的不正確敘述？", "opts": {"A": "抽樣蒐集資料的速度較快", "B": "抽樣蒐集資料的成本較低", "C": "在某些狀況下，抽樣的價值僅止於蒐集樣本", "D": "只要抽到足夠的樣本數，抽樣調查所取得的資料都呈常態分配"}, "ans": "D", "ansText": null, "expl": "樣本數大並不保證資料本身呈常態分配。", "flag": false, "num": 3}, {"id": 411, "src": "統計學題庫", "ch": "資料蒐集與整理", "type": "single", "q": "下列何者不是電話調查的優點？", "opts": {"A": "省時", "B": "省錢", "C": "所得樣本一定是簡單隨機抽樣", "D": "電話調查可利用電腦輔助，通話中可直接輸入資料，可即刻檢查輸入資料的明顯錯誤。"}, "ans": "C", "ansText": null, "expl": "", "flag": false, "num": 4}, {"id": 412, "src": "統計學題庫", "ch": "資料蒐集與整理", "type": "single", "q": "統計學上有四種測量尺度：名目尺度、等級尺度、等比尺度，以及何種尺度？", "opts": {"A": "標準尺度", "B": "有效尺度", "C": "區間尺度", "D": "類別尺度"}, "ans": "C", "ansText": null, "expl": "", "flag": false, "num": 5}, {"id": 413, "src": "統計學題庫", "ch": "資料蒐集與整理", "type": "single", "q": "就統計推論的合理性而言，下列何種抽樣方法較佳？", "opts": {"A": "非機率抽樣", "B": "簡單隨機抽樣", "C": "立意抽樣", "D": "配額抽樣"}, "ans": "B", "ansText": null, "expl": "", "flag": false, "num": 6}, {"id": 414, "src": "統計學題庫", "ch": "資料蒐集與整理", "type": "single", "q": "「大隊接力賽跑中甲班得到冠軍，丁班得到亞軍」句中的「冠軍」「亞軍」，是何種量度尺度？", "opts": {"A": "順序尺度", "B": "區間尺度", "C": "名目尺度", "D": "以上皆非"}, "ans": "A", "ansText": null, "expl": "", "flag": false, "num": 7}, {"id": 415, "src": "統計學題庫", "ch": "資料蒐集與整理", "type": "single", "q": "「阿丁體重75公斤」句中的「75公斤」，是何種量度尺度？", "opts": {"A": "順序尺度", "B": "區間尺度", "C": "名目尺度", "D": "以上皆非"}, "ans": "D", "ansText": null, "expl": "體重有絕對零點，屬比率尺度，故以上皆非。", "flag": false, "num": 8}, {"id": 416, "src": "統計學題庫", "ch": "資料蒐集與整理", "type": "single", "q": "下列那種圖形是屬性資料可畫的圖形？", "opts": {"A": "直方圖", "B": "肩形圖", "C": "長條圖", "D": "莖葉圖"}, "ans": "C", "ansText": null, "expl": "", "flag": false, "num": 9}, {"id": 417, "src": "統計學題庫", "ch": "資料蒐集與整理", "type": "single", "q": "因郵寄問卷回收率過低所成的偏估，可藉由下列何者方式避免？", "opts": {"A": "郵寄更多問卷", "B": "對於樣本中未回答者，進行進一步調查", "C": "對於樣本中回答者，進行進一步調查", "D": "放棄未回答者的意見，把它當成無效樣本"}, "ans": "B", "ansText": null, "expl": "", "flag": false, "num": 10}, {"id": 418, "src": "統計學題庫", "ch": "資料蒐集與整理", "type": "single", "q": "對同一資料集編製幾種不同組距的次數分配表，則組距為最寬的次數分配表：", "opts": {"A": "組數最多", "B": "組數最少", "C": "各組發生的次數都變小", "D": "與其他表的分組結果一樣各組發生次數一樣多"}, "ans": "B", "ansText": null, "expl": "", "flag": false, "num": 11}, {"id": 419, "src": "統計學題庫", "ch": "資料蒐集與整理", "type": "single", "q": "比較屬量成對樣本（X，Y）資料中，兩變數資料的分配是否一致，下列何種圖形最為恰當？", "opts": {"A": "兩直方圖", "B": "X與Y的散佈圖", "C": "莖葉圖", "D": "圓餅圖"}, "ans": "A", "ansText": null, "expl": "", "flag": false, "num": 12}, {"id": 420, "src": "統計學題庫", "ch": "資料蒐集與整理", "type": "single", "q": "「溫度」在量度尺度分類中屬於下列那一種？", "opts": {"A": "名目尺度（nominal scale）", "B": "順序尺度（ordinal scale）", "C": "區間尺度（interval scale）", "D": "比率尺度（ratio scale）"}, "ans": "C", "ansText": null, "expl": "", "flag": false, "num": 13}, {"id": 421, "src": "統計學題庫", "ch": "資料蒐集與整理", "type": "single", "q": "「王建民的球衣號碼」在量度尺度分類中屬於下列那一種？", "opts": {"A": "名目尺度（nominal scale）", "B": "順序尺度（ordinal scale）", "C": "區間尺度（interval scale）", "D": "比率尺度（ratio scale）"}, "ans": "A", "ansText": null, "expl": "", "flag": false, "num": 14}, {"id": 422, "src": "統計學題庫", "ch": "資料蒐集與整理", "type": "single", "q": "某汽車公司想比較在去年與今年，公司銷售的輕型卡車及轎車的數目。下列何種圖形最為恰當？", "opts": {"A": "兩直方圖", "B": "兩長條圖", "C": "莖葉圖", "D": "圓餅圖"}, "ans": "B", "ansText": null, "expl": "", "flag": false, "num": 15}, {"id": 423, "src": "統計學題庫", "ch": "資料蒐集與整理", "type": "single", "q": "下列何者不是莖葉圖的優點：", "opts": {"A": "提供原始數值及其取得條件。", "B": "較容易製作，就算有數值遺漏或重複，可立即補足或刪除，不必重新繪製。", "C": "便利閱讀。", "D": "容易讀出各分組的百分比。"}, "ans": "D", "ansText": null, "expl": "", "flag": false, "num": 16}, {"id": 424, "src": "統計學題庫", "ch": "資料蒐集與整理", "type": "single", "q": "下列何者不是長條圖的特性：", "opts": {"A": "各長條依其長度而區別，與其寬度無關。", "B": "各長條間應留空隙，勿連接在一起，以利區分。", "C": "各長條依某一變數特性的順序排列，使其易於分析，並求美觀。", "D": "各長條間連接在一起，以求美觀。"}, "ans": "D", "ansText": null, "expl": "", "flag": false, "num": 17}, {"id": 425, "src": "統計學題庫", "ch": "資料蒐集與整理", "type": "single", "q": "調查化妝品市場消費者職業別，可用下列何種尺度來衡量？", "opts": {"A": "名目尺度（nominal scale）", "B": "順序尺度（ordinal scale）", "C": "區間尺度（interval scale）", "D": "無法判斷"}, "ans": "A", "ansText": null, "expl": "", "flag": false, "num": 18}, {"id": 426, "src": "統計學題庫", "ch": "資料蒐集與整理", "type": "single", "q": "友愛有線電視公司為預測晚間新聞節目的收視率，在收視戶中加裝收視率監控器，這種資料蒐集的方法是屬：", "opts": {"A": "派員調查", "B": "郵寄問卷調查", "C": "實驗性資料", "D": "觀察性資料"}, "ans": "D", "ansText": null, "expl": "", "flag": false, "num": 19}, {"id": 427, "src": "統計學題庫", "ch": "資料蒐集與整理", "type": "single", "q": "要將累積次數用圖表示，下列何種圖形最為恰當？", "opts": {"A": "肩形圖", "B": "圓餅圖", "C": "直方圖", "D": "次數多邊形圖"}, "ans": "A", "ansText": null, "expl": "", "flag": false, "num": 20}, {"id": 428, "src": "統計學題庫", "ch": "敘述統計", "type": "single", "q": "下列那個統計量無法顯示資料變異的程度？", "opts": {"A": "四分位距", "B": "標準差", "C": "中位數", "D": "全距"}, "ans": "C", "ansText": null, "expl": "中位數為中央趨勢量數，非變異量數。", "flag": false, "num": 1}, {"id": 429, "src": "統計學題庫", "ch": "敘述統計", "type": "single", "q": "若某組資料之標準差為0，則下列敘述何者為真？", "opts": {"A": "資料分配成對稱", "B": "平均數大於中位數", "C": "資料中所有觀察值都相同", "D": "資料中觀察值的數值，正負各佔一半"}, "ans": "C", "ansText": null, "expl": "", "flag": false, "num": 2}, {"id": 430, "src": "統計學題庫", "ch": "敘述統計", "type": "multi", "q": "一隨機樣本數據為：2,4,6,8,10,12，則：", "opts": {"A": "中位數為7", "B": "全距為7", "C": "眾數為7", "D": "平均數為7"}, "ans": "AD", "ansText": null, "expl": "中位數=(6+8)/2=7，平均數=42/6=7；全距=12-2=10，無眾數。原解答為複選 A,D。", "flag": false, "num": 3}, {"id": 431, "src": "統計學題庫", "ch": "敘述統計", "type": "single", "q": "下列那一個配對可以提供關於次數分配之偏態方面的情報：", "opts": {"A": "眾數、平均數", "B": "標準差、中位數", "C": "中位數、平均數", "D": "以上皆非"}, "ans": "D", "ansText": null, "expl": "原解答區塊為 D；但依常理，中位數與平均數（或眾數與平均數）之相對位置可判斷偏態，一般教科書答案為 C，解答疑有誤。", "flag": true, "num": 4}, {"id": 432, "src": "統計學題庫", "ch": "敘述統計", "type": "single", "q": "分配的第三級動差是在衡量分配的：", "opts": {"A": "離散程度（Degree of dispersion）", "B": "中央趨勢（Central tendency）", "C": "峰度（Peakedness）", "D": "偏態（Skewness）"}, "ans": "D", "ansText": null, "expl": "", "flag": false, "num": 5}, {"id": 433, "src": "統計學題庫", "ch": "敘述統計", "type": "multi", "q": "吾人觀測了一組資料：3,5,2,4,6,5,9,5,7,8，下列何者正確？", "opts": {"A": "平均數＞中位數", "B": "中位數＞眾數", "C": "平均數＞眾數", "D": "以上皆非"}, "ans": "AC", "ansText": null, "expl": "排序後為2,3,4,5,5,5,6,7,8,9，眾數=5，中位數=5，平均數=5.4，故A、C皆正確（原解答為複選 A,C）。", "flag": false, "num": 6}, {"id": 434, "src": "統計學題庫", "ch": "敘述統計", "type": "single", "q": "四群學生，人數是10、20、30、40人，平均體重分別是50、55、60、65公斤，則全部學生的平均體重是（四捨五入）：", "opts": {"A": "55", "B": "57", "C": "60", "D": "資料不足，不能計算"}, "ans": "C", "ansText": null, "expl": "(10*50+20*55+30*60+40*65)/(10+20+30+40)=6000/100=60。", "flag": false, "num": 7}, {"id": 435, "src": "統計學題庫", "ch": "敘述統計", "type": "single", "q": "下列那一個統計量較可能同時表示一組樣本中，體重的變異程度高於身高的變異程度：", "opts": {"A": "四分位距", "B": "標準差", "C": "全距", "D": "變異係數"}, "ans": "D", "ansText": null, "expl": "不同單位資料的變異比較須用變異係數。", "flag": false, "num": 8}, {"id": 436, "src": "統計學題庫", "ch": "敘述統計", "type": "single", "q": "何種測量離散程度的測度量最易受到極端值的影響？", "opts": {"A": "標準差", "B": "四分位距", "C": "變異數", "D": "全距"}, "ans": "D", "ansText": null, "expl": "全距僅由最大值與最小值決定，最易受極端值影響。", "flag": false, "num": 9}, {"id": 437, "src": "統計學題庫", "ch": "敘述統計", "type": "single", "q": "飲料工廠有兩條生產線，A生產線產出250c.c.的飲料且產品容量的標準差為2c.c.，B生產線產出500c.c.的飲料且產品容量的標準差為3c.c.，就產品容量的觀點而言：", "opts": {"A": "A生產線的品質較佳", "B": "B生產線的品質較佳", "C": "兩條生產線品質一樣", "D": "難以斷論"}, "ans": "B", "ansText": null, "expl": "A的變異係數=2/250=0.008 大於 B的變異係數=3/500=0.006，故B生產線品質較佳。", "flag": false, "num": 10}, {"id": 438, "src": "統計學題庫", "ch": "敘述統計", "type": "single", "q": "阿美班上期中考的會計學與統計學成績統計如下：全班會計學的平均分數為65分，標準差為5分，統計學的平均分數為70分，標準差為7分。阿美會計學得78分，統計學得84分，相較於全班同學，阿美：", "opts": {"A": "會計學成績較佳", "B": "統計學成績較佳", "C": "會計學與統計學一樣好", "D": "平均數與標準差皆不同，兩科成績無法比較"}, "ans": "A", "ansText": null, "expl": "會計學z分數=(78-65)/5=2.6，統計學z分數=(84-70)/7=2，故會計學相對較佳。", "flag": false, "num": 11}, {"id": 439, "src": "統計學題庫", "ch": "敘述統計", "type": "single", "q": "下列敘述何者恆為正確？", "opts": {"A": "一組資料的最大值為100，最小值為0，其中位數為50，則此資料為對稱資料", "B": "以算術平均數為中心的標準差，較以任何其他平均數為中心的標準差小", "C": "若二組資料有相同平均數且皆為正數，則標準差愈大者，變異係數（C.V.）愈小", "D": "兩組不同單位的資料可藉全距比較資料之離散程度"}, "ans": "B", "ansText": null, "expl": "離差平方和以算術平均數為中心時最小。", "flag": false, "num": 12}, {"id": 440, "src": "統計學題庫", "ch": "敘述統計", "type": "single", "q": "下列敘述何者可能不正確？", "opts": {"A": "一組資料的最大值為100，最小值為0，其中位數為60，則此資料右偏", "B": "一組資料的所有數值與其算術平均數的差，其總和為0", "C": "若二組資料有相同標準差，且平均數皆為正數，則平均數愈大者，變異係數（C.V.）愈小", "D": "兩組不同單位的資料可藉變異係數（C.V.）比較資料之離散程度"}, "ans": "A", "ansText": null, "expl": "僅憑最大、最小值與中位數無法判定偏態方向。", "flag": false, "num": 13}, {"id": 441, "src": "統計學題庫", "ch": "敘述統計", "type": "single", "q": "一組數據資料中，若平均數減去中位數的值是很大的正數時，則下列敘述何者正確？", "opts": {"A": "中位數必須小於零", "B": "平均數必須是大的正數", "C": "中位數必須小於零同時平均數必須大於零", "D": "資料分佈呈右偏"}, "ans": "D", "ansText": null, "expl": "平均數遠大於中位數表示右尾拉長，資料右偏。", "flag": false, "num": 14}, {"id": 442, "src": "統計學題庫", "ch": "敘述統計", "type": "single", "q": "某一國際大公司招考員工時，初試必須先考滿分為200分之英語測驗，再以其分數高低決定面試與否。過去經驗顯示測驗分數為鐘形分配。假設今年公司預定錄取分數最好的16人面試，而報考人數有100人，計算其平均成績為150分和標準差為15分。該公司面試前錄取分數會：", "opts": {"A": "比150分高", "B": "比165分高", "C": "比180分高", "D": "比195分高"}, "ans": "B", "ansText": null, "expl": "依經驗法則，鐘形分配下比平均數大一個標準差以上的資料約占16%；150+15=165，取前16%即約165分以上。", "flag": false, "num": 15}, {"id": 443, "src": "統計學題庫", "ch": "敘述統計", "type": "single", "q": "一組樣本的觀察值為 3,5,7,5,6,7，則「樣本眾數」為：", "opts": {"A": "5", "B": "5.5", "C": "7", "D": "5與7"}, "ans": "D", "ansText": null, "expl": "5與7各出現2次，為雙眾數。", "flag": false, "num": 16}, {"id": 444, "src": "統計學題庫", "ch": "敘述統計", "type": "single", "q": "5位學生每人投籃8次，而投中球數分別為4,4,5,5,6，則投中次數的第一個四分位數是：", "opts": {"A": "4", "B": "5", "C": "5.5", "D": "6"}, "ans": "A", "ansText": null, "expl": "", "flag": false, "num": 17}, {"id": 445, "src": "統計學題庫", "ch": "敘述統計", "type": "single", "q": "5位學生每人投籃8次，而投中球數分別為4,4,5,5,6，則投中次數的標準差為何？", "opts": {"A": "√(2.8/4)", "B": "√(2.8/5)", "C": "√(3/4)", "D": "√(3/5)"}, "ans": "A", "ansText": null, "expl": "平均=4.8，離差平方和=2*(0.8)^2+2*(0.2)^2+(1.2)^2=2.8，樣本標準差=√(2.8/(5-1))=√(2.8/4)。", "flag": false, "num": 18}, {"id": 446, "src": "統計學題庫", "ch": "敘述統計", "type": "single", "q": "一組數據中，介於第一個四分位數和第六十百分位數之間的數據比例為：", "opts": {"A": "20％", "B": "35％", "C": "40％", "D": "65％"}, "ans": "B", "ansText": null, "expl": "60%-25%=35%。", "flag": false, "num": 19}, {"id": 447, "src": "統計學題庫", "ch": "敘述統計", "type": "single", "q": "下列何者不是算術平均數的特性？", "opts": {"A": "位於中央位置的資料值", "B": "是整個資料的平衡點", "C": "與資料差異的總和為0", "D": "與資料差異的平方和是最小的"}, "ans": "A", "ansText": null, "expl": "位於中央位置的資料值是中位數的特性。", "flag": false, "num": 20}, {"id": 448, "src": "統計學題庫", "ch": "敘述統計", "type": "single", "q": "一組資料如右：1,2,3,5,8,10,12,17,22,26,29,30，其第3個四分位數為：", "opts": {"A": "17", "B": "22", "C": "24", "D": "26"}, "ans": "C", "ansText": null, "expl": "n=12，Q3位置=3*(12/4)=9，取第9個與第10個數字的平均=(22+26)/2=24。", "flag": false, "num": 21}, {"id": 449, "src": "統計學題庫", "ch": "敘述統計", "type": "open", "q": "某班50名學生之統計學平均成績為68分，若已知一名學生成績登記錯誤，40分更正為65分，試求更正後之全班平均成績=______。", "opts": {}, "ans": null, "ansText": "68.5分", "expl": "新平均=[68*50+(65-40)]/50=3425/50=68.5。", "flag": false, "num": 22}, {"id": 450, "src": "統計學題庫", "ch": "敘述統計", "type": "open", "q": "某班50名學生之統計學成績平均數為68分，標準差為10分，若已知一名學生成績登記錯誤，40分更正為65分，試求更正後之全班成績的標準差=______。", "opts": {}, "ans": null, "ansText": "9.179分", "expl": "原平方和=(變異數+均值平方)*50=(100+68^2)*50=236200；新平方和=236200-40^2+65^2=238825；新均值=68.5；新變異數=238825/50-68.5^2=84.25；標準差=√84.25≈9.179。", "flag": false, "num": 23}, {"id": 451, "src": "統計學題庫", "ch": "敘述統計", "type": "open", "q": "一班級男生20人，女生30人，已知某次統計學測驗成績，男生的平均數為65分，標準差為12分，女生的平均數為70分，標準差為10分，則此次統計學測驗，全班50人成績的平均數=______。", "opts": {}, "ans": null, "ansText": "68分", "expl": "平均數=(20*65+30*70)/(20+30)=3400/50=68。", "flag": false, "num": 24}, {"id": 452, "src": "統計學題庫", "ch": "敘述統計", "type": "open", "q": "一班級男生20人，女生30人，已知某次統計學測驗成績，男生的平均數為65分，標準差為12分，女生的平均數為70分，標準差為10分，則此次統計學測驗，全班50人成績的標準差=______。", "opts": {}, "ans": null, "ansText": "11.12分", "expl": "變異數=[20*12^2+30*10^2+20*(65-68)^2+30*(70-68)^2]/50=6180/50=123.6；標準差=√123.6≈11.12。", "flag": false, "num": 25}, {"id": 453, "src": "統計學題庫", "ch": "敘述統計", "type": "open", "q": "某班學生之統計學成績平均數為45分，標準差為15分，老師決定調整成績：每人加20分，則平均數=______，標準差=______。", "opts": {}, "ans": null, "ansText": "平均數=65，標準差=15", "expl": "平移不改變標準差：平均數=45+20=65，標準差=15。", "flag": false, "num": 26}, {"id": 454, "src": "統計學題庫", "ch": "敘述統計", "type": "open", "q": "某班學生之統計學成績平均數為45分，標準差為15分，老師決定調整成績：每人成績乘以1.5倍，則平均數=______，標準差=______。", "opts": {}, "ans": null, "ansText": "平均數=67.5，標準差=22.5", "expl": "平均數=45*1.5=67.5，標準差=15*1.5=22.5。註：章末解答區塊寫76.5，與題解之67.5不一致，應為67.5（76.5疑為誤植）。", "flag": true, "num": 27}, {"id": 455, "src": "統計學題庫", "ch": "敘述統計", "type": "open", "q": "某班學生之統計學成績平均數為45分，標準差為15分，老師決定調整成績：每人成績乘以1.5倍後，再加5分，則平均數=______，標準差=______。", "opts": {}, "ans": null, "ansText": "平均數=72.5，標準差=22.5", "expl": "平均數=45*1.5+5=72.5，標準差=15*1.5=22.5。", "flag": false, "num": 28}, {"id": 456, "src": "統計學題庫", "ch": "機率概論", "type": "single", "q": "若王先生得到甲工作的機率為0.5，得到乙工作的機率為0.6，在得到甲工作的條件下，王先生會得到乙工作的機率為0.5，請問王先生同時會得到甲工作及乙工作的機率為何？", "opts": {"A": "1.1", "B": "0.6", "C": "0.3", "D": "0.25"}, "ans": "D", "ansText": null, "expl": "P(A∩B)=P(B|A)P(A)=0.5*0.5=0.25。", "flag": false, "num": 1}, {"id": 457, "src": "統計學題庫", "ch": "機率概論", "type": "single", "q": "若李先生得到甲工作的機率為0.5，得到乙工作的機率為0.6，在得到甲工作的條件下，李先生會得到乙工作的機率為0.5，請問李先生會得到甲工作或乙工作的機率為何？", "opts": {"A": "1.1", "B": "0.85", "C": "0.75", "D": "0.6"}, "ans": "B", "ansText": null, "expl": "P(A∪B)=P(A)+P(B)-P(A∩B)=0.5+0.6-0.25=0.85。", "flag": false, "num": 2}, {"id": 458, "src": "統計學題庫", "ch": "機率概論", "type": "single", "q": "彩券的中獎號碼是由四個箱中各抽一個號碼球，而每個箱內有0到9的號碼球各一顆，則樣本空間中有多少樣本點？", "opts": {"A": "40", "B": "729", "C": "1000", "D": "10000"}, "ans": "D", "ansText": null, "expl": "10*10*10*10=10000。", "flag": false, "num": 3}, {"id": 459, "src": "統計學題庫", "ch": "機率概論", "type": "single", "q": "二個互斥事件A、B，機率分別是0.5、0.6，則Pr{Aᶜ∪Bᶜ}=？（註：Aᶜ、Bᶜ分別表示A、B的餘集合）", "opts": {"A": "0.7", "B": "0.8", "C": "0.9", "D": "1.0"}, "ans": "D", "ansText": null, "expl": "互斥則P(A∩B)=0，Pr{Aᶜ∪Bᶜ}=1-P(A∩B)=1-0=1。", "flag": false, "num": 4}, {"id": 460, "src": "統計學題庫", "ch": "機率概論", "type": "single", "q": "二個獨立事件A、B，機率分別是0.5、0.6，則Pr{A∪B}=？", "opts": {"A": "0.9", "B": "0.8", "C": "0.7", "D": "0.6"}, "ans": "B", "ansText": null, "expl": "獨立則P(A∩B)=0.5*0.6=0.3，P(A∪B)=0.5+0.6-0.3=0.8。", "flag": false, "num": 5}, {"id": 461, "src": "統計學題庫", "ch": "機率概論", "type": "single", "q": "設5位助理的薪水分別是（單位：千元）25,27,30,32,36，平均是30，現在隨機抽出3人，則其中2人的薪水大於平均30的機率是：", "opts": {"A": "0.3", "B": "0.4", "C": "0.5", "D": "0.6"}, "ans": "A", "ansText": null, "expl": "薪水大於30者有2人（32,36）：C(2,2)*C(3,1)/C(5,3)=1*3/10=3/10=0.3。", "flag": false, "num": 6}, {"id": 462, "src": "統計學題庫", "ch": "機率概論", "type": "single", "q": "擲一枚公正的骰子8次結果8次均出現奇數點，則擲第9次時：", "opts": {"A": "出現奇數點的機率比較出現偶數點的機率大", "B": "出現偶數點的機率比較出現奇數點的機率大", "C": "出現偶數點的機率與出現奇數點的機率一樣大", "D": "應該會出現偶數點"}, "ans": "C", "ansText": null, "expl": "每次投擲互相獨立，機率不受先前結果影響。", "flag": false, "num": 7}, {"id": 463, "src": "統計學題庫", "ch": "機率概論", "type": "single", "q": "某公司生產鬧鐘，有10％的不良率。此公司為了商譽，對每一個鬧鐘做品質檢驗以區分產品是否不良，並分類為「通過」或「不通過」，若檢驗員有5％的機會分類錯誤，則被分類為「通過」的百分比，最接近下列那一項？", "opts": {"A": "80％", "B": "85％", "C": "90％", "D": "95％"}, "ans": "B", "ansText": null, "expl": "P(通過)=P(通過|不良)P(不良)+P(通過|良)P(良)=0.05*0.1+0.95*0.9=0.86。", "flag": false, "num": 8}, {"id": 464, "src": "統計學題庫", "ch": "機率概論", "type": "single", "q": "某公司生產鬧鐘，有10％的不良率。對每一個鬧鐘做品質檢驗並分類為「通過」或「不通過」，若檢驗員有5％的機會分類錯誤，只有被分類為「通過」的鬧鐘可對外販賣；被分類為「不通過」的則報廢丟棄。問可對外販賣的鬧鐘中，是良品的百分比，最接近下列那一項？", "opts": {"A": "90％", "B": "93％", "C": "96％", "D": "99％"}, "ans": "D", "ansText": null, "expl": "P(良|通過)=P(良∩通過)/P(通過)=0.95*0.9/0.86=0.855/0.86≈0.994。", "flag": false, "num": 9}, {"id": 465, "src": "統計學題庫", "ch": "機率概論", "type": "single", "q": "某公司生產的零件來自甲、乙兩工廠，甲工廠生產其中70%，不良率是0.5%，乙工廠生產其餘30%，不良率是1%，則該公司零件不良率是：", "opts": {"A": "0.3%", "B": "0.38%", "C": "0.5%", "D": "0.65%"}, "ans": "D", "ansText": null, "expl": "0.7*0.005+0.3*0.01=0.0065=0.65%。", "flag": false, "num": 10}, {"id": 466, "src": "統計學題庫", "ch": "機率概論", "type": "single", "q": "投一公正骰子一次（有6面，分別是1,2,3,4,5,6點），則出現點數的期望值是：", "opts": {"A": "3", "B": "3.5", "C": "4", "D": "依出現點數而定"}, "ans": "B", "ansText": null, "expl": "E(X)=(1+2+3+4+5+6)/6=3.5。", "flag": false, "num": 11}, {"id": 467, "src": "統計學題庫", "ch": "機率概論", "type": "single", "q": "假定 P(A1)=0.2，P(A2)=0.8，P(B|A1)=0.2，P(B|A2)=0.4，那麼 P(A1|B)=？", "opts": {"A": "0.10", "B": "0.111", "C": "0.182", "D": "0.250"}, "ans": "B", "ansText": null, "expl": "貝氏定理：P(A1|B)=P(B|A1)P(A1)/[P(B|A1)P(A1)+P(B|A2)P(A2)]=0.04/(0.04+0.32)=1/9≈0.111。", "flag": false, "num": 12}, {"id": 468, "src": "統計學題庫", "ch": "機率概論", "type": "single", "q": "袋中有相同大小的1個黑球與1個白球。事件A表示第1球取到白球，事件B表示第2球取到白球。一次取1球，而且取出不放回，則下列敘述何者正確：", "opts": {"A": "A與B是互斥事件且A與B是獨立事件", "B": "A與B是互斥且事件A與B是相依事件", "C": "A與B不互斥且事件A與B是相依事件", "D": "A與B不互斥且A與B是獨立事件"}, "ans": "B", "ansText": null, "expl": "不放回時第1球取到白球後第2球必為黑球，故A、B互斥；P(A∩B)=0≠P(A)P(B)=1/4，故相依。", "flag": false, "num": 13}, {"id": 469, "src": "統計學題庫", "ch": "機率概論", "type": "single", "q": "袋中有相同大小的1個黑球與1個白球。事件A代表第1球取到白球，事件B代表第2球取到白球。一次取1球，而且取出放回，則下列敘述何者正確：", "opts": {"A": "A與B是互斥事件且A與B是獨立事件", "B": "A與B是互斥且事件A與B是相依事件", "C": "A與B不互斥且事件A與B是相依事件", "D": "A與B不互斥且A與B是獨立事件"}, "ans": "D", "ansText": null, "expl": "放回後袋中恢復原狀，P(A)=P(B)=1/2，可同時發生（不互斥），且P(A∩B)=1/4=P(A)P(B)，故獨立。", "flag": false, "num": 14}, {"id": 470, "src": "統計學題庫", "ch": "機率概論", "type": "single", "q": "袋中有相同大小的1個黑球與2個白球。事件A表示第1球取到白球，事件B表示第2球取到白球。一次取1球，而且取出不放回，則下列敘述何者正確：", "opts": {"A": "A與B是互斥事件且A與B是獨立事件", "B": "A與B是互斥且事件A與B是相依事件", "C": "A與B不互斥且事件A與B是相依事件", "D": "A與B不互斥且A與B是獨立事件"}, "ans": "C", "ansText": null, "expl": "P(A)=2/3，P(B)=1/3*1+2/3*1/2=2/3，P(A∩B)=2/3*1/2=1/3≠P(A)P(B)=4/9，故不互斥且相依。", "flag": false, "num": 15}, {"id": 471, "src": "統計學題庫", "ch": "機率概論", "type": "single", "q": "連續丟二個公平銅板，丟第四次才發生一正一反的機率是：", "opts": {"A": "1/16", "B": "1/8", "C": "3/16", "D": "1/4"}, "ans": "A", "ansText": null, "expl": "每次丟二銅板出現一正一反的機率是1/2，前三次未發生、第四次發生=(1/2)^3*(1/2)=1/16。", "flag": false, "num": 16}, {"id": 472, "src": "統計學題庫", "ch": "機率概論", "type": "single", "q": "設生男生女之機率各為1/2，且互相獨立。某夫婦生了3個小孩，則恰是1男2女的機率是：", "opts": {"A": "1/8", "B": "1/4", "C": "3/8", "D": "1/2"}, "ans": "C", "ansText": null, "expl": "C(3,1)*(1/2)^3=3/8。", "flag": false, "num": 17}, {"id": 473, "src": "統計學題庫", "ch": "機率概論", "type": "single", "q": "投一公正骰子一次，定義A,B,C三事件如下：A={出現數字是偶數}，B={出現數字是小於4}，C={出現數字是大於4}。那麼Pr(A∩(B∪C))為何？", "opts": {"A": "1/6", "B": "1/3", "C": "1/2", "D": "2/3"}, "ans": "B", "ansText": null, "expl": "B∪C={1,2,3,5,6}，A∩(B∪C)={2,6}，機率=2/6=1/3。", "flag": false, "num": 18}, {"id": 474, "src": "統計學題庫", "ch": "機率概論", "type": "single", "q": "某疾病的發生率為1%，而某藥廠宣稱他們發展出一種很準確的檢測藥劑：若有病則檢測結果為陽性的機率是99%，若無病則檢測結果為陰性的機率也是99%。現隨機選一人，則檢測結果為陽性的機率最接近：", "opts": {"A": "1%", "B": "2%", "C": "50%", "D": "99%"}, "ans": "B", "ansText": null, "expl": "P(陽性)=0.99*0.01+0.01*0.99=0.0198≈2%。", "flag": false, "num": 19}, {"id": 475, "src": "統計學題庫", "ch": "機率概論", "type": "single", "q": "某疾病的發生率為1%，若有病則檢測結果為陽性的機率是99%，若無病則檢測結果為陰性的機率也是99%。現某人檢驗結果為陽性（顯示帶病），則他真的帶病的機率最接近：", "opts": {"A": "1%", "B": "2%", "C": "50%", "D": "99%"}, "ans": "C", "ansText": null, "expl": "P(有病|陽性)=0.99*0.01/(0.99*0.01+0.01*0.99)=1/2。", "flag": false, "num": 20}, {"id": 476, "src": "統計學題庫", "ch": "機率概論", "type": "single", "q": "假設台灣地區婦女就業調查中發現，40%在上班，60%為家庭主婦。若已知在上班工作的婦女中，大學畢業者佔50%；家庭主婦中，大學畢業者佔60%。從所有婦女中隨機抽取一人，其為大學畢業者的機率是多少？", "opts": {"A": "0.45", "B": "0.56", "C": "0.67", "D": "0.78"}, "ans": "B", "ansText": null, "expl": "P(大學畢業)=0.5*0.4+0.6*0.6=0.56。", "flag": false, "num": 21}, {"id": 477, "src": "統計學題庫", "ch": "機率概論", "type": "single", "q": "假設台灣地區婦女就業調查中發現，40%在上班，60%為家庭主婦。在上班工作的婦女中，大學畢業者佔50%；家庭主婦中，大學畢業者佔60%。從所有婦女中隨機抽取一人，若被抽中者是大學畢業者，則其在上班工作的機率是多少？", "opts": {"A": "0.135", "B": "0.246", "C": "0.357", "D": "0.468"}, "ans": "C", "ansText": null, "expl": "P(上班|大學畢業)=0.5*0.4/0.56=0.357。", "flag": false, "num": 22}, {"id": 478, "src": "統計學題庫", "ch": "機率概論", "type": "single", "q": "從台灣全省抽樣1,000家公司，調查其去年的業績：業績成長的有150家，業績衰退的有550家，業績不變的有300家，而其中服務業所佔的比例分別為45%、30%、50%。若從中選取一家公司，其為服務業的機率為若干？", "opts": {"A": "0.3825", "B": "0.4016", "C": "0.4167", "D": "0.4207"}, "ans": "A", "ansText": null, "expl": "P(服務業)=0.15*0.45+0.55*0.30+0.30*0.50=0.0675+0.165+0.15=0.3825。", "flag": false, "num": 23}, {"id": 479, "src": "統計學題庫", "ch": "機率概論", "type": "single", "q": "從台灣全省抽樣1,000家公司：業績成長150家，業績衰退550家，業績不變300家，其中服務業所佔比例分別為45%、30%、50%。若從中選取一家公司，已知其為服務業，則其去年業績成長的機率為若干？", "opts": {"A": "0.151", "B": "0.176", "C": "0.189", "D": "0.207"}, "ans": "B", "ansText": null, "expl": "P(業績成長|服務業)=0.15*0.45/0.3825=0.0675/0.3825≈0.176。", "flag": false, "num": 24}, {"id": 480, "src": "統計學題庫", "ch": "機率概論", "type": "single", "q": "從台灣全省抽樣1,000家公司：業績成長的有120家，業績衰退的有580家，業績不變的有300家，其中服務業所佔的比例分別為45%、30%、50%。若從中選取一家公司，所選取的公司不為服務業的機率為若干？", "opts": {"A": "0.3475", "B": "0.4167", "C": "0.5833", "D": "0.6175"}, "ans": "D", "ansText": null, "expl": "依題解：P(非服務業)=0.15*0.55+0.55*0.70+0.30*0.50=0.0825+0.385+0.15=0.6175（題解沿用150/550/300之權重）。", "flag": false, "num": 25}, {"id": 481, "src": "統計學題庫", "ch": "機率概論", "type": "single", "q": "若 P(A)=0.8，P(B)=0.7 且 P(A∪B)=0.90，則 P(A∩B)=", "opts": {"A": "0.5", "B": "0.6", "C": "0.7", "D": "0.8"}, "ans": "B", "ansText": null, "expl": "P(A∩B)=P(A)+P(B)-P(A∪B)=0.8+0.7-0.9=0.6。", "flag": false, "num": 26}, {"id": 482, "src": "統計學題庫", "ch": "機率概論", "type": "single", "q": "若 P(A)=0.3，P(B)=0.4 且 P(A∩B)=0.25，則 P(A|B)=", "opts": {"A": "0.556", "B": "0.625", "C": "0.833", "D": "0.875"}, "ans": "B", "ansText": null, "expl": "P(A|B)=P(A∩B)/P(B)=0.25/0.4=0.625。", "flag": false, "num": 27}, {"id": 483, "src": "統計學題庫", "ch": "機率概論", "type": "single", "q": "若 P(A)=0.30，P(B)=0.40，P(A∩B)=0.06，則 A 與 B 為：", "opts": {"A": "獨立事件", "B": "相依事件", "C": "互斥事件", "D": "互補事件"}, "ans": "B", "ansText": null, "expl": "P(A∩B)=0.06≠P(A)P(B)=0.12，故相依。", "flag": false, "num": 28}, {"id": 484, "src": "統計學題庫", "ch": "機率概論", "type": "single", "q": "若 A 與 B 為獨立事件，P(A)=0.7 且 P(A|B)=0.7，則 P(B)=", "opts": {"A": "1.00", "B": "0.7", "C": "0.49", "D": "資料不足無法決定"}, "ans": "D", "ansText": null, "expl": "獨立時P(A|B)=P(A)恆成立，無法由此決定P(B)。", "flag": false, "num": 29}, {"id": 485, "src": "統計學題庫", "ch": "機率概論", "type": "single", "q": "若 P(A)=0.6，P(B)=0.5，且 P(A∩B)=0.4，則 P(A∪B)=", "opts": {"A": "0.6", "B": "0.7", "C": "0.8", "D": "0.9"}, "ans": "B", "ansText": null, "expl": "P(A∪B)=0.6+0.5-0.4=0.7。", "flag": false, "num": 30}, {"id": 486, "src": "統計學題庫", "ch": "間斷型機率分配", "type": "single", "q": "以投擲一枚六面骰子一次的隨機試驗，下列那一個隨機變數的定義是正確的？", "opts": {"A": "X=1如出現偶數；2如出現奇數；3如出現1,2,3；4如出現4,5,6", "B": "X=1如出現1,2,3；2如出現4；3如出現5", "C": "X=1如出現1,6；0如出現2,3,4,5", "D": "X=贏如出現6；輸如出現1,2,3,4,5"}, "ans": "C", "ansText": null, "expl": "隨機變數須為實數值且每一結果對應唯一數值：(A)分類重疊、(B)未涵蓋6、(D)非數值，僅(C)正確。原文選項為分段定義，PDF轉文字後排版錯亂，此為依上下文重建。", "flag": true, "num": 1}, {"id": 487, "src": "統計學題庫", "ch": "間斷型機率分配", "type": "single", "q": "一個不公正六面骰子，號碼（2、5）每面出現的機率都是1/4，號碼（1、3、4、6）每面出現的機率都是1/8。令X為擲這個骰子兩次的點數和。請問X等於9的機率為何？", "opts": {"A": "5/64", "B": "7/64", "C": "3/32", "D": "1/9"}, "ans": "D", "ansText": null, "expl": "原解答為D(1/9)。但依題意計算：和為9的組合(3,6),(6,3)各1/64、(4,5),(5,4)各1/32，合計6/64=3/32（選項C）；1/9為公正骰子之答案，解答疑有誤。", "flag": true, "num": 2}, {"id": 488, "src": "統計學題庫", "ch": "間斷型機率分配", "type": "single", "q": "一個不公正六面骰子，號碼（2、5）每面出現的機率都是1/4，號碼（1、3、4、6）每面出現的機率都是1/8。令X為擲這個骰子兩次的點數和，請問X大於或等於4且小於或等於10的機率為何？", "opts": {"A": "5/6", "B": "27/32", "C": "5/36", "D": "53/64"}, "ans": "B", "ansText": null, "expl": "P(4≤X≤10)=1-P(X=2,3,11,12)=1-(1/64+1/16+1/16+1/64)=1-10/64=27/32。", "flag": false, "num": 3}, {"id": 489, "src": "統計學題庫", "ch": "間斷型機率分配", "type": "single", "q": "盒中有10個球，其中4個紅球，6個黑球；以不放回抽樣方式隨機選取4球。令隨機變數X表示黑球數，請問機率P(X≧2)之值為何？", "opts": {"A": "0.0485", "B": "0.1191", "C": "0.1256", "D": "0.167"}, "ans": "B", "ansText": null, "expl": "原解答為B(0.1191)。惟依題意P(X≥2)=1-[C(4,4)+C(4,3)C(6,1)]/C(10,4)=1-25/210≈0.881；0.1191=25/210為P(X≤1)之值，題目不等號方向疑因轉檔錯亂。", "flag": true, "num": 4}, {"id": 490, "src": "統計學題庫", "ch": "間斷型機率分配", "type": "single", "q": "假設一上市股票依過去股價分析可知隔天上升1元的機率為0.4，維持相同股價的機率為0.4，而隔天下降1元的機率為0.2，當某日的成交價格為80元時，問明日的期望價格為何？", "opts": {"A": "79.8元", "B": "80.2元", "C": "81元", "D": "78元"}, "ans": "B", "ansText": null, "expl": "E=80+1*0.4+0*0.4-1*0.2=80.2。", "flag": false, "num": 5}, {"id": 491, "src": "統計學題庫", "ch": "間斷型機率分配", "type": "single", "q": "假定X為一隨機變數，且其E(X)=100，σ²(X)=60。變數Y為X的線性函數，Y=2X+150。那麼E(Y)、σ²(Y)各為多少：", "opts": {"A": "200；210", "B": "350；120", "C": "350；240", "D": "250；60"}, "ans": "C", "ansText": null, "expl": "E(Y)=2*100+150=350；Var(Y)=2²*60=240。", "flag": false, "num": 6}, {"id": 492, "src": "統計學題庫", "ch": "間斷型機率分配", "type": "single", "q": "某私立高中應屆畢業生有60%會考進國立大學。令X為隨機選出100人考進國立大學的人數。請問X的標準差為何？", "opts": {"A": "4.90", "B": "3.24", "C": "3.8730", "D": "10.5"}, "ans": "A", "ansText": null, "expl": "X~B(100,0.6)，σ=√(100*0.6*0.4)=√24≈4.90。", "flag": false, "num": 7}, {"id": 493, "src": "統計學題庫", "ch": "間斷型機率分配", "type": "single", "q": "在一個班級共有30位男生與20位女生，隨機抽出5人參加演講比賽，設隨機變數X是抽出的女生人數，則隨機變數X的機率分配是：", "opts": {"A": "常態分配", "B": "二項分配", "C": "幾何分配", "D": "超幾何分配"}, "ans": "D", "ansText": null, "expl": "有限母體不放回抽樣，為超幾何分配。", "flag": false, "num": 8}, {"id": 494, "src": "統計學題庫", "ch": "間斷型機率分配", "type": "single", "q": "假設在太平洋捕鮭作業中捕獲畸形鮭魚的機率為0.2%，今欲求從該處捕獲的1000條鮭魚中最多有兩條魚為畸形魚的機率，應該用何種統計方法較適宜？", "opts": {"A": "常態（normal）分配", "B": "超幾何分配", "C": "卜瓦松（Poisson）分配", "D": "F分配"}, "ans": "C", "ansText": null, "expl": "n大p小，以Poisson分配（λ=np=2）近似最適宜。", "flag": false, "num": 9}, {"id": 495, "src": "統計學題庫", "ch": "間斷型機率分配", "type": "single", "q": "已知一錄音室180分鐘之光碟片的錯誤數服從平均數為6的卜瓦松（Poisson）分配，隨機抽取一片180分鐘之光碟片，已播放前30分鐘，未出現錯誤，則接著的60分鐘不會出現錯誤的機率為：", "opts": {"A": "0.0498", "B": "0.1353", "C": "0.3679", "D": "0.9502"}, "ans": "B", "ansText": null, "expl": "60分鐘的平均錯誤數λ=6*(60/180)=2，P(X=0)=e^(-2)≈0.1353（Poisson各時段獨立）。", "flag": false, "num": 10}, {"id": 496, "src": "統計學題庫", "ch": "間斷型機率分配", "type": "single", "q": "長榮航空747班機預售了300個座位，但此班機只有298個可供乘客使用，假設平均有2％旅客取消其班機，試求無人取消班機之機率為：", "opts": {"A": "e^(-6)", "B": "e^(-4)", "C": "e^(-2)", "D": "e^2"}, "ans": "A", "ansText": null, "expl": "取消人數近似Poisson(λ=300*0.02=6)，P(X=0)=e^(-6)。", "flag": false, "num": 11}, {"id": 497, "src": "統計學題庫", "ch": "間斷型機率分配", "type": "single", "q": "設產品不良率為0.02，隨機從產品中取出200件檢查。令200件中不良品個數為X，則機率P(X≧3)之近似值為何？", "opts": {"A": "0.3234", "B": "0.7619", "C": "0.488", "D": "0.594"}, "ans": "B", "ansText": null, "expl": "以Poisson(λ=200*0.02=4)近似：P(X≥3)=1-e^(-4)(1+4+8)=1-0.238≈0.762。", "flag": false, "num": 12}, {"id": 498, "src": "統計學題庫", "ch": "間斷型機率分配", "type": "single", "q": "盒中有10個球，其中3個紅球，5個黑球，2個白球；以歸還方式隨機選取3球。令X表示紅球數，令Y表示黑球數，請問機率P(X=1,Y=2)之值為何？", "opts": {"A": "1/5", "B": "1/4", "C": "1/9", "D": "1/6"}, "ans": "B", "ansText": null, "expl": "多項分配：3!/(1!2!)*0.3*0.5²=3*0.075=0.225，最接近1/4。", "flag": false, "num": 13}, {"id": 499, "src": "統計學題庫", "ch": "間斷型機率分配", "type": "single", "q": "假設有兩個離散型隨機變數X和Y，其聯合機率分配是f(x,y)=k(x+y)，x=1,2,3；y=0,1,2。試問k=？", "opts": {"A": "1/12", "B": "1/18", "C": "1/21", "D": "1/27"}, "ans": "D", "ansText": null, "expl": "Σ(x+y)=3(1+2+3)+3(0+1+2)=18+9=27，故k=1/27。", "flag": false, "num": 14}, {"id": 500, "src": "統計學題庫", "ch": "間斷型機率分配", "type": "single", "q": "假設有兩個離散型隨機變數X和Y，其聯合機率分配是f(x,y)=k(x+y)，x=1,2,3；y=0,1,2。Pr(Y=2)=？", "opts": {"A": "1/2", "B": "1/5", "C": "4/9", "D": "2/15"}, "ans": "C", "ansText": null, "expl": "P(Y=2)=k[(1+2)+(2+2)+(3+2)]=12/27=4/9。", "flag": false, "num": 15}, {"id": 501, "src": "統計學題庫", "ch": "間斷型機率分配", "type": "single", "q": "設隨機變數X與Y為獨立變數，則下列何者為正確？（其中E(X)、E(Y)為X與Y的期望值，VAR(X)、VAR(Y)為X與Y的變異數）", "opts": {"A": "E(X/Y)=E(X)/E(Y)", "B": "E(X|Y)=E(Y|X)", "C": "VAR(Y|X)=VAR(X|Y)", "D": "VAR(X+Y)=VAR(X)+VAR(Y)"}, "ans": "D", "ansText": null, "expl": "獨立時共變異數為0，故VAR(X+Y)=VAR(X)+VAR(Y)。", "flag": false, "num": 16}, {"id": 502, "src": "統計學題庫", "ch": "間斷型機率分配", "type": "single", "q": "有關波松隨機變數（Poisson random variable）的陳述下列何者正確？", "opts": {"A": "具無限多個可能值的離散隨機變數", "B": "具有限多個可能值的離散隨機變數", "C": "具無限多個可能值的連續隨機變數", "D": "具有限多個可能值的連續隨機變數"}, "ans": "A", "ansText": null, "expl": "Poisson隨機變數取值0,1,2,…為可數無限多個的離散型。", "flag": false, "num": 17}, {"id": 503, "src": "統計學題庫", "ch": "間斷型機率分配", "type": "single", "q": "假設鑽探1口井會發現天然氣之機率為0.36，而且每次鑽探之結果互為「獨立」。今欲求算鑽探少於10次就會發現第1口天然氣井的機率。這個問題中的隨機變數具有什麼機率分配？", "opts": {"A": "二項分配", "B": "負二項分配", "C": "幾何分配", "D": "卜瓦松分配"}, "ans": "C", "ansText": null, "expl": "「第1次成功所需的試驗次數」為幾何分配。", "flag": false, "num": 18}, {"id": 504, "src": "統計學題庫", "ch": "間斷型機率分配", "type": "single", "q": "一個養鵝場中體重超過4公斤的鵝隻占0.25的機率，求算隨機抓取20隻鵝，會發現5隻超過4公斤的機率。這個問題中的隨機變數具有什麼機率分配？", "opts": {"A": "二項分配", "B": "負二項分配", "C": "幾何分配", "D": "卜瓦松分配"}, "ans": "A", "ansText": null, "expl": "固定次數n=20、成功機率p=0.25之成功次數為二項分配。（原文誤植「豬隻」，解答區塊題號19、20數字脫落，依位置對應。）", "flag": false, "num": 19}, {"id": 505, "src": "統計學題庫", "ch": "間斷型機率分配", "type": "single", "q": "袋中共有10個球，其中有2個紅球。一次取1球，取出不放回，則第2球會取到紅球之機率為：", "opts": {"A": "2/10", "B": "2/9", "C": "1/9", "D": "不一定"}, "ans": "A", "ansText": null, "expl": "依對稱性，每一抽取位置取到紅球的機率皆為2/10。", "flag": false, "num": 20}, {"id": 506, "src": "統計學題庫", "ch": "間斷型機率分配", "type": "open", "q": "有一個隨機變數X，其機率分配如下：f(x)=a·x²/x!，x=1,2,3,4；其他值為0。則常數a等於______。", "opts": {}, "ans": null, "ansText": "a=6/31", "expl": "Σf(x)=a(1/1!+4/2!+9/3!+16/4!)=a(1+2+3/2+2/3)=a·31/6=1，故a=6/31。", "flag": false, "num": 21}, {"id": 507, "src": "統計學題庫", "ch": "間斷型機率分配", "type": "open", "q": "有一個隨機變數X，其機率分配如下：f(x)=6x²/(31·x!)，x=1,2,3,4；其他值為0。則P(X>1)=______和P(X>1|X<4)=______，又E(X)=______，Var(X)=______。", "opts": {}, "ans": null, "ansText": "25/31, 7/9, 2.355, 7.194（原Ans行；依題解Var(X)應為1.648）", "expl": "P(X>1)=1-P(X=1)=1-6/31=25/31；P(X>1|X<4)=[P(X=2)+P(X=3)]/[1-P(X=4)]=(12/31+9/31)/(1-4/31)=21/27=7/9；E(X)=Σx·f(x)=(6+24+27+16)/31=73/31≈2.355；E(X²)=223/31≈7.194；Var(X)=7.194-2.355²≈1.648。Ans行第4值7.194實為E(X²)，與題解不一致。", "flag": true, "num": 22}, {"id": 508, "src": "統計學題庫", "ch": "間斷型機率分配", "type": "open", "q": "有一個隨機變數X，其機率分配如下：f(x)=P(X=x)=a(1+x²)，x=-1,0,1,2；其他值為0。則常數a等於______。", "opts": {}, "ans": null, "ansText": "a=0.1（原Ans行寫0.11，依題解應為0.1）", "expl": "Σf(x)=2a+a+2a+5a=10a=1，故a=0.1。", "flag": true, "num": 23}, {"id": 509, "src": "統計學題庫", "ch": "間斷型機率分配", "type": "open", "q": "有一個隨機變數X，其機率分配如下：f(x)=P(X=x)=0.1(1+x²)，x=-1,0,1,2；其他值為0。令隨機變數Y=2X²+2，則P(Y>2)=______，又E(Y)=______和Var(Y)=______。", "opts": {}, "ans": null, "ansText": "0.9, 6.8, 10.56（原Ans行第2值寫56.8，實為E(Y²)，依題解E(Y)=6.8）", "expl": "Y之分配：y=2(f=0.1)、y=4(f=0.4)、y=10(f=0.5)；P(Y>2)=1-0.1=0.9；E(Y)=0.2+1.6+5.0=6.8；E(Y²)=0.4+6.4+50=56.8；Var(Y)=56.8-6.8²=10.56。", "flag": true, "num": 24}, {"id": 510, "src": "統計學題庫", "ch": "間斷型機率分配", "type": "open", "q": "一盒內有5個紅球及5個藍球，自其中任取2球。若2球是相同顏色，則得10元；若2球不是相同顏色，則得-8元（即輸8元），令隨機變數X為某一次賭局中所贏得之金額；(1)則隨機變數X的機率分配=______。(2)隨機變數X的平均數=______及變異數=______。", "opts": {}, "ans": null, "ansText": "f(-8)=4/9, f(10)=5/9；E(X)=2；Var(X)=80", "expl": "P(兩球同色)=[C(5,2)+C(5,2)]/C(10,2)=20/45=4/9，P(不同色)=5/9。註：依此f(10)=4/9、f(-8)=5/9，惟原Ans行標示f(-8)=4/9,f(10)=5/9；E(X)=-8*(5/9)+10*(4/9)=0/9…依題解E(X)=-8*(4/9)+10*(5/9)=18/9=2，E(X²)=64*(4/9)+100*(5/9)=756/9=84，Var(X)=84-4=80。", "flag": true, "num": 25}, {"id": 511, "src": "統計學題庫", "ch": "間斷型機率分配", "type": "open", "q": "假如你投資$2萬元於某風險很高的創投基金，有40%的機會可以拿回$5萬元；有25%的機會可以將投資的錢拿回來，有35%的機會一毛錢都拿不回來。令隨機變數X為你可能的淨回收（net payoff），(1)隨機變數X的平均數=______與變異數=______。(2)若你改變心意，想加碼投資到$10萬元，則你可能的淨回收的平均數=______與變異數=______。", "opts": {}, "ans": null, "ansText": "E(X)=0.5萬元, Var(X)=4.75；加碼後 E=2.5萬元, Var=118.75", "expl": "淨回收x=3,0,-2（萬元），f=0.4,0.25,0.35；E(X)=3*0.4+0-2*0.35=0.5；E(X²)=9*0.4+4*0.35=5；Var(X)=5-0.25=4.75。加碼5倍：Y=5X，E(Y)=2.5，Var(Y)=25*4.75=118.75。", "flag": false, "num": 26}, {"id": 512, "src": "統計學題庫", "ch": "間斷型機率分配", "type": "open", "q": "設10個小孩的家庭中，男生之機率為0.3，則：(1)此家庭中恰有2位男生之機率=______。(2)此家庭中至少有2位男生之機率=______。", "opts": {}, "ans": null, "ansText": "0.2335, 0.8507", "expl": "X~B(10,0.3)；P(X=2)=C(10,2)*0.3²*0.7⁸≈0.2335；P(X≥2)=1-P(0)-P(1)≈0.8507。", "flag": false, "num": 27}, {"id": 513, "src": "統計學題庫", "ch": "間斷型機率分配", "type": "open", "q": "有25%的學生在某一特定必修科目中會被當掉，現有20個學生修課，令隨機變數X代表被當掉的學生人數：則(1)隨機變數X的平均數=______及變異數=______；(2)P(X=0)=______和P(X≧2)=______。", "opts": {}, "ans": null, "ansText": "E(X)=5, Var(X)=3.75；P(X=0)=0.0032, P(X≧2)=0.9757", "expl": "X~B(20,0.25)；E(X)=np=5，Var(X)=npq=3.75；P(X=0)=0.75²⁰≈0.0032；P(X≥2)=1-0.0032-0.0211=0.9757。", "flag": false, "num": 28}, {"id": 514, "src": "統計學題庫", "ch": "間斷型機率分配", "type": "open", "q": "某一考試有10題選擇題，每一題均有4個可能答案，而每一題都只有一個是正確的。若某學生純粹以猜答案的方式來答題，令隨機變數Y代表此學生猜對的題數。則(1)隨機變數Y的機率分配為______。(2)隨機變數Y的平均數=______及變異數=______。(3)P(Y≧3)=______。", "opts": {}, "ans": null, "ansText": "Y~B(10,1/4)；E(Y)=2.5, Var(Y)=15/8；P(Y≧3)=0.4744", "expl": "E(Y)=np=10*(1/4)=2.5，Var(Y)=10*(1/4)*(3/4)=15/8；P(Y≥3)=1-P(0)-P(1)-P(2)=1-0.5256=0.4744。", "flag": false, "num": 29}, {"id": 515, "src": "統計學題庫", "ch": "間斷型機率分配", "type": "open", "q": "若有一個非正常硬幣，出現反面的機率為出現正面的三倍，擲這個非正常硬幣10次，令隨機變數X代表出現反面的次數，則：(1)隨機變數X的平均數=______及變異數=______。(2)P(2<X≦4)=______和P(X>1)=______。", "opts": {}, "ans": null, "ansText": "E(X)=2.5, Var(X)=1.875；P(2<X≦4)=0.3963, P(X>1)=0.756", "expl": "題解以X~B(10,0.25)計算：E=2.5，Var=1.875；P(2<X≤4)=P(3)+P(4)=0.2503+0.1460=0.3963；P(X>1)=1-P(0)-P(1)=0.756。惟依題意p(反面)=3/4，題解卻用0.25（相當於以正面次數計），題目與題解不一致。", "flag": true, "num": 30}, {"id": 516, "src": "統計學題庫", "ch": "間斷型機率分配", "type": "open", "q": "一盒中置有黑球5個、紅球4個，自其中連續抽取4球（不放回），令隨機變數X代表抽出黑球的個數，試求：(1)P(3≦X≦5)=______和P(X≧2)=______。(2)E(X)=______和Var(X)=______。", "opts": {}, "ans": null, "ansText": "0.357, 0.753, 2.222, 0.617", "expl": "X~超幾何H(N=9,S=5,n=4)，f(x)=C(5,x)C(4,4-x)/C(9,4)；P(3≤X≤4)=P(3)+P(4)=0.317+0.040=0.357；P(X≥2)=1-P(0)-P(1)=1-0.008-0.159=0.753；E(X)=n(S/N)=4*5/9≈2.222；Var(X)=npq*(N-n)/(N-1)=4*(5/9)*(4/9)*(5/8)≈0.617。", "flag": false, "num": 31}, {"id": 517, "src": "統計學題庫", "ch": "間斷型機率分配", "type": "open", "q": "某公司在電子產品運出之前對所製造的產品進行可用性測試，並以二階段進行其計劃。裝有25個電子產品的盒子準備運送時，每盒取2個產品來做不良品試驗。如果找到任何不良品，則整盒送回廠內進行100%的篩選。如果沒有找到任何不良品，則此盒就運出。(1)裝有3個瑕疵品的盒子被運出的機率=______。(2)只有1個瑕疵品的盒子卻回廠做100%篩選的機率=______。", "opts": {}, "ans": null, "ansText": "0.77, 0.08", "expl": "X~H(N=25,S,n=2)；(1)S=3：P(X=0)=C(3,0)C(22,2)/C(25,2)=231/300=0.77；(2)S=1：P(X=1)=C(1,1)C(24,1)/C(25,2)=24/300=0.08。", "flag": false, "num": 32}, {"id": 518, "src": "統計學題庫", "ch": "間斷型機率分配", "type": "open", "q": "一個袋子裝有24張彩卷，其中有5張有獎，由袋子中隨機抽出5張，隨機變數X代表有獎彩卷之張數，則：E(X)=______，Var(X)=______；P(X≧1)=______。", "opts": {}, "ans": null, "ansText": "E(X)=1.25, Var(X)=0.74, P(X≧1)=0.8063", "expl": "題解以X~H(N=20,S=5,n=5)計算：E(X)=5*(5/20)=1.25；Var(X)=5*(1/4)*(3/4)*(15/19)≈0.74；P(X≥1)=1-C(15,5)/C(20,5)=0.8063。註：題目寫24張彩卷，題解以N=20計，兩者不一致。", "flag": true, "num": 33}, {"id": 519, "src": "統計學題庫", "ch": "間斷型機率分配", "type": "open", "q": "假定每天在大千路與萬全路之交叉路口發生的車禍件數符合Poisson分配，而且每天平均有2次車禍發生。問某天在此交叉路口：(1)至多只會發生一次車禍的機率=______？(2)不會有車禍發生的機率=______？(3)至少有3件車禍會發生的機率=______？", "opts": {}, "ans": null, "ansText": "0.406, 0.1353, 0.3223", "expl": "X~Poisson(λ=2)；P(X≤1)=e^(-2)(1+2)=0.406；P(X=0)=e^(-2)=0.1353；P(X≥3)=1-P(X≤2)=1-0.6777=0.3223。", "flag": false, "num": 34}, {"id": 520, "src": "統計學題庫", "ch": "間斷型機率分配", "type": "open", "q": "H牌汽車業者關心Q-PLUS車型煞車系統的一種故障。此故障發生率不高，但在高速行駛時會引起嚴重的事故。假定每年有過此故障的汽車數目X為一個λ=4的卜瓦松機率分配：(1)每年最多3輛汽車造成嚴重事故的機率=______。(2)每年超過2輛汽車會造成嚴重事故的機率=______。(3)E(X)=______和Var(X)=______各為何？", "opts": {}, "ans": null, "ansText": "0.433, 0.762, E(X)=4, Var(X)=4", "expl": "X~Poisson(4)；P(X≤3)=e^(-4)(1+4+8+32/3)=e^(-4)*71/3≈0.433；P(X>2)=1-P(X≤2)=1-0.238=0.762；Poisson之期望值與變異數皆為λ=4。", "flag": false, "num": 35}, {"id": 521, "src": "統計學題庫", "ch": "間斷型機率分配", "type": "open", "q": "已知一個池塘中的一種泰國蝦有2%的蝦有病，假設病蝦在池水中呈隨機分布，則在一網含有100隻蝦中剛好有2隻病蝦的機率是多少？(1)用二項分布（Binomial Distribution）解所問的機率=______。(2)用卜瓦松分布（Poisson Distribution）解所問的機率=______。", "opts": {}, "ans": null, "ansText": "0.1823, 0.1804", "expl": "題解計算的是恰有3隻：二項 P(Y=3)=C(100,3)*0.02³*0.98⁹⁷≈0.1823；Poisson(λ=2) P(Y=3)=e^(-2)*2³/3!≈0.1804。題目文字寫「剛好有2隻」，與題解（3隻）不一致；若為2隻，二項答案應約0.2734。", "flag": true, "num": 36}, {"id": 522, "src": "統計學題庫", "ch": "連續型隨機變數", "type": "single", "q": "給定一連續隨機變數下，其機率密度函數下的面積為：", "opts": {"A": "等於此連續隨機變數的平均數", "B": "依不同機率密度函數而定", "C": "等於1.00", "D": "不能判斷"}, "ans": "C", "ansText": null, "expl": "", "flag": false, "num": 1}, {"id": 523, "src": "統計學題庫", "ch": "連續型隨機變數", "type": "single", "q": "兩次地震間隔時間的隨機變數，最適合下列何種分配？", "opts": {"A": "常態分配", "B": "指數分配", "C": "二項分配", "D": "幾何分配"}, "ans": "B", "ansText": null, "expl": "事件發生間隔時間服從指數分配。", "flag": false, "num": 2}, {"id": 524, "src": "統計學題庫", "ch": "連續型隨機變數", "type": "single", "q": "某電腦執行程式的時間（以秒計）為一連續隨機變數，其機率密度函數為 f(x)=0.1（0≦x≦10），其他為0。其執行程式時間X的期望值與變異數為：", "opts": {"A": "3.62；16.67", "B": "5.00；8.33", "C": "7.5；33.33", "D": "9.31；108.33"}, "ans": "B", "ansText": null, "expl": "均勻分配U(0,10)：E(X)=5，Var(X)=10²/12≈8.33。", "flag": false, "num": 3}, {"id": 525, "src": "統計學題庫", "ch": "連續型隨機變數", "type": "single", "q": "下列對常態分配的敘述，何者為錯誤？", "opts": {"A": "對稱的分配", "B": "單峰（unimodal）的分配", "C": "有相同的平均數與標準差", "D": "在機率密度函數下的面積永遠等於1.00"}, "ans": "C", "ansText": null, "expl": "常態分配的平均數與標準差是兩個不同的參數，不必相同。", "flag": false, "num": 4}, {"id": 526, "src": "統計學題庫", "ch": "連續型隨機變數", "type": "single", "q": "標準常態分配與常態分配差異之處為何？", "opts": {"A": "標準常態分配為對稱於零的分配，然而常態分配卻不一定對稱於零", "B": "標準常態分配的標準差為0，而常態分配的標準差永遠大於0", "C": "標準常態分配是間斷型分配，而常態分配為連續型分配", "D": "標準常態分配在密度函數下的面積永遠等於1.00，而常態分配在密度函數下的面積永遠大於1.00"}, "ans": "A", "ansText": null, "expl": "", "flag": false, "num": 5}, {"id": 527, "src": "統計學題庫", "ch": "連續型隨機變數", "type": "single", "q": "在一個常態分配中，觀測值落在平均數左右一個標準差範圍所佔的機率約為何？", "opts": {"A": "95.45%", "B": "25.25%", "C": "99.73%", "D": "68.27%"}, "ans": "D", "ansText": null, "expl": "", "flag": false, "num": 6}, {"id": 528, "src": "統計學題庫", "ch": "連續型隨機變數", "type": "single", "q": "標準化常態分配之標準差為何？", "opts": {"A": "0.5", "B": "1", "C": "1.5", "D": "2"}, "ans": "B", "ansText": null, "expl": "", "flag": false, "num": 7}, {"id": 529, "src": "統計學題庫", "ch": "連續型隨機變數", "type": "single", "q": "下列何者為真：", "opts": {"A": "常態分布的算術平均值在眾數的右邊", "B": "偏斜分布的中位數與眾數在同一位置", "C": "自由度為1時，卡方分布近似常態分布", "D": "Z=(x-μ)/σ 是標準化常態分布轉換公式"}, "ans": "D", "ansText": null, "expl": "", "flag": false, "num": 8}, {"id": 530, "src": "統計學題庫", "ch": "連續型隨機變數", "type": "single", "q": "設X~N(μ,σ²)（亦即隨機變數X服從一個常態分配，平均數μ，變異數σ²），若aX+b具標準常態分布，則下述何者正確？", "opts": {"A": "a=1/σ；b=-μ/σ", "B": "a=1/σ²，b=-μ/σ²", "C": "a=-μ/σ，b=-μ", "D": "a=-μ/σ²，b=-μ"}, "ans": "A", "ansText": null, "expl": "Z=(X-μ)/σ=X/σ-μ/σ。", "flag": false, "num": 9}, {"id": 531, "src": "統計學題庫", "ch": "連續型隨機變數", "type": "single", "q": "設標準常態分配下，95百分位數落於標準化值Z=？", "opts": {"A": "1.645", "B": "1.96", "C": "2.054", "D": "2.326"}, "ans": "A", "ansText": null, "expl": "", "flag": false, "num": 10}, {"id": 532, "src": "統計學題庫", "ch": "連續型隨機變數", "type": "single", "q": "隨機抽出200位某高中一年級新生，其身高（單位公分）資料的部分敘述性統計如下：樣本平均數=164.24，樣本中位數=165.00，樣本標準差=9.72，假設這些身高資料服從常態。請問身高179公分以上的同學應該有多少人？（解答請四捨五入到整數）", "opts": {"A": "11", "B": "13", "C": "15", "D": "17"}, "ans": "B", "ansText": null, "expl": "z=(179-164.24)/9.72≈1.52，P(Z>1.52)≈0.0643，200*0.0643≈13人。", "flag": false, "num": 11}, {"id": 533, "src": "統計學題庫", "ch": "連續型隨機變數", "type": "single", "q": "隨機抽出200位某高中一年級新生，其身高（單位公分）資料：樣本平均數=164.24，樣本中位數=165.00，樣本標準差=9.72，假設這些身高資料服從常態。請問最矮的10個人身高應該在多少公分以下？", "opts": {"A": "148", "B": "150", "C": "152", "D": "154"}, "ans": "C", "ansText": null, "expl": "原解答為C(152)，相當於使用z≈-1.28（10百分位）：164.24-1.28*9.72≈151.8。惟10/200=5%，若用z=-1.645則約148.2（選項A），解答與題意的百分位取法可能不一致。", "flag": true, "num": 12}, {"id": 534, "src": "統計學題庫", "ch": "連續型隨機變數", "type": "single", "q": "假設滅火器壽命是常態分布N(3,1)，單位是年。則一滅火器在放置五整年之後還有作用的機率是：", "opts": {"A": "0.023", "B": "0.046", "C": "0.159", "D": "0.318"}, "ans": "A", "ansText": null, "expl": "P(X>5)=P(Z>(5-3)/1)=P(Z>2)≈0.023。", "flag": false, "num": 13}, {"id": 535, "src": "統計學題庫", "ch": "連續型隨機變數", "type": "single", "q": "假設滅火器壽命是常態分布N(3,1)，單位是年，若二支滅火器放置五整年之後，至少有一支有作用的機率約是：", "opts": {"A": "0.29", "B": "0.090", "C": "0.045", "D": "0.54"}, "ans": "C", "ansText": null, "expl": "1-(1-0.023)²≈0.045。", "flag": false, "num": 14}, {"id": 536, "src": "統計學題庫", "ch": "連續型隨機變數", "type": "single", "q": "某一跨國商務公司在招考員工時，必須先考初試（滿分為200分之性向測驗），再以其分數高低決定面試與否。過去經驗顯示測驗分數為常態分配。假設今年公司預定錄取分數最好的30人面試，而報考人數有150人，計算其平均成績為120分和標準差為15分。該公司面試前錄取分數會：", "opts": {"A": "比129分高", "B": "比132分高", "C": "比135分高", "D": "比138分高"}, "ans": "B", "ansText": null, "expl": "前30/150=20%，z(0.80)≈0.84，120+0.84*15≈132.6，故比132分高。", "flag": false, "num": 15}, {"id": 537, "src": "統計學題庫", "ch": "連續型隨機變數", "type": "single", "q": "設隨機變數X服從一個二項分配B(n,p)，請問在什麼條件下最適合利用常態分配求其二項機率的近似值？", "opts": {"A": "n≧30", "B": "np>5", "C": "n(1-p)>5", "D": "np>5 且 n(1-p)>5"}, "ans": "D", "ansText": null, "expl": "", "flag": false, "num": 16}, {"id": 538, "src": "統計學題庫", "ch": "連續型隨機變數", "type": "single", "q": "若某校學生之經濟學分數為常態分配，該校學生經濟學平均分數為68分，標準差為8，若70分以上為B，而B以上成績的學生有120人，則該校修習之學生共約多少人？", "opts": {"A": "320人", "B": "300人", "C": "480人", "D": "600人"}, "ans": "B", "ansText": null, "expl": "P(X>70)=P(Z>0.25)≈0.40，120/0.40≈300人。", "flag": false, "num": 17}, {"id": 539, "src": "統計學題庫", "ch": "連續型隨機變數", "type": "single", "q": "青山農場所出產的蘋果的重量分配是N(μ,σ²)，μ=300（公克），σ=10（公克），現在36粒裝一箱，設其總重量是X公克，則X在10800±720公克之間的機率最接近的數字是：", "opts": {"A": "0.9018", "B": "0.9306", "C": "0.9544", "D": "0.9974"}, "ans": "C", "ansText": null, "expl": "原解答為C(0.9544，即z=±2)。惟總重量標準差=√36*10=60，720/60=12，機率應趨近1；解答對應之z=2意味界限為±120，題目數字疑有誤。", "flag": true, "num": 18}, {"id": 540, "src": "統計學題庫", "ch": "連續型隨機變數", "type": "single", "q": "假設隨機變數X的分配為二項分配B(25,0.5)，若要計算P(10<X≦15)的機率，我們採取常態分配逼近，而且使用連續性修正（continuity correction），下列何者正確？", "opts": {"A": "Φ(1.2)-Φ(-0.8)", "B": "Φ(1.0)-Φ(-1.0)", "C": "Φ(0.12)-Φ(-0.08)", "D": "Φ(0.10)-Φ(-0.10)"}, "ans": "A", "ansText": null, "expl": "μ=12.5，σ=2.5；P(10.5≦X≦15.5)=Φ((15.5-12.5)/2.5)-Φ((10.5-12.5)/2.5)=Φ(1.2)-Φ(-0.8)。", "flag": false, "num": 19}, {"id": 541, "src": "統計學題庫", "ch": "連續型隨機變數", "type": "single", "q": "某加油站的洗車服務包括機器自動沖洗和人工擦乾兩階段。若此兩階段的服務時間皆服從常態分配且彼此互相獨立，其平均數分別為10,8分鐘，標準差分別為4,3分鐘，則洗一部車費時超過23分鐘的機率為何？", "opts": {"A": "0.3413", "B": "0.1587", "C": "0.4706", "D": "0.02"}, "ans": "B", "ansText": null, "expl": "總時間~N(18,4²+3²=25)，P(T>23)=P(Z>1)=0.1587。", "flag": false, "num": 20}, {"id": 542, "src": "統計學題庫", "ch": "連續型隨機變數", "type": "single", "q": "設隨機變數X代表某商品之售價服從一個常態分配，平均數為30，變異數為5；設隨機變數Y代表此商品的進貨成本，也是一個常態分配，平均數為25，變異數為4。若可假設售價與成本互為獨立，則不虧本（即X-Y>0）之機率為何？", "opts": {"A": "0.0475", "B": "0.9525", "C": "0.1587", "D": "0.8413"}, "ans": "B", "ansText": null, "expl": "X-Y~N(5,9)，P(X-Y>0)=P(Z>-5/3)=P(Z<1.67)≈0.9525。", "flag": false, "num": 21}, {"id": 543, "src": "統計學題庫", "ch": "連續型隨機變數", "type": "single", "q": "設X1,X2是互相獨立的隨機變數，且其分配分別是N(1,3)和N(3,4)（X1為常態分配，期望值1、變異數3；X2為常態分配，期望值3、變異數4）。令Y=4X1-2X2。則下列敘述何者正確？①E(Y)=2 ②E(Y)=0 ③V(Y)=4 ④V(Y)=32", "opts": {"A": "①", "B": "②", "C": "③（或④）", "D": "四者皆錯"}, "ans": "D", "ansText": null, "expl": "E(Y)=4*1-2*3=-2；V(Y)=16*3+4*4=64，故四者皆錯。原選項與敘述之對應在轉檔時錯亂，此為重建。", "flag": true, "num": 22}, {"id": 544, "src": "統計學題庫", "ch": "連續型隨機變數", "type": "single", "q": "設某大學有一萬名男學生，其身高分布是常態N(170,100)，單位是公分，若超過190公分是高個子，則高個子人數最接近的數字是：", "opts": {"A": "500人", "B": "250人", "C": "223人", "D": "25人"}, "ans": "C", "ansText": null, "expl": "z=(190-170)/10=2，P(Z>2)≈0.0228，10000*0.0228≈228，最接近223人。", "flag": false, "num": 23}, {"id": 545, "src": "統計學題庫", "ch": "連續型隨機變數", "type": "single", "q": "企管系二年級共有100個學生，若統計學成績分布呈常態分配，且平均分數為70分，標準差為10分，則約略有幾個人的成績在60分以下？（根據P(|Z|>2)≒5%，P(|Z|>1)≒32%，其中Z為標準常態分配）", "opts": {"A": "16人", "B": "32人", "C": "84人", "D": "90人"}, "ans": "A", "ansText": null, "expl": "P(X<60)=P(Z<-1)=32%/2=16%，約16人。", "flag": false, "num": 24}, {"id": 546, "src": "統計學題庫", "ch": "連續型隨機變數", "type": "single", "q": "若Z是一個標準常態隨機變數，則P(-1<Z<0)將會比P(1.5<Z<2.5)：", "opts": {"A": "相等", "B": "大", "C": "小", "D": "以上都不正確"}, "ans": "B", "ansText": null, "expl": "P(-1<Z<0)=0.3413 > P(1.5<Z<2.5)=0.0606。", "flag": false, "num": 25}, {"id": 547, "src": "統計學題庫", "ch": "連續型隨機變數", "type": "open", "q": "X為一隨機變數，服從均勻分配（Uniform distribution），其機率密度函數為 f(x)=1/20（20≦x≦40），其他為0。(1)則X之平均數=______與變異數=______。(2)P(25<X<32)=______。", "opts": {}, "ans": null, "ansText": "E(X)=30, Var(X)=100/3；P(25<X<32)=0.35", "expl": "E(X)=(20+40)/2=30；E(X²)=∫x²/20dx=(40³-20³)/60=2800/3；Var(X)=2800/3-900=100/3；P(25<X<32)=(32-25)/20=7/20=0.35。", "flag": false, "num": 26}, {"id": 548, "src": "統計學題庫", "ch": "連續型隨機變數", "type": "open", "q": "製成後的型號A1012之螺母內徑是平均值5公分及標準差0.01公分的一個常態分配。(1)內徑超過5.025公分之螺母的機率=______。(2)內徑在4.9883公分和5.01公分之間的機率=______。(3)15%的螺母其內徑會低於______。", "opts": {}, "ans": null, "ansText": "0.0062, 0.7203, 4.9896公分", "expl": "(1)z=(5.025-5)/0.01=2.5，P(Z>2.5)=0.5-0.4938=0.0062。(2)z介於-1.17與1，P=0.3790+0.3413=0.7203。(3)P(Z<-1.04)=0.15，a=5-1.04*0.01=4.9896。註：原題解以N(10,0.03²)之數字表述（10.075等），標準化後z值與本題一致；題目文字混用「螺母/活塞環」，疑為不同來源拼接。", "flag": true, "num": 27}, {"id": 549, "src": "統計學題庫", "ch": "連續型隨機變數", "type": "open", "q": "台灣年輕人喜歡紅色的手機的比例為20%，則在某一個手機直營店未來二個月所出售的800支手機中，試求下列機率：(1)介於140支到170支是紅色的手機（含兩端）的機率=______。(2)至少180支是紅色的手機的機率=______。", "opts": {}, "ans": null, "ansText": "0.767, 0.0516", "expl": "X~B(800,0.2)，np=160>5且n(1-p)=640>5，以N(160,144)近似（σ=12）；(1)連續性修正 P(139.5≦X≦170.5)=P(-1.71≦Z≦0.88)=0.4564+0.3106=0.767。(2)P(X≧179.5)=P(Z≧1.63)=0.5-0.4484=0.0516。", "flag": false, "num": 28}, {"id": 550, "src": "統計學題庫", "ch": "連續型隨機變數", "type": "open", "q": "若已知P(X>116)=0.0668和P(X<114)=0.8413，且X服從一個常態分配N(μ,σ²)，則(1)隨機變數X的平均數=______和標準差=______。(2)P(112<X<118)=______和P(X<103)=______。", "opts": {}, "ans": null, "ansText": "μ=110, σ=4；P(112<X<118)=0.2857, P(X<103)=0.0401", "expl": "P(Z<1.0)=0.8413→μ+σ=114；P(Z<1.5)=0.9332→μ+1.5σ=116；解聯立得μ=110、σ=4。P(112<X<118)=P(0.5<Z<2)=0.9772-0.6915=0.2857；P(X<103)=P(Z<-1.75)=1-0.9599=0.0401。", "flag": false, "num": 29}, {"id": 551, "src": "統計學題庫", "ch": "連續型隨機變數", "type": "open", "q": "青山農場生產蘋果，其重量為一常態分配，平均數為560公克，標準差為20公克，試求下列各小題：(1)某一個重量大於580公克的機率=______。(2)抽取5個，恰有3個重量大於580公克的機率=______。(3)抽取5個，至少有2個重量大於580公克的機率=______。", "opts": {}, "ans": null, "ansText": "0.1587, 0.0283, 0.181", "expl": "(1)P(X>580)=P(Z>1)=1-0.8413=0.1587（原Ans行0.01587為誤植）。(2)Y~B(5,0.1587)，P(Y=3)=C(5,3)*0.1587³*0.8413²≈0.0283。(3)P(Y≧2)=1-P(0)-P(1)=1-0.4215-0.3975=0.181。註：題目文字混用蘋果/水梨。", "flag": false, "num": 30}, {"id": 552, "src": "統計學題庫", "ch": "連續型隨機變數", "type": "open", "q": "已知大千企業所生產之AQ03零件，其長度符合常態分配，平均數為118公分，標準差為3.2公分。則(1)任取一個AQ03零件，其長度超過122公分之機率=______。(2)任取四個AQ03零件，最多只有一個長度超過122公分之機率=______。", "opts": {}, "ans": null, "ansText": "0.1056, 0.9421", "expl": "(1)z=(122-118)/3.2=1.25，P(Z>1.25)=0.1056。(2)Y~B(4,0.1056)，P(Y≦1)=P(0)+P(1)=0.6399+0.3022=0.9421。註：原題第2小題寫「超過120公分」，但題解以122公分（p=0.1056）計算，此處依題解改為122。", "flag": true, "num": 31}, {"id": 553, "src": "統計學題庫", "ch": "連續型隨機變數", "type": "open", "q": "某一大廣告公司招考相關廣告設計人員時，初試為總分180分之『設計概念與創意』測驗，第二階段面試是以分數高低來決定。假設測驗分數為一個常態分配，且今年公司預定選分數最好的二十四人面試，而報考人數有150人，計算其平均成績為120分和標準差為15分。(1)該公司第二階段面試的最低分數為______。(2)若某位先生考試得140分時，估計他的分數至少名列第______名。", "opts": {}, "ans": null, "ansText": "134.92分, 第14名", "expl": "(1)24/150=0.16，P(Z>z)=0.16→z≈0.9945，a=120+0.9945*15≈134.92分。(2)P(X≧140)=P(Z≧1.33)=1-0.9082=0.0918，150*0.0918≈13.77，至少名列第14名。", "flag": false, "num": 32}, {"id": 554, "src": "統計學題庫", "ch": "連續型隨機變數", "type": "open", "q": "設某私立大學共有6000位學生，其學生之年齡服從一個常態分配N(20.8,1.8²)，則：(1)年齡低於20歲之學生比例（人數）=______。(2)若全體學生中隨機抽問10位學生的年齡，正好有4位同學高於20歲的機率為______。", "opts": {}, "ans": null, "ansText": "0.33（約6000*0.33=1980人）, 0.0547", "expl": "(1)z=(20-20.8)/1.8≈-0.44，P(Z<-0.44)=0.33。(2)Y~B(10,0.67)，P(Y=4)=C(10,4)*0.67⁴*0.33⁶≈0.0547。註：原題第2小題文字寫「正好有2位」，但題解計算P(Y=4)，此處依題解改為4位；第1小題問人數而Ans給機率0.33。", "flag": true, "num": 33}, {"id": 555, "src": "統計學題庫", "ch": "連續型隨機變數", "type": "open", "q": "某醫院會計部門為了解病患應收帳款天數之情形，整理了所有病患應收帳款之天數資料，發現應收帳款天數呈現是一個常態分配N(20,8²)，則：(1)帳款介於20天至40天之機率=______。(2)若醫院想寄給欠帳款最久的2.5%催繳信函，則欠______天以上的病患將會收到信函？", "opts": {}, "ans": null, "ansText": "0.4938, 35.68天", "expl": "(1)P(20<X<40)=P(0<Z<2.5)=0.4938。(2)P(Z>1.96)=0.025，a=20+1.96*8=35.68天。", "flag": false, "num": 34}, {"id": 556, "src": "統計學題庫", "ch": "連續型隨機變數", "type": "open", "q": "一產品之重量分配為常態分配N(200,4²)，單位：公克。(1)今客戶要求之規格為199±4公克，過重或過輕均為不合格，試問在目前之機器設備下，不合格的比例為______。(2)若該產品的標準差仍維持4公克，欲使其重量超過210公克之機率等於5%，則平均重量應訂為______。", "opts": {}, "ans": null, "ansText": "0.3323, 203.42公克", "expl": "(1)規格195~203：P(X<195)=P(Z<-1.25)=0.1056，P(X>203)=P(Z>0.75)=0.2266，合計≈0.3323。(2)P(Z>1.645)=0.05，(210-μ)/4=1.645→μ=210-6.58=203.42公克。", "flag": false, "num": 35}, {"id": 557, "src": "統計學題庫", "ch": "抽樣分配", "type": "single", "q": "抽樣分配係指下列何者的機率分配？", "opts": {"A": "樣本統計量", "B": "母體統計量", "C": "樣本參數", "D": "母體參數"}, "ans": "A", "ansText": null, "expl": "", "flag": false, "num": 1}, {"id": 558, "src": "統計學題庫", "ch": "抽樣分配", "type": "single", "q": "統計學上的「參數」一詞，是指：", "opts": {"A": "樣本所計算的數量值", "B": "母體中某種未知特性值", "C": "推論中引用的某種統計量", "D": "計算中所得的有效數量"}, "ans": "B", "ansText": null, "expl": "", "flag": false, "num": 2}, {"id": 559, "src": "統計學題庫", "ch": "抽樣分配", "type": "single", "q": "統計學上的「統計量」一詞，概要而言是指？", "opts": {"A": "母體中的某種未知特性值", "B": "母體中的某些部分集合", "C": "研究者所要探討的未知特徵數", "D": "由樣本所計算的數量"}, "ans": "D", "ansText": null, "expl": "", "flag": false, "num": 3}, {"id": 560, "src": "統計學題庫", "ch": "抽樣分配", "type": "single", "q": "根據中央極限定理，樣本平均數的抽樣分配，在什麼情況下趨近於常態分配：", "opts": {"A": "母體平均數為0", "B": "樣本平均數為0", "C": "母體變異數為1", "D": "趨近於常態分配的速度與樣本數大小有關"}, "ans": "D", "ansText": null, "expl": "", "flag": false, "num": 4}, {"id": 561, "src": "統計學題庫", "ch": "抽樣分配", "type": "single", "q": "在做抽樣調查時，試問下列何者是正確的敘述？", "opts": {"A": "樣本大小與變異數大小成正比", "B": "樣本大小與所能接受的誤差大小成正比", "C": "樣本大小與所需之信心水準高低成反比", "D": "樣本大小與母體大小成反比"}, "ans": "A", "ansText": null, "expl": "n=(z*σ/e)²，變異數愈大所需樣本愈大。", "flag": false, "num": 5}, {"id": 562, "src": "統計學題庫", "ch": "抽樣分配", "type": "single", "q": "若說『普查優於抽樣調查』，試問下列何者是正確的敘述？", "opts": {"A": "普查所取得的資料都呈常態分配", "B": "普查可提供較正確的資訊", "C": "普查可消除抽樣調查因對母體資訊不完整所產生的錯誤", "D": "普查花費較少"}, "ans": "C", "ansText": null, "expl": "", "flag": false, "num": 6}, {"id": 563, "src": "統計學題庫", "ch": "抽樣分配", "type": "single", "q": "就統計學上的公正而言，下列何種抽樣方法較佳？", "opts": {"A": "非機率抽樣", "B": "簡單隨機抽樣", "C": "立意抽樣", "D": "配額抽樣"}, "ans": "B", "ansText": null, "expl": "", "flag": false, "num": 7}, {"id": 564, "src": "統計學題庫", "ch": "抽樣分配", "type": "single", "q": "若每一個可能的樣本被抽的機會相等，此抽樣方法稱為：", "opts": {"A": "簡單隨機抽樣", "B": "分層隨機抽樣", "C": "集體抽樣", "D": "系統抽樣"}, "ans": "A", "ansText": null, "expl": "", "flag": false, "num": 8}, {"id": 565, "src": "統計學題庫", "ch": "抽樣分配", "type": "single", "q": "一個母體含有100個個體，由1號編到100號，然後利用亂數表（Random number tables），選出一個介於1到10的號碼，例如8，然後抽出8，18，28，…，98等10個對應的母體個體，當作樣本，此種抽樣法為何種抽樣？", "opts": {"A": "單純隨機抽樣", "B": "分層隨機抽樣", "C": "叢式抽樣", "D": "系統抽樣"}, "ans": "D", "ansText": null, "expl": "", "flag": false, "num": 9}, {"id": 566, "src": "統計學題庫", "ch": "抽樣分配", "type": "single", "q": "台中市市政府的調查員從該市之132個里中，隨機抽出5個里，然後以這5個里的全部成年人作為調查對象。請問這位調查員是採用那種抽樣方法？", "opts": {"A": "集體抽樣", "B": "系統抽樣", "C": "簡單隨機抽樣", "D": "分層隨機抽樣"}, "ans": "A", "ansText": null, "expl": "", "flag": false, "num": 10}, {"id": 567, "src": "統計學題庫", "ch": "抽樣分配", "type": "single", "q": "下列敘述何者為正確？所謂「簡單隨機樣本」必須符合以下條件：①樣本中的觀察值必須符合常態分配的假設；②樣本中的觀察值間必須是統計獨立；③樣本中的觀察值必須來自同一機率分配", "opts": {"A": "僅①", "B": "僅②", "C": "②和③", "D": "①②③"}, "ans": "C", "ansText": null, "expl": "簡單隨機樣本需獨立（②）且同分配（③），不需常態假設。原文圈號在轉檔時脫落，選項內容為依上下文重建。", "flag": true, "num": 11}, {"id": 568, "src": "統計學題庫", "ch": "抽樣分配", "type": "single", "q": "設X1,X2,…,Xn為由母體平均數為μ、變異數σ²中，取出之隨機樣本，且X̄=ΣXi/n，下列敘述何者不正確？", "opts": {"A": "樣本變異數S²=Σ(Xi-X̄)²/(n-1)，則E(S²)=σ²", "B": "令m1與m2為原文以樣本動差定義之兩統計量（轉檔符號錯亂），則Var(m1)=Var(m2)", "C": "X1可用來估計μ", "D": "當n愈大時，(X̄-μ)/(σ/√n)愈接近標準常態分配"}, "ans": "B", "ansText": null, "expl": "解答為B。選項B原文下標與符號嚴重錯亂，無法完整重建。", "flag": true, "num": 12}, {"id": 569, "src": "統計學題庫", "ch": "抽樣分配", "type": "single", "q": "假設樣本大小為100，樣本平均數16.5，母體標準差10，母體平均數15，選出檢定統計量之Z值：", "opts": {"A": "0.214", "B": "-0.214", "C": "1.5", "D": "-1.5"}, "ans": "C", "ansText": null, "expl": "Z=(16.5-15)/(10/√100)=1.5/1=1.5。", "flag": false, "num": 13}, {"id": 570, "src": "統計學題庫", "ch": "抽樣分配", "type": "single", "q": "從標準常態分配的母體中，隨機抽取一組樣本大小為n的隨機樣本，令X̄表示樣本平均數，且P(X̄≦c)=0.99，試求c值？", "opts": {"A": "1.96√n", "B": "1.96/√n", "C": "2.58√n", "D": "2.58/√n"}, "ans": "C", "ansText": null, "expl": "原解答為C。X̄~N(0,1/n)，P(X̄≦c)=0.99應得c=2.33/√n；原選項中√n之分子分母位置因轉檔錯亂無法確定，依常理答案應為2.33/√n（或近似2.58/√n形式），解答對應存疑。", "flag": true, "num": 14}, {"id": 571, "src": "統計學題庫", "ch": "抽樣分配", "type": "single", "q": "設M牌手機的市場佔有率為12%。若隨機調查400位手機持有人，令P̂表此400人中持用該廠牌手機的樣本比率。求P̂的抽樣誤差不超過3%的近似機率。", "opts": {"A": "0.8756", "B": "0.9052", "C": "0.9350", "D": "0.9690"}, "ans": "C", "ansText": null, "expl": "σ(P̂)=√(0.12*0.88/400)=0.01625，P(|P̂-0.12|≦0.03)=P(|Z|≦1.85)≈0.935。", "flag": false, "num": 15}, {"id": 572, "src": "統計學題庫", "ch": "抽樣分配", "type": "single", "q": "假設在上次的民意調查中得知，設立腳踏車專用道的贊成比率是62%。假設民意無改變，若現在重新隨機抽樣調查400人，則在此400人中贊成的比率在64.5%以上的機率，最接近數字是：", "opts": {"A": "0.1516", "B": "0.1389", "C": "0.1056", "D": "0.0782"}, "ans": "A", "ansText": null, "expl": "σ(P̂)=√(0.62*0.38/400)≈0.02427，z=(0.645-0.62)/0.02427≈1.03，P(Z>1.03)≈0.1515。", "flag": false, "num": 16}, {"id": 573, "src": "統計學題庫", "ch": "抽樣分配", "type": "single", "q": "設X1,X2,...,Xn是N(μ,σ²)（常態分配）的一組隨機樣本。若n=20時，X̄的標準誤是2，則n是多少時，才會使X̄的變異數為0.2？", "opts": {"A": "200", "B": "400", "C": "600", "D": "800"}, "ans": "B", "ansText": null, "expl": "σ/√20=2→σ²=80；σ²/n=0.2→n=80/0.2=400。", "flag": false, "num": 17}, {"id": 574, "src": "統計學題庫", "ch": "抽樣分配", "type": "single", "q": "大小分別為40與50之兩獨立樣本分別隨機抽自任兩個母體以檢定兩個母體均數差，其樣本均數差X̄1-X̄2之抽樣分配為：", "opts": {"A": "常態分配", "B": "近似於常態分配", "C": "自由度88之t分配", "D": "自由度90之卡方分配（chi-square distribution）"}, "ans": "B", "ansText": null, "expl": "母體分配未知但為大樣本，由中央極限定理知近似常態。", "flag": false, "num": 18}, {"id": 575, "src": "統計學題庫", "ch": "抽樣分配", "type": "single", "q": "某公司所生產10公斤裝的洗衣粉，其標準差為0.4公斤，欲估計母體平均數，在95%信賴水準下並使估計誤差不超過0.08公斤，至少應抽多少包洗衣粉來秤重？", "opts": {"A": "62", "B": "75", "C": "97", "D": "116"}, "ans": "C", "ansText": null, "expl": "n=(1.96*0.4/0.08)²=96.04，取97。", "flag": false, "num": 19}, {"id": 576, "src": "統計學題庫", "ch": "抽樣分配", "type": "single", "q": "目前想要估計一養鴨場鴨隻之平均體重μ。假設養鴨場鴨隻體重具有標準差σ=0.5公斤之常態分配。若要求具有95%的信心使得所觀察之樣本平均體重X̄與μ之距離小於0.12公斤，則至少應抓取幾隻鴨出來稱重？（根據P(|Z|>2)≈5%，P(|Z|>1)≈32%）", "opts": {"A": "62", "B": "67", "C": "82", "D": "90"}, "ans": "B", "ansText": null, "expl": "n=(1.96*0.5/0.12)²≈66.7，取67（若用z=2得69.4，最接近選項仍為67）。", "flag": false, "num": 20}, {"id": 577, "src": "統計學題庫", "ch": "抽樣分配", "type": "single", "q": "某民調公司想了解民眾對於立法院通過『離島博奕法案』的支持度，採用電話訪問。在95%的信賴度之下，請問有效樣本應該在多少以上才能使抽樣誤差控制在3%之下？", "opts": {"A": "423", "B": "752", "C": "1068", "D": "1692"}, "ans": "C", "ansText": null, "expl": "取p=0.5最保守：n=(1.96/(2*0.03))²≈1067.1，取1068。", "flag": false, "num": 21}, {"id": 578, "src": "統計學題庫", "ch": "抽樣分配", "type": "single", "q": "某民調公司想了解民眾對於立法院通過『離島博奕法案』的支持度，採用電話訪問。成功訪問400人，調查結果顯示該議題的支持度為70%。在95%的信賴度之下，抽樣誤差有多少？", "opts": {"A": "0.0329", "B": "0.0392", "C": "0.0426", "D": "0.0449"}, "ans": "D", "ansText": null, "expl": "1.96*√(0.7*0.3/400)=1.96*0.0229≈0.0449。", "flag": false, "num": 22}, {"id": 579, "src": "統計學題庫", "ch": "抽樣分配", "type": "single", "q": "母體平均數為μ，變異數為σ²，假設X1,…,X10為該母體的隨機樣本，則X̄的變異數為：", "opts": {"A": "σ²/100", "B": "σ²/10", "C": "σ²/2", "D": "σ²"}, "ans": "B", "ansText": null, "expl": "Var(X̄)=σ²/n=σ²/10。", "flag": false, "num": 23}, {"id": 580, "src": "統計學題庫", "ch": "抽樣分配", "type": "single", "q": "若已知母體平均數μ=50，變異數為σ²=25，若欲達到P(|X̄-μ|≦1)=0.99的準確度，需抽樣多少個樣本數？", "opts": {"A": "91", "B": "144", "C": "167", "D": "224"}, "ans": "C", "ansText": null, "expl": "n=(2.58*5/1)²≈166.4，取167。", "flag": false, "num": 24}, {"id": 581, "src": "統計學題庫", "ch": "抽樣分配", "type": "single", "q": "令(X1,X2,X3)為由常態母體N(μ,σ²)抽出的一組隨機樣本，T1,T2,T3,T4均為μ的估計量：T1=(3X1+3X2+4X3)/10；T2=(X1+X2+X3)/3；T3=(X1+2X2+3X3)/6；T4=(2X1+3X2+4X3)/9，問下列何者為μ的不偏估計量中變異數最小者？", "opts": {"A": "T1", "B": "T2", "C": "T3", "D": "T4"}, "ans": "B", "ansText": null, "expl": "T1、T2、T3為不偏（權重和=1；T4權重和=1）；其中樣本平均數T2的變異數σ²/3最小。", "flag": false, "num": 25}, {"id": 582, "src": "統計學題庫", "ch": "抽樣分配", "type": "open", "q": "設有一母體之機率分配如下：X=5,9,12，f(X)=0.3,0.2,0.5。若自母體以抽出放回之方式隨機抽二個樣本(X1,X2)：X̄=(X1+X2)/2之期望值=______及變異數=______，與母體之平均數μ及變異數σ²間的關係為X̄的期望值=___×μ？X̄的變異數=___×σ²？", "opts": {}, "ans": null, "ansText": "E(X̄)=9.3, Var(X̄)=4.605；E(X̄)=1×μ, Var(X̄)=(1/2)×σ²", "expl": "μ=E(X)=5*0.3+9*0.2+12*0.5=9.3；E(X²)=95.7，σ²=95.7-9.3²=9.21；抽出放回n=2：E(X̄)=μ=9.3，Var(X̄)=σ²/2=4.605。", "flag": false, "num": 26}, {"id": 583, "src": "統計學題庫", "ch": "抽樣分配", "type": "open", "q": "一常態母體之平均數50，標準差5，由其中任取16個樣本，則：(1)X̄的抽樣分配為______。(2)樣本平均數大於52的機率=______。(3)樣本平均數介於48與51的機率=______。", "opts": {}, "ans": null, "ansText": "X̄~N(50,25/16)；0.0448；0.7333", "expl": "X̄~N(50,25/16)，標準誤=5/4=1.25；P(X̄>52)=P(Z>1.6)=1-0.9452=0.0448；P(48<X̄<51)=P(-1.6<Z<0.8)=0.7881-0.0548=0.7333。", "flag": false, "num": 27}, {"id": 584, "src": "統計學題庫", "ch": "抽樣分配", "type": "open", "q": "桃園機場的行李中心處理一批旅客行李，旅客行李的重量假設服從一個常態分配，其平均數μ=28公斤，而其標準差σ未知，如果由其中隨機抽出36件行李，並稱其重量，得到樣本標準差s=4公斤。(1)旅客行李之樣本平均重量X̄之抽樣分配為______？(2)以μ=28公斤為中心，而機率為0.95之X̄的區間為______。(3)樣本平均重量X̄落在[26.8,29.2]之間的機率為______。", "opts": {}, "ans": null, "ansText": "X̄近似N(28,16/36)；[26.69,29.31]；0.9282", "expl": "大樣本以s代σ：X̄~N(28,16/36)，標準誤=4/6；(2)28±1.96*(4/6)=[26.69,29.31]；(3)P(26.8≦X̄≦29.2)=P(-1.8≦Z≦1.8)=0.9641-0.0359=0.9282。", "flag": false, "num": 28}, {"id": 585, "src": "統計學題庫", "ch": "抽樣分配", "type": "open", "q": "已知某一20-60歲成年人族群的收縮壓分布呈雙峰分布，一個高峰在120 mmHg處，另一個高峰在170 mmHg處，而此分布的平均值與標準差則分別為128 mmHg與24 mmHg。今從此成年人族群中隨機抽出36人，此36人的平均收縮壓為X̄，而X̄為一隨機變數，X̄介於120到132的機率=______。", "opts": {}, "ans": null, "ansText": "0.8185", "expl": "母體非常態但n=36為大樣本，由中央極限定理X̄~N(128,24²/36)，標準誤=4；P(120≦X̄≦132)=P(-2≦Z≦1)=0.8413-0.0228=0.8185。", "flag": false, "num": 29}, {"id": 586, "src": "統計學題庫", "ch": "抽樣分配", "type": "open", "q": "自具有常態母體N(100,σ²)抽出一組n=16的隨機樣本，並得到s=9，則(1)P(X̄≧96.056)=______。(2)以μ=100為中心，而機率為0.95之X̄的區間為______。", "opts": {}, "ans": null, "ansText": "0.95；[95.21,104.79]", "expl": "母體常態、小樣本且σ未知：t=(X̄-μ)/(s/√n)~t(15)；(1)t=(96.056-100)/(9/4)=-1.753，P(X
