<script>
/* ===== 資料索引 ===== */
const SRC_ORDER = [];
const BY_SRC = {};
DATA.forEach(q=>{
  if(!BY_SRC[q.src]){BY_SRC[q.src]={};SRC_ORDER.push(q.src);}
  (BY_SRC[q.src][q.ch] = BY_SRC[q.src][q.ch]||[]).push(q);
});
const QBYID = {}; DATA.forEach(q=>QBYID[q.id]=q);

/* ===== 儲存 ===== */
const KEY='cqt_stats_v1';
let S;
try{S=JSON.parse(localStorage.getItem(KEY))||null}catch(e){S=null}
if(!S) S={stats:{},wrong:[],session:null,shuffle:false};
function save(){try{localStorage.setItem(KEY,JSON.stringify(S))}catch(e){} schedulePush();}
function saveLocal(){try{localStorage.setItem(KEY,JSON.stringify(S))}catch(e){}}
function stat(id){return S.stats[id]||{c:0,w:0}}
function record(id,correct){
  const st=S.stats[id]||{c:0,w:0};
  correct?st.c++:st.w++;
  S.stats[id]=st;
  const i=S.wrong.indexOf(id);
  if(correct){ if(i>=0)S.wrong.splice(i,1); }
  else { if(i<0)S.wrong.push(id); }
  S.ts=Date.now();
  save();
}

/* ===== 畫面骨架 ===== */
const app=document.getElementById('app');
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
let curView='';
function render(headerHTML, mainHTML){
  curView='';
  app.innerHTML = `<header>${headerHTML}</header><main>${mainHTML}</main><footer>CQT 品質管理技術師・第一堂課題庫</footer>`;
  window.scrollTo(0,0);
}

/* ===== 首頁 ===== */
function home(){
  S.session=null; save();
  const total=DATA.length;
  const done=Object.keys(S.stats).length;
  const mastered=Object.values(S.stats).filter(s=>s.c>0).length;
  const wrongN=S.wrong.length;
  render(
    `<div class="title">📚 CQT 統計題庫練習</div>`,
    `<div class="stat-row">
       <div class="stat"><b>${total}</b><span>總題數</span></div>
       <div class="stat"><b>${done}</b><span>已作答</span></div>
       <div class="stat"><b style="color:var(--ok)">${mastered}</b><span>答對過</span></div>
       <div class="stat"><b style="color:var(--bad)">${wrongN}</b><span>待複習</span></div>
     </div>
     <button class="big-btn" onclick="pickSrc()">
       <span class="ic">✏️</span><span><div class="t">開始練習</div><div class="d">依題庫、章節選題作答</div></span>
     </button>
     <button class="big-btn" onclick="startWrong()">
       <span class="ic">🔁</span><span><div class="t">錯題反覆練習</div><div class="d">答錯的題目重複出現，直到答對</div></span>
       ${wrongN?`<span class="badge">${wrongN}</span>`:`<span class="badge gray">0</span>`}
     </button>
     <button class="big-btn" onclick="startRandom()">
       <span class="ic">🎲</span><span><div class="t">隨機 30 題測驗</div><div class="d">從全部題庫隨機抽 30 題</div></span>
     </button>
     <button class="big-btn" onclick="location.href='notes.html'">
       <span class="ic">📖</span><span><div class="t">速查筆記</div><div class="d">公式、口訣、易錯觀念（HTML 版）</div></span>
     </button>
     <button class="big-btn" onclick="exportView()">
       <span class="ic">📤</span><span><div class="t">匯出錯題</div><div class="d">複製錯題清單，貼給 Claude 更新速查筆記</div></span>
     </button>
     <button class="big-btn" onclick="syncView()">
       <span class="ic">☁️</span><span><div class="t">雲端同步與備份</div><div class="d">${esc(syncStatusText())}</div></span>
     </button>
     <div class="toggle-row"><span>練習時隨機排列題目</span>
       <button class="switch ${S.shuffle?'on':''}" onclick="S.shuffle=!S.shuffle;save();home()"></button></div>
     <div style="text-align:center"><button class="danger-link" onclick="resetAll()">清除所有作答紀錄</button></div>`
  );
  curView='home';
}
function resetAll(){
  if(confirm('確定要清除所有作答與錯題紀錄嗎？')){S={stats:{},wrong:[],session:null,shuffle:S.shuffle,ts:Date.now()};save();home();}
}

/* ===== 選題庫 / 章節 ===== */
function srcStats(qs){
  let d=0,c=0,w=0;
  qs.forEach(q=>{const st=S.stats[q.id];if(st){d++;if(st.c>0)c++;}if(S.wrong.includes(q.id))w++;});
  return {d,c,w};
}
function pickSrc(){
  let html='';
  SRC_ORDER.forEach((src,i)=>{
    const qs=Object.values(BY_SRC[src]).flat();
    const {d,c,w}=srcStats(qs);
    html+=`<button class="list-item" onclick="pickCh(${i})">
      <span style="flex:1">
        <span class="name">${esc(src)}</span>
        <span class="meta">　${qs.length} 題</span>
        ${w?`<span class="wr">　錯 ${w}</span>`:''}
        <div class="pbar"><div class="g" style="width:${qs.length?Math.round(100*c/qs.length):0}%"></div></div>
      </span>
      <span class="meta">${d}/${qs.length}</span><span style="color:var(--sub)">›</span>
    </button>`;
  });
  render(`<button class="back" onclick="home()">‹</button><div class="title">選擇題庫</div>`, html);
}
function pickCh(si){
  const src=SRC_ORDER[si];
  const chs=Object.keys(BY_SRC[src]);
  const all=Object.values(BY_SRC[src]).flat();
  let html=`<button class="list-item" style="border-color:var(--pri)" onclick="startDeck('${si}','*')">
     <span class="name" style="color:var(--pri)">▶ 整份練習（${all.length} 題）</span></button>`;
  chs.forEach((ch,ci)=>{
    const qs=BY_SRC[src][ch];
    const {d,c,w}=srcStats(qs);
    html+=`<button class="list-item" onclick="startDeck('${si}','${ci}')">
      <span style="flex:1"><span class="name">${esc(ch)}</span><span class="meta">　${qs.length} 題</span>
      ${w?`<span class="wr">　錯 ${w}</span>`:''}
      <div class="pbar"><div class="g" style="width:${Math.round(100*c/qs.length)}%"></div></div></span>
      <span class="meta">${d}/${qs.length}</span><span style="color:var(--sub)">›</span></button>`;
  });
  render(`<button class="back" onclick="pickSrc()">‹</button><div class="title">${esc(src)}</div>`, html);
}

/* ===== 出題引擎 ===== */
let deck=null; /* {ids:[], i:0, label, mode:'practice'|'wrong', right:0, wrongCnt:0}；答錯只在 wrong 模式重排 */
function shuffleArr(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a}

let pending=null;
function startDeck(si,ci){
  const src=SRC_ORDER[si];
  let qs = ci==='*' ? Object.values(BY_SRC[src]).flat() : BY_SRC[src][Object.keys(BY_SRC[src])[ci]];
  const chName = ci==='*' ? '整份練習' : Object.keys(BY_SRC[src])[ci];
  const allIds = qs.map(q=>q.id);
  /* 已答對過且不在錯題本 = 已完成，接續練習時跳過；錯題除外（會再出現） */
  const remain = allIds.filter(id=>!(stat(id).c>0) || S.wrong.includes(id));
  const doneN = allIds.length - remain.length;
  pending = {all:allIds, remain:remain, label:src, si:si};
  if(doneN===0){ launchDeck('all'); return; }
  if(remain.length===0){
    render(`<button class="back" onclick="pickCh(${si})">‹</button><div class="title">${esc(chName)}</div>`,
      `<div class="card center"><div class="big">🎉</div><div style="font-size:16px;color:var(--text)">這 ${allIds.length} 題都答對過了！</div><div style="margin-top:6px">可以整份重練一次加深記憶。</div></div>
       <div class="actions"><button class="btn pri" onclick="launchDeck('all')">全部重練</button><button class="btn ghost" onclick="pickCh(${si})">返回</button></div>`);
    return;
  }
  const wrongN = remain.filter(id=>S.wrong.includes(id)).length;
  render(`<button class="back" onclick="pickCh(${si})">‹</button><div class="title">${esc(chName)}</div>`,
    `<div class="card center" style="text-align:left">
       <div style="font-size:15px">已答對 <b style="color:var(--ok)">${doneN}</b> / ${allIds.length} 題</div>
       <div class="pbar" style="margin-top:8px"><div class="g" style="width:${Math.round(100*doneN/allIds.length)}%"></div></div>
       <div style="font-size:13.5px;color:var(--sub);margin-top:8px">接續練習會跳過已答對的題目${wrongN?`，錯過的 ${wrongN} 題會再出現`:''}。</div>
     </div>
     <div class="actions" style="flex-direction:column">
       <button class="btn pri" onclick="launchDeck('remain')">▶ 接續練習（剩 ${remain.length} 題）</button>
       <button class="btn ghost" onclick="launchDeck('all')">全部重練（${allIds.length} 題）</button>
     </div>`);
}
function launchDeck(which){
  let ids=(which==='remain'?pending.remain:pending.all).slice();
  if(S.shuffle) ids=shuffleArr(ids);
  deck={ids:ids,i:0,label:pending.label,mode:'practice',right:0,wrongCnt:0,seen:{}};
  quiz();
}
function startWrong(){
  if(!S.wrong.length){alert('目前沒有錯題，太棒了！');return;}
  let ids=shuffleArr(S.wrong.slice());
  deck={ids:ids,i:0,label:'錯題反覆練習',mode:'wrong',right:0,wrongCnt:0,seen:{}};
  quiz();
}
function startRandom(){
  let ids=shuffleArr(DATA.map(q=>q.id)).slice(0,30);
  deck={ids:ids,i:0,label:'隨機 30 題',mode:'practice',right:0,wrongCnt:0,seen:{}};
  quiz();
}

let sel=new Set(); /* 複選暫存 */
function quiz(){
  if(deck.i>=deck.ids.length){return result();}
  const q=QBYID[deck.ids[deck.i]];
  sel=new Set();
  const remain=deck.ids.length-deck.i;
  const prog=Math.round(100*deck.i/deck.ids.length);
  const typeChip = q.type==='multi'?'<span class="chip r">複選題</span>':(q.type==='open'?'<span class="chip r">計算/簡答</span>':'<span class="chip">單選題</span>');
  const wrongChip = S.wrong.includes(q.id)?'<span class="chip r">曾答錯</span>':'';
  let body=`
    <div class="topbar"><span>${deck.i+1} / ${deck.ids.length}</span><div class="pbar"><div style="width:${prog}%"></div></div><span>剩 ${remain}</span></div>
    <div class="card">
      <div class="qmeta">${typeChip}<span>${esc(q.src)}｜${esc(q.ch)}｜第 ${q.num} 題</span>${wrongChip}</div>
      <div class="qtext">${esc(q.q)}</div>
      ${q.flag?'<div class="flagnote">⚠️ 此題原檔含圖表或數學式轉檔可能不完整，若題意不清可對照原 PDF。</div>':''}
    </div>
    <div id="optzone"></div>
    <div id="fbzone"></div>
    <div id="actzone"></div>`;
  render(`<button class="back" onclick="confirmExit()">‹</button><div class="title">${esc(deck.label)}</div><div class="sub">✅${deck.right} ❌${deck.wrongCnt}</div>`, body);
  drawOptions(q);
}
function confirmExit(){ if(confirm('離開本次練習？（作答紀錄已即時儲存）')) home(); }

function drawOptions(q){
  const oz=document.getElementById('optzone'), az=document.getElementById('actzone');
  if(q.type==='open'){
    az.innerHTML=`<div class="actions"><button class="btn pri" onclick="revealOpen(${q.id})">顯示答案</button></div>`;
    return;
  }
  let html='';
  Object.keys(q.opts).forEach(L=>{
    html+=`<button class="opt" id="opt${L}" onclick="tapOpt('${L}',${q.id})"><span class="L">${L}</span><span>${esc(q.opts[L])}</span></button>`;
  });
  oz.innerHTML=html;
  if(q.type==='multi'){
    az.innerHTML=`<div class="actions"><button class="btn pri" onclick="submitMulti(${q.id})">確認送出（可複選）</button></div>`;
  }
}
function tapOpt(L,qid){
  const q=QBYID[qid];
  if(q.type==='single'){ grade(qid,[L]); return; }
  /* multi: toggle */
  if(sel.has(L))sel.delete(L);else sel.add(L);
  document.getElementById('opt'+L).classList.toggle('sel');
}
function submitMulti(qid){
  if(!sel.size){alert('請先選擇答案');return;}
  grade(qid,[...sel].sort());
}
function grade(qid,chosen){
  const q=QBYID[qid];
  const correctSet=q.ans.split('');
  const correct = chosen.length===correctSet.length && chosen.every(c=>correctSet.includes(c));
  record(qid,correct);
  correct?deck.right++:deck.wrongCnt++;
  /* 標示選項 */
  Object.keys(q.opts).forEach(L=>{
    const el=document.getElementById('opt'+L);
    el.disabled=true; el.onclick=null;
    if(correctSet.includes(L)) el.classList.add('ok');
    else if(chosen.includes(L)) el.classList.add('bad');
    el.classList.remove('sel');
  });
  const fb=document.getElementById('fbzone');
  fb.innerHTML=`<div class="feedback ${correct?'ok':'bad'}"><b>${correct?'✅ 答對了！':'❌ 答錯了，正確答案：'+q.ans.split('').join('、')}</b>${q.expl?`<div class="expl">💡 ${esc(q.expl)}</div>`:''}${!correct&&deck.mode!=='wrong'?'<div class="expl">已加入錯題本，可用「錯題反覆練習」複習。</div>':''}</div>`;
  afterAnswer(qid,correct);
}
function revealOpen(qid){
  const q=QBYID[qid];
  const fb=document.getElementById('fbzone');
  const ansShow = q.ansText && q.ansText!==q.expl ? `<b>📖 答案：${esc(q.ansText)}</b>` : '<b>📖 參考解答</b>';
  fb.innerHTML=`<div class="feedback ok" style="background:var(--pri-soft);border-color:#93c5fd">${ansShow}${q.expl?`<div class="expl">💡 ${esc(q.expl)}</div>`:''}</div>`;
  document.getElementById('actzone').innerHTML=
    `<div class="actions"><button class="btn okb" onclick="selfJudge(${qid},true)">我答對了</button><button class="btn badb" onclick="selfJudge(${qid},false)">我答錯了</button></div>`;
}
function selfJudge(qid,ok){
  record(qid,ok);
  ok?deck.right++:deck.wrongCnt++;
  const fb=document.getElementById('fbzone');
  if(!ok && deck.mode!=='wrong') fb.insertAdjacentHTML('beforeend','<div class="feedback bad">已加入錯題本，可用「錯題反覆練習」複習。</div>');
  afterAnswer(qid,ok);
}
function afterAnswer(qid,correct){
  /* 錯題練習模式：答錯 → 重新排入本回合後段，直到答對；一般練習不重複出現 */
  if(!correct && deck.mode==='wrong'){
    const pos=Math.min(deck.i+1+4+Math.floor(Math.random()*3), deck.ids.length);
    deck.ids.splice(pos,0,qid);
  }
  document.getElementById('actzone').innerHTML=
    `<div class="actions"><button class="btn pri" onclick="deck.i++;quiz()">下一題 ›</button></div>`;
  document.getElementById('actzone').scrollIntoView({behavior:'smooth',block:'end'});
}

/* ===== 匯出錯題 ===== */
function buildExport(){
  const cur=S.wrong.slice();
  const ever=Object.keys(S.stats).filter(id=>S.stats[id].w>0).map(Number);
  const line=q=>`#${q.id}｜${q.src}｜${q.ch}｜第${q.num}題｜錯${stat(q.id).w}次${S.wrong.includes(q.id)?'（尚未答對）':''}\n　${q.q.slice(0,50)}`;
  let txt=`CQT錯題匯出 v1（${new Date().toISOString().slice(0,10)}）\n`;
  txt+=`待複習ID: ${cur.join(',')||'無'}\n曾答錯ID: ${ever.join(',')||'無'}\n\n--- 明細 ---\n`;
  ever.forEach(id=>{const q=QBYID[id]; if(q) txt+=line(q)+'\n';});
  return {txt, n:ever.length, cur:cur.length};
}
function exportView(){
  const e=buildExport();
  render(`<button class="back" onclick="home()">‹</button><div class="title">匯出錯題</div>`,
    e.n===0?`<div class="card center"><div class="big">✨</div>還沒有答錯過的題目。<br>先去練習，答錯的題目會自動記錄。</div>
      <div class="actions"><button class="btn pri" onclick="home()">回首頁</button></div>`
    :`<div class="card"><div style="font-size:14px;color:var(--sub);margin-bottom:8px">曾答錯 ${e.n} 題（其中 ${e.cur} 題尚未答對）。按下方按鈕複製，貼給 Claude 即可把觀念寫進速查筆記。</div>
      <textarea id="exp" readonly style="width:100%;height:260px;font-size:12.5px;border:1px solid var(--line);border-radius:8px;padding:8px;font-family:inherit">${esc(e.txt)}</textarea></div>
      <div class="actions"><button class="btn pri" id="copybtn" onclick="copyExport()">📋 複製全部</button></div>`);
}
function copyExport(){
  const ta=document.getElementById('exp');
  ta.select(); ta.setSelectionRange(0,999999);
  const done=()=>{const b=document.getElementById('copybtn'); if(b) b.textContent='✅ 已複製'};
  if(navigator.clipboard&&navigator.clipboard.writeText){ navigator.clipboard.writeText(ta.value).then(done,()=>{document.execCommand('copy');done();}); }
  else { document.execCommand('copy'); done(); }
}

/* ===== 結果 ===== */
function result(){
  const total=deck.right+deck.wrongCnt;
  const acc= total?Math.round(100*deck.right/total):0;
  render(`<div class="title">練習完成</div>`,
    `<div class="card center">
      <div class="big">${acc>=80?'🎉':acc>=60?'💪':'📖'}</div>
      <div class="result-num">${acc}%</div>
      <div style="margin:6px 0 2px">答對 ${deck.right}．答錯 ${deck.wrongCnt}${deck.mode==='wrong'?'（含重複作答）':''}</div>
      ${deck.mode==='wrong'?'<div style="font-size:13.5px">錯題重複出現，全部答對才結束 ✅</div>':(deck.wrongCnt?'<div style="font-size:13.5px">答錯的題目已收進錯題本，可隨時複習 📖</div>':'')}
     </div>
     <div class="actions">
       ${S.wrong.length?`<button class="btn badb" onclick="startWrong()">錯題練習（${S.wrong.length}）</button>`:''}
       <button class="btn pri" onclick="home()">回首頁</button>
     </div>`);
}
/* ===== 雲端同步（GitHub Gist）與備份 ===== */
const SYNCKEY='cqt_sync_v1', GIST_FILE='cqt-quiz-stats.json';
let SYNC;
try{SYNC=JSON.parse(localStorage.getItem(SYNCKEY))||null}catch(e){SYNC=null}
if(!SYNC) SYNC={token:'',gistId:'',last:0};
function saveSync(){try{localStorage.setItem(SYNCKEY,JSON.stringify(SYNC))}catch(e){}}
let syncBusy=false, pushTimer=null, lastSig='';
function dataSig(){return JSON.stringify([S.stats,S.wrong])}
function snapshot(ts){return JSON.stringify({v:1,ts:ts||S.ts||0,stats:S.stats,wrong:S.wrong})}
function syncStatusText(){
  if(!SYNC.token) return '未設定：紀錄只存在此裝置';
  if(syncBusy) return '☁️ 同步中…';
  if(SYNC.last) return '☁️ 上次同步 '+new Date(SYNC.last).toLocaleString('zh-TW',{hour12:false});
  return '已連線，尚未同步';
}
function toast(msg){
  let t=document.getElementById('cqtoast');
  if(!t){t=document.createElement('div');t.id='cqtoast';
    t.style.cssText='position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:#334155;color:#fff;padding:8px 16px;border-radius:20px;font-size:13px;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap';
    document.body.appendChild(t);}
  t.textContent=msg;t.style.opacity='1';clearTimeout(t._h);t._h=setTimeout(()=>{t.style.opacity='0'},2200);
}
async function gh(path,method,body){
  const r=await fetch('https://api.github.com'+path,{
    method:method||'GET',
    headers:{'Authorization':'Bearer '+SYNC.token,'Accept':'application/vnd.github+json'},
    body:body?JSON.stringify(body):undefined});
  if(!r.ok) throw new Error('GitHub '+r.status+(r.status===401?'（token 無效或已過期）':r.status===403?'（權限不足，token 需勾選 gist）':''));
  return r.status===204?null:r.json();
}
async function findOrCreateGist(){
  if(SYNC.gistId){
    try{return (await gh('/gists/'+SYNC.gistId)) && SYNC.gistId}catch(e){SYNC.gistId=''}
  }
  for(let p=1;p<=3;p++){
    const list=await gh('/gists?per_page=100&page='+p);
    const hit=list.find(g=>g.files&&g.files[GIST_FILE]);
    if(hit){SYNC.gistId=hit.id;saveSync();return hit.id}
    if(list.length<100)break;
  }
  const g=await gh('/gists','POST',{description:'CQT 統計題庫練習・作答紀錄自動同步',public:false,files:{[GIST_FILE]:{content:snapshot(Date.now())}}});
  SYNC.gistId=g.id;saveSync();return g.id;
}
function mergeRemote(remote){
  if(!remote||typeof remote!=='object')return;
  const rs=remote.stats||{}, rw=Array.isArray(remote.wrong)?remote.wrong:[], rts=remote.ts||0, lts=S.ts||0;
  const localDirty=lts>=SYNC.last, remoteDirty=rts>=SYNC.last;
  if(remoteDirty&&!localDirty){ S.stats=rs; S.wrong=rw.slice(); S.ts=rts; }
  else if(remoteDirty&&localDirty){
    Object.keys(rs).forEach(id=>{const a=S.stats[id]||{c:0,w:0},b=rs[id]||{};S.stats[id]={c:Math.max(a.c||0,b.c||0),w:Math.max(a.w||0,b.w||0)};});
    rw.forEach(id=>{if(!S.wrong.includes(id))S.wrong.push(id)});
    S.ts=Date.now();
  }
  saveLocal();
}
async function doSync(manual){
  if(!SYNC.token||syncBusy)return;
  syncBusy=true; if(curView==='home')home();
  try{
    const id=await findOrCreateGist();
    const g=await gh('/gists/'+id);
    let remote=null;
    try{remote=JSON.parse(g.files[GIST_FILE].content)}catch(e){}
    mergeRemote(remote);
    const rsig=remote?JSON.stringify([remote.stats||{},remote.wrong||[]]):'';
    if(dataSig()!==rsig) await gh('/gists/'+id,'PATCH',{files:{[GIST_FILE]:{content:snapshot(Date.now())}}});
    lastSig=dataSig(); SYNC.last=Math.max(Date.now(),(S.ts||0)+1); saveSync();
    syncBusy=false;
    if(curView==='home')home(); else if(manual)toast('☁️ 同步完成');
  }catch(e){
    syncBusy=false;
    if(curView==='home')home();
    if(manual)alert('同步失敗：'+e.message);
    else toast('⚠️ 同步失敗，稍後會自動再試');
  }
}
function schedulePush(){
  if(!SYNC.token)return;
  clearTimeout(pushTimer);
  pushTimer=setTimeout(()=>{if(dataSig()!==lastSig)return doSync(false)},4000);
}
document.addEventListener('visibilitychange',()=>{
  if(document.visibilityState==='hidden'&&SYNC.token&&SYNC.gistId&&dataSig()!==lastSig){
    clearTimeout(pushTimer);
    try{
      fetch('https://api.github.com/gists/'+SYNC.gistId,{method:'PATCH',keepalive:true,
        headers:{'Authorization':'Bearer '+SYNC.token,'Accept':'application/vnd.github+json'},
        body:JSON.stringify({files:{[GIST_FILE]:{content:snapshot(Date.now())}}})});
      lastSig=dataSig();
    }catch(e){}
  }
});

/* ===== 同步設定頁 ===== */
function syncView(){
  const connected=!!SYNC.token;
  render(`<button class="back" onclick="home()">‹</button><div class="title">雲端同步與備份</div>`,
   `<div class="card">
      <div style="font-weight:700;margin-bottom:6px">☁️ GitHub 自動同步</div>
      <div style="font-size:13.5px;color:var(--sub);line-height:1.7">作答紀錄會自動存到你 GitHub 帳號的<b>私密 Gist</b>。其他裝置開啟本網頁、貼上同一組 token，紀錄就會互通。題庫更新也不影響紀錄。<br>狀態：<b style="color:var(--text)">${esc(syncStatusText())}</b></div>
      ${connected?`
        <div class="actions" style="margin-top:12px">
          <button class="btn pri" onclick="doSync(true)">立即同步</button>
          <button class="btn ghost" onclick="disconnectSync()">中斷連線</button>
        </div>`
      :`<input id="tok" type="password" autocomplete="off" placeholder="貼上 GitHub token" style="width:100%;margin-top:12px;padding:10px;border:1px solid var(--line);border-radius:8px;font-size:14px;box-sizing:border-box">
        <div class="actions" style="margin-top:10px"><button class="btn pri" onclick="connectSync()">連線並同步</button></div>
        <div style="font-size:12.5px;color:var(--sub);margin-top:8px">token 只會存在這台裝置的瀏覽器裡。建立方式見「部署說明」（需勾選 gist 權限）。</div>`}
    </div>
    <div class="card">
      <div style="font-weight:700;margin-bottom:6px">📦 手動備份 / 匯入</div>
      <div style="font-size:13.5px;color:var(--sub);line-height:1.7">不用 GitHub 也能搬紀錄：「備份」產生一段文字，到另一台裝置「匯入」貼上即可。也可以貼<b>舊版 App 的「匯出錯題」文字</b>，把舊手機的錯題紀錄搬進來。</div>
      <div class="actions" style="margin-top:12px">
        <button class="btn ghost" onclick="backupView()">📤 備份紀錄</button>
        <button class="btn ghost" onclick="importView()">📥 匯入紀錄</button>
      </div>
    </div>`);
}
async function connectSync(){
  const t=document.getElementById('tok').value.trim();
  if(!t){alert('請先貼上 token');return;}
  SYNC.token=t;saveSync();
  try{await gh('/user')}
  catch(e){SYNC.token='';saveSync();alert('token 驗證失敗：'+e.message);return;}
  await doSync(true);
  syncView();
}
function disconnectSync(){
  if(!confirm('中斷雲端同步？（雲端與本機紀錄都會保留，只是不再自動同步）'))return;
  SYNC={token:'',gistId:'',last:0};saveSync();syncView();
}
function backupView(){
  const txt=JSON.stringify({v:1,type:'cqt-backup',date:new Date().toISOString().slice(0,10),ts:S.ts||Date.now(),stats:S.stats,wrong:S.wrong});
  render(`<button class="back" onclick="syncView()">‹</button><div class="title">備份紀錄</div>`,
    `<div class="card"><div style="font-size:13.5px;color:var(--sub);margin-bottom:8px">複製下面整段文字，保存起來或傳到另一台裝置貼上匯入。</div>
     <textarea id="bak" readonly style="width:100%;height:220px;font-size:12px;border:1px solid var(--line);border-radius:8px;padding:8px;font-family:monospace;box-sizing:border-box">${esc(txt)}</textarea></div>
     <div class="actions"><button class="btn pri" id="bakbtn" onclick="copyTA('bak','bakbtn')">📋 複製全部</button></div>`);
}
function importView(){
  render(`<button class="back" onclick="syncView()">‹</button><div class="title">匯入紀錄</div>`,
    `<div class="card"><div style="font-size:13.5px;color:var(--sub);margin-bottom:8px">貼上「備份紀錄」的文字，或舊版 App「匯出錯題」的文字（CQT錯題匯出 v1 開頭）。匯入會與現有紀錄<b>合併</b>，不會清掉現有進度。</div>
     <textarea id="imp" placeholder="在此貼上…" style="width:100%;height:220px;font-size:12px;border:1px solid var(--line);border-radius:8px;padding:8px;font-family:monospace;box-sizing:border-box"></textarea></div>
     <div class="actions"><button class="btn pri" onclick="importApply()">匯入並合併</button></div>`);
}
function copyTA(taId,btnId){
  const ta=document.getElementById(taId);
  ta.select();ta.setSelectionRange(0,9999999);
  const done=()=>{const b=document.getElementById(btnId);if(b)b.textContent='✅ 已複製'};
  if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(ta.value).then(done,()=>{document.execCommand('copy');done();});}
  else{document.execCommand('copy');done();}
}
function parseIdList(s){return (s||'').split(',').map(x=>parseInt(x.trim())).filter(n=>!isNaN(n))}
function importApply(){
  const txt=document.getElementById('imp').value.trim();
  if(!txt){alert('請先貼上內容');return;}
  let merged=0, skipped=0;
  if(txt.startsWith('CQT錯題匯出')){
    const curIds=parseIdList((txt.match(/待複習ID[:：]\s*([\d,\s]+)/)||[])[1]);
    const everIds=parseIdList((txt.match(/曾答錯ID[:：]\s*([\d,\s]+)/)||[])[1]);
    const detail={};
    txt.split('\n').forEach(l=>{const m=l.match(/^#(\d+)｜.*｜錯(\d+)次/);if(m)detail[+m[1]]=+m[2];});
    if(!everIds.length&&!curIds.length){alert('沒有讀到任何錯題 ID，請確認貼的是完整的匯出文字。');return;}
    everIds.forEach(id=>{
      if(!QBYID[id]){skipped++;return;}
      const st=S.stats[id]||{c:0,w:0};
      st.w=Math.max(st.w,detail[id]||1);
      if(!curIds.includes(id)&&st.c===0)st.c=1;
      S.stats[id]=st;merged++;
    });
    curIds.forEach(id=>{if(QBYID[id]&&!S.wrong.includes(id))S.wrong.push(id)});
  }else{
    let o=null;try{o=JSON.parse(txt)}catch(e){}
    if(!o||typeof o.stats!=='object'){alert('無法辨識的內容。請貼「備份紀錄」的完整文字，或「CQT錯題匯出 v1」開頭的文字。');return;}
    Object.keys(o.stats).forEach(id=>{
      if(!QBYID[id]){skipped++;return;}
      const a=S.stats[id]||{c:0,w:0},b=o.stats[id]||{};
      S.stats[id]={c:Math.max(a.c||0,b.c||0),w:Math.max(a.w||0,b.w||0)};merged++;
    });
    (o.wrong||[]).forEach(id=>{if(QBYID[id]&&!S.wrong.includes(id))S.wrong.push(id)});
  }
  S.ts=Date.now();save();
  alert('匯入完成：合併了 '+merged+' 題的紀錄'+(skipped?'（'+skipped+' 題在目前題庫找不到，已略過）':'')+'。');
  home();
}

lastSig=dataSig();
if(SYNC.token) doSync(false);
home();
