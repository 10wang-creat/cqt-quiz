1×4/7+2×2/7+3×4/35+4×1/35=8/5元。", "flag": false, "num": 151}, {"id": 849, "src": "講義3-2機率統計", "ch": "總習題", "type": "open", "q": "在一次考試中，選擇題有4題，每題都是5選1，張三沒有準備，都用猜的作答。請問(1)4題都猜對的機率是多少？(2)4題只猜對1題的機率是多少？(3)猜對題數的期望值是多少？(4)猜對題數的標準差是多少？", "opts": {}, "ans": null, "ansText": "(1)0.0016，(2)0.4096，(3)0.8，(4)0.8", "expl": "X~B(4,0.2)：P(X=4)=0.2^4=0.0016；P(X=1)=4×0.2×0.8^3=0.4096；E=0.8；σ=√(4×0.2×0.8)=0.8。", "flag": false, "num": 152}, {"id": 850, "src": "講義3-2機率統計", "ch": "總習題", "type": "open", "q": "某校有男生3000人、女生2000人，如想估計此校平均身高，以性別做分層抽樣100人，請問男生應抽多少人？", "opts": {}, "ans": null, "ansText": "60人", "expl": "男生應抽100×3000/5000=60人。", "flag": false, "num": 153}, {"id": 851, "src": "講義3-2機率統計", "ch": "總習題", "type": "open", "q": "調查500位市民對居住品質是否滿意，結果有240位滿意，求居住滿意比率p的95%信賴區間。", "opts": {}, "ans": null, "ansText": "[0.4353, 0.5247]", "expl": "p^=0.48，e=2√(0.48×0.52/500)≈0.0447，區間為[0.48-0.0447, 0.48+0.0447]。", "flag": false, "num": 154}, {"id": 852, "src": "講義3-2機率統計", "ch": "總習題", "type": "open", "q": "某地區有甲、乙兩校，高二數學段考成績呈常態分布：甲校800人，平均63分，標準差6分；乙校500人，平均70分，標準差5分。(1)甲、乙兩校超過75分的人數各有多少位？(2)若已知一位學生的成績超過75分，則他是甲校學生的機率是多少？", "opts": {}, "ans": null, "ansText": "(1)甲校約20人，乙校約80人，(2)0.2", "expl": "甲校75分為μ+2σ，800×0.025=20人；乙校75分為μ+σ，500×0.16=80人；超過75分共100人，甲校占20/100=0.2。", "flag": false, "num": 155}, {"id": 853, "src": "講義3-2機率統計", "ch": "總習題", "type": "open", "q": "某次數學測驗共有25題單一選擇題，每題都有五個選項，每答對一題得4分，答錯倒扣1分。某生確定其中16題可答對；有6題他確定五個選項中有兩個選項不正確，因此這6題他從剩下的選項中分別猜選一個；另外3題只好亂猜，則他這次測驗得分之期望值為多少？", "opts": {}, "ans": null, "ansText": "68分", "expl": "6題中猜對數X~B(6,1/3)，E(X)=2；3題中猜對數Y~B(3,1/5)，E(Y)=0.6；總分期望=16×4+(2×4-4×1)+(0.6×4-2.4×1)=64+4+0=68分。", "flag": false, "num": 156}, {"id": 854, "src": "講義3-2機率統計", "ch": "總習題", "type": "open", "q": "某營養學研究者想了解女生有服保健食品的比率，最近有人做了類似調查，100位中有20位有服保健食品。他想要達到信心水準為95%，而誤差在2%以內，他需要抽樣多少樣本？", "opts": {}, "ans": null, "ansText": "1600人", "expl": "n=(2√(0.2×0.8)/0.02)^2=1600人。", "flag": false, "num": 157}, {"id": 855, "src": "講義3-2機率統計", "ch": "總習題", "type": "open", "q": "某公司生產的零件長度是常態分布X~N(80, 25)。若零件長度在75到90之間，每件可獲利100元；若零件長度超過90，每件可獲利40元；若零件不足75，每件損失30元。設此公司每月生產10000件，請問每月獲利的期望值是多少？", "opts": {}, "ans": null, "ansText": "777000元（每件期望獲利77.7元）", "expl": "σ=5，P(75<X<90)=P(-1<Z<2)≈0.815，P(X>90)≈0.025，P(X<75)≈0.16；每件期望=100×0.815+40×0.025-30×0.16=77.7元，每月77.7×10000=777000元。", "flag": false, "num": 158}, {"id": 856, "src": "講義3機率與統計", "ch": "綜合試題（二項分布與常態分布）", "type": "single", "q": "某校高二學生2000人，期末數學成績呈常態分配，平均成績70分，標準差10分，已知及格者成績皆大於60分，若須參加補考者（40分（含）以上、60分（不含）以下）有x人，則x最接近下列哪一數字？", "opts": {"A": "300", "B": "310", "C": "320", "D": "330", "E": "340"}, "ans": "C", "ansText": "320", "expl": "40~60分約為μ-3σ至μ-σ，比例約(1-68%)/2≈16%（扣除3σ外極少數），2000×16%=320人。", "flag": false, "num": 159}, {"id": 857, "src": "講義3機率與統計", "ch": "綜合試題（二項分布與常態分布）", "type": "single", "q": "參加期末考試的學生有1000位，已知全體數學成績平均為65分，標準差為15分，且成績呈常態分配，則成績高於80分的大約有多少人？", "opts": {"A": "120", "B": "140", "C": "160", "D": "180", "E": "200"}, "ans": "C", "ansText": "160", "expl": "80=μ+σ，高於80分的比例=(1-68%)/2=16%，1000×0.16=160人。", "flag": false, "num": 160}, {"id": 858, "src": "講義3機率與統計", "ch": "綜合試題（二項分布與常態分布）", "type": "single", "q": "某次英語檢定考試參加的考生有1200名，已知成績呈常態分配且平均54分，標準差6分。若60分以上的考生有a名，分數在42到60分的考生有b名，依據68-95-99.7的經驗法則，a、b的取值最接近下列哪一選項？", "opts": {"A": "a=816，b=978", "B": "a=192，b=978", "C": "a=570，b=816", "D": "a=408，b=570", "E": "a=192，b=570"}, "ans": "B", "ansText": "a=192，b=978", "expl": "60分以上占50%-34%=16%，a=1200×16%=192；42~60分占68%+13.5%=81.5%，b=1200×81.5%=978。", "flag": false, "num": 161}, {"id": 859, "src": "講義3機率與統計", "ch": "綜合試題（二項分布與常態分布）", "type": "single", "q": "某生解對一題機率為3/4，此次考試共20題，解對一題可得6分，則某生得分的期望值為幾分？", "opts": {"A": "70", "B": "75", "C": "80", "D": "85", "E": "90"}, "ans": "E", "ansText": "90", "expl": "E=6×20×3/4=90分。", "flag": false, "num": 162}, {"id": 860, "src": "講義3機率與統計", "ch": "綜合試題（二項分布與常態分布）", "type": "single", "q": "一個骰子連擲50次，么點的次數出現r次的機率為Pr，當Pr為最大時，則其r的值為", "opts": {"A": "7", "B": "8", "C": "9", "D": "10", "E": "皆非"}, "ans": "B", "ansText": "8", "expl": "Pr=C(50,r)(1/6)^r(5/6)^(50-r)，由Pr≥Pr+1且Pr≥Pr-1解得7.5≤r≤8.5，故r=8。", "flag": false, "num": 163}, {"id": 861, "src": "講義3機率與統計", "ch": "綜合試題（二項分布與常態分布）", "type": "single", "q": "甲、乙二隊比賽，若平均甲隊五場勝二場，今甲、乙二隊比賽五場，甲隊恰勝三場之機率為", "opts": {"A": "3/5", "B": "(3/5)^3", "C": "大於3/5", "D": "小於3/5", "E": "小於(3/5)^3"}, "ans": "D", "ansText": "小於3/5", "expl": "甲一場獲勝機率2/5，五場勝三場=C(5,3)(2/5)^3(3/5)^2=10×(8/125)(9/25)=144/625≈0.23＜3/5。", "flag": false, "num": 164}, {"id": 862, "src": "講義3機率與統計", "ch": "綜合試題（二項分布與常態分布）", "type": "single", "q": "若某校800位學生的數學段考成績平均分數是65分，樣本標準差是5分，且成績分布呈常態分配。試問全校約有多少人數學成績低於60分？（依68-95-99.7經驗法則）", "opts": {"A": "約64人", "B": "約128人", "C": "約256人", "D": "約328人", "E": "約272人"}, "ans": "B", "ansText": "約128人", "expl": "60=65-5=μ-σ，低於60分者占(1-68%)/2=16%，800×16%=128人。", "flag": false, "num": 165}, {"id": 863, "src": "講義3機率與統計", "ch": "綜合試題（二項分布與常態分布）", "type": "single", "q": "若常態分配其平均數為μX，變異數為100，且已知P(X>a)=0.5，則a值為", "opts": {"A": "μX-100", "B": "μX+100", "C": "μX", "D": "μX-10", "E": "μX+10"}, "ans": "C", "ansText": "a=μX", "expl": "P(X>a)=0.5表示a右側占全體的一半，故a為平均數的位置。", "flag": false, "num": 166}, {"id": 864, "src": "講義3機率與統計", "ch": "綜合試題（二項分布與常態分布）", "type": "single", "q": "設某高中女生之身高分配為常態分配，已知平均數為162公分，變異數為9平方公分，則該校女生身高超過165公分的人數占全校女生之比例為（註：標準常態分配Z中，P(Z<1)=0.8413，P(Z<2)=0.9772）", "opts": {"A": "16%", "B": "32%", "C": "68%", "D": "95%", "E": "99.7%"}, "ans": "A", "ansText": "16%", "expl": "σ=3，P(X>165)=P(Z>1)=1-0.8413≈0.16。", "flag": false, "num": 167}, {"id": 865, "src": "講義3機率與統計", "ch": "綜合試題（二項分布與常態分布）", "type": "single", "q": "設甲、乙兩班人數一樣多，若某次考試兩班均全數參加，且成績呈常態分配。統計結果：甲班平均數為70分，標準差為10分；乙班平均數為75分，標準差為5分，則兩班中成績超過80分的人數", "opts": {"A": "大約一樣", "B": "甲班較多", "C": "乙班較多", "D": "不可能一樣多", "E": "無法確定"}, "ans": "A", "ansText": "大約一樣", "expl": "80分對兩班皆為平均數加一個標準差，故超過80分的比例都約16%，人數大約一樣多。", "flag": false, "num": 168}, {"id": 866, "src": "講義3機率與統計", "ch": "綜合試題（二項分布與常態分布）", "type": "single", "q": "設A、B為兩獨立事件，且P(A)=1/2，P(B)=2/5，則P(A'∩B')=", "opts": {"A": "3/5", "B": "3/10", "C": "2/3", "D": "1/5", "E": "4/5"}, "ans": "B", "ansText": "3/10", "expl": "A、B獨立則A'、B'亦獨立，P(A'∩B')=(1-1/2)(1-2/5)=1/2×3/5=3/10。", "flag": false, "num": 169}, {"id": 867, "src": "講義3機率與統計", "ch": "綜合試題（二項分布與常態分布）", "type": "single", "q": "設甲袋中有白球4個、紅球5個，乙袋中有白球2個、紅球1個、黑球3個。今自兩袋中任選一袋，再由此袋中任取一球，則取出之球為白球的機率為", "opts": {"A": "5/9", "B": "7/9", "C": "5/18", "D": "7/18", "E": "11/18"}, "ans": "D", "ansText": "7/18", "expl": "P(白)=1/2×4/9+1/2×2/6=2/9+1/6=7/18。", "flag": false, "num": 170}, {"id": 868, "src": "講義3機率與統計", "ch": "綜合試題（二項分布與常態分布）", "type": "single", "q": "一袋中有紅球6個、白球4個，由甲、乙兩人輪流取出一球，取出後不放回。今由甲先取，先取得紅球者獲勝，則甲獲勝的機率為", "opts": {"A": "37/210", "B": "43/210", "C": "37/105", "D": "53/105", "E": "74/105"}, "ans": "E", "ansText": "74/105", "expl": "P(甲勝)=6/10+(4/10)(3/9)(6/8)+(4/10)(3/9)(2/8)(1/7)(6/6)=74/105。", "flag": false, "num": 171}, {"id": 869, "src": "講義3機率與統計", "ch": "綜合試題（二項分布與常態分布）", "type": "single", "q": "若某校1000位學生的數學段考成績平均分數是65.24分，樣本標準差是5.24分，且成績分布呈常態分配。試問全校約有多少人數學成績低於60分？", "opts": {"A": "約80人", "B": "約160人", "C": "約240人", "D": "約320人", "E": "約400人"}, "ans": "B", "ansText": "約160人", "expl": "60~70.48分（μ±σ）間約有68%即680人，低於60分約(1000-680)/2=160人。", "flag": false, "num": 172}, {"id": 870, "src": "講義3機率與統計", "ch": "綜合試題（二項分布與常態分布）", "type": "single", "q": "某校高三學生在一次考試中，成績呈常態分配，且已知其分數之平均數為70分，標準差為10分。若從這次考試的學生中隨機抽出一位學生，則這位學生的成績低於60分的機率最接近以下哪一選項？", "opts": {"A": "0.16", "B": "0.32", "C": "0.34", "D": "0.68", "E": "0.84"}, "ans": "A", "ansText": "0.16", "expl": "60=μ-σ，P(X<60)=(100%-68%)/2=16%=0.16。", "flag": false, "num": 173}, {"id": 871, "src": "講義3機率與統計", "ch": "綜合試題（二項分布與常態分布）", "type": "single", "q": "甲、乙兩校有一樣多的學生參加數學能力測驗，兩校學生測驗成績的分布都很接近常態分布，其中甲校學生的平均分數為60分，標準差為10分；乙校學生的平均分數為65分，標準差為5分。若用粗線表示甲校學生成績分布曲線、細線表示乙校學生成績分布曲線，則下列哪一個分布圖較為正確？", "opts": {"A": "分布圖(1)", "B": "分布圖(2)", "C": "分布圖(3)", "D": "分布圖(4)", "E": "分布圖(5)"}, "ans": "A", "ansText": "分布圖(1)：乙的中心偏右且峰值較高", "expl": "乙的平均數較大故中心偏右；兩校人數相等且乙的標準差較小，故乙的峰值較高。選項為圖形，文字資料無法呈現。", "flag": true, "num": 174}, {"id": 872, "src": "講義3機率與統計", "ch": "綜合試題（二項分布與常態分布）", "type": "single", "q": "p1表示丟2個公正硬幣時恰好出現1個正面的機率；p2表示擲2個均勻骰子恰好出現1個偶數點的機率；p3表示丟4個公正硬幣時恰好出現2個正面的機率。請問下列哪一選項正確？", "opts": {"A": "p1=p2=p3", "B": "p1=p2>p3", "C": "p1>p3>p2", "D": "p1<p3<p2", "E": "p3>p2>p1"}, "ans": "B", "ansText": "p1=p2>p3", "expl": "p1=C(2,1)(1/2)^2=1/2，p2=C(2,1)(1/2)^2=1/2，p3=C(4,2)(1/2)^4=3/8，故p1=p2>p3。原選項間的等號/不等號因轉檔佚失，僅正確選項可由解析確定。", "flag": true, "num": 175}, {"id": 873, "src": "講義3機率與統計", "ch": "綜合試題（二項分布與常態分布）", "type": "single", "q": "擲一枚公正硬幣10次，恰好出現n次正面的機率記為pn，試問哪一選項正確？", "opts": {"A": "p5=1/2", "B": "p3>p7", "C": "p0, p1, p2, …, p10中的最大值是p5", "D": "10次中得正面次數的期望值大於5"}, "ans": "C", "ansText": "p0~p10中的最大值是p5", "expl": "p5=C(10,5)/2^10=63/256≠1/2；p3=p7（對稱）；最大值在中間的p5；期望值np=5並未大於5。選項(A)(B)的數值因轉檔部分佚失，依解析重建。", "flag": true, "num": 176}, {"id": 874, "src": "講義3機率與統計", "ch": "綜合試題（二項分布與常態分布）", "type": "single", "q": "在擲一枚均勻硬幣8次的試驗中，恰好出現n次正面的機率記為an，以下哪一選項是不正確的？", "opts": {"A": "a4=1/2", "B": "a0+a1+a2+a3<1/2", "C": "a0, a1, a2, …, a8中的最大值是a4", "D": "出現正面次數的期望值為4次"}, "ans": "A", "ansText": "a4=1/2不正確（a4=70/256）", "expl": "a4=C(8,4)/2^8=70/256≠1/2；a0+a1+a2+a3=93/256<1/2；最大值為a4；期望值np=4，故不正確的是(A)。", "flag": false, "num": 177}, {"id": 875, "src": "講義3機率與統計", "ch": "綜合試題（二項分布與常態分布）", "type": "single", "q": "設某校高三學生成績為常態分布，平均成績70分，標準差為5分。假定成績及格標準為60分，某次考試共有1000人參加，則考試成績及格者大約多少人？（P(Z<2)=0.9772）", "opts": {"A": "930", "B": "948", "C": "960", "D": "977", "E": "990"}, "ans": "D", "ansText": "977", "expl": "P(X≥60)=P(Z≥-2)=P(Z<2)=0.9772，1000×0.9772≈977人。", "flag": false, "num": 178}, {"id": 876, "src": "講義-基礎統計", "ch": "1-4 統計資料的衡量尺度", "type": "open", "q": "下列資料分別屬於何種尺度？(1)蔬果到貨量 (2)智商 (3)溫度 (4)汽車銷售量排行榜 (5)雨量 (6)血壓 (7)颱風風速級數", "opts": {}, "ans": null, "ansText": "(1)比率尺度 (2)區間尺度 (3)區間尺度 (4)順序尺度 (5)比率尺度 (6)比率尺度 (7)順序尺度", "expl": "依可否四則運算與有無絕對原點判斷：可加減乘除且有絕對原點者為比率尺度，可加減但無絕對原點者為區間尺度，僅有大小順序者為順序尺度。", "flag": false, "num": 1}, {"id": 877, "src": "講義-基礎統計", "ch": "綜合練習1", "type": "open", "q": "某一地區居民有200萬人，隨機抽出50人，調查其對某項議題的贊成與否，若有40人贊成，隨後調查者就宣布此地區有160萬人贊成，此為何種統計例子？", "opts": {}, "ans": null, "ansText": "推論統計", "expl": "以樣本贊成比例40/50=0.8推估母體200萬人中有160萬人贊成，屬由樣本推論母體特性的推論統計。", "flag": false, "num": 2}, {"id": 878, "src": "講義-基礎統計", "ch": "綜合練習1", "type": "open", "q": "下列資料屬於何種尺度：(1)學歷 (2)收入", "opts": {}, "ans": null, "ansText": "(1)順序尺度，(2)比率尺度", "expl": "學歷只有高低順序、不可加減，為順序尺度；收入可四則運算且有絕對原點0，為比率尺度。", "flag": false, "num": 3}, {"id": 879, "src": "講義-基礎統計", "ch": "2-2 統計圖", "type": "open", "q": "利用2-1統計表之手機品牌及次數資料（Nokia 14、Motorola 4、Sony Ericsson 11、Samsung 10、OKWap 4、其他5、無2，合計50），使用Excel軟體完成(1)直條圖 (2)圓形圖。", "opts": {}, "ans": null, "ansText": "依各品牌次數繪製直條圖；依各品牌百分比（28%、8%、22%、20%、8%、10%、4%）繪製圓形圖（答案為圖形）", "expl": "直條圖以品牌為橫軸、次數為縱軸；圓形圖以各品牌次數占總數50的百分比切割圓面。答案為圖形，純文字無法完整呈現。", "flag": true, "num": 4}, {"id": 880, "src": "講義-基礎統計", "ch": "2-2 統計圖", "type": "open", "q": "將下列成績利用Excel軟體完成直方圖：80,72,45,78,82,63,71,92,75,32,61,75,47,94,81,65,68,73,84,75,79,58,78,85,96", "opts": {}, "ans": null, "ansText": "以組距10分組（30~40、40~50、…、90~100）繪製直方圖（答案為圖形）", "expl": "將25筆成績依組距10分組計次後，以組別為橫軸、人數為縱軸繪製直方圖。答案為圖形，純文字無法完整呈現。", "flag": true, "num": 5}, {"id": 881, "src": "講義-基礎統計", "ch": "2-3 次數分配表編製", "type": "open", "q": "某班有十二名學生電腦品牌分別為：Asus、Acer、Asus、Asus、HP、Acer、Asus、HP、Asus、Acer、Acer、Asus，則其次數分配表及相對次數表各為何？", "opts": {}, "ans": null, "ansText": "Asus：次數6、相對次數0.50（50%）；Acer：次數4、相對次數0.3333（33.33%）；HP：次數2、相對次數0.1667（16.67%）；合計12、1.00（100%）", "expl": "依品牌分類計次，相對次數=各類次數/總數12。", "flag": false, "num": 6}, {"id": 882, "src": "講義-基礎統計", "ch": "2-3 次數分配表編製", "type": "open", "q": "某班期中考基礎統計成績如下：45 65 70 45 50 78 65 70 42 58 85 92 95 78 65 82 92 95 78 75 55 82 75 90 95 75 82 71 62 86 73 79 76 73 83 73 83 76 63 84 78 65 79 73 72 72 55 79 71 72，則其次數分配表及相對次數表各為何？", "opts": {}, "ans": null, "ansText": "全距R=53，組數k=6，組距取10；各組次數：40≤x<50：3（6%）、50≤x<60：4（8%）、60≤x<70：6（12%）、70≤x<80：23（46%）、80≤x<90：8（16%）、90≤x<100：6（12%），合計50", "expl": "R=95-42=53；由2^k≥n=50得k=6；組距=53/6≈8.83，取10；以40為第一組下限，逐組計次並算相對次數。", "flag": false, "num": 7}, {"id": 883, "src": "講義-基礎統計", "ch": "2-4 枝葉圖", "type": "open", "q": "一組數據如下，畫出其枝葉圖：21 50 39 37 62 35 23 56 59 56", "opts": {}, "ans": null, "ansText": "枝|葉：2|1 3；3|5 7 9；4|（無）；5|0 6 6 9；6|2", "expl": "以最後一位數為葉、十位數為枝，枝由小到大成行，葉再由小到大排列。", "flag": false, "num": 8}, {"id": 884, "src": "講義-基礎統計", "ch": "綜合練習2", "type": "open", "q": "一組數據如下，畫出其枝葉圖：(1) 6 11 22 16 105 6 (2) 112 111 56 65 55 (3) 75 76 29 85 132", "opts": {}, "ans": null, "ansText": "(1) 0|6 6、1|1 6、2|2、10|5，(2) 5|5 6、6|5、11|1 2，(3) 2|9、7|5 6、8|5、13|2", "expl": "以最後一位數為葉、其餘位數為枝，枝由小到大排列，葉由小到大寫在枝右側。", "flag": false, "num": 9}, {"id": 885, "src": "講義-基礎統計", "ch": "綜合練習2", "type": "open", "q": "利用例題2之資料（25筆成績：80,72,45,78,82,63,71,92,75,32,61,75,47,94,81,65,68,73,84,75,79,58,78,85,96），使用Excel軟體完成折線圖。", "opts": {}, "ans": null, "ansText": "依分組次數繪製折線圖（答案為圖形，講義未附解答）", "expl": "將成績分組計次後以組中點為橫軸、次數為縱軸連線繪製折線圖。答案為圖形且講義未提供解答。", "flag": true, "num": 10}, {"id": 886, "src": "講義-基礎統計", "ch": "3-1 集中趨勢量數", "type": "open", "q": "抽樣出來的數據如下：3,4,1,4,6，求平均數。", "opts": {}, "ans": null, "ansText": "3.6", "expl": "x̄=(3+4+1+4+6)/5=18/5=3.6。", "flag": false, "num": 11}, {"id": 887, "src": "講義-基礎統計", "ch": "3-1 集中趨勢量數", "type": "open", "q": "抽樣出來的數據如下：3,4,1,4,6，求中位數。", "opts": {}, "ans": null, "ansText": "Me=4", "expl": "排序為1,3,4,4,6；位置i=5×1/2=2.5，無條件進位取第3個值，Me=4。", "flag": false, "num": 12}, {"id": 888, "src": "講義-基礎統計", "ch": "3-1 集中趨勢量數", "type": "open", "q": "抽樣出來的數據如下：3,4,1,4,6，求眾數。", "opts": {}, "ans": null, "ansText": "Mo=4", "expl": "4出現次數最多（2次），故眾數為4。", "flag": false, "num": 13}, {"id": 889, "src": "講義-基礎統計", "ch": "3-2 離散趨勢量數", "type": "open", "q": "抽樣出來的數據如下：3,4,1,4,6，求Q1及Q3。", "opts": {}, "ans": null, "ansText": "Q1=3，Q3=4", "expl": "排序1,3,4,4,6；Q1位置i=5×1/4=1.25→第2個值=3；Q3位置i=5×3/4=3.75→第4個值=4。", "flag": false, "num": 14}, {"id": 890, "src": "講義-基礎統計", "ch": "3-2 離散趨勢量數", "type": "open", "q": "某班級共50人，某次統計學成績如下：22 25 26 29 29 40 42 43 46 56 57 59 60 60 60 61 62 64 66 68 70 71 71 72 75 76 76 77 78 79 82 82 85 85 86 86 86 88 88 86 89 90 91 91 92 92 96 94 96 97，試求出P25、P30。", "opts": {}, "ans": null, "ansText": "P25=60，P30=60.5", "expl": "P25位置i=50×25/100=12.5→取第13個值60；P30位置i=50×30/100=15為整數→取(X15+X16)/2=(60+61)/2=60.5。", "flag": false, "num": 15}, {"id": 891, "src": "講義-基礎統計", "ch": "3-2 離散趨勢量數", "type": "open", "q": "設有一組樣本資料如下：3,4,1,4,6，試求全距。", "opts": {}, "ans": null, "ansText": "R=5", "expl": "R=最大值-最小值=6-1=5。", "flag": false, "num": 16}, {"id": 892, "src": "講義-基礎統計", "ch": "3-2 離散趨勢量數", "type": "open", "q": "設有一組樣本資料如下：3,4,1,4,6，試求四分位距。", "opts": {}, "ans": null, "ansText": "IQR=1", "expl": "排序後Q1=3、Q3=4，IQR=Q3-Q1=4-3=1。", "flag": false, "num": 17}, {"id": 893, "src": "講義-基礎統計", "ch": "3-2 離散趨勢量數", "type": "open", "q": "設有一組樣本資料如下：3,4,1,4,6，試求變異數及標準差。", "opts": {}, "ans": null, "ansText": "S^2=3.3，S≈1.8166", "expl": "x̄=3.6，Σ(x-x̄)^2=13.2，S^2=13.2/(5-1)=3.3，S=√3.3≈1.8166。", "flag": false, "num": 18}, {"id": 894, "src": "講義-基礎統計", "ch": "3-2 離散趨勢量數", "type": "open", "q": "設有一組樣本資料如下：3,4,1,4,6，試求變異係數。", "opts": {}, "ans": null, "ansText": "CV≈50.46%", "expl": "CV=S/x̄×100%=1.8166/3.6×100%≈50.46%。", "flag": false, "num": 19}, {"id": 895, "src": "講義-基礎統計", "ch": "3-3 柴比雪夫與經驗法則", "type": "open", "q": "有100位學生修課，期中考成績之平均數為70，標準差為5。有多少學生的分數介於60與80之間？(1)用柴比雪夫 (2)用經驗法則，分別算出。", "opts": {}, "ans": null, "ansText": "(1)至少75人，(2)約95人", "expl": "K=(80-70)/5=2；柴比雪夫至少1-1/K^2=3/4，100×3/4=75人；經驗法則2個標準差內約95%，100×0.95=95人。", "flag": false, "num": 20}, {"id": 896, "src": "講義-基礎統計", "ch": "綜合練習3", "type": "open", "q": "有一組樣本資料值為8, 3, 10, 3, 11, 4，請計算其平均數、眾數、中位數、全距、Q1、Q2、Q3、IQR、變異數、標準差、變異係數。", "opts": {}, "ans": null, "ansText": "平均數6.5，眾數3，中位數6，全距8，Q1=3，Q2=6，Q3=10，IQR=7，變異數13.1，標準差≈3.6194，變異係數≈55.68%", "expl": "排序3,3,4,8,10,11；x̄=39/6=6.5；Me=(4+8)/2=6；Σ(x-x̄)^2=65.5，S^2=65.5/5=13.1，S≈3.62，CV=3.62/6.5≈55.68%。附錄確認Mo=3、Q1=3、Q3=10、IQR=7。", "flag": false, "num": 21}, {"id": 897, "src": "講義-基礎統計", "ch": "綜合練習3", "type": "open", "q": "若母體有10個，平均數為16，標準差為5，其中有一數正確應為23，卻誤為32，問修正後平均數及標準差應為多少？", "opts": {}, "ans": null, "ansText": "修正後平均數15.1，標準差≈1.868", "expl": "原總和160，修正後151，μ=15.1；原Σx²=10(25+16²)=2810，修正為2810-32²+23²=2315，σ²=231.5-15.1²=3.49，σ≈1.868。附錄確認μ=15.1。", "flag": false, "num": 22}, {"id": 898, "src": "講義-基礎統計", "ch": "綜合練習3", "type": "open", "q": "全班有55人，若平均數為72分，標準差為4分，欲算出64分到80分有多少人？(1)若利用柴比雪夫，有多少人？(2)若利用經驗法則，有多少人？", "opts": {}, "ans": null, "ansText": "(1)至少42人，(2)約53人", "expl": "K=(80-72)/4=2；柴比雪夫55×3/4=41.25→至少42人；經驗法則55×0.95=52.25→約53人（附錄答案）。", "flag": false, "num": 23}, {"id": 899, "src": "講義-基礎統計", "ch": "4-1 樣本空間及事件", "type": "open", "q": "(1)擲一顆骰子，其樣本空間為何？(2)擲二顆骰子，其樣本空間為何？", "opts": {}, "ans": null, "ansText": "(1)S={1,2,3,4,5,6}共6個樣本點，(2)S={(1,1),(1,2),…,(6,6)}共36個樣本點", "expl": "一顆骰子有6種出象；二顆骰子為有序數對，共6×6=36個樣本點。", "flag": false, "num": 24}, {"id": 900, "src": "講義-基礎統計", "ch": "4-2 排列與組合", "type": "open", "q": "王先生的銀行存款欲設定四個不相同的數字的密碼，問共有幾種方式可設定？", "opts": {}, "ans": null, "ansText": "5040種", "expl": "由0~9十個數字取4個排列，P(10,4)=10!/6!=10×9×8×7=5040。", "flag": false, "num": 25}, {"id": 901, "src": "講義-基礎統計", "ch": "4-2 排列與組合", "type": "open", "q": "自5位科長中，隨機抽取2位，則共有多少樣本點？", "opts": {}, "ans": null, "ansText": "10個", "expl": "不計順序之組合C(5,2)=5!/(2!3!)=10。", "flag": false, "num": 26}, {"id": 902, "src": "講義-基礎統計", "ch": "4-3 機率理論", "type": "open", "q": "投擲一顆骰子兩次，點數和為6的機率為何？", "opts": {}, "ans": null, "ansText": "5/36", "expl": "n(S)=36；和為6的事件E={(1,5),(2,4),(3,3),(4,2),(5,1)}共5個，P(E)=5/36。", "flag": false, "num": 27}, {"id": 903, "src": "講義-基礎統計", "ch": "4-3 機率理論", "type": "open", "q": "擲二枚硬幣，出現一枚正面的機率？", "opts": {}, "ans": null, "ansText": "0.5", "expl": "S={正正,正反,反正,反反}，恰一正面E={正反,反正}，P(E)=2/4=0.5。", "flag": false, "num": 28}, {"id": 904, "src": "講義-基礎統計", "ch": "4-4 事件機率", "type": "open", "q": "已知P(A)=0.4，P(B)=0.5，P(A∩B)=0.3，求：(1)P(A∪B) (2)P(A′∪B′) (3)P(A′∪B) (4)P(A∩B′)（′表餘事件）", "opts": {}, "ans": null, "ansText": "(1)0.6，(2)0.7，(3)0.9，(4)0.1", "expl": "(1)0.4+0.5-0.3=0.6；(2)P(A′∪B′)=1-P(A∩B)=0.7；(3)P(A′∪B)=P(A′)+P(B)-P(A′∩B)=0.6+0.5-0.2=0.9；(4)P(A)-P(A∩B)=0.1。", "flag": false, "num": 29}, {"id": 905, "src": "講義-基礎統計", "ch": "4-4 事件機率", "type": "open", "q": "若A、B是獨立事件，P(A)=0.4，P(B)=0.5，求：(1)P(A∩B) (2)P(A∪B) (3)P(A′∪B)（′表餘事件）", "opts": {}, "ans": null, "ansText": "(1)0.2，(2)0.7，(3)0.8", "expl": "獨立故P(A∩B)=0.4×0.5=0.2；P(A∪B)=0.4+0.5-0.2=0.7；P(A′∪B)=P(A′)+P(B)-P(A′∩B)=0.6+0.5-0.3=0.8。", "flag": false, "num": 30}, {"id": 906, "src": "講義-基礎統計", "ch": "4-7 條件機率", "type": "open", "q": "已知某公司有A、B兩種產品，A產品良品480、不良品20，B產品良品450、不良品50。(1)任選一件產品為A產品的機率為何？(邊際機率) (2)任選一件產品為A產品且不良品的機率為何？(聯合機率) (3)隨機抽取一件B產品，其結果為不良品的機率為何？(條件機率)", "opts": {}, "ans": null, "ansText": "(1)0.5，(2)0.02，(3)0.1", "expl": "總數1000件；P(A)=500/1000=0.5；P(A∩不良)=20/1000=0.02；P(不良|B)=50/500=0.1。", "flag": false, "num": 31}, {"id": 907, "src": "講義-基礎統計", "ch": "4-7 條件機率", "type": "open", "q": "準時飛之機率0.83，準時到之機率0.92，準時飛且準時到之機率0.78。(1)若已知準時飛，則準時到之機率？(2)若已知準時到，則準時飛之機率？", "opts": {}, "ans": null, "ansText": "(1)0.78/0.83≈0.94，(2)0.78/0.92≈0.85", "expl": "條件機率P(到|飛)=P(到∩飛)/P(飛)=0.78/0.83≈0.94；P(飛|到)=0.78/0.92≈0.85。", "flag": false, "num": 32}, {"id": 908, "src": "講義-基礎統計", "ch": "綜合練習4", "type": "open", "q": "擲二顆骰子，(1)出現點數和為7的機率？(2)出現點數和為7或第一顆為4點的機率？", "opts": {}, "ans": null, "ansText": "(1)1/6，(2)11/36", "expl": "和為7有6種，6/36=1/6；第一顆為4有6種，交集{(4,3)}1種，P=6/36+6/36-1/36=11/36。", "flag": false, "num": 33}, {"id": 909, "src": "講義-基礎統計", "ch": "綜合練習4", "type": "open", "q": "令A、B分別表示擲一顆骰子兩次點數和為6及點數和為奇數的事件，請問A、B是否為獨立事件？或為互斥事件？", "opts": {}, "ans": null, "ansText": "A、B為互斥事件，且不是獨立事件", "expl": "和為6為偶數，A∩B=空集合，故互斥；P(A∩B)=0≠P(A)P(B)=(5/36)(1/2)，故不獨立。", "flag": false, "num": 34}, {"id": 910, "src": "講義-基礎統計", "ch": "綜合練習4", "type": "open", "q": "若A、B是獨立事件，P(A)=0.6，P(B)=0.3，求：(1)P(A|B)與P(A′|B) (2)P(A∩B)與P(A∩B′) (3)P(A∪B)與P(A∪B′)（′表餘事件）", "opts": {}, "ans": null, "ansText": "(1)P(A|B)=0.6、P(A′|B)=0.4，(2)P(A∩B)=0.18、P(A∩B′)=0.42，(3)P(A∪B)=0.72、P(A∪B′)=0.88", "expl": "獨立故P(A|B)=P(A)=0.6；P(A∩B)=0.18，P(A∩B′)=0.6×0.7=0.42；P(A∪B)=0.6+0.3-0.18=0.72，P(A∪B′)=0.6+0.7-0.42=0.88。附錄確認0.42、0.88。", "flag": false, "num": 35}, {"id": 911, "src": "講義-基礎統計", "ch": "綜合練習4", "type": "open", "q": "若P(A)=0.3，P(B)=0.2，P(A∪B)=0.4，(1)P(A∩B)=? (2)P(A′∪B′)=?（′表餘事件）", "opts": {}, "ans": null, "ansText": "(1)0.1，(2)0.9", "expl": "(1)P(A∩B)=0.3+0.2-0.4=0.1；(2)P(A′∪B′)=1-P(A∩B)=0.9。第(2)小題之餘事件符號因轉檔遺失，依附錄答案0.9重建。", "flag": false, "num": 36}, {"id": 912, "src": "講義-基礎統計", "ch": "綜合練習4", "type": "open", "q": "某公司有員工50人，其性別及婚姻狀況：男已婚16人、男未婚14人、女已婚12人、女未婚8人。今隨機由該公司抽取一員工，試問：(1)為女員工的機率為何？(2)為男員工且已婚者的機率為何？(3)已知為女員工，則已婚者的機率為何？", "opts": {}, "ans": null, "ansText": "(1)0.4，(2)0.32，(3)0.6", "expl": "(1)女20/50=0.4；(2)男且已婚16/50=0.32；(3)P(已婚|女)=12/20=0.6。附錄確認。", "flag": false, "num": 37}, {"id": 913, "src": "講義-基礎統計", "ch": "綜合練習4", "type": "open", "q": "假設某製造廠生產A、B兩產品，已知A、B兩種產品分別占總產品數的60％及40％，且A產品的不良率為0.01，B產品的不良率為0.05。試問：(1)由此家製造廠生產出不良品的機率為何？(2)由此家製造廠生產出的不良品中，A產品的比例為何？", "opts": {}, "ans": null, "ansText": "(1)0.026，(2)3/13≈0.2308", "expl": "全機率：0.6×0.01+0.4×0.05=0.026；貝氏定理：P(A|不良)=0.006/0.026=3/13≈0.2308。", "flag": false, "num": 38}, {"id": 914, "src": "講義-基礎統計", "ch": "綜合練習4", "type": "open", "q": "公司需2名職員，報考者有四位：趙一(男,高餐)、錢二(男,景文)、孫三(女,高餐)、李四(男,文化)。(1)已知錄取至少有一名為高餐，則是趙一的機率為何？(2)兩位高餐皆被錄取的機率為何？(3)已知有男生被錄取，則是趙一的機率為何？", "opts": {}, "ans": null, "ansText": "(1)3/5，(2)1/6，(3)1/2", "expl": "C(4,2)=6種組合；至少一名高餐者5種，其中含趙一3種→3/5；兩高餐{趙一,孫三}僅1種→1/6；每種組合皆含男生，含趙一3/6=1/2。附錄確認。", "flag": false, "num": 39}, {"id": 915, "src": "講義-基礎統計", "ch": "5-1 離散型機率分配", "type": "open", "q": "已知X之機率分配：x=1,2,3,4，f(x)=1/4,3/8,1/4,1/8。求(1)P(1≤X≤3) (2)P(X>3)", "opts": {}, "ans": null, "ansText": "(1)7/8，(2)1/8", "expl": "(1)P(X=1)+P(X=2)+P(X=3)=1/4+3/8+1/4=7/8；(2)P(X>3)=P(X=4)=1/8。", "flag": false, "num": 40}, {"id": 916, "src": "講義-基礎統計", "ch": "5-2 期望值及變異數", "type": "open", "q": "已知X之機率分配：x=0,1,2，f(x)=1/4,1/2,1/4。求(1)E(X) (2)V(X) (3)σ(X)", "opts": {}, "ans": null, "ansText": "(1)E(X)=1，(2)V(X)=0.5，(3)σ(X)≈0.7071", "expl": "E(X)=0×1/4+1×1/2+2×1/4=1；E(X²)=3/2，V(X)=1.5-1²=0.5，σ=√0.5≈0.7071。", "flag": false, "num": 41}, {"id": 917, "src": "講義-基礎統計", "ch": "5-3 二項分配", "type": "open", "q": "假設產品之瑕疵比例為20%，從中隨機抽取3個產品，抽中2個瑕疵品之機率為何？若抽20個，則平均多少個為瑕疵品？", "opts": {}, "ans": null, "ansText": "機率0.096，平均4個", "expl": "二項分配P(X=2)=C(3,2)(0.2)²(0.8)¹=0.096；E(X)=np=20×0.2=4。", "flag": false, "num": 42}, {"id": 918, "src": "講義-基礎統計", "ch": "5-4 卜式分配", "type": "open", "q": "假設某人平均打一頁的字會出現3個錯字。(1)打一頁的字出現錯字2個字的機率為何？(2)打三頁的字沒有出現錯誤的機率為何？(3)打五十頁的字，平均錯字有幾個？", "opts": {}, "ans": null, "ansText": "(1)0.2240，(2)0.0001，(3)150個", "expl": "卜式分配λ=3：P(X=2)=e^(-3)3²/2!≈0.2240；三頁λ=9，P(X=0)=e^(-9)≈0.0001；50頁E(X)=50×3=150。", "flag": false, "num": 43}, {"id": 919, "src": "講義-基礎統計", "ch": "5-5 超幾何分配", "type": "open", "q": "袋中有3紅球2白球，每次抽一球，抽出不放回，若抽2次，則抽中1紅1白的機率為何？", "opts": {}, "ans": null, "ansText": "0.6", "expl": "超幾何分配P(X=1)=C(3,1)C(2,1)/C(5,2)=6/10=0.6。", "flag": false, "num": 44}, {"id": 920, "src": "講義-基礎統計", "ch": "綜合練習5", "type": "open", "q": "已知X機率分配表：X=1,2,3,4，f(X)=1/5,2/5,1/5,?。求(1)f(4)=? (2)σ(X)=?", "opts": {}, "ans": null, "ansText": "(1)f(4)=1/5，(2)σ(X)≈1.0198", "expl": "機率總和為1得f(4)=1/5；E(X)=2.4，E(X²)=6.8，V(X)=6.8-2.4²=1.04，σ=√1.04≈1.0198。附錄確認。", "flag": false, "num": 45}, {"id": 921, "src": "講義-基礎統計", "ch": "綜合練習5", "type": "open", "q": "隨機投擲一顆骰子二次，令X表投擲此骰子二次的點數和，試求隨機變數X之機率函數。", "opts": {}, "ans": null, "ansText": "f(x)=(6-|x-7|)/36，x=2,3,…,12（即f(2)=1/36、f(3)=2/36、f(4)=3/36、f(5)=4/36、f(6)=5/36、f(7)=6/36、f(8)=5/36、…、f(12)=1/36）", "expl": "36個等可能樣本點中，點數和為x的組合數為6-|x-7|，除以36即得機率函數。", "flag": false, "num": 46}, {"id": 922, "src": "講義-基礎統計", "ch": "綜合練習5", "type": "open", "q": "隨機投擲一個銅板三次，令X表出現正面的次數，試求隨機變數之機率函數及累積機率分配。", "opts": {}, "ans": null, "ansText": "f(0)=1/8、f(1)=3/8、f(2)=3/8、f(3)=1/8；F(0)=1/8、F(1)=4/8、F(2)=7/8、F(3)=1", "expl": "X~B(3,1/2)，f(x)=C(3,x)(1/2)³；累積分配為逐項加總。", "flag": false, "num": 47}, {"id": 923, "src": "講義-基礎統計", "ch": "綜合練習5", "type": "open", "q": "設有三男二女，隨機抽出二人組委員會，求男生之期望值？", "opts": {}, "ans": null, "ansText": "E(X)=1.2人", "expl": "超幾何分配E(X)=n×K/N=2×3/5=1.2。", "flag": false, "num": 48}, {"id": 924, "src": "講義-基礎統計", "ch": "綜合練習5", "type": "open", "q": "已知一班級中有男生10人，女生40人。今隨機抽取4位同學作調查，(1)全部為女生的機率為何？(2)男生3人及女生1人的機率為何？", "opts": {}, "ans": null, "ansText": "(1)C(40,4)/C(50,4)=91390/230300≈0.3968，(2)C(10,3)C(40,1)/C(50,4)=4800/230300≈0.0208", "expl": "超幾何分配：分母為C(50,4)=230300，分子依取法計算組合數。", "flag": false, "num": 49}, {"id": 925, "src": "講義-基礎統計", "ch": "綜合練習5", "type": "open", "q": "假設校門口平均每分鐘有5部汽車通過。求：(1)每分鐘有10部汽車通過的機率為何？(2)平均每小時有多少汽車通過？", "opts": {}, "ans": null, "ansText": "(1)P(X=10)=e^(-5)5^10/10!≈0.0181，(2)300部", "expl": "卜式分配λ=5：P(X=10)=e^(-5)×5^10/10!≈0.0181；每小時λ=5×60=300。", "flag": false, "num": 50}, {"id": 926, "src": "講義-基礎統計", "ch": "綜合練習5", "type": "open", "q": "袋中有3紅球2白球，每次抽一球，抽出放回，若抽2次，則抽中1紅1白的機率為何？", "opts": {}, "ans": null, "ansText": "12/25=0.48", "expl": "放回抽取為二項分配：C(2,1)(3/5)(2/5)=12/25=0.48。", "flag": false, "num": 51}, {"id": 927, "src": "講義-基礎統計", "ch": "6-1 常態分配", "type": "open", "q": "假設隨機變數Z為標準常態分配，利用標準常態分配表求出下列機率值：(1)P(0≤Z≤2) (2)P(Z>1.64) (3)P(-0.5≤Z≤1.5) (4)P(Z≥-1.26) (5)P(1≤Z≤2)", "opts": {}, "ans": null, "ansText": "(1)0.4772，(2)0.0505，(3)0.6247，(4)0.8962，(5)0.1359", "expl": "查表：(2)0.5-0.4495；(3)0.1915+0.4332；(4)0.3962+0.5；(5)0.4772-0.3413。", "flag": false, "num": 52}, {"id": 928, "src": "講義-基礎統計", "ch": "6-1 常態分配", "type": "open", "q": "假設隨機變數X具有常態分配且μ=10、σ²=25，則(1)P(X＜15)=? (2)P(12≤X≤15)=?", "opts": {}, "ans": null, "ansText": "(1)0.8413，(2)0.1859", "expl": "標準化σ=5：(1)P(Z<1)=0.5+0.3413=0.8413；(2)P(0.4≤Z≤1)=0.3413-0.1554=0.1859。", "flag": false, "num": 53}, {"id": 929, "src": "講義-基礎統計", "ch": "6-1 常態分配", "type": "open", "q": "某校500名學生基礎統計成績為常態分配，平均80分，變異數16分，求成績在68分與86分間的機率為多少？", "opts": {}, "ans": null, "ansText": "0.9319", "expl": "σ=4，P(68≤X≤86)=P(-3≤Z≤1.5)=0.4987+0.4332=0.9319。", "flag": false, "num": 54}, {"id": 930, "src": "講義-基礎統計", "ch": "綜合練習6", "type": "open", "q": "假設隨機變數Z為標準常態分配，求出下列機率值：(1)P(Z≤-2) (2)P(-1.5≤Z≤-0.5) (3)P(Z≥-1.5) (4)P(-1.25≤Z≤0) (5)P(Z≥1.5)", "opts": {}, "ans": null, "ansText": "(1)0.0228，(2)0.2417，(3)0.9332，(4)0.3944，(5)0.0668（附錄載0.0932，與P(Z≥1.5)不符）", "expl": "查標準常態表計算。原文不等號因轉檔遺失，(1)(2)依附錄答案0.0228、0.2417重建；第(5)小題附錄答案0.0932與P(Z≥1.5)=0.0668不一致，原題方向或數值無法確定。", "flag": true, "num": 55}, {"id": 931, "src": "講義-基礎統計", "ch": "綜合練習6", "type": "open", "q": "假設隨機變數X具有常態分配且μ=2、σ²=25，求出下列機率值：(1)P(X＜10)=? (2)P(X≥6)=? (3)P(4＜X＜7)=?", "opts": {}, "ans": null, "ansText": "(1)0.9452，(2)0.2119，(3)0.1859", "expl": "σ=5：(1)P(Z<1.6)=0.5+0.4452=0.9452（附錄確認）；(2)P(Z≥0.8)=0.5-0.2881=0.2119；(3)P(0.4<Z<1)=0.3413-0.1554=0.1859（附錄確認）。", "flag": false, "num": 56}, {"id": 932, "src": "講義-基礎統計", "ch": "7-1 抽樣方法", "type": "open", "q": "班上50人，要抽出5人到國際會議廳聽演講，用亂數表法（講義所附亂數表），若從第5列第3行開始抽，則哪5位被抽中？", "opts": {}, "ans": null, "ansText": "49、22、26、45、01", "expl": "將50位編號01~50，自亂數表第5列第3行起依序取兩位數：55,49,22,26,77,59,56,45,79,45,63,01，落在01~50且不重複者為49,22,26,45,01。", "flag": false, "num": 57}, {"id": 933, "src": "講義-基礎統計", "ch": "7-3 樣本平均數之抽樣分配", "type": "open", "q": "常態分配N(3,0.04)，抽出25個，則(1)樣本平均數大於3.01之機率 (2)樣本平均數介於2.9到3.1之機率", "opts": {}, "ans": null, "ansText": "(1)0.4013，(2)0.9876", "expl": "標準誤=0.2/√25=0.04：(1)P(Z>0.25)=0.5-0.0987=0.4013；(2)P(-2.5≤Z≤2.5)=2×0.4938=0.9876。", "flag": false, "num": 58}, {"id": 934, "src": "講義-基礎統計", "ch": "7-3 樣本平均數之抽樣分配", "type": "open", "q": "某國小全校學生的體重呈現常態分配，且其平均體重為45公斤，標準差為4公斤。隨機抽出25位學生為樣本，其平均體重大於50公斤之機率為何？", "opts": {}, "ans": null, "ansText": "約0（P(Z>6.25)≈0）", "expl": "標準誤=4/√25=0.8，Z=(50-45)/0.8=6.25，P(Z>6.25)趨近於0。", "flag": false, "num": 59}, {"id": 935, "src": "講義-基礎統計", "ch": "7-3 樣本平均數之抽樣分配", "type": "open", "q": "假設某學校學生平均每週上圖書館的時間呈現常態分配，平均為12小時，變異數為25小時，若隨機抽100位學生，其每週上圖書館的時間平均為13至14小時之機率為多少？", "opts": {}, "ans": null, "ansText": "0.0228", "expl": "標準誤=5/√100=0.5，P(13≤X̄≤14)=P(2≤Z≤4)=0.5-0.4772=0.0228。", "flag": false, "num": 60}, {"id": 936, "src": "講義-基礎統計", "ch": "綜合練習7", "type": "open", "q": "常態分配N(80,25)，則(1)抽出16個，樣本平均低於78之機率 (2)抽出25個，樣本平均介於78至82之機率", "opts": {}, "ans": null, "ansText": "(1)0.0548，(2)0.9544", "expl": "(1)標準誤=5/4=1.25，P(Z<-1.6)=0.5-0.4452=0.0548；(2)標準誤=1，P(-2≤Z≤2)=0.9544。附錄確認。", "flag": false, "num": 61}, {"id": 937, "src": "講義-基礎統計", "ch": "綜合練習7", "type": "open", "q": "假設某產品之重量呈現常態分配，且平均數100公克，變異數為25公克，今隨機抽取該產品16件作為樣本，則樣本平均數小於102公克之機率為何？", "opts": {}, "ans": null, "ansText": "0.9452", "expl": "標準誤=5/√16=1.25，Z=(102-100)/1.25=1.6，P(Z<1.6)=0.9452。附錄確認。", "flag": false, "num": 62}, {"id": 938, "src": "講義-基礎統計", "ch": "8-1 假設檢定基本概念", "type": "open", "q": "雷達有不明飛行物，H0：一切正常，只是有干擾；H1：有敵機來襲。下列為何種錯誤？(1)錯誤警報 (2)疏忽而未放警報", "opts": {}, "ans": null, "ansText": "(1)型I錯誤，(2)型II錯誤", "expl": "(1)H0為真卻拒絕H0（正常卻放警報）為型I錯誤；(2)H0為假卻接受H0（有敵機卻沒放警報）為型II錯誤。", "flag": false, "num": 63}, {"id": 939, "src": "講義-基礎統計", "ch": "8-1 假設檢定基本概念", "type": "open", "q": "H0：該生具有潛力；H1：該生不具潛力。下列為何種錯誤？(1)本校錄取該生，發現表現不佳 (2)本校沒錄取該生，該生卻在他校表現優異", "opts": {}, "ans": null, "ansText": "(1)型II錯誤，(2)型I錯誤", "expl": "(1)H0為假（不具潛力）卻接受H0（錄取），為型II錯誤；(2)H0為真（具潛力）卻拒絕H0（沒錄取），為型I錯誤。", "flag": false, "num": 64}, {"id": 940, "src": "講義-基礎統計", "ch": "8-2 母體平均數檢定", "type": "open", "q": "某廠商宣稱其罐裝食品平均重量為1.5磅，今自其中抽49罐，得平均重量為1.47磅，標準差為0.21磅，在α=0.01下，欲檢測此廠商重量不足1.5磅是否正確？", "opts": {}, "ans": null, "ansText": "Z=-1>-2.328，接受H0：重量沒有不足1.5磅", "expl": "H0：μ≥1.5，H1：μ<1.5，左尾檢定臨界值-2.328（講義值）；Z=(1.47-1.5)/(0.21/√49)=-1，未落入棄卻域，接受H0。", "flag": false, "num": 65}, {"id": 941, "src": "講義-基礎統計", "ch": "8-2 母體平均數檢定", "type": "open", "q": "新生註冊所需時間平均為50分鐘，標準差為16分鐘，若隨機抽樣16名學生為調查，發現平均值為42分鐘，以α=0.1檢測是否不等於50分鐘？", "opts": {}, "ans": null, "ansText": "|Z|=2>1.645，拒絕H0：註冊時間不等於50分鐘", "expl": "H0：μ=50，H1：μ≠50，雙尾臨界±1.645；Z=(42-50)/(16/√16)=-2，落入棄卻域，拒絕H0。", "flag": false, "num": 66}, {"id": 942, "src": "講義-基礎統計", "ch": "8-2 母體平均數檢定", "type": "open", "q": "校外住宿生之通勤所需時間平均為40分鐘，若隨機抽樣16名學生為調查，發現平均值為38分鐘，變異數為25分鐘，以α=0.01檢測是否不等於40分鐘？", "opts": {}, "ans": null, "ansText": "|T|=1.6<2.9467，接受H0：通勤時間與40分鐘無顯著差異", "expl": "σ未知小樣本用t檢定：S=5，v=15，雙尾臨界±t(15,0.005)=±2.9467；T=(38-40)/(5/√16)=-1.6，未落入棄卻域，接受H0。", "flag": false, "num": 67}, {"id": 943, "src": "講義-基礎統計", "ch": "綜合練習8", "type": "open", "q": "住宿生每日上網時間平均為90分鐘，變異數為16分鐘，若隨機抽樣25名學生為調查，發現平均值為85分鐘，以α=0.05檢測是否不等於90分鐘？", "opts": {}, "ans": null, "ansText": "|Z|=6.25>1.96，拒絕H0：每日上網時間不等於90分鐘", "expl": "H0：μ=90，H1：μ≠90，σ=4，n=25，雙尾臨界±1.96；Z=(85-90)/(4/√25)=-6.25，落入棄卻域，拒絕H0。附錄確認。", "flag": false, "num": 68}, {"id": 944, "src": "講義-條件機率", "ch": "條件機率", "type": "open", "q": "擲一均勻骰子3次，令A表示3次出現點數和為12的事件，B表示第1次出現偶數點之事件，則P(B'|A)=？", "opts": {}, "ans": null, "ansText": "12/25", "expl": "點數和為12的樣本點共25個，其中第一次為奇數點者12個，故P(B'|A)=12/25。", "flag": false, "num": 1}, {"id": 945, "src": "講義-條件機率", "ch": "條件機率", "type": "open", "q": "設A、B為二事件，P(A)=3/8，P(B)=3/4，P(A∪B)=7/8，試求：(1)P(A|B) (2)P(A'|B) (3)P(A'|B')。", "opts": {}, "ans": null, "ansText": "(1)1/3，(2)2/3，(3)1/2", "expl": "P(A∩B)=3/8+3/4-7/8=1/4，P(A|B)=(1/4)/(3/4)=1/3，P(A'|B)=1-1/3=2/3，P(A'|B')=P((A∪B)')/P(B')=(1/8)/(1/4)=1/2。", "flag": false, "num": 2}, {"id": 946, "src": "講義-條件機率", "ch": "條件機率", "type": "open", "q": "設袋中有8個白球4個紅球，從袋中逐次取出4球（每次取球時每一球被取中的機會相等），在抽中3個白球的條件下，求第三次抽中白球的機率（分別考慮取後放回與取後不放回）。", "opts": {}, "ans": null, "ansText": "3/4（取後放回與取後不放回皆為3/4）", "expl": "在恰抽中3白球的條件下，由對稱性，白球出現在四次中任一次的條件機率相等，故第三次為白球的機率為3/4。", "flag": false, "num": 3}, {"id": 947, "src": "講義-條件機率", "ch": "條件機率的乘法原理", "type": "open", "q": "一袋中有5個白球、8個黑球，從袋中連續取出3個球，取出之球不再放回。求(1)依序取出白球、黑球、白球的機率 (2)第一次取出為黑球的機率 (3)第二次取出黑球的機率。", "opts": {}, "ans": null, "ansText": "(1)160/1716，(2)8/13，(3)8/13", "expl": "(1)=5/13×8/12×4/11=160/1716；(2)(3)由抽籤原理，每一次取出黑球的機率皆為8/13。", "flag": false, "num": 4}, {"id": 948, "src": "講義-條件機率", "ch": "條件機率的乘法原理", "type": "open", "q": "一袋內有m支籤，其中n支是獎籤(3<n<m)，甲、乙、丙依次抽籤，每人各取一次，每次從袋內任取1支籤取後不放回，則甲、乙、丙三人抽中獎籤的機率依次為何？", "opts": {}, "ans": null, "ansText": "三人均為 n/m", "expl": "抽籤原理：不論抽籤先後順序，每人抽中獎籤的機率都等於n/m。", "flag": false, "num": 5}, {"id": 949, "src": "講義-條件機率", "ch": "貝氏定理", "type": "multi", "q": "醫療主管機關發現若受檢人感染某傳染病就一定可檢測出來，但有4%的機率將不患病之受檢者誤檢為患病。已知全部男性人口中有0.2%患有此病。兵役體檢時某役男被告知患有該病，請問下列哪些敘述為真？", "opts": {"A": "該役男確實染病的機率大於3%", "B": "該役男確實染病的機率大於4%", "C": "該役男確實染病的機率大於5%", "D": "該役男確實染病的機率大於90%"}, "ans": "AB", "ansText": "(A)(B)", "expl": "由貝氏定理，P(染病|檢出)=0.002×1/(0.002×1+0.998×0.04)≈0.0477，約4.8%，大於3%與4%但小於5%。", "flag": false, "num": 6}, {"id": 950, "src": "講義-條件機率", "ch": "貝氏定理", "type": "open", "q": "某工廠由甲、乙、丙三台機器製造某一產品，甲生產全部產品的50%，乙生產30%，丙生產20%。甲的產品中有3%、乙有4%、丙有5%為不良品。從產品中任選一產品，(1)求選出之產品為不良品的機率 (2)若該產品為不良品，求此產品為甲機器製造的機率。", "opts": {}, "ans": null, "ansText": "(1)0.037，(2)15/37", "expl": "P(不良)=0.5×0.03+0.3×0.04+0.2×0.05=0.037；由貝氏定理P(甲|不良)=0.015/0.037=15/37。", "flag": false, "num": 7}, {"id": 951, "src": "講義-條件機率", "ch": "樹狀圖求機率", "type": "open", "q": "彩票公司每天開獎一次，從1、2、3三個號碼中隨機開出一個。開獎時若開出的號碼和前一天相同就要重開，直到開出與前一天不同的號碼為止。如果第一天開出的號碼是3，則第五天開出號碼同樣是3的機率是多少（以最簡分數表示）？", "opts": {}, "ans": null, "ansText": "3/8", "expl": "設第n天開出3的機率為q(n)，q(n+1)=(1-q(n))/2；q(1)=1，q(2)=0，q(3)=1/2，q(4)=1/4，q(5)=3/8。", "flag": false, "num": 8}, {"id": 952, "src": "講義-條件機率", "ch": "樹狀圖求機率", "type": "open", "q": "設A、B兩箱，A箱內有1黑球1白球，B箱內有1白球。甲乙兩人輪流取球，每次先由甲自A箱任取一球放入B箱，再由乙自B箱任取一球放入A箱，動作完成後稱為一局。(1)當一局結束時，A箱內兩球為一黑一白的機率為何？(2)當第三局結束時，A箱內兩球為一黑一白的機率為何？", "opts": {}, "ans": null, "ansText": "(1)3/4，(2)43/64", "expl": "以樹狀圖列出每局後A箱狀態的轉移機率：每局後維持一黑一白的機率為3/4，全白轉回一黑一白機率為1/2，遞推得第三局後為43/64。", "flag": false, "num": 9}, {"id": 953, "src": "講義-條件機率", "ch": "條件機率", "type": "open", "q": "設A、B為樣本空間S中的二事件，且P(A)=1/3，P(B)=1/4，P(A∩B)=1/6，求(1)P(A|B) (2)P(B|A) (3)P(A'|B') (4)P(B'|A')。", "opts": {}, "ans": null, "ansText": "(1)2/3，(2)1/2，(3)7/9，(4)7/8", "expl": "P(A∪B)=5/12，P(A'∩B')=7/12；P(A|B)=(1/6)/(1/4)=2/3，P(B|A)=1/2，P(A'|B')=(7/12)/(3/4)=7/9，P(B'|A')=(7/12)/(2/3)=7/8。", "flag": false, "num": 10}, {"id": 954, "src": "講義-條件機率", "ch": "條件機率", "type": "open", "q": "某鎮患有眼疾者12%，牙疾者10%，二者兼有者4%。(1)從患眼疾中選一人，恰有患牙疾之條件機率為何？(2)從患牙疾中選一人，恰有患眼疾之條件機率為何？", "opts": {}, "ans": null, "ansText": "(1)1/3，(2)2/5", "expl": "(1)=0.04/0.12=1/3；(2)=0.04/0.10=2/5。", "flag": false, "num": 11}, {"id": 955, "src": "講義-條件機率", "ch": "條件機率", "type": "open", "q": "假設汽車駕駛人中有0.005是酒醉駕車，又酒醉駕車且肇事者占駕駛人的0.003，求駕駛人在酒醉的情況下肇事的機率。", "opts": {}, "ans": null, "ansText": "3/5", "expl": "P(肇事|酒醉)=0.003/0.005=3/5。", "flag": false, "num": 12}, {"id": 956, "src": "講義-條件機率", "ch": "條件機率", "type": "open", "q": "某一家庭有兩個小孩，(1)若已知兩個小孩至少有一個男孩，求兩個均為男孩的機率 (2)若已知大孩子為男孩，求兩個都是男孩的機率。", "opts": {}, "ans": null, "ansText": "(1)1/3，(2)1/2", "expl": "樣本空間{男男,男女,女男,女女}；至少一男的條件下為男男機率1/3；大孩為男的條件下為1/2。", "flag": false, "num": 13}, {"id": 957, "src": "講義-條件機率", "ch": "條件機率", "type": "open", "q": "擲三次均勻骰子，設三次中至少出現一次6點的事件為A，至少出現一次1點的事件為B，則P(B|A)=？", "opts": {}, "ans": null, "ansText": "30/91", "expl": "n(A)=216-125=91；n(A∩B)=216-2×125+64=30（排容原理）；P(B|A)=30/91。", "flag": false, "num": 14}, {"id": 958, "src": "講義-條件機率", "ch": "條件機率", "type": "open", "q": "擲三枚相同且均勻的銅板一次，則在至少出現一個正面的條件下，恰好出現兩個正面的機率為何？", "opts": {}, "ans": null, "ansText": "3/7", "expl": "至少一正面有7個樣本點，恰兩正面有3個，故為3/7。", "flag": false, "num": 15}, {"id": 959, "src": "講義-條件機率", "ch": "條件機率", "type": "open", "q": "設袋中有10個球，其中白球6個、紅球4個，自袋中取球每次取一個，取後不放回共取三次。在取出之三球中恰有二白球的條件下，求第二次抽到白球的機率。", "opts": {}, "ans": null, "ansText": "2/3", "expl": "恰二白球的條件下，由對稱性白球落在三次中任兩次的機率相同，第二次為白球的機率=2/3。", "flag": false, "num": 16}, {"id": 960, "src": "講義-條件機率", "ch": "條件機率的乘法原理", "type": "open", "q": "設甲袋中有5個白球、2個紅球，乙袋中有4個白球、3個紅球。今擲骰子一次，擲得1,2點則選取甲袋，擲得3,4,5,6點則選取乙袋，從選出的袋中任取2球，求選出的球為1白1紅的機率。", "opts": {}, "ans": null, "ansText": "34/63", "expl": "(1/3)×C(5,1)C(2,1)/C(7,2)+(2/3)×C(4,1)C(3,1)/C(7,2)=(1/3)(10/21)+(2/3)(12/21)=34/63。", "flag": false, "num": 17}, {"id": 961, "src": "講義-條件機率", "ch": "條件機率的乘法原理", "type": "open", "q": "袋中有4個白球、3個黑球。(1)任取3球，求取得2白球1黑球之機率 (2)每次任取一球取後不放回，求依次取得白球、白球、黑球的機率 (3)每次任取一球取後放回共取3次，求取得2次白球、1次黑球的機率。", "opts": {}, "ans": null, "ansText": "(1)18/35，(2)6/35，(3)144/343", "expl": "(1)C(4,2)C(3,1)/C(7,3)=18/35；(2)4/7×3/6×3/5=6/35；(3)C(3,2)(4/7)^2(3/7)=144/343。", "flag": false, "num": 18}, {"id": 962, "src": "講義-條件機率", "ch": "條件機率的乘法原理", "type": "open", "q": "某公司生產20個產品中有4個不良品，現逐一加以檢查。(1)取出後不放回，在第四次發現第二個不良品之機率為何？(2)取出後放回，在第四次發現第二個不良品之機率為何？", "opts": {}, "ans": null, "ansText": "(1)24/323，(2)48/625", "expl": "(1)前三次恰1不良且第四次不良：C(3,1)×(4×16×15×3)/(20×19×18×17)=24/323；(2)C(3,1)(0.2)(0.8)^2×0.2=48/625。", "flag": false, "num": 19}, {"id": 963, "src": "講義-條件機率", "ch": "條件機率的乘法原理", "type": "open", "q": "袋中有5白球、4紅球，今自袋中連取3球（每次取一球）。(1)若取出不放回，求依次是紅球、白球、紅球之機率 (2)若取出再放回，求依次是紅球、白球、紅球之機率。", "opts": {}, "ans": null, "ansText": "(1)5/42，(2)80/729", "expl": "(1)4/9×5/8×3/7=5/42；(2)4/9×5/9×4/9=80/729。（原文未附解答，此為依題意計算之結果）", "flag": false, "num": 20}, {"id": 964, "src": "講義-條件機率", "ch": "條件機率的乘法原理", "type": "open", "q": "10支籤中有獎籤3支，今依甲、乙之順序抽籤（不放回），試求：(1)甲乙均抽中有獎籤的機率 (2)甲沒抽中有獎籤、乙抽中有獎籤的機率 (3)在甲沒抽中有獎籤的條件下，乙抽中有獎籤的機率 (4)甲抽中有獎籤和乙抽中有獎籤之機率各為何。", "opts": {}, "ans": null, "ansText": "(1)1/15，(2)7/30，(3)1/3，(4)都是3/10", "expl": "(1)3/10×2/9=1/15；(2)7/10×3/9=7/30；(3)3/9=1/3；(4)由抽籤原理，甲、乙抽中的機率皆為3/10。", "flag": false, "num": 21}, {"id": 965, "src": "講義-條件機率", "ch": "貝氏定理", "type": "open", "q": "調查某新興工業都市市民對市長施政的滿意情況，隨機抽樣男性600人、女性400人。調查結果男性中有36%滿意市長的施政，女性市民中有46%滿意，則滿意市長施政的樣本佔全體樣本的百分比為多少％？", "opts": {}, "ans": null, "ansText": "40％", "expl": "(600×0.36+400×0.46)/1000=(216+184)/1000=40%。", "flag": false, "num": 22}, {"id": 966, "src": "講義-條件機率", "ch": "貝氏定理", "type": "open", "q": "某種診斷方法，患癌症的人經檢驗後發現有癌症的可能性為0.90，不患癌症的人經同樣檢驗後發現有癌症的可能性為0.05。假設一群人中有6%的人患有癌症，現從此群人中任選一人加以檢驗，求(1)檢驗出有癌症的機率 (2)設檢驗出有癌症，求此人確有癌症的機率。", "opts": {}, "ans": null, "ansText": "(1)0.101，(2)54/101", "expl": "(1)0.06×0.9+0.94×0.05=0.101；(2)貝氏定理：0.054/0.101=54/101。", "flag": false, "num": 23}, {"id": 967, "src": "講義-條件機率", "ch": "貝氏定理", "type": "single", "q": "某校橋藝社由甲、乙、丙三班同學組成，各佔40%、30%、30%。社員中甲班人數的1/4、乙班人數的1/5、丙班人數的1/3也是籃球校隊的隊員。某次橋藝社推選新社長，每人當選的機會均等，則籃球隊員當選的機率為何？", "opts": {"A": "11/50", "B": "12/50", "C": "13/50", "D": "14/50", "E": "15/50"}, "ans": "C", "ansText": "(C) 13/50", "expl": "0.4×1/4+0.3×1/5+0.3×1/3=0.1+0.06+0.1=0.26=13/50。", "flag": false, "num": 24}, {"id": 968, "src": "講義-條件機率", "ch": "貝氏定理", "type": "open", "q": "甲說實話的機率為7/10，乙說實話的機率為9/10。今有一袋內藏3白球、7黑球，自袋中任取一球，甲乙二人均說是白球，則此球確實為白球之機率為何？", "opts": {}, "ans": null, "ansText": "9/10", "expl": "P(白且兩人皆實話)=3/10×7/10×9/10=189/1000；P(黑且兩人皆說謊)=7/10×3/10×1/10=21/1000；所求=189/(189+21)=9/10。", "flag": false, "num": 25}, {"id": 969, "src": "講義-條件機率", "ch": "樹狀圖求機率", "type": "open", "q": "設A、B兩盒子內各有兩個球，其中A盒內有二白球，B盒內有一白球一黑球。甲、乙兩人輪流取球，每次先由甲自A盒任取一球放入B盒，再由乙自B盒任取一球放入A盒，動作完成後稱為一局。(1)求第一局結束時A盒內還是二白球的機率 (2)求第二局結束時A盒內還是二白球的機率 (3)求第三局結束時A盒內還是二白球的機率。", "opts": {}, "ans": null, "ansText": "(1)2/3，(2)5/9，(3)14/27", "expl": "每局的狀態轉移：二白→二白機率2/3，一白一黑→二白機率1/3，遞推得5/9、14/27。", "flag": false, "num": 26}, {"id": 970, "src": "講義-條件機率", "ch": "樹狀圖求機率", "type": "open", "q": "某人上班有甲、乙兩條路線可供選擇，早上定時從家裡出發，走甲路線有1/10的機率會遲到，走乙路線有1/5的機率會遲到。無論走哪一條路線，只要不遲到下次就走同一路線，否則就換另一條路線。假設他第一天走甲路線，則第三天也走甲路線的機率為何？", "opts": {}, "ans": null, "ansText": "83/100", "expl": "第二天走甲機率9/10、走乙機率1/10；第三天走甲=9/10×9/10+1/10×1/5=81/100+2/100=83/100。", "flag": false, "num": 27}, {"id": 971, "src": "講義-條件機率", "ch": "綜合練習", "type": "open", "q": "擲三粒均勻的骰子，已知點數和為5的倍數，求點數和不超過10的機率。", "opts": {}, "ans": null, "ansText": "33/43", "expl": "點數和為5的倍數：和為5有6種、和為10有27種、和為15有10種；(6+27)/43=33/43。", "flag": false, "num": 28}, {"id": 972, "src": "講義-條件機率", "ch": "綜合練習", "type": "open", "q": "由1到9的9個數字中任取2數，且取過的數字不再取，若其和為偶數，求二者均為偶數的機率。", "opts": {}, "ans": null, "ansText": "3/8", "expl": "和為偶數：兩偶C(4,2)=6或兩奇C(5,2)=10，共16種；兩偶機率=6/16=3/8。", "flag": false, "num": 29}, {"id": 973, "src": "講義-條件機率", "ch": "綜合練習", "type": "open", "q": "自一副撲克牌中任取一張，若取得紅色牌的事件為A，事件C：取出之牌為偶數點，事件D：取出之牌的點數大於或等於10點。在A發生的條件下，求C、D二事件中至少有一件發生的機率。", "opts": {}, "ans": null, "ansText": "8/13", "expl": "P(C∪D|A)=P(C|A)+P(D|A)-P(C∩D|A)=10/26+8/26-2/26=16/26=8/13。", "flag": false, "num": 30}, {"id": 974, "src": "講義-條件機率", "ch": "綜合練習", "type": "open", "q": "設正整數x,y,z為偶數的機率分別為1/2、1/3、1/4，在xy為偶數的條件下，xy+z為奇數的機率為何？", "opts": {}, "ans": null, "ansText": "3/4", "expl": "xy偶的條件下，xy+z為奇需z為奇，機率=1-1/4=3/4。", "flag": false, "num": 31}, {"id": 975, "src": "講義-條件機率", "ch": "綜合練習", "type": "open", "q": "甲乙丙三袋中，甲袋有2黑球3白球，乙袋有2黑球2白球，丙袋有1黑球2白球。今自甲乙丙三袋中各取一球，則至少取出2黑球的機率為何？", "opts": {}, "ans": null, "ansText": "11/30", "expl": "計算恰2黑與3黑的機率和：以各袋取黑機率2/5、1/2、1/3代入得11/30。", "flag": false, "num": 32}, {"id": 976, "src": "講義-條件機率", "ch": "綜合練習", "type": "open", "q": "一個袋子中有20個球，其中4個白球，每次取一個球，取出後不放回。若第二次取到白球，求第三次也取到白球的機率。", "opts": {}, "ans": null, "ansText": "3/19", "expl": "第二次取到白球的條件下，剩19球中白球3個，由對稱性第三次取白球機率=3/19。", "flag": false, "num": 33}, {"id": 977, "src": "講義-條件機率", "ch": "綜合練習", "type": "open", "q": "設袋中有12個球，其中有8個白球，從袋中逐次取出4球，每次取球時每球被取到的機會相等。試求(a)取後放回，抽中3白球的機率 (b)取後放回，在抽中3白球的條件下第三個是白球的機率 (c)取後不放回，抽中3白球的機率 (d)取後不放回，在抽中3白球的條件下第三個是白球的機率。", "opts": {}, "ans": null, "ansText": "(a)32/81，(b)3/4，(c)224/495，(d)3/4", "expl": "(a)C(4,3)(2/3)^3(1/3)=32/81；(c)C(8,3)C(4,1)/C(12,4)=224/495；(b)(d)由對稱性皆為3/4。", "flag": false, "num": 34}, {"id": 978, "src": "講義-條件機率", "ch": "綜合練習", "type": "open", "q": "袋中有4紅球、3白球，今自袋中每次取一球連取4次，每次均不放回，問第3次取到白球的機率為何？", "opts": {}, "ans": null, "ansText": "3/7", "expl": "抽籤原理：P(第3次白球)=P(第1次白球)=3/7。", "flag": false, "num": 35}, {"id": 979, "src": "講義-條件機率", "ch": "綜合練習", "type": "open", "q": "課外活動社團共有20位同學參加，已知其中高一、高二、高三同學所佔的比例分別為55%、25%、20%。若由該社團中任選二人，則此二人是不同年級學生的機率為何？", "opts": {}, "ans": null, "ansText": "119/190", "expl": "人數為11、5、4；1-[C(11,2)+C(5,2)+C(4,2)]/C(20,2)=1-71/190=119/190。", "flag": false, "num": 36}, {"id": 980, "src": "講義-條件機率", "ch": "綜合練習", "type": "open", "q": "某校橋藝社由甲乙丙三班同學組成，各佔40%、30%、30%。社員中甲班人數的1/5、乙班人數的1/5、丙班人數的1/3亦為籃球校隊隊員。某次橋藝社推選新社長，每人當選的機會相等，求(a)籃球隊員當選的機率 (b)若籃球隊員當選社長，求他是甲班同學的機率。", "opts": {}, "ans": null, "ansText": "(a)24/100，(b)1/3", "expl": "(a)0.4×1/5+0.3×1/5+0.3×1/3=0.08+0.06+0.10=0.24；(b)貝氏定理：0.08/0.24=1/3。", "flag": false, "num": 37}, {"id": 981, "src": "講義-條件機率", "ch": "綜合練習", "type": "open", "q": "交通規則測驗時，答對有兩種可能：一種是會做而答對，一種是不會做但猜對。已知小華會做的機率是0.8，現有一題5選1的選擇題，小華會做就答對，不會做就亂猜。已知此題小華答對，試問在此條件之下，此題小華是因為會做而答對(不是亂猜)的機率是多少（以最簡分數表示）？", "opts": {}, "ans": null, "ansText": "20/21", "expl": "P(會做|答對)=0.8/(0.8+0.2×1/5)=0.8/0.84=20/21。", "flag": false, "num": 38}, {"id": 982, "src": "講義-條件機率", "ch": "綜合練習", "type": "open", "q": "某地區之天氣，依多年統計每年晴天佔40%、非晴天佔60%。天氣預報將晴天說成晴天的機率為0.7，將非晴天說成晴天之機率為0.2。試問：若天氣預報說明天是晴天，則明天確為晴天的機率為何？", "opts": {}, "ans": null, "ansText": "7/10", "expl": "貝氏定理：0.4×0.7/(0.4×0.7+0.6×0.2)=0.28/0.40=7/10。", "flag": false, "num": 39}, {"id": 983, "src": "講義-條件機率", "ch": "綜合練習", "type": "open", "q": "假設陪審團不論被告有罪或無罪，都有0.95的機率做出正確判決；且在被審判的人當中有99%事實上是有罪的。若已知陪審團判某被告無罪，則該名被告真的是無罪之機率是多少？", "opts": {}, "ans": null, "ansText": "約0.161", "expl": "P(無罪|判無罪)=0.01×0.95/(0.01×0.95+0.99×0.05)=0.0095/0.059≈0.161。", "flag": false, "num": 40}, {"id": 984, "src": "講義-條件機率", "ch": "綜合練習", "type": "open", "q": "某電腦工廠檢驗產品的過程中，將良品檢驗為不良品的機率為0.20，將不良品檢驗為良品的機率為0.16。又知該產品中不良品佔5％、良品佔95％。若一件產品被檢驗為良品，則該產品實際上為不良品之機率為何？", "opts": {}, "ans": null, "ansText": "1/96", "expl": "P(不良|驗為良)=0.05×0.16/(0.05×0.16+0.95×0.80)=0.008/0.768=1/96。", "flag": false, "num": 41}, {"id": 985, "src": "講義-條件機率", "ch": "綜合練習", "type": "open", "q": "某項胸部X光檢查的可靠程度如下：對於有結核病者，90%可發現、10%未發現；對於無結核病者，99%為正確、1%不正確。設地區廣大人口中患有結核病者佔0.1%，若其中任意一人經X光檢查有結核病嫌疑，則此人確有結核病的機率為何？", "opts": {}, "ans": null, "ansText": "10/121", "expl": "貝氏定理：0.001×0.9/(0.001×0.9+0.999×0.01)=0.0009/0.01089=10/121。原文數字經抽字後錯亂，依答案回推無結核病者誤判率為1%。", "flag": false, "num": 42}, {"id": 986, "src": "講義-條件機率", "ch": "綜合練習", "type": "open", "q": "宿舍大門在晚上10點到11點之間上鎖的機率為1/2。某生的抽屜中有10把鑰匙，其中有兩把是大門鑰匙。有一天中午此生任意抓走3把鑰匙外出，請問他在晚上10點半回來時，能打開宿舍大門的機率是多少？", "opts": {}, "ans": null, "ansText": "23/30", "expl": "未上鎖機率1/2必可進門；上鎖時帶到大門鑰匙的機率=1-C(8,3)/C(10,3)=8/15；所求=1/2+1/2×8/15=23/30。", "flag": false, "num": 43}, {"id": 987, "src": "講義-條件機率", "ch": "綜合練習", "type": "open", "q": "設每次甲訪問別人家裡而告辭時忘記帶傘的機率為1/5。某日甲帶傘出去，順次去乙、丙、丁的家訪問，最後回家時發現傘沒有帶回，問此傘遺忘在丙家之機率是多少？", "opts": {}, "ans": null, "ansText": "20/61", "expl": "P(忘在丙)=4/5×1/5；P(忘傘)=1/5+4/5×1/5+4/5×4/5×1/5=61/125；所求=(4/25)/(61/125)=20/61。", "flag": false, "num": 44}, {"id": 988, "src": "講義-條件機率", "ch": "綜合練習", "type": "open", "q": "設有甲、乙兩個袋子，甲袋內有一白球、一黑球，乙袋內有兩個白球。今從甲袋取一球放入乙袋，再從乙袋取一球放入甲袋，然後再由甲袋取一球放入乙袋，最後再由乙袋取一球放入甲袋。試求：(a)最後甲袋內有一白球一黑球的機率 (b)最後乙袋內有一白球一黑球的機率。", "opts": {}, "ans": null, "ansText": "(a)5/9，(b)4/9", "expl": "以樹狀圖追蹤黑球位置，兩輪交換後黑球在甲袋的機率為5/9，在乙袋為4/9。", "flag": false, "num": 45}, {"id": 989, "src": "講義-條件機率", "ch": "進階問題", "type": "open", "q": "有8個人(含甲乙兩人)同時乘坐一輛有4節車廂的火車，在已知剛好每兩人乘坐一車廂的情形下，求甲乙兩人同坐一車廂的機率。", "opts": {}, "ans": null, "ansText": "1/7", "expl": "甲固定後，乙與甲同車廂的機率為1/7（其餘7人中與甲同廂者僅1個位置）。", "flag": false, "num": 46}, {"id": 990, "src": "講義-條件機率", "ch": "進階問題", "type": "open", "q": "設甲袋中有5個銀幣、1個金幣，乙袋中有3個銀幣。今自甲袋中任取4個硬幣放入乙袋，再由乙袋中任取5個硬幣放入甲袋。試求(a)金幣在乙袋的機率 (b)若金幣在甲袋，則甲取得4銀幣（第一次取出的4枚皆為銀幣）的機率。", "opts": {}, "ans": null, "ansText": "(a)4/21，(b)7/17", "expl": "(a)金幣先被移入乙袋(10/15)且未被移回(6/21)：10/15×6/21=4/21；(b)條件機率=(5/15×1)/(10/15×15/21+5/15×1)=7/17。", "flag": false, "num": 47}, {"id": 991, "src": "講義-條件機率", "ch": "進階問題", "type": "open", "q": "一袋中有6個紅球、4個黑球，依次在袋中任取一球，取後不放回。在已知紅球先取完的情形下，求前6次取出皆為紅球的機率。", "opts": {}, "ans": null, "ansText": "1/84", "expl": "P(紅球先取完)=P(第10個位置為黑球)=4/10；P(前6次皆紅)=6!×4!/10!×4=1/210；所求=(1/210)/(4/10)=1/84。", "flag": false, "num": 48}, {"id": 992, "src": "講義-綜合演練", "ch": "單選題", "type": "single", "q": "袋中有5白球、3紅球，由袋中一次取出2球，則至少有一紅球之機率為下列何者？", "opts": {"A": "3/5", "B": "2/5", "C": "5/14", "D": "9/14", "E": "13/14"}, "ans": "D", "ansText": "(D) 9/14", "expl": "至少一紅=1-兩白=1-C(5,2)/C(8,2)=1-5/14=9/14。", "flag": false, "num": 1}, {"id": 993, "src": "講義-綜合演練", "ch": "單選題", "type": "single", "q": "已知樣本空間有A、B兩事件，A事件發生的機率為0.4，B事件發生的機率為0.6，A發生或B發生的機率為0.8，則A與B都發生的機率為下列何者？", "opts": {"A": "0.2", "B": "0.24", "C": "0.32", "D": "0.48", "E": "1"}, "ans": "A", "ansText": "(A) 0.2", "expl": "P(A∩B)=P(A)+P(B)-P(A∪B)=0.4+0.6-0.8=0.2。", "flag": false, "num": 2}, {"id": 994, "src": "講義-綜合演練", "ch": "多選題", "type": "multi", "q": "設A、B為獨立事件，且P(A)=2/3，P(B)=1/2，試選出正確的選項。", "opts": {"A": "A、B為互斥事件", "B": "P(A∩B)=1/3", "C": "P(A∩B')=1/3", "D": "P(A'∩B)=1/6", "E": "P(A'∩B')=1/6"}, "ans": "BCDE", "ansText": "(B)(C)(D)(E)", "expl": "獨立事件P(A∩B)=P(A)P(B)=1/3≠0故非互斥；A與B'、A'與B、A'與B'亦獨立，分別得1/3、1/6、1/6。", "flag": false, "num": 3}, {"id": 995, "src": "講義-綜合演練", "ch": "多選題", "type": "multi", "q": "設A、B為獨立事件，若P(A)=1/3、P(B)=1/2，試選出正確的選項。", "opts": {"A": "P(A)=P(A|B)", "B": "P(A|B)=P(B|A)", "C": "P(A|B)=1/6", "D": "P(A'|B)=2/3", "E": "P(B|A')=1/2"}, "ans": "ADE", "ansText": "(A)(D)(E)", "expl": "獨立時P(A|B)=P(A)=1/3、P(A'|B)=P(A')=2/3、P(B|A')=P(B)=1/2；因P(A)≠P(B)，故P(A|B)≠P(B|A)。", "flag": false, "num": 4}, {"id": 996, "src": "講義-綜合演練", "ch": "填充題", "type": "open", "q": "話劇社動員了16名演員演出舞臺劇，其中有10名高二社員、6名高一社員；高二社員中有6名女生、4名男生，高一社員中有3名女生、3名男生。今任選一名社員，試求：(1)已知是高二社員的情況下，是女生的機率 (2)已知是男生的情況下，是高二社員的機率。", "opts": {}, "ans": null, "ansText": "(1)3/5，(2)4/7", "expl": "(1)=6/10=3/5；男生共7人其中高二4人，(2)=4/7。", "flag": false, "num": 5}, {"id": 997, "src": "講義-綜合演練", "ch": "填充題", "type": "open", "q": "甲、乙、丙三人參加校內桌球比賽，甲、乙、丙進入決賽的機率依序為3/4、2/3、1/2，且三人能否進入決賽是獨立事件。求：(1)三人中至少有一人進入決賽的機率 (2)三人中恰有兩人進入決賽的機率。", "opts": {}, "ans": null, "ansText": "(1)23/24，(2)11/24", "expl": "(1)=1-(1/4)(1/3)(1/2)=23/24；(2)=3/4×2/3×1/2+3/4×1/3×1/2+1/4×2/3×1/2=11/24。", "flag": false, "num": 6}, {"id": 998, "src": "講義-綜合演練", "ch": "填充題", "type": "open", "q": "甲、乙兩人同時解一數學問題，甲每3題能解出2題，乙每4題能解出3題，兩人解題互不影響。求：(1)恰有一人解出的機率 (2)此題被解出的機率。", "opts": {}, "ans": null, "ansText": "(1)5/12，(2)11/12", "expl": "(1)=2/3×1/4+1/3×3/4=5/12；(2)=1-(1/3)(1/4)=11/12。", "flag": false, "num": 7}, {"id": 999, "src": "講義-綜合演練", "ch": "填充題", "type": "open", "q": "桌上有甲、乙、丙三個袋子：甲袋有3個白球，乙袋有2個紅球、1個白球，丙袋有1個紅球、2個白球。小偉擲兩枚均勻硬幣一次，若出現兩正面則從甲袋抽1球，兩反面則從乙袋抽1球，一正一反則從丙袋抽1球。求：(1)抽出白球的機率 (2)此白球來自乙袋的機率。", "opts": {}, "ans": null, "ansText": "(1)2/3，(2)1/8", "expl": "(1)=1/4×1+1/4×1/3+2/4×2/3=8/12=2/3；(2)貝氏定理=(1/12)/(8/12)=1/8。", "flag": false, "num": 8}, {"id": 1000, "src": "講義-綜合演練", "ch": "填充題", "type": "open", "q": "甲、乙、丙三人同時打靶，每人一發，甲、乙、丙的命中率依序為0.5、0.3、0.4，且三人命中靶面的事件為獨立事件。試問：(1)靶面恰中一發的機率 (2)靶面恰中一發，是由甲命中的機率。", "opts": {}, "ans": null, "ansText": "(1)0.44，(2)21/44", "expl": "(1)=0.5×0.7×0.6+0.5×0.3×0.6+0.5×0.7×0.4=0.21+0.09+0.14=0.44；(2)=0.21/0.44=21/44。", "flag": false, "num": 9}, {"id": 1001, "src": "講義-綜合演練", "ch": "填充題", "type": "open", "q": "設A、B是樣本空間S的兩事件，且P(A)=1/2，P(A∪B)=2/3。試依下列條件求：(1)A與B是互斥事件，則P(B)=？ (2)A與B是獨立事件，則P(B)=？", "opts": {}, "ans": null, "ansText": "(1)1/6，(2)1/3", "expl": "(1)互斥時2/3=1/2+P(B)，得P(B)=1/6；(2)獨立時2/3=1/2+P(B)-1/2·P(B)，得P(B)=1/3。", "flag": false, "num": 10}, {"id": 1002, "src": "講義-綜合演練", "ch": "計算題", "type": "open", "q": "袋中有2白球3黑球，自袋中任取一球，甲、乙看過之後都說是白球。根據經驗，甲說實話的機率是4/7，乙說實話的機率為2/7，試求此球確實為白球的機率。", "opts": {}, "ans": null, "ansText": "16/61", "expl": "取白且兩人皆實話=2/5×4/7×2/7=16/245；取黑且兩人皆說謊=3/5×3/7×5/7=45/245；所求=16/(16+45)=16/61。", "flag": false, "num": 11}, {"id": 1003, "src": "講義-綜合演練", "ch": "計算題", "type": "open", "q": "科學研習社社員的年級與性別分配為：高二男16人、高一男8人、高二女12人、高一女2人。如果希望性別與年級獨立，試問應再招收幾名高一女生社員？", "opts": {}, "ans": null, "ansText": "4名", "expl": "設招收x名，使任選一社員是女生的機率等於高一社員中是女生的機率：(14+x)/(38+x)=(2+x)/(10+x)，解得x=4。", "flag": false, "num": 12}, {"id": 1004, "src": "講義-離散型隨機變數", "ch": "離散型隨機變數", "type": "open", "q": "袋中裝有大小相同的紅球2顆、白球4顆。從袋中任取2顆球，並令隨機變數X表示取得紅球的顆數。(1)寫出X所有可能的取值 (2)描述X=0所表示的事件。", "opts": {}, "ans": null, "ansText": "(1)X的取值為0,1,2，(2)X=0表示取到0顆紅球（兩顆皆白球）的事件", "expl": "取2球中紅球數可為0、1、2；X=0即{兩顆白球}。", "flag": false, "num": 1}, {"id": 1005, "src": "講義-離散型隨機變數", "ch": "離散型隨機變數", "type": "open", "q": "從52張撲克牌中隨機抽出5張牌，令隨機變數X表示抽到點數「K」的張數。(1)寫出X所有可能的取值 (2)描述X=1所表示的事件。", "opts": {}, "ans": null, "ansText": "(1)X的取值為0,1,2,3,4，(2)X=1表示抽出的5張牌中恰有1張K的事件", "expl": "K共4張，抽5張中K的張數可為0至4。（原文未附解答，依題意作答）", "flag": false, "num": 2}, {"id": 1006, "src": "講義-離散型隨機變數", "ch": "離散型隨機變數", "type": "open", "q": "丟一枚均勻硬幣3次，並令隨機變數X表示正面出現的次數。(1)寫出X所有可能的取值 (2)求機率P(X=1)及P(X=3)的值。", "opts": {}, "ans": null, "ansText": "(1)0,1,2,3，(2)P(X=1)=3/8、P(X=3)=1/8", "expl": "樣本空間共8個樣本點，恰一正面有3個，三正面有1個。", "flag": false, "num": 3}, {"id": 1007, "src": "講義-離散型隨機變數", "ch": "離散型隨機變數", "type": "open", "q": "丟一枚均勻硬幣4次，並令隨機變數X表示正面出現的次數。(1)寫出X所有可能的取值 (2)求機率P(X=2)與P(X=3)的值。", "opts": {}, "ans": null, "ansText": "(1)0,1,2,3,4，(2)P(X=2)=3/8、P(X=3)=1/4", "expl": "P(X=2)=C(4,2)/16=6/16=3/8；P(X=3)=C(4,3)/16=4/16=1/4。（原文未附解答，依題意計算）", "flag": false, "num": 4}, {"id": 1008, "src": "講義-離散型隨機變數", "ch": "離散型隨機變數", "type": "open", "q": "袋中有大小相同的白球2顆、紅球3顆，每次從袋中任取一球，取後不放回，直到取到紅球才停止，稱此為一輪操作。每顆球被取到的機會均等，令隨機變數X表示一輪操作中所取出的總球數。(1)寫出隨機變數X的機率分布表 (2)求機率P(X≤2)的值。", "opts": {}, "ans": null, "ansText": "(1)P(X=1)=3/5、P(X=2)=3/10、P(X=3)=1/10，(2)P(X≤2)=9/10", "expl": "P(X=1)=3/5；P(X=2)=2/5×3/4=3/10；P(X=3)=2/5×1/4×1=1/10；P(X≤2)=3/5+3/10=9/10。", "flag": false, "num": 5}, {"id": 1009, "src": "講義-離散型隨機變數", "ch": "離散型隨機變數", "type": "open", "q": "甲、乙兩人各從1, 2與3三個數字中任選一個數字，可重複選取，每個數字被選到的機會均等。令隨機變數X表示甲、乙所選數字的差之絕對值。(1)寫出隨機變數X的機率分布表 (2)求機率P(X≥1)的值。", "opts": {}, "ans": null, "ansText": "(1)P(X=0)=1/3、P(X=1)=4/9、P(X=2)=2/9，(2)P(X≥1)=2/3", "expl": "共9種等機率組合：差0有3種、差1有4種、差2有2種；P(X≥1)=1-1/3=2/3。（原文未附解答，依題意計算）", "flag": false, "num": 6}, {"id": 1010, "src": "講義-離散型隨機變數", "ch": "期望值", "type": "open", "q": "已知裝有100元、200元與300元的紅包袋各有1, 2, 1個，任取2個紅包袋，且每個紅包袋被取到的機會均等，令隨機變數X表示取出兩個紅包袋的總金額，求X的期望值。", "opts": {}, "ans": null, "ansText": "E(X)=400元", "expl": "X取值300,400,500元的機率各為1/3，E(X)=300×1/3+400×1/3+500×1/3=400。", "flag": false, "num": 7}, {"id": 1011, "src": "講義-離散型隨機變數", "ch": "期望值", "type": "open", "q": "盒中有8顆巧克力，其中3顆的內餡為杏仁。自盒中任取兩顆，且每顆巧克力被取到的機會均等，令隨機變數X表示取到杏仁內餡巧克力的顆數，求X的期望值。", "opts": {}, "ans": null, "ansText": "E(X)=3/4", "expl": "P(X=0)=C(5,2)/C(8,2)=10/28、P(X=1)=15/28、P(X=2)=3/28；E(X)=(0×10+1×15+2×3)/28=21/28=3/4。（原文未附解答，依題意計算）", "flag": false, "num": 8}, {"id": 1012, "src": "講義-離散型隨機變數", "ch": "期望值", "type": "open", "q": "袋中有100元代幣3枚、50元代幣6枚與20元代幣n枚。從袋中抽出一枚代幣，且每枚代幣被取到的機會均等，令隨機變數X表示抽出代幣的金額。已知X的期望值為40元，求n的值。", "opts": {}, "ans": null, "ansText": "n=12", "expl": "E(X)=(100×3+50×6+20n)/(n+9)=40，整理得20n=240，故n=12。", "flag": false, "num": 9}, {"id": 1013, "src": "講義-離散型隨機變數", "ch": "期望值", "type": "open", "q": "擲一粒公正的骰子一次，當出現1, 2或3點時可得200元；出現4或5點時可得500元；出現6點時可得k元。設隨機變數X表示擲骰子一次所得的金額，已知X的期望值為400元，求k的值。", "opts": {}, "ans": null, "ansText": "k=800", "expl": "E(X)=200×1/2+500×1/3+k×1/6=400，得100+500/3+k/6=400，解得k=800。（原文未附解答，依題意計算）", "flag": false, "num": 10}, {"id": 1014, "src": "講義-離散型隨機變數", "ch": "變異數與標準差", "type": "open", "q": "袋中有編號2, 4, 6, 8的球各一顆，今從袋中取出一球，且每球被取到的機會均等。設隨機變數X表示取出球的編號，求X的期望值、變異數與標準差。", "opts": {}, "ans": null, "ansText": "E(X)=5，Var(X)=5，標準差=√5", "expl": "E(X)=(2+4+6+8)/4=5；Var(X)=(9+1+1+9)/4=5；標準差為√5。", "flag": false, "num": 11}, {"id": 1015, "src": "講義-離散型隨機變數", "ch": "變異數與標準差", "type": "open", "q": "摸彩箱中裝有標示5, 6, 7, 8折的球分別各有1, 2, 3, 4顆。從箱中取出一球，且每球被取到的機會均等。設隨機變數X表示取出球所代表的折扣數，求X的期望值、變異數與標準差。", "opts": {}, "ans": null, "ansText": "E(X)=7，Var(X)=1，標準差=1", "expl": "E(X)=(5+12+21+32)/10=7；E(X^2)=(25+72+147+256)/10=50，Var(X)=50-49=1，標準差1。（原文未附解答，依題意計算）", "flag": false, "num": 12}, {"id": 1016, "src": "講義-離散型隨機變數", "ch": "變異數與標準差", "type": "open", "q": "投擲一粒不公正的骰子，其各點數出現的機率與該點數成正比。設隨機變數X表示擲一次骰子所出現的點數，求X的期望值與變異數。", "opts": {}, "ans": null, "ansText": "E(X)=13/3，Var(X)=20/9", "expl": "P(X=k)=k/21；E(X)=91/21=13/3；Var(X)=E(X^2)-(13/3)^2=441/21-169/9=20/9。", "flag": false, "num": 13}, {"id": 1017, "src": "講義-離散型隨機變數", "ch": "變異數與標準差", "type": "open", "q": "袋中裝有大小相同、編號1, 2, 3, 4的球各一顆，自袋中任取兩顆球，且每球被取到的機會均等。隨機變數X表示取出兩顆球中的最大編號，求X的期望值、變異數與標準差。", "opts": {}, "ans": null, "ansText": "E(X)=10/3，Var(X)=5/9，標準差=√5/3", "expl": "P(X=2)=1/6、P(X=3)=2/6、P(X=4)=3/6；E(X)=20/6=10/3；E(X^2)=70/6=35/3，Var(X)=35/3-100/9=5/9。（原文未附解答，依題意計算）", "flag": false, "num": 14}, {"id": 1018, "src": "講義-離散型隨機變數", "ch": "期望值變異數與標準差的性質", "type": "open", "q": "同時丟兩枚均勻的硬幣一次，每出現一枚正面可得200元，每出現一枚反面可得100元。設隨機變數X表示正面出現的枚數；Y表示所得的金額。(1)求X的期望值E(X)與標準差σ(X) (2)已知X與Y的關係可表示成Y=aX+b，求a, b的值 (3)利用(1)與(2)，求Y的期望值E(Y)與標準差σ(Y)。", "opts": {}, "ans": null, "ansText": "(1)E(X)=1、σ(X)=√2/2，(2)a=100、b=200，(3)E(Y)=300元、σ(Y)=50√2元", "expl": "X取0,1,2機率1/4,1/2,1/4，E(X)=1，Var(X)=1/2；X=0,1,2對應Y=200,300,400，得Y=100X+200；E(Y)=100×1+200=300，σ(Y)=100×√2/2=50√2。", "flag": false, "num": 15}, {"id": 1019, "src": "講義-離散型隨機變數", "ch": "期望值變異數與標準差的性質", "type": "open", "q": "已知隨機變數X滿足E(-2X+3)=47，Var(-2X+3)=196，求X的期望值E(X)、變異數Var(X)與標準差σ(X)。", "opts": {}, "ans": null, "ansText": "E(X)=-22，Var(X)=49，標準差=7", "expl": "-2E(X)+3=47得E(X)=-22；4Var(X)=196得Var(X)=49，標準差7。（原文未附解答，依題意計算）", "flag": false, "num": 16}, {"id": 1020, "src": "講義-離散型隨機變數", "ch": "觀念澄清", "type": "open", "q": "下列敘述對的打「○」，錯的打「×」：(1)丟一枚均勻硬幣三次，令隨機變數X表示正面出現的次數，則P(X=0)=0。(2)若隨機變數X所有可能的取值為1, 2，則P(X=1)+P(X=2)=1。(3)若隨機變數X的期望值E(X)=2，且Y=-2X+3，則E(Y)=-4。", "opts": {}, "ans": null, "ansText": "(1)×，(2)○，(3)×", "expl": "(1)P(X=0)=1/8≠0；(2)所有取值機率和為1；(3)E(Y)=-2×2+3=-1≠-4。（原文未附解答，依題意判斷）", "flag": false, "num": 17}, {"id": 1021, "src": "講義-離散型隨機變數", "ch": "習題-基礎題", "type": "open", "q": "從1, 2, 3, 4, 5中任取兩個相異的數字，並令隨機變數X表示取到偶數的個數。(1)寫出X所有可能的取值 (2)描述X=0所表示的事件。", "opts": {}, "ans": null, "ansText": "(1)0,1,2，(2)X=0表示取出的兩個數字皆為奇數的事件", "expl": "偶數有2,4兩個，取2數中偶數個數可為0,1,2。（原文未附解答，依題意作答）", "flag": false, "num": 18}, {"id": 1022, "src": "講義-離散型隨機變數", "ch": "習題-基礎題", "type": "open", "q": "袋中有紅球4顆、白球2顆。從袋中取出2顆球，且每球被取到的機會均等。令隨機變數X表示取出的紅球數。(1)寫出X所有可能的取值 (2)求機率P(X=2)的值 (3)求機率P(X≥1)的值。", "opts": {}, "ans": null, "ansText": "(1)0,1,2，(2)P(X=2)=2/5，(3)P(X≥1)=14/15", "expl": "P(X=2)=C(4,2)/C(6,2)=6/15=2/5；P(X≥1)=1-C(2,2)/C(6,2)=1-1/15=14/15。（原文未附解答，依題意計算）", "flag": false, "num": 19}, {"id": 1023, "src": "講義-離散型隨機變數", "ch": "習題-基礎題", "type": "open", "q": "甲、乙兩人各從1與2兩個數字中任選一個數字，並令隨機變數X表示甲、乙所選數字的平方和。已知每個數字被選到的機會均等，求機率P(X≤7)的值。", "opts": {}, "ans": null, "ansText": "P(X≤7)=3/4", "expl": "X可能為2,5,8，機率各為1/4,1/2,1/4；P(X≤7)=P(X=2)+P(X=5)=3/4。（原文未附解答，依題意計算）", "flag": false, "num": 20}, {"id": 1024, "src": "講義-離散型隨機變數", "ch": "習題-基礎題", "type": "open", "q": "擲一粒公正骰子2次，令隨機變數X為點數6出現的次數，求隨機變數X的期望值。", "opts": {}, "ans": null, "ansText": "E(X)=1/3", "expl": "X服從二項分布B(2,1/6)，E(X)=2×1/6=1/3。（原文未附解答，依題意計算）", "flag": false, "num": 21}, {"id": 1025, "src": "講義-離散型隨機變數", "ch": "習題-基礎題", "type": "open", "q": "箱中有黃球2顆、紅球5顆與白球n顆。從箱中取出一球，且每球被取到的機會均等。取出球的顏色為黃球、紅球與白球分別可得500元、200元與0元，並令隨機變數X表示取出一球所得的金額。已知X的期望值為100元，求n的值。", "opts": {}, "ans": null, "ansText": "n=13", "expl": "E(X)=(500×2+200×5)/(7+n)=2000/(7+n)=100，解得n=13。（原文未附解答，依題意計算）", "flag": false, "num": 22}, {"id
